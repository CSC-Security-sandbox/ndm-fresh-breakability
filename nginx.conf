            add_header "Expires" "-1";
         }
    
        location ~ /api/v1/(servers)/* {
            proxy_pass             __VITE_CONFIG_SERVICE_ENDPOINT__;
            proxy_read_timeout     60;
            proxy_connect_timeout  60;
            proxy_redirect         off;

            # Allow the use of websockets
