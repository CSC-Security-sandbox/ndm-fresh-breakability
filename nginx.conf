            add_header "Pragma" "no-cache";
            add_header "Expires" "-1";
        }

        location ~ /api/v1/(health|api-docs|accounts|user-status|reset-password|create-user|permission|role-permissions|user-roles|user-permissions|inviteUser|roles|users|projects)/* {
           proxy_pass             __VITE_ADMIN_SERVICE_ENDPOINT__;
           proxy_read_timeout     60;
           proxy_connect_timeout  60;
           proxy_redirect         off;

           # Allow the use of websockets
           proxy_http_version 1.1;
