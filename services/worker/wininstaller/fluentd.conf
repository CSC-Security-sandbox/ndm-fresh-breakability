<system>
  log_level info
  suppress_repeated_stacktrace true
</system>

# Input: worker application logs
<source>
  @type tail
  path C:/datamigrator/logs/*.log
  pos_file C:/opt/fluent/var/log/fluent/worker.log.pos
  tag worker.tag
  <parse>
    @type none
    message_key log
  </parse>
  read_from_head false
</source>

# Filter: Add worker metadata to worker logs
<filter worker.tag>
  @type record_transformer
  <record>
    worker_id {{WORKER_ID}}
    worker_type windows
    worker_platform windows
    hostname ${hostname}
    source_type datamigrator_log
    log_source datamigrator
  </record>
</filter>

# Output: Forward all logs to control plane
<match **>
  @type forward
  send_timeout 60s
  recover_wait 10s
  heartbeat_interval 15s
  phi_threshold 16
  hard_timeout 60s
  
  <server>
    name control-plane
    host {{CONTROL_PLANE_IP}}
    port 32422
    weight 60
  </server>
  
  <security>
    self_hostname {{WORKER_ID}}-windows
    shared_key secure_communication_is_awesome
  </security>
  
  <buffer>
    @type file
    path C:/opt/fluent/var/log/fluent/buffer/forward
    flush_mode interval
    flush_interval 30s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 5s
    retry_max_interval 300s
    retry_timeout 24h
    queued_chunks_limit_size 128
    chunk_limit_size 64MB
    total_limit_size 2GB
    overflow_action drop_oldest_chunk
    timekey 1h
    timekey_wait 300
    compress gzip
  </buffer>
</match>