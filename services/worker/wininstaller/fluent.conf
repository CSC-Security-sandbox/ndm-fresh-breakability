<system>
  log_level info
  suppress_repeated_stacktrace true
</system>

# Input: Tail worker application logs
<source>
  @type tail
  path C:/datamigrator/logs/*.log
  pos_file C:/opt/fluent/var/log/fluent/worker.log.pos
  tag worker.tag
  <parse>
    @type none
    message_key log
  </parse>
  read_from_head false
</source>

# Input: Windows Event Log 
<source>
  @type windows_eventlog2
  @id windows_eventlog2
  channels application,system
  tag winevt.raw
  read_existing_events false
  <storage>
    @type local
    persistent true
    path C:/opt/fluent/var/log/fluent/winevt.pos
  </storage>
</source>

<filter worker.tag>
  @type record_transformer
  <record>
    worker_id {{WORKER_ID}}
    worker_type windows
    hostname ${hostname}
  </record>
</filter>

<filter winevt.raw>
  @type record_transformer
  <record>
    worker_id {{WORKER_ID}}
    log_type windows_event
    hostname ${hostname}
  </record>
</filter>

<match **>
  @type forward
  send_timeout 60s
  recover_wait 10s
  heartbeat_interval 1s
  phi_threshold 16
  hard_timeout 60s
  
  <server>
    name control-plane
    host {{CONTROL_PLANE_IP}}
    port 32422
    weight 60
  </server>
  
  <security>
    self_hostname {{WORKER_ID}}-windows
    shared_key secure_communication_is_awesome
  </security>
  
  <buffer>
    @type file
    path C:/opt/fluent/var/log/fluent/buffer/forward
    flush_mode interval
    flush_interval 5s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_timeout 1h
    queued_chunks_limit_size 8
    compress gzip
  </buffer>
</match>