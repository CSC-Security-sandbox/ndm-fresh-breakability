- name: Admin entry configmap template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/admin-entry-configmap.j2 dest=$HOME/admin-entry-configmap.yaml

- name: Admin entry job template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/admin-entry-job.j2 dest=$HOME/admin-entry-job.yaml

- name: reset job for the users
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl delete -f $HOME/admin-entry-configmap.yaml -n datamigrate
    kubectl delete -f $HOME/admin-entry-job.yaml -n datamigrate
  when: reset_job is defined    
  args:
    chdir: $HOME

- name: Run script to add admin
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl apply -f $HOME/admin-entry-configmap.yaml -n datamigrate
    sleep 5
    kubectl apply -f $HOME/admin-entry-job.yaml -n datamigrate

- name: Wait for job to complete successfully
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl wait --for=condition=complete --timeout=600s job/admin-entry-job -n datamigrate
  register: job_wait_result
  retries: 5
  delay: 10
  until: job_wait_result.rc == 0

- name: Clean up admin entry configmap and job files
  become: yes
  become_user: "{{ vm_username }}"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - $HOME/admin-entry-configmap.yaml
    - $HOME/admin-entry-job.yaml
