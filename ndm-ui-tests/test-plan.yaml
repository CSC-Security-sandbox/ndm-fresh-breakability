# ─────────────────────────────────────────────────────────────────────────────
# NDM UI Test Plan
#
# Controls which UI tests run on the pipeline.
#
# Structure:
#   suites.<name>.enabled  — false skips the whole suite (no browser launched)
#   suites.<name>.parallel — max concurrent browser instances for this suite
#   suites.<name>.timeout  — go test -timeout value (e.g. 30m, 60m)
#   suites.<name>.tests.<TestFunctionName>: true|false  # description
#
# Each test line:
#   TestFoo: true   # what this test verifies
#   TestFoo: false  # why it is disabled / what env vars it needs
#
# Notes:
#   - Suite-level enabled:false takes priority over individual test flags.
#   - parallel defaults to 2 when not specified.
#   - timeout defaults to 30m when not specified.
# ─────────────────────────────────────────────────────────────────────────────

suites:

  # ── Account / User Management ──────────────────────────────────────────────
  # Creates users, assigns project roles, completes first-login password change,
  # and verifies RBAC permissions for Project Viewer and Project Admin — all in
  # one end-to-end flow.
  user_management:
    enabled: false
    parallel: 1          # stateful test; run serially
    timeout: 20m
    tests:
      TestUserManagement_CreateThreeRoleUsers: true   # Create users, assign roles, first login, verify RBAC for Viewer + Admin

  # ── Discovery ──────────────────────────────────────────────────────────────
  discovery:
    enabled: false
    parallel: 4          # each test gets its own browser + ANF clone
    timeout: 60m
    tests:
      TestDiscovery_BasicNFS:               true    # NFS discovery on a cloned volume; validates report counts against live data
      TestDiscovery_ExcludeFilePatterns:    true    # Discovery with custom exclude patterns (*.tmp *.log *.bak)
      TestDiscovery_Bulk:                   true    # Bulk discovery — all export paths selected in a single job
      TestDiscovery_Destination:            false   # Scan destination server for baseline — requires NDM_DESTINATION_FILE_SERVER_ID
      TestDiscovery_Isilon:                 false   # Isilon/PowerScale auto-lists paths, excludes .snapshot — requires NDM_ISILON_HOST
      TestDiscovery_IndividualReportCSV:    false   # Download per-run discovery CSV from Job Run List — requires NDM_FILE_SERVER_ID
      TestDiscovery_ConsolidatedCSV:        false   # Generate and download consolidated discovery CSV — requires NDM_FILE_SERVER_ID
      TestDiscovery_ValidateReportAgainstVolume: false   # Validate CSV counts against live NFS volume — requires NDM_FILE_SERVER_ID

  # ── Migration ────────────────────────────────────────────────────────────────
  # End-to-end Bulk Migrate flows — NFS source → NFS destination.
  # Creates fresh file servers, runs migration, validates job completion,
  # and downloads CoC (Chain of Custody) reports.
  migration:
    enabled: false
    parallel: 1          # avoid creating 6 file servers at once; run serially
    timeout: 60m
    tests:
      TestMigration_BasicNFS: true               # Full NFS Bulk Migrate end-to-end + CoC report download
      TestMigration_IncrementalSyncCron: true    # Bulk Migrate with cron-based incremental sync (waits for 2nd job run)
      TestMigration_CustomOptions: true          # Bulk Migrate with custom options (a-time off, permissions off, exclude patterns)
      TestMigration_BasicSMB: true               # Full SMB Bulk Migrate end-to-end + CoC report download

  # ── Incremental Migration ──────────────────────────────────────────────────
  # Validates adhoc migration runs after source-side changes.
  # Runs baseline migration, applies 10% metadata + 10% file churn on source
  # via SSH, triggers adhoc run, downloads CoC reports, and reverts source.
  incremental:
    enabled: false
    parallel: 1          # sequential — single source volume under churn
    timeout: 90m
    tests:
      TestIncremental_AdhocAfterChurn: true    # Baseline + 10% metadata/file churn + adhoc run + both CoC reports

  # ── Cutover ────────────────────────────────────────────────────────────────
  # Validates the Bulk Cutover flow end-to-end:
  # Runs baseline migration, navigates to Bulk Cutover, selects the completed
  # job config path, accepts the downtime acknowledgment, and submits.
  # Verifies the cutover job reaches "Blocked" state (awaiting human approval).
  cutover:
    enabled: true
    parallel: 1          # sequential — depends on completed migration
    timeout: 60m
    tests:
      TestCutover_BasicNFS: false   # Baseline NFS migration + Bulk Cutover → Blocked → Review & Approve → Approved state
      TestCutover_BasicSMB: true    # Baseline SMB migration + Bulk Cutover → Blocked → Review & Approve → Approved state
