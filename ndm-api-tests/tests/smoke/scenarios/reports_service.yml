Get-JobRunId-by-job-config-id:
  url: /api/v1/job-run?page=1&limit=10&sort=createdAt&order=asc&jobConfigId={MigrationJobConfigId}&projectId={projectId}
  method: GET
  service_name: job_service
  data: {}
  params:
    projectId: projectId
    MigrationJobConfigId: MigrationJobConfigId
  response:
   - status_code: 200
  parse: 
    jobRunId : MigrationJobRunId


 
download-report-by-jobrunid-and-report-type-discovery :
  url: /api/v1/report/inventory/download?jobRunId=$SourceDiscoveryJobRunId,$DestinationDiscoveryJobRunId&report-type=DISCOVER
  method : GET
  service_name : reports_service
  data : {}

  response :
    - text : text
    - status_code: 200
  parse : {}


Get-Report-by-job-Run-Id-Migration:
  url: /api/v1/report/job-run/{id}
  method: GET
  service_name: reports_service
  data: {}
  params:
    id: MigrationJobRunId
  response:
   - status_code: 200
  parse: {}



  
