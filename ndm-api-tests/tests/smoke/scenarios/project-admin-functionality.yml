# TC: Validate Project Admin able to create the file server Config

create-config:
  url: /api/v1/servers
  method: post
  service_name: config_service
  data:
    configName: "${CONFIG_NAME}"
    configType: "${CONFIG_TYPE}"
    projectId: $project_id
    fileServers:
      - serverType: "${SERVER_TYPE}"
        userName: "${ROOT_USER_NAME}"
        password: "${PASSWORD}"
        protocol: "NFS"
        protocolVersion: "${PROTOCOL_VERSION_3}"
        host: "${NFS_HOST}"
        volumes: []
        workers:
          - "7c8877e6-df9b-414b-bf1d-e8d8c3d78cad"
    workingDirectory:
      workingDirectory: ""
      pathId: null
      pathName: ""
  response:
    - status_code: 201
  parse:
    id: configId