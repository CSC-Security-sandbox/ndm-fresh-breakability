scenarios:
  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    data:
      username: "testprojectviewer@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 201
      - user.first_name: "test"
    parse:
      user: user
      userid: user.id

  - name: create-new-user-role
    url: /api/v1/user-roles
    method: POST
    service_name: admin_service
    data:
      project_id: "$project_id"
      account_id: "$account_id"
      user_id: "$userid"
      role_id: "$project_viewer_id"
    response:
      - status_code: 201
    parse:
      user_role_id: id

  - name: keycloak-reset-password
    method: POST
    data:
      username: "$user.email"
      password: "Root@123"
    response:
      - status_code: 201
    parse: {}

  - name: new-login
    method: POST
    data:
      username: "$user.email"
      password: "Root@123"
    response:
      - status_code: 201
    parse: { }

  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    headers:
      projectid: $project_id
    data:
      username: "testprojectviewer@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 403

  - name: get-all-users
    url: /api/v1/users
    method: GET
    service_name: admin_service
    headers:
      projectid: $project_id
    response:
      - status_code: 403

  - name: get-user-by-id
    url: /api/v1/users/{id}
    method: GET
    service_name: admin_service
    headers:
      projectid: $project_id
    response:
      - status_code: 403
    params:
      id: userid

  - name: change-user-status
    url: /api/v1/user-status
    method: POST
    service_name: admin_service
    headers:
      projectid: $project_id
    data:
      email: "$user.email"
      enable: false
    response:
      - status_code: 403