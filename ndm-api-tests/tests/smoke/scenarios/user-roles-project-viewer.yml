scenarios:
  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    data:
      username: "testprojectviewer@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 201
      - user.first_name: "test"
    parse:
      userid: user.id
      userEmail: user.email

  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    data:
      username: "testprojectviewer2@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 201
      - user.first_name: "test"
    parse:
      userid2: user.id
      userEmail2: user.email

  - name: create-new-user-role
    url: /api/v1/user-roles
    method: POST
    service_name: admin_service
    data:
      project_id: "$project_id"
      account_id: "$account_id"
      user_id: "$userid"
      role_id: "$project_viewer_id"
    response:
      - status_code: 201

  - name: keycloak-reset-password
    method: POST
    data:
      username: "$userEmail"
      password: "Root@123"
    response:
      - status_code: 201
    parse: { }

  - name: new-login
    method: POST
    data:
      username: "$userEmail"
      password: "Root@123"
    response:
      - status_code: 201
    parse: { }

  - name: create-new-user-role-batch
    url: /api/v1/user-roles/batch
    method: POST
    service_name: admin_service
    headers:
      projectid: $project_id
    data:
      project_id: "$project_id"
      account_id: "$account_id"
      users:
        - user_id: "$userid2"
          role_id: "$project_admin_id"
    response:
      - status_code: 403

  - name: get-user-role
    url: /api/v1/user-roles
    headers:
      projectid: $project_id
    method: GET
    service_name: admin_service
    data: {}
    response:
      - status_code: 403

