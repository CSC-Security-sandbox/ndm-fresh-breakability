# api/v1/jobs/project/{project_id}

# MIGRATION STEP 1
get-config-and-volume-by-project-id:
  url: /api/v1/jobs/project/{project_id}
  method: get
  service_name: job_service
  params:
    project_id: projectId
  response:
    - status_code: 200
  parse: {}


pre-check-migration:
  url: /api/v1/jobs/precheck
  method: post
  service_name: job_service
  data:
    migrateConfigs:
      sourcePathId: "$configs[0].fileServers[0].volumes[0].id"
      destinationPathId:
        - "UUID_PLACEHOLDER"
    preserveAccessTime: true
  response:
    - status_code: 201
  parse:
    workflowId: workflowId

create-migration-now:
  url: /api/v1/jobs/bulk-migrate
  method: post
  service_name: job_service
  data:
    firstRunAt: "2025-03-20T09:51:01.230Z"
    futureRunSchedule: ""
    migrateConfigs:
      - sourcePathId: "$configs[0].fileServers[0].volumes[0].id"
        destinationPathId: "$destinationPathId"
    sid_mapping: false
    options:
      excludeFilePatterns: "*/snapshots/*,*/logs/*,*/tmp/*"
      preserveAccessTime: true
      preservePermissions: true
      skipFile: "15-M"
  response:
    - status_code: 201
  parse:
    id: MigrationJobConfigId




