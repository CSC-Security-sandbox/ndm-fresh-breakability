# TC: Validate the creaton of NFS file server with protocol version 3
create-config:
  url: /api/v1/servers
  method: post
  service_name: config_service
  data:
    configName: "${CONFIG}"
    configType: "${CONFIG_TYPE}"
    projectId: $project_id
    fileServers:
      - serverType: "${SERVER_TYPE}"
        userName: "${ROOT_USER_NAME}"
        password: "${PASSWORD}"
        protocol: "NFS"
        protocolVersion: "${PROTOCOL_VERSION_3}"
        host: "${NFS_HOST}"
        volumes: []
        workers:
          - "7c8877e6-df9b-414b-bf1d-e8d8c3d78cad"
    workingDirectory:
      workingDirectory: ""
      pathId: null
      pathName: ""

  response:
    - status_code: 201
  parse:
    id: configId

# TC: Validate the file server created successfully with expected export path and worker with protocol version 3 
get-config-by-id:
  url: /api/v1/servers/{id}
  method: get
  service_name : config_service
  delay : "5"
  data: {}
  response:
    - status_code : 200
      configs[0].fileServers[0].volumes[0].volumePath: "${NFS_EXPORT_PATH}"
      configs[0].fileServers[0].workers[0].workerName: "${NFS_WORKER_NAME}"
  params :
    id: configId



