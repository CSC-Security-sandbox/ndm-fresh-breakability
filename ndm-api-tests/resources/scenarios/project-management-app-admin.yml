scenarios:
  - name: create-project
    url: /api/v1/projects
    method: post
    service_name : admin_service
    data:
      account_id: "$account_id"
      project_name: $autogen_project_name
      project_description: desc1
      start_date: "2025-03-05T07:08:02.742Z"
    response:
      - status_code: 201
    parse:
      project_id_1: id

  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    data:
      username: "testprojectadmin3010@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 201
      - user.first_name: "test"
    parse:
      user: user
      userid: user.id

  - name: create-new-user-role
    url: /api/v1/user-roles
    method: post
    service_name: admin_service
    data:
      project_id: "$project_id_1"
      account_id: "$account_id"
      user_id: "$userid"
      role_id: "$app_admin_id"
    response:
      - status_code: 201
    parse:
      user_role_id: id

  - name: get-project-list
    url : /api/v1/projects?limit=1000
    method : get
    service_name : admin_service
    data :
    response :
      - status_code: 200

  - name: get-permission-list
    url : /api/v1/user-permissions
    method : get
    service_name : admin_service
    data :
    response :
      - status_code: 200

  - name: get-project-by-project_id
    url : /api/v1/projects/{id}
    method : get
    service_name : admin_service
    data :
    params :
      id : project_id_1
    response :
      - status_code: 200
    parse :
      project_id_1: id
