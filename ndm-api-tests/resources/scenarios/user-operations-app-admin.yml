scenarios:
  - name: create-user
    url: /api/v1/create-user
    method: POST
    service_name: admin_service
    data:
      username: "testadmin@email.com"
      firstName: "test"
      lastName: "user"
    response:
      - status_code: 201
      - user.first_name: "test"
    parse:
      user: user
      userid: user.id

  - name: get-all-users
    url: /api/v1/users
    method: GET
    service_name: admin_service
    response:
      - status_code: 200

  - name: get-user-by-id
    url: /api/v1/users/{id}
    method: GET
    service_name: admin_service
    response:
      - status_code: 200
    params:
      id: userid

  - name: change-user-status
    url: /api/v1/user-status
    method: POST
    service_name: admin_service
    data:
      email: "$user.email"
      enable: false
    response:
      - status_code: 201

  - name: get-user-with-changed-status
    url: /api/v1/users/{id}
    method: GET
    service_name: admin_service
    response:
      - status_code: 200
      - user_status: "inactive"
    params:
      id: userid

  - name: change-user-status
    url: /api/v1/user-status
    method: POST
    service_name: admin_service
    data:
      email: "$user.email"
      enable: true
    response:
      - status_code: 201

  - name: get-user-with-changed-status
    url: /api/v1/users/{id}
    method: GET
    service_name: admin_service
    response:
      - status_code: 200
      - user_status: "active"
    params:
      id: userid
