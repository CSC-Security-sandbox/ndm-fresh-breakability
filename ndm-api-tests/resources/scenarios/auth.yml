    url: /api/v1/create-user
    method: post
    service_name: admin_service
    data:
      username: "lasslssissstsdinsdsghsssss8ss1sssssss2ss00sss0@email.com"
      firstName: "Lalit"
      lastName: "Singh"
    response:
      - status_code: 201
      - user.first_name: "Lalit"
    parse:
      id: user.id
      user: user


  - name: reset-password-user
    url: /api/v1/reset-password
    method: post
    service_name: admin_service
    data:
      email: "$user.email"
    response:
      - status_code: 201
      - email: "lasslssissstsdinsdsghsssss8ss1sssssss2ss00sss0@email.com"
    parse: {}

  - name: change-user-status
    url: /api/v1/user-status
    method: post
    service_name: admin_service
    data:
      email: "$user.email"
      enable: false
    response:
      - status_code: 201
    parse: {}

  - name: worker-registration
    url: /api/v1/worker-registration
    method: post
