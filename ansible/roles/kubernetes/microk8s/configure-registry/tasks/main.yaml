---
# 1. Copy the tar file from your control node to the target server
- name: Copy Docker image tar file to target
  copy:
    src: "../../datamigrate/datamigrate_{{ datamigrate_release_version }}.tar"
    dest: /tmp/docker_images.tar
    mode: '0644'

# 2. Load Docker images from the tar file
- name: Load Docker images from tar file
  command: docker load --input /tmp/docker_images.tar
  register: docker_load_result

# 3. Extract image names from the load output using awk
- name: Extract loaded image names using awk
  shell: echo "{{ docker_load_result.stdout }}" | grep 'Loaded image:' | awk '{print $3}'
  register: image_list

# Debug loaded images (optional, for verification)
- name: Display loaded images
  debug:
    var: image_list

# 4. Push images to the MicroK8s local registry
- name: Push Docker images to MicroK8s local registry
  command: docker push "{{ item }}"
  loop: "{{ image_list.stdout_lines }}"

# 5. List images in the MicroK8s local registry with tags
- name: List images and tags in the MicroK8s local registry
  shell: |
    curl -s http://localhost:32000/v2/_catalog | jq -r '.repositories[]' | while read repo; do
      curl -s "http://localhost:32000/v2/$repo/tags/list" | jq -r '.tags[]' | while read tag; do
        echo "$repo:$tag"
      done
    done
  register: registry_images

- name: Show images with tags
  debug:
    msg: "{{ registry_images.stdout_lines }}"

# 6. Clean up the tar file after loading (optional)
- name: Remove tar file from target
  file:
    path: /tmp/docker_images.tar
    state: absent
