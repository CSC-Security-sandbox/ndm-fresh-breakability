---
- name: 1.1 Create the '{{ vm_username }}' user with a home directory
  become: yes
  user:
    name: "{{ vm_username }}"
    state: present
    home: "/home/{{ vm_username }}"
    shell: /bin/bash
    groups: sudo
    append: yes

- name: 1.2. Set up sudo for '{{ vm_username }}' (with restricted commands)
  become: yes
  copy:
    dest: "/etc/sudoers.d/{{ vm_username }}"
    content: |
      "{{ vm_username }}" ALL=(ALL) NOPASSWD: \
        /usr/bin/microk8s.start, \
        /usr/bin/microk8s.stop, \
        /usr/bin/microk8s.enable, \
        /usr/bin/microk8s.disable, \
        /usr/bin/microk8s.join, \
        /usr/bin/microk8s.leave, \
        /usr/bin/microk8s.refresh-certs, \
        /usr/bin/microk8s.config, \
        /usr/bin/snap refresh microk8s, \
        /usr/bin/snap install microk8s, \
        /usr/bin/microk8s.kubectl*, \
        /usr/bin/microk8s.*
    mode: "0440"

