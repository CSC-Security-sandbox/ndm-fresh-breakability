- name: 1.3. Disable root SSH access
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present

- name: 1.4. Deny SSH access for '{{ vm_username }}'
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?DenyUsers'
    line: 'DenyUsers {{ vm_username }}'
    state: present

- name: 1.5. Allow SSH access only for the 'ubuntu' user
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?AllowUsers'
    line: 'AllowUsers ubuntu'
    state: present
  
# - name: Disable password authentication for SSH
#   lineinfile:
#     path: /etc/ssh/sshd_config
#     regexp: '^#?PasswordAuthentication'
#     line: 'PasswordAuthentication no'
#     state: present

- name: 1.6. Validate sudoers file for '{{ vm_username }}'
  become: yes
  command: visudo -cf /etc/sudoers.d/{{ vm_username }}
  register: visudo_check
  failed_when: visudo_check.rc != 0
  changed_when: false

- name: 1.7. Confirm the new user can log in (only for testing the user creation)
  become: yes
  shell: "su - '{{ vm_username }}' -c 'whoami'"
  register: login_check
  changed_when: false

- name: 1.8. Debug the login check
  become: yes
  debug:
    var: login_check.stdout
