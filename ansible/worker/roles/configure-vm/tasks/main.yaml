---
- name: 2.1. Update apt package index
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: 2.2. Ensure essential packages are installed
  apt:
    name:
      - nfs-common
      - smbclient
    state: present
    
- name: 2.3. Ensure rpc-statd is enabled and running
  systemd:
    name: rpc-statd
    enabled: yes
    state: started
    masked: no