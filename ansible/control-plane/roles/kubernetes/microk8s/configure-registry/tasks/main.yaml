---
# 1. Copy the tar file to the target server
- name: Copy Docker image tar file to target
  copy:
    src: "../../../datamigrator/datamigrator.tar"
    dest: /tmp/docker_images.tar
    mode: '0644'

# 2. Load Docker images from the tar file
- name: Load Docker images from tar file
  command: docker load --input /tmp/docker_images.tar
  register: docker_load_result

# 3. Extract loaded image names properly
- name: Extract loaded image names
  set_fact:
    image_list: "{{ docker_load_result.stdout | regex_findall('Loaded image: (.+)') }}"

# 4. Debug loaded images
- name: Display loaded images
  debug:
    msg: "Loaded images: {{ image_list | join(', ') }}"

# 5. Push images to MicroK8s registry
- name: Push Docker images to MicroK8s registry
  command: docker push "{{ item }}"
  loop: "{{ image_list }}"
  retries: 3
  delay: 5
  register: push_results
  until: push_results.rc == 0

# 6. Get list of repositories from MicroK8s registry
- name: Get list of repositories from MicroK8s registry
  uri:
    url: http://localhost:32000/v2/_catalog
    return_content: yes
  register: repo_list
  changed_when: false

# 7. Get tags for each repository and store results in a dictionary
- name: Get tags for each repository
  uri:
    url: "http://localhost:32000/v2/{{ item }}/tags/list"
    return_content: yes
  loop: "{{ repo_list.json.repositories }}"
  register: tag_results
  changed_when: false

- name: Format image tags for better output
  set_fact:
    formatted_images: "{{ tag_results.results | map(attribute='json') | list }}"

# 8. Display repositories with their available tags
- name: Display images with tags
  debug:
    msg: >-
      {% for repo in formatted_images %}
      {{ repo.repository }}: {{ repo.tags | default([]) | join(', ') }}
      {% endfor %}
  when: formatted_images | length > 0

# 9. Remove tar file after loading
- name: Remove tar file from target
  file:
    path: /tmp/docker_images.tar
    state: absent
  when: image_list | length > 0
