- name: Configure kubectl for MicroK8s
  become_user: "{{ vm_username }}"
  become: yes
  shell: | 
    /snap/bin/microk8s.config -l | tee /home/"{{ vm_username }}"/.kube/config

- name: Change ownership of kubeconfig
  become: yes
  file:
    path: /home/"{{ vm_username }}"/.kube/config
    owner: "{{ vm_username }}"
    group: "{{ vm_username }}"
    mode: '0644'

- name: Display kubeconfig content
  become: yes
  command: cat /home/"{{ vm_username }}"/.kube/config
  register: kubeconfig_content

- name: Print kubeconfig content
  debug:
    var: kubeconfig_content.stdout

# - name: csr template
#   become: yes
#   template: src=./templates/custom-csr-template.j2 dest=/var/snap/microk8s/current/certs/csr.conf.template
  # notify:
  #   - Refresh certs

- name: Create folder for microk8s certificates
  become: yes
  file:
    path: /usr/share/ca-certificates/extra
    state: directory
    mode: 0755

- name: Copy certificates
  become: yes
  copy:
    src: "{{ item }}"
    dest: /usr/share/ca-certificates/extra
    remote_src: yes
    force: yes
    mode: 0644
  with_fileglob:
    - /var/snap/microk8s/current/certs/*ca*.crt

- name: Trust certificates generated by microk8s
  become: yes
  command: "update-ca-certificates"
  register: command_result
  changed_when: "'0 added, 0 removed' not in command_result.stdout"