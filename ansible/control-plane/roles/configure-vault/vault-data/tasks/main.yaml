---

- name: delete vault-data directory if uninstall flag is defined 
  file:
    path: /data/vault-data
    state: absent
    owner: 100
    group: 1000
    mode: 0755
  when: vault_uninstall is defined

- name: create vault-data directory 
  file:
    path: /data/vault-data
    state: directory
    owner: 100
    group: 1000
    mode: 0755

- name: Delete /opt/datamigrator/vault if uninstall flag is defined 
  become: yes
  file:
    path: /opt/datamigrator/vault
    state: absent
    owner: "{{ vm_username }}"
    group: "{{ vm_username }}"
    mode: '0755'
  when: vault_uninstall is defined

- name: Ensure /opt/datamigrator/vault directory exists and is owned by the vm_username
  become: yes
  file:
    path: /opt/datamigrator/vault
    state: directory
    owner: "{{ vm_username }}"
    group: "{{ vm_username }}"
    mode: '0755'