---
- name: Creates vault directory
  become: yes
  become_user: "{{ vm_username }}"
  file:
    path: $HOME/vault
    state: directory

- name: vault namespace
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/vault-namespace.j2 dest=$HOME/vault/vault-namespace.yaml

- name: vault-storageclass template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/vault-storageclass.j2 dest=$HOME/vault/vault-storageclass.yaml

- name: vault-pv template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/vault-pv.j2 dest=$HOME/vault/vault-pv.yaml

- name: vault-values template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/vault-values.j2 dest=$HOME/vault/vault-values.yaml

- name: vault-ingress template
  become: yes
  become_user: "{{ vm_username }}"
  template: src=./templates/vault-ingress.j2 dest=$HOME/vault/vault-ingress.yaml

- name: remove previous installation
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    helm delete vault --namespace "vault"
    kubectl delete pvc --all --namespace "vault"
    kubectl delete -f $HOME/vault/vault-ingress.yaml
    kubectl delete -f $HOME/vault/vault-pv.yaml
    kubectl delete -f $HOME/vault/vault-storageclass.yaml
    kubectl delete -f $HOME/vault/vault-namespace.yaml
  when: vault_uninstall is defined
  args:
    chdir: $HOME

- name: setup namespace, persistentvolume for vault
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl apply -f $HOME/vault/vault-namespace.yaml
    kubectl apply -f $HOME/vault/vault-storageclass.yaml
    kubectl apply -f $HOME/vault/vault-pv.yaml
  args:
    chdir: $HOME

- name: Deploy vault helm chart
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    helm repo add hashicorp https://helm.releases.hashicorp.com
    helm upgrade --install vault hashicorp/vault -f $HOME/vault/vault-values.yaml --version "{{ vault_version }}" --namespace "vault"
    exit 0
  args:
    executable: /bin/bash      
  register: SHELL_STDOUT

- name: setup ingress for vault
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl apply -f $HOME/vault/vault-ingress.yaml
  args:
    chdir: $HOME

- name: debug output
  ansible.builtin.debug: 
    msg: "Helm Install (vault) => stderr: {{ SHELL_STDOUT.stderr_lines }} stdout: {{ SHELL_STDOUT.stdout_lines }}"

- name: Pause for 45 seconds to make sure vault is up
  ansible.builtin.pause:
    seconds: 45

- name: Get the unseal keys
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec vault-{{ item }} -n vault -- vault operator init -key-shares=1 -key-threshold=1 -format=json > $HOME/vault/cluster-keys.json
    VAULT_UNSEAL_KEY=$(cat $HOME/vault/cluster-keys.json | jq -r ".unseal_keys_b64[]")
    kubectl exec vault-{{ item }} -n vault -- vault operator unseal $VAULT_UNSEAL_KEY
  with_items:
    - 0

- name: Pause for 45 seconds to make sure vault is up
  ansible.builtin.pause:
    seconds: 45

- name: Unseal the vault
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    VAULT_UNSEAL_KEY=$(cat $HOME/vault/cluster-keys.json | jq -r ".unseal_keys_b64[]")
    kubectl exec vault-{{ item }} -n vault -- vault operator unseal $VAULT_UNSEAL_KEY
  with_items:
    - 1
    - 2

- name: Pause for 10 seconds to make sure vault is up
  ansible.builtin.pause:
    seconds: 10

- name: Authenticate to vault
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    VAULT_ROOT_PASSWORD=$(cat $HOME/vault/cluster-keys.json | jq -r ".root_token")
    kubectl exec vault-{{ item }} -n vault -- vault login $VAULT_ROOT_PASSWORD  
  with_items:
    - 0
    - 1
    - 2

