---
- name: Vault kubernetes authorization enabling
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec vault-0 -n vault -- vault auth enable kubernetes
    KUBERNETES_PORT_443_TCP_ADDR=$(kubectl exec vault-0 -n vault -- printenv | grep KUBERNETES_PORT_443_TCP_ADDR | cut -f 2- -d "=" | tr -d " ")
    kubectl exec vault-0 -n vault -- vault write auth/kubernetes/config kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443" 

- name: Vault secret enable on path
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    # Check if the secrets engine already exists
    secrets_exist=$(kubectl exec -ti vault-0 -n vault -- vault secrets list -format=json | jq '.["secrets/"]')

    if [ "null" = "$secrets_exist" ]; then
      kubectl exec -ti vault-0 -n vault -- vault secrets enable -path=secrets/ kv
    else
      echo "Secrets engine 'secrets/' is already enabled."
    fi  

- name: Vault policies 
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec -i vault-0 -n vault -- vault policy write {{ item }}-policy - <<EOF
    path "secrets/{{ item }}-secrets/{{ item }}-creds" {
      capabilities = ["read"]
    }
    EOF
  with_items:
    - keycloak
    - postgres
    - rabbitmq
  
- name: Vault roles creation -- datamigrator
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec -ti vault-0 -n vault -- vault write auth/kubernetes/role/{{ item }}-role \
    bound_service_account_names={{ item }}-vault-sa \
    bound_service_account_namespaces=datamigrator \
    policies=keycloak-policy,postgres-policy,rabbitmq-policy \
    ttl=24h
  with_items:
    - datamigrator

- name: Vault roles creation -- keycloak
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec -ti vault-0 -n vault -- vault write auth/kubernetes/role/{{ item }}-role \
    bound_service_account_names={{ item }}-sa \
    bound_service_account_namespaces=datamigrator,keycloak \
    policies=keycloak-policy,postgres-policy \
    ttl=24h
  with_items:
    - keycloak
  
- name: Vault roles creation -- postgres
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec -ti vault-0 -n vault -- vault write auth/kubernetes/role/{{ item }}-role \
    bound_service_account_names={{ item }}-sa \
    bound_service_account_namespaces=datamigrator,postgres \
    policies=postgres-policy \
    ttl=24h
  with_items:
    - postgres
  
- name: Vault roles creation -- rabbitmq
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl exec -ti vault-0 -n vault -- vault write auth/kubernetes/role/{{ item }}-role \
    bound_service_account_names={{ item }}-sa \
    bound_service_account_namespaces=datamigrator,rabbitmq \
    policies=rabbitmq-policy \
    ttl=24h
  with_items:
    - rabbitmq

