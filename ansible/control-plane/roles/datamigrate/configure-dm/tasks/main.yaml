- name: Cleanup service account
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl delete serviceaccount -n datamigrate datamigrate-vault-sa
  ignore_errors: yes
  when: dm_uninstall is defined

- name: delete acr pull secert when dm_uninstall is defined
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl delete secret docker-registry azure-dev-acr-creds --namespace datamigrate
  ignore_errors: yes
  when: dm_uninstall is defined

- name: Create service account and namespace
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl create namespace datamigrate
    kubectl create serviceaccount -n datamigrate datamigrate-vault-sa

- name: Create acr pull secert
  become: yes
  become_user: "{{ vm_username }}"
  shell: |
    kubectl create secret docker-registry azure-dev-acr-creds \
        --namespace datamigrate \
        --docker-server={{ acr_registry }} \
        --docker-username={{ azure_client_id }} \
        --docker-password={{ azure_client_secret }}
  ignore_errors: yes