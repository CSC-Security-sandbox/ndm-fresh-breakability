get-config-by-id:
  url: /api/v1/servers/{id}
  method: get
  service_name : config_service
  delay : "5"
  data: {}
  response:
    - status_code : 200
  params :
    id: configId




create-new-discovery-job:
  url: /api/v1/jobs/bulk-discovery
  method: post
  service_name: job_service
  data:
    excludeOlderThan: "2025-03-20T06:55:32.491Z"
    excludeFilePatterns: "string"
    preserveAccessTime: false
    firstRunAt: "2025-03-19T17:33:44.590Z"
    sourcePathIds: $sourcePathIds
    createdBy: null
    options:
      workflowExecutionTimeout: "60s"
      workflowTaskTimeout: "30s"
      workflowRunTimeout: "30s"
      startDelay: "10s"

  response:
    - status_code: 201
  parse:
    id: jobConfigId










  # sourcePathId = fileServers[0].volumes[0].id


get-jobs-by-job-config-id:
  url: /api/v1/jobs/{id}
  method: get
  service_name : job_service
  delay : "20"
  data: {}
  response:
    - status_code : 200
    - jobRuns[0].status: COMPLETED
  params :
    id: jobConfigId
  parse : 
    jobRuns[0].jobRunId : DestinationDiscoveryJobRunId
