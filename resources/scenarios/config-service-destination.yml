

create-new-request:
  url: /api/v1/work-manager/validate-connection
  method: post
  service_name : config_service
  data:
    fileServer:
      hostname: "192.168.64.11"
      protocols:
        - type: "NFS"
          username: "root"
          password: ""

    workerIds: "$workerId"
    options :
      workflowExecutionTimeout: "60s"
      workflowTaskTimeout: "30s"
      workflowRunTimeout: "30s"
      startDelay: "10s"

  response:
    - status_code: 201
  parse: {}
  params: {}


get-workflow-result:
  url: "/api/v1/work-manager/workflow/details/{id}"
  method: GET
  service_name: config_service
  delay : "5"
  data: {}
  response:
    - status_code: 200
  params:
    id : workflowId


create-config:
  url: /api/v1/servers
  method: post
  service_name: config_service
  data:
    configName: "Lalit-Test-Destination"
    configType: "FILE"
    projectId: "15bcd258-23c7-4773-a8e3-92694fe50729"
    fileServers:
      - serverType: "OtherNAS"
        userName: "root"
        password: ""
        protocol: "NFS"
        protocolVersion: "v3"
        host: "192.168.64.11"
        volumes: []
        workers:
          - "7c8877e6-df9b-414b-bf1d-e8d8c3d78cad"
    workingDirectory:
      workingDirectory: ""
      pathId: "null"
      pathName: ""

  response:
    - status_code: 201
  parse:
    id: configId


