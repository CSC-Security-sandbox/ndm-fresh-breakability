version: '3'
services:
  app:
    build:
      context: .
    deploy:
      replicas: 3
    environment:
      - RABBITMQ_URLS=amqp://guest:guest@host.docker.internal:5672,amqp://guest:guest@host.docker.internal:5673,amqp://guest:guest@host.docker.internal:5674
      - RABBITMQ_QUEUE=myqueue-2
      - RABBITMQ_QUEUE_DURABLE=true
      - REPLICA_INDEX= ${REPLICA_INDEX}
    entrypoint: ["/app/entrypoint.sh"]
    networks:
      - local_network

  nginx:
    image: nginx:latest
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - local_network

networks:
 local_network:
