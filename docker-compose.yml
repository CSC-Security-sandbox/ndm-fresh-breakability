version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 3
    environment:
      - RABBITMQ_URLS=amqp://guest:guest@host.docker.internal:5672,amqp://guest:guest@host.docker.internal:5673,amqp://guest:guest@host.docker.internal:5674
      - RABBITMQ_QUEUE=myqueue-2
      - RABBITMQ_QUEUE_DURABLE=true
    entrypoint: ["/entrypoint.sh"]
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network

networks:
  app-network:
    driver: bridge