name: AWS Image Export & SHA256 Generation

on:
  workflow_dispatch:
    inputs:
      cp_ami_id:
        description: "Control Plane AMI ID (e.g., ami-xxxxx)"
        required: true
        type: string
      worker_ami_id:
        description: "Worker Node AMI ID (e.g., ami-yyyyy)"
        required: true
        type: string
      export_prefix:
        description: "Export folder prefix (e.g., preview-dryrun)"
        required: false
        default: "releases"

env:
  AWS_REGION: us-east-1
  S3_BUCKET: dk-test-workflow
  EXPORT_FORMAT: VHD
  LOCAL_EXPORT_PATH: /home/ubuntu/
  SCRATCH_SPACE: /mnt/scratch_space
  NSS_HOST: cyclortp7.rtp.openeng.netapp.com
  NSS_PATH: /x/eng/NDM/

jobs:
  aws-image-export:
    runs-on: openlab
    outputs:
      worker_vhd: ${{ steps.set-outputs.outputs.worker_vhd }}
      controlplane_vhd: ${{ steps.set-outputs.outputs.controlplane_vhd }}
      export_prefix: ${{ steps.set-outputs.outputs.export_prefix }}
      timestamp: ${{ steps.set-outputs.outputs.timestamp }}

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass

      - name: Execute AWS Operations
        env:
          RUNNER_PASSWORD: ${{ secrets.RUNNER_GITHUB_PASS_66 }}
        run: |
          sshpass -p "$RUNNER_PASSWORD" ssh -o StrictHostKeyChecking=no ubuntu@10.192.7.66 << 'ENDSSH'
          set -e
          
          CP_AMI="${{ github.event.inputs.cp_ami_id }}"
          WORKER_AMI="${{ github.event.inputs.worker_ami_id }}"
          EXPORT_PREFIX="${{ github.event.inputs.export_prefix }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          LOCAL_PATH="${{ env.LOCAL_EXPORT_PATH }}"
          SCRATCH_SPACE="${{ env.SCRATCH_SPACE }}"
          CHECKSUM_FILE="AWS_SHA256SUMS-${TIMESTAMP}.sha256"
          
          # Validate AMIs exist
          echo "Validating Control Plane AMI: $CP_AMI"
          CP_AMI_INFO=$(aws ec2 describe-images \
            --region ${{ env.AWS_REGION }} \
            --image-ids "$CP_AMI" \
            --query 'Images[0].[Name,State,Architecture]' \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$CP_AMI_INFO" ]; then
            echo "❌ Control Plane AMI $CP_AMI not found"
            exit 1
          fi
          echo "✅ Control Plane AMI found: $CP_AMI_INFO"
          
          echo "Validating Worker Node AMI: $WORKER_AMI"
          WORKER_AMI_INFO=$(aws ec2 describe-images \
            --region ${{ env.AWS_REGION }} \
            --image-ids "$WORKER_AMI" \
            --query 'Images[0].[Name,State,Architecture]' \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$WORKER_AMI_INFO" ]; then
            echo "❌ Worker Node AMI $WORKER_AMI not found"
            exit 1
          fi
          echo "✅ Worker Node AMI found: $WORKER_AMI_INFO"

          # Create IAM role for VM import (if it doesn't exist)
          echo "Setting up IAM role for VM import..."
          if ! aws iam get-role --role-name vmimport &>/dev/null; then
            echo "Creating IAM role 'vmimport'..."
            aws iam create-role \
              --role-name vmimport \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "ec2.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole",
                    "Condition": {}
                  }
                ]
              }'
            echo "✅ IAM role created"
          else
            echo "✅ IAM role 'vmimport' already exists"
          fi

          # Attach policy to role
          echo "Attaching policy to IAM role..."
          S3_BUCKET_NAME="${{ env.S3_BUCKET }}"
          echo '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetBucketLocation","s3:GetObject","s3:ListBucket","s3:PutObject"],"Resource":["arn:aws:s3:::'"${S3_BUCKET_NAME}"'","arn:aws:s3:::'"${S3_BUCKET_NAME}"'/*"]},{"Effect":"Allow","Action":["ec2:ModifySnapshotAttribute","ec2:CopySnapshot","ec2:Describe*"],"Resource":"*"}]}' > /tmp/vmimport-policy.json
          aws iam put-role-policy \
            --role-name vmimport \
            --policy-name vmimport \
            --policy-document file:///tmp/vmimport-policy.json
          rm -f /tmp/vmimport-policy.json
          # Export Worker Node AMI
          echo "Exporting Worker Node AMI: $WORKER_AMI"
          WORKER_S3_PREFIX="${EXPORT_PREFIX}/aws/worker-node"
          
          WORKER_EXPORT_TASK=$(aws ec2 export-image \
            --region ${{ env.AWS_REGION }} \
            --image-id "$WORKER_AMI" \
            --disk-image-format ${{ env.EXPORT_FORMAT }} \
            --s3-export-location S3Bucket=${{ env.S3_BUCKET }},S3Prefix=$WORKER_S3_PREFIX \
            --tag-specifications "ResourceType=export-image-task,Tags=[{Key=Component,Value=worker-node},{Key=ExportPrefix,Value=${EXPORT_PREFIX}},{Key=Timestamp,Value=${TIMESTAMP}}]" \
            --query 'ExportImageTaskId' \
            --output text)
          
          echo "Worker Export Task ID: $WORKER_EXPORT_TASK"
          
          # Export Control Plane AMI
          echo "Exporting Control Plane AMI: $CP_AMI"
          CP_S3_PREFIX="${EXPORT_PREFIX}/aws/control-plane"
          
          CP_EXPORT_TASK=$(aws ec2 export-image \
            --region ${{ env.AWS_REGION }} \
            --image-id "$CP_AMI" \
            --disk-image-format ${{ env.EXPORT_FORMAT }} \
            --s3-export-location S3Bucket=${{ env.S3_BUCKET }},S3Prefix=$CP_S3_PREFIX \
            --tag-specifications "ResourceType=export-image-task,Tags=[{Key=Component,Value=control-plane},{Key=ExportPrefix,Value=${EXPORT_PREFIX}},{Key=Timestamp,Value=${TIMESTAMP}}]" \
            --query 'ExportImageTaskId' \
            --output text)
          
          echo "Control Plane Export Task ID: $CP_EXPORT_TASK"
          
          # Monitor Worker Node export
          echo "Monitoring Worker Node Export..."
          MAX_WAIT=7200  # 2 hours
          ELAPSED=0
          SLEEP_INTERVAL=30
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            WORKER_STATUS=$(aws ec2 describe-export-image-tasks \
              --region ${{ env.AWS_REGION }} \
              --export-image-task-ids $WORKER_EXPORT_TASK \
              --query 'ExportImageTasks[0].[Status,StatusMessage,Progress]' \
              --output text 2>/dev/null || echo "UNKNOWN")
            
            WORKER_TASK_STATUS=$(echo "$WORKER_STATUS" | awk '{print $1}')
            WORKER_PROGRESS=$(echo "$WORKER_STATUS" | awk '{print $3}')
            
            echo "Worker status: $WORKER_TASK_STATUS | Progress: ${WORKER_PROGRESS}% | ${ELAPSED}s"
            
            if [ "$WORKER_TASK_STATUS" = "completed" ]; then
              echo "✅ Worker export completed (${ELAPSED}s)"
              
              WORKER_S3_KEY=$(aws ec2 describe-export-image-tasks \
                --region ${{ env.AWS_REGION }} \
                --export-image-task-ids $WORKER_EXPORT_TASK \
                --query 'ExportImageTasks[0].S3ExportLocation.S3Key' \
                --output text)
              
              WORKER_VHD=$(basename "$WORKER_S3_KEY")
              echo "Worker VHD: $WORKER_VHD"
              break
            elif [ "$WORKER_TASK_STATUS" = "cancelled" ] || [ "$WORKER_TASK_STATUS" = "cancelling" ] || [ "$WORKER_TASK_STATUS" = "deleted" ]; then
              echo ""
              echo "=========================================="
              echo "Worker Export Failed: $WORKER_TASK_STATUS"
              echo "=========================================="
              echo ""
              echo "Status Message:"
              echo "$WORKER_STATUS" | awk '{print $2}'
              echo ""
              exit 1
            fi
            
            sleep $SLEEP_INTERVAL
            ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Worker export timeout after $MAX_WAIT seconds"
            exit 1
          fi
          
          # Monitor Control Plane export
          echo "Monitoring Control Plane Export..."
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CP_STATUS=$(aws ec2 describe-export-image-tasks \
              --region ${{ env.AWS_REGION }} \
              --export-image-task-ids $CP_EXPORT_TASK \
              --query 'ExportImageTasks[0].[Status,StatusMessage,Progress]' \
              --output text 2>/dev/null || echo "UNKNOWN")
            
            CP_TASK_STATUS=$(echo "$CP_STATUS" | awk '{print $1}')
            CP_PROGRESS=$(echo "$CP_STATUS" | awk '{print $3}')
            
            echo "CP status: $CP_TASK_STATUS | Progress: ${CP_PROGRESS}% | ${ELAPSED}s"
            
            if [ "$CP_TASK_STATUS" = "completed" ]; then
              echo "✅ Control Plane export completed (${ELAPSED}s)"
              
              CP_S3_KEY=$(aws ec2 describe-export-image-tasks \
                --region ${{ env.AWS_REGION }} \
                --export-image-task-ids $CP_EXPORT_TASK \
                --query 'ExportImageTasks[0].S3ExportLocation.S3Key' \
                --output text)
              
              CP_VHD=$(basename "$CP_S3_KEY")
              echo "Control Plane VHD: $CP_VHD"
              break
            elif [ "$CP_TASK_STATUS" = "cancelled" ] || [ "$CP_TASK_STATUS" = "cancelling" ] || [ "$CP_TASK_STATUS" = "deleted" ]; then
              echo ""
              echo "=========================================="
              echo "Control Plane Export Failed: $CP_TASK_STATUS"
              echo "=========================================="
              echo ""
              echo "Status Message:"
              echo "$CP_STATUS" | awk '{print $2}'
              echo ""
              exit 1
            fi
            
            sleep $SLEEP_INTERVAL
            ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Control Plane export timeout after $MAX_WAIT seconds"
            exit 1
          fi
          
          # Download from S3
          echo "Downloading from S3..."
          mkdir -p "$LOCAL_PATH/$EXPORT_PREFIX/aws/worker-node"
          mkdir -p "$LOCAL_PATH/$EXPORT_PREFIX/aws/control-plane"
          
          echo "Downloading Worker Node VHD..."
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/$WORKER_S3_PREFIX/$WORKER_VHD" \
            "$LOCAL_PATH/$EXPORT_PREFIX/aws/worker-node/$WORKER_VHD" \
            --region ${{ env.AWS_REGION }} \
            --no-progress
          
          echo "Downloading Control Plane VHD..."
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/$CP_S3_PREFIX/$CP_VHD" \
            "$LOCAL_PATH/$EXPORT_PREFIX/aws/control-plane/$CP_VHD" \
            --region ${{ env.AWS_REGION }} \
            --no-progress
          
          # Generate checksums
          echo "Generating checksums..."
          cd "$LOCAL_PATH/$EXPORT_PREFIX/aws"
          
          sha256sum "worker-node/$WORKER_VHD" "control-plane/$CP_VHD" > "${CHECKSUM_FILE}"
          
          # Upload checksum to S3
          aws s3 cp \
            "${CHECKSUM_FILE}" \
            "s3://${{ env.S3_BUCKET }}/${EXPORT_PREFIX}/aws/${CHECKSUM_FILE}" \
            --region ${{ env.AWS_REGION }}
          
          # Copy to scratch space
          echo "Copying to scratch space..."
          sudo mkdir -p "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/worker-node"
          sudo mkdir -p "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/control-plane"
          
          sudo cp "worker-node/$WORKER_VHD" "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/worker-node/"
          sudo cp "control-plane/$CP_VHD" "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/control-plane/"
          sudo cp "${CHECKSUM_FILE}" "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/"
          
          sudo chmod 644 "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws"/*
          sudo chmod 644 "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/worker-node"/*
          sudo chmod 644 "${SCRATCH_SPACE}/${EXPORT_PREFIX}/aws/control-plane"/*
          
          echo "Export complete"
          
          # Save outputs to temp files
          echo "$TIMESTAMP" > /tmp/aws_timestamp.txt
          echo "$WORKER_VHD" > /tmp/aws_worker.txt
          echo "$CP_VHD" > /tmp/aws_cp.txt
          echo "$EXPORT_PREFIX" > /tmp/aws_prefix.txt
          
          ENDSSH

      - name: Set Outputs
        id: set-outputs
        env:
          RUNNER_PASSWORD: ${{ secrets.RUNNER_GITHUB_PASS_66 }}
        run: |
          # Read outputs from temp files via SSH
          OUTPUT=$(sshpass -p "$RUNNER_PASSWORD" ssh -T -o StrictHostKeyChecking=no -o LogLevel=QUIET ubuntu@10.192.7.66 << 'ENDSSH'
          cat /tmp/aws_timestamp.txt
          cat /tmp/aws_worker.txt
          cat /tmp/aws_cp.txt
          cat /tmp/aws_prefix.txt
          ENDSSH
          )
          
          echo "Raw output from remote:"
          echo "$OUTPUT"
          
          # Get only the last 4 lines (actual data, skip banner)
          CLEAN_OUTPUT=$(echo "$OUTPUT" | tail -4)
          
          # Parse the output
          TIMESTAMP=$(echo "$CLEAN_OUTPUT" | sed -n '1p')
          WORKER_VHD=$(echo "$CLEAN_OUTPUT" | sed -n '2p')
          CP_VHD=$(echo "$CLEAN_OUTPUT" | sed -n '3p')
          EXPORT_PREFIX=$(echo "$CLEAN_OUTPUT" | sed -n '4p')
          
          # Set GitHub outputs
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "worker_vhd=$WORKER_VHD" >> $GITHUB_OUTPUT
          echo "controlplane_vhd=$CP_VHD" >> $GITHUB_OUTPUT
          echo "export_prefix=$EXPORT_PREFIX" >> $GITHUB_OUTPUT
          
          # Display for verification
          echo "Captured outputs:"
          echo "  Timestamp: $TIMESTAMP"
          echo "  Worker: $WORKER_VHD"
          echo "  CP: $CP_VHD"
          echo "  Prefix: $EXPORT_PREFIX"

      - name: Display Summary
        run: |
          echo "=========================================="
          echo "AWS Image Export Summary"
          echo "=========================================="
          echo ""
          echo "Timestamp: ${{ steps.set-outputs.outputs.timestamp }}"
          echo "Worker VHD: ${{ steps.set-outputs.outputs.worker_vhd }}"
          echo "Control Plane VHD: ${{ steps.set-outputs.outputs.controlplane_vhd }}"
          echo ""
          echo "S3 Locations:"
          echo "  Bucket: s3://${{ env.S3_BUCKET }}/${{ steps.set-outputs.outputs.export_prefix }}/aws/"
          echo "  Worker: s3://${{ env.S3_BUCKET }}/${{ steps.set-outputs.outputs.export_prefix }}/aws/worker-node/${{ steps.set-outputs.outputs.worker_vhd }}"
          echo "  CP: s3://${{ env.S3_BUCKET }}/${{ steps.set-outputs.outputs.export_prefix }}/aws/control-plane/${{ steps.set-outputs.outputs.controlplane_vhd }}"
          echo ""
          echo "Local Path: ${{ env.LOCAL_EXPORT_PATH }}/${{ steps.set-outputs.outputs.export_prefix }}/aws/"
          echo "Scratch Space: ${{ env.SCRATCH_SPACE }}/${{ steps.set-outputs.outputs.export_prefix }}/aws/"
          echo ""
          echo "✅ Export completed successfully"




