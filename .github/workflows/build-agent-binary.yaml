name: Build Worker Binary and Pre Release

on:
  push:
    branches:
      - main

jobs:
  Worker-package:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and pkg
        run: npm install && npm install pkg -g
      
      - name: Run Build
        run: npm run build

      - name: Build binary
        run: npm run pkg
    
      - name: Zip pkg folder
        run: zip -r pkg.zip pkg
      
      - name: Get short SHA
        id: get_short_sha
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.SHORT_SHA }}
          release_name: Release-${{ env.SHORT_SHA }}
          draft: false
          prerelease: true

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1.0.1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: pkg.zip
          asset_name: ${{ env.SHORT_SHA }}-worker.zip
          asset_content_type: application/zip