name: Wiz Nightly Container Image Scan

# ============================================================================
# Nightly Wiz CLI container image vulnerability scan for all NDM services.
# Builds each service image from source and scans with Wiz CLI.
#
# Required repository secrets:
#   - WIZ_CLIENT_ID / WIZ_CLIENT_SECRET  (Wiz service account)
#   - GITOPS_USER_GITHUB_TOKEN           (npm registry for Docker builds)
#   - AZURE_SP_USERNAME / AZURE_SP_PASSWORD (ACR for datamigrator-ui)
# ============================================================================

on:
  schedule:
    - cron: '30 18 * * *'   # Nightly at 18:30 UTC
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to scan, or "all"'
        required: false
        default: 'all'
        type: string

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  prepare-matrix:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Set matrix
        id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.services || 'all' }}"

          ALL_SERVICES='[
            {"service":"admin-service",           "path":"services/admin-service",           "needs_acr":false},
            {"service":"config-service",          "path":"services/config-service",          "needs_acr":false},
            {"service":"db-writer",               "path":"services/db-writer",               "needs_acr":false},
            {"service":"jobs-service",            "path":"services/jobs-service",            "needs_acr":false},
            {"service":"reports-service",         "path":"services/reports-service",         "needs_acr":false},
            {"service":"support-service",         "path":"services/support-service",         "needs_acr":false},
            {"service":"datamigrator-ui",         "path":"services/datamigrator-ui",         "needs_acr":true},
            {"service":"keycloak-customizations", "path":"services/keycloak-customizations", "needs_acr":false},
            {"service":"db-migrations",           "path":"liquibase",                        "needs_acr":false}
          ]'

          if [ "$INPUT" = "all" ]; then
            MATRIX="{\"include\":$(echo $ALL_SERVICES | jq -c .)}"
          else
            IFS=',' read -ra SELECTED <<< "$INPUT"
            FILTERED="[]"
            for svc in "${SELECTED[@]}"; do
              svc=$(echo "$svc" | xargs)
              MATCH=$(echo "$ALL_SERVICES" | jq -c "[.[] | select(.service == \"$svc\")]")
              FILTERED=$(echo "$FILTERED" "$MATCH" | jq -c -s 'add')
            done
            MATRIX="{\"include\":$(echo $FILTERED | jq -c .)}"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Scanning: $(echo $MATRIX | jq -r '.include[].service' | tr '\n' ' ')"

  wiz-scan:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [prepare-matrix]
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Login to ACR
        if: matrix.needs_acr == true
        uses: step-security/docker-login-action@6aa05fe688caf2c58e784663f01b3415ced503e8 # v3.7.0
        with:
          registry: datamigratedev.azurecr.io
          username: ${{ secrets.AZURE_SP_USERNAME }}
          password: ${{ secrets.AZURE_SP_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --secret id=git_token,env=GITOPS_USER_GITHUB_TOKEN \
            -t "ndm-${{ matrix.service }}:scan" \
            "${{ matrix.path }}"
        env:
          GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1

      - name: Download Wiz CLI
        run: |
          curl -sSL -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Scan container image with Wiz
        id: scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli version 2>&1 || true

          # --assist-migration: required because the SA uses legacy (v0-style)
          # OAuth audience. Without it, v1 CLI requests audience=wiz-scanner
          # which returns HTTP 400 from auth.app.wiz.io. This flag tells the
          # CLI to use audience=wiz-api (same as 'wizcli auth' / dir scans).
          # TODO: remove once the SA is re-provisioned as a v1-native account.
          # --by-policy-hits=DISABLED: show ALL findings regardless of policy
          # severity threshold. Without this, the default policy filters to
          # CRITICAL-only + ignoreUnfixed, producing empty SARIF/JSON output.
          set +e
          ./wizcli scan container-image "ndm-${{ matrix.service }}:scan" \
            --client-id "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET" \
            --assist-migration \
            --by-policy-hits DISABLED \
            --sarif-output-file "wiz-results-${{ matrix.service }}.sarif" \
            --json-output-file "wiz-results-${{ matrix.service }}.json" \
            --csv-output-file "wiz-results-${{ matrix.service }}.csv"
          SCAN_EXIT=$?
          set -e

          echo "exit_code=$SCAN_EXIT" >> $GITHUB_OUTPUT

          # Show summary of findings for the log
          if [ -f "wiz-results-${{ matrix.service }}.json" ]; then
            echo "=== Scan result summary ==="
            jq -r '
              .result.analytics.vulnerabilities as $v |
              "  Critical: \($v.criticalCount // 0)",
              "  High:     \($v.highCount // 0)",
              "  Medium:   \($v.mediumCount // 0)",
              "  Low:      \($v.lowCount // 0)",
              "  Unfixed:  \($v.unfixedCount // 0)",
              "  Total:    \($v.totalCount // 0)",
              "  Verdict:  \(.status.verdict // "?")"
            ' "wiz-results-${{ matrix.service }}.json" 2>/dev/null || true
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && steps.scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: wiz-results-${{ matrix.service }}.sarif
          category: wiz-${{ matrix.service }}
        continue-on-error: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wiz-scan-${{ matrix.service }}
          path: |
            wiz-results-${{ matrix.service }}.json
            wiz-results-${{ matrix.service }}.sarif
            wiz-results-${{ matrix.service }}.csv
          retention-days: 30
          if-no-files-found: ignore
