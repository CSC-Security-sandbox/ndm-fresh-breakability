name: Publish NDM libs to Github Registry
on:
  workflow_dispatch:
    inputs:
      lib_name:
        description: 'Select library to publish'
        required: true
        type: choice
        options:
          - auth-lib
          - jobs-lib
          - logger-lib

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@NetApp-Cloud-DataMigrate'
      - name: Install dependencies
        working-directory: lib/${{ github.event.inputs.lib_name }}
        run: npm i && npm run build
      - name: Publish package
        working-directory: lib/${{ github.event.inputs.lib_name }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}