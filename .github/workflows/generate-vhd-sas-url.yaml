name: Generate Azure SAS URLs for Azure Artifacts

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      control_plane_blob_name:
        description: 'Control Plane VHD blob name (Ex: controlplane_2025.12.0.vhd)'
        required: true
      linux_worker_blob_name:
        description: 'Linux Worker VHD blob name (Ex: worker_2025.12.0.vhd)'
        required: true
      windows_worker_blob_name:
        description: 'Windows Worker installer blob name (Ex: windows-worker-installer-2025.12.0.exe)'
        required: true
      storage_account_name:
        description: 'Azure Storage Account name (Ex: netappvhdexports)'
        required: true
      container_name:
        description: 'Storage Container name (Ex: ndm-releases-vhd)'
        required: true
      sas_expiry_days:
        description: 'SAS URL expiry in days (ex: 7)'
        required: true

  workflow_call:
    inputs:
      control_plane_blob_name:
        description: 'Control Plane VHD blob name'
        required: true
        type: string
      linux_worker_blob_name:
        description: 'Linux Worker VHD blob name'
        required: true
        type: string
      windows_worker_blob_name:
        description: 'Windows Worker installer blob name'
        required: true
        type: string
      storage_account_name:
        description: 'Azure Storage Account name'
        required: true
        type: string
      container_name:
        description: 'Storage Container name'
        required: true
        type: string
      sas_expiry_days:
        description: 'SAS URL expiry in days'
        required: true
        type: string
    outputs:
      control_plane_url:
        description: 'SAS URL for Control Plane VHD'
        value: ${{ jobs.generate-sas-urls.outputs.control_plane_url }}
      linux_worker_url:
        description: 'SAS URL for Linux Worker VHD'
        value: ${{ jobs.generate-sas-urls.outputs.linux_worker_url }}
      windows_worker_url:
        description: 'SAS URL for Windows Worker installer'
        value: ${{ jobs.generate-sas-urls.outputs.windows_worker_url }}

env:
  VM_RESOURCE_GROUP: ${{ vars.AZ_VM_RESOURCE_GROUP }}
  VM_VNET_NAME: ${{ vars.AZ_VM_VNET_NAME }}
  VM_SUBNET_NAME: ${{ vars.AZ_VM_SUBNET_NAME }}
  VM_SIZE: ${{ vars.AZ_VM_SIZE }}

jobs:
  generate-sas-urls:
    runs-on: openlab
    name: Generate VHD SAS URLs
    
    outputs:
      control_plane_url: ${{ steps.generate-sas.outputs.control_plane_url }}
      linux_worker_url: ${{ steps.generate-sas.outputs.linux_worker_url }}
      windows_worker_url: ${{ steps.generate-sas.outputs.windows_worker_url }}
      vm_name: ${{ steps.create-vm.outputs.vm_name }}
      vm_ip: ${{ steps.create-vm.outputs.vm_ip }}
      vm_resource_group: ${{ steps.create-vm.outputs.vm_resource_group }}
      vm_nic_name: ${{ steps.create-vm.outputs.vm_nic_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Azure CLI and SSH Tools
        run: |
          # sudo apt-get update
          sudo apt-get install -y sshpass
          if ! command -v az &> /dev/null; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Authenticate to Azure
        env:
          AZURE_CLIENT_ID: ${{ secrets.NDM_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.NDM_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.NDM_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.NDM_AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Create Dynamic Azure VM
        id: create-vm
        env:
          VM_PASSWORD: ${{ secrets.SAS_AZURE_VM_SSH_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VM_NAME="sas-gen-vm-${TIMESTAMP}"
          RESOURCE_GROUP="${{ env.VM_RESOURCE_GROUP }}"
          VNET_NAME="${{ env.VM_VNET_NAME }}"
          SUBNET_NAME="${{ env.VM_SUBNET_NAME }}"
          VM_SIZE="${{ env.VM_SIZE }}"
          
          echo "Creating VM: $VM_NAME"
          echo "Resource Group: $RESOURCE_GROUP"
          echo "VNet: $VNET_NAME"
          echo "Subnet: $SUBNET_NAME"
          
          # Get VNet location
          VNET_LOCATION=$(az network vnet show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VNET_NAME" \
            --query location -o tsv)
          
          if [ -z "$VNET_LOCATION" ]; then
            echo "ERROR: VNet $VNET_NAME not found in resource group $RESOURCE_GROUP"
            exit 1
          fi
          
          # Get subnet ID
          SUBNET_ID=$(az network vnet subnet show \
            --resource-group "$RESOURCE_GROUP" \
            --vnet-name "$VNET_NAME" \
            --name "$SUBNET_NAME" \
            --query id -o tsv)
          
          if [ -z "$SUBNET_ID" ]; then
            echo "ERROR: Subnet $SUBNET_NAME not found in VNet $VNET_NAME"
            exit 1
          fi
          
          # Create NIC with private IP only
          NIC_NAME="${VM_NAME}-nic"
          az network nic create \
            --resource-group "$RESOURCE_GROUP" \
            --name "$NIC_NAME" \
            --location "$VNET_LOCATION" \
            --vnet-name "$VNET_NAME" \
            --subnet "$SUBNET_NAME" \
            --output none
          
          # Create VM
          az vm create \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --image "Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest" \
            --size "$VM_SIZE" \
            --admin-username "ubuntu" \
            --admin-password "$VM_PASSWORD" \
            --nics "$NIC_NAME" \
            --location "$VNET_LOCATION" \
            --os-disk-caching ReadWrite \
            --storage-sku Standard_LRS \
            --output none

          # Wait for VM to be fully provisioned
          echo "Waiting for VM to be provisioned..."
          for i in {1..30}; do
            VM_STATE=$(az vm show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$VM_NAME" \
              --query "provisioningState" -o tsv 2>/dev/null || echo "Unknown")
            
            if [ "$VM_STATE" = "Succeeded" ]; then
              echo "VM provisioning completed"
              break
            fi
            echo "VM provisioning state: $VM_STATE (attempt $i/30), waiting 5 seconds..."
            sleep 5
          done
          
          # Wait for NIC to get private IP assigned
          echo "Waiting for NIC to get private IP assigned..."
          VM_PRIVATE_IP=""
          for i in {1..30}; do
            VM_PRIVATE_IP=$(az network nic show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$NIC_NAME" \
              --query ipConfigurations[0].privateIPAddress -o tsv 2>/dev/null || echo "")
            
            if [ -n "$VM_PRIVATE_IP" ] && [ "$VM_PRIVATE_IP" != "None" ]; then
              echo "Private IP assigned: $VM_PRIVATE_IP"
              break
            fi
            echo "Private IP not yet assigned (attempt $i/30), waiting 5 seconds..."
            sleep 5
          done
          
          if [ -z "$VM_PRIVATE_IP" ] || [ "$VM_PRIVATE_IP" = "None" ]; then
            echo "ERROR: Failed to get VM private IP after 150 seconds"
            exit 1
          fi
          
          echo "VM created successfully"
          echo "VM Name: $VM_NAME"
          echo "VM Private IP: $VM_PRIVATE_IP"
          
          # Wait for VM to be ready (SSH accessible)
          echo "Waiting for VM to be ready..."
          for i in {1..30}; do
            if sshpass -p "$VM_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
               -o UserKnownHostsFile=/dev/null ubuntu@"$VM_PRIVATE_IP" "echo 'VM is ready'" 2>/dev/null; then
              echo "VM is ready!"
              break
            fi
            echo "Attempt $i/30: VM not ready yet, waiting 10 seconds..."
            sleep 10
          done
          
          # Set outputs
          echo "vm_name=$VM_NAME" >> $GITHUB_OUTPUT
          echo "vm_ip=$VM_PRIVATE_IP" >> $GITHUB_OUTPUT
          echo "vm_resource_group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "vm_nic_name=$NIC_NAME" >> $GITHUB_OUTPUT
          
          # Add to known_hosts
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$VM_PRIVATE_IP" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install Azure CLI on VM
        env:
          SSH_HOST: ${{ steps.create-vm.outputs.vm_ip }}
          SSH_USER: 'ubuntu'
          SSH_PASSWORD: ${{ secrets.SAS_AZURE_VM_SSH_PASSWORD }}
        run: |
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${SSH_HOST} "
            if ! command -v az &> /dev/null; then
              echo 'Installing Azure CLI...'
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            fi
            az --version | head -1
          "

      - name: Generate SAS URLs via SSH
        id: generate-sas
        env:
          SSH_HOST: ${{ steps.create-vm.outputs.vm_ip }}
          SSH_USER: 'ubuntu'
          SSH_PASSWORD: ${{ secrets.SAS_AZURE_VM_SSH_PASSWORD }}
          STORAGE_ACCOUNT_KEY: ${{ secrets.SAS_AZURE_STORAGE_ACCOUNT_KEY }}
          STORAGE_ACCOUNT_NAME: ${{ inputs.storage_account_name }}
          CONTAINER_NAME: ${{ inputs.container_name }}
          CP_BLOB_NAME: ${{ inputs.control_plane_blob_name }}
          LINUX_WORKER_BLOB_NAME: ${{ inputs.linux_worker_blob_name }}
          WINDOWS_WORKER_BLOB_NAME: ${{ inputs.windows_worker_blob_name }}
          EXPIRY_DAYS: ${{ inputs.sas_expiry_days }}
        run: |
          # Create SSH commands script
          cat > generate_sas.sh <<'EOFSCRIPT'
          #!/bin/bash
          set -e
          
          # Calculate expiry date
          SAS_EXPIRY=$(date -u -d "+${EXPIRY_DAYS} days" +"%Y-%m-%dT%H:%MZ")
          
          echo "Generating SAS URL for Control Plane VHD..."
          CP_URL=$(az storage blob generate-sas \
            --account-key "${STORAGE_ACCOUNT_KEY}" \
            --account-name "${STORAGE_ACCOUNT_NAME}" \
            --container-name "${CONTAINER_NAME}" \
            --name "${CP_BLOB_NAME}" \
            --permissions r \
            --expiry "$SAS_EXPIRY" \
            --full-uri \
            --output tsv)
          
          echo "Generating SAS URL for Linux Worker VHD..."
          LINUX_WORKER_URL=$(az storage blob generate-sas \
            --account-key "${STORAGE_ACCOUNT_KEY}" \
            --account-name "${STORAGE_ACCOUNT_NAME}" \
            --container-name "${CONTAINER_NAME}" \
            --name "${LINUX_WORKER_BLOB_NAME}" \
            --permissions r \
            --expiry "$SAS_EXPIRY" \
            --full-uri \
            --output tsv)
          
          echo "Generating SAS URL for Windows Worker Installer..."
          WINDOWS_WORKER_URL=$(az storage blob generate-sas \
            --account-key "${STORAGE_ACCOUNT_KEY}" \
            --account-name "${STORAGE_ACCOUNT_NAME}" \
            --container-name "${CONTAINER_NAME}" \
            --name "${WINDOWS_WORKER_BLOB_NAME}" \
            --permissions r \
            --expiry "$SAS_EXPIRY" \
            --full-uri \
            --output tsv)
          
          echo "CP_URL=${CP_URL}"
          echo "LINUX_WORKER_URL=${LINUX_WORKER_URL}"
          echo "WINDOWS_WORKER_URL=${WINDOWS_WORKER_URL}"
          EOFSCRIPT
          
          chmod +x generate_sas.sh
          
          # Transfer script to remote host
          sshpass -p "${SSH_PASSWORD}" scp -o StrictHostKeyChecking=no \
            generate_sas.sh ${SSH_USER}@${SSH_HOST}:/tmp/
          
          # Execute script on remote host and capture output
          OUTPUT=$(sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${SSH_HOST} \
            "export STORAGE_ACCOUNT_KEY='${STORAGE_ACCOUNT_KEY}' && \
             export STORAGE_ACCOUNT_NAME='${STORAGE_ACCOUNT_NAME}' && \
             export CONTAINER_NAME='${CONTAINER_NAME}' && \
             export CP_BLOB_NAME='${CP_BLOB_NAME}' && \
             export LINUX_WORKER_BLOB_NAME='${LINUX_WORKER_BLOB_NAME}' && \
             export WINDOWS_WORKER_BLOB_NAME='${WINDOWS_WORKER_BLOB_NAME}' && \
             export EXPIRY_DAYS='${EXPIRY_DAYS}' && \
             bash /tmp/generate_sas.sh")
          
          
          # Parse URLs from output
          CP_URL=$(echo "$OUTPUT" | grep "CP_URL=" | cut -d'=' -f2-)
          LINUX_WORKER_URL=$(echo "$OUTPUT" | grep "LINUX_WORKER_URL=" | cut -d'=' -f2-)
          WINDOWS_WORKER_URL=$(echo "$OUTPUT" | grep "WINDOWS_WORKER_URL=" | cut -d'=' -f2-)
          
          # Set outputs
          echo "control_plane_url=${CP_URL}" >> $GITHUB_OUTPUT
          echo "linux_worker_url=${LINUX_WORKER_URL}" >> $GITHUB_OUTPUT
          echo "windows_worker_url=${WINDOWS_WORKER_URL}" >> $GITHUB_OUTPUT

      - name: Clean up remote script
        if: always()
        env:
          SSH_HOST: ${{ steps.create-vm.outputs.vm_ip }}
          SSH_USER: 'ubuntu'
          SSH_PASSWORD: ${{ secrets.SAS_AZURE_VM_SSH_PASSWORD }}
        run: |
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${SSH_HOST} "rm -f /tmp/generate_sas.sh" || true

      - name: Display SAS URLs
        env:
          SAS_EXPIRY_DAYS: ${{ inputs.sas_expiry_days }}
        run: |
          # Calculate expiry date
          EXPIRY_DATE=$(date -u -d "+${SAS_EXPIRY_DAYS} days" +"%d/%m/%Y")
          RUN_DATE=$(date -u +"%d/%m/%Y")
          
          echo "### Azure Artifact SAS URLs Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated on:** ${RUN_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "**Expires on:** ${EXPIRY_DATE} (${SAS_EXPIRY_DAYS} days from run)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Control Plane VHD:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.generate-sas.outputs.control_plane_url }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Linux Worker VHD:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.generate-sas.outputs.linux_worker_url }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Windows Worker Installer:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.generate-sas.outputs.windows_worker_url }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create artifact with URLs
        env:
          SAS_EXPIRY_DAYS: ${{ inputs.sas_expiry_days }}
        run: |
          mkdir -p vhd-urls
          
          # Calculate dates
          EXPIRY_DATE=$(date -u -d "+${SAS_EXPIRY_DAYS} days" +"%d/%m/%Y")
          RUN_DATE=$(date -u +"%d/%m/%Y")
          
          cat > vhd-urls/sas-urls-$(date +%Y%m%d-%H%M%S).txt <<EOF
          Azure Artifact SAS URLs Generated on ${RUN_DATE}
          Expires on ${EXPIRY_DATE} (${SAS_EXPIRY_DAYS} days from run)
          
          Control Plane VHD:
          ${{ steps.generate-sas.outputs.control_plane_url }}
          
          Linux Worker VHD:
          ${{ steps.generate-sas.outputs.linux_worker_url }}
          
          Windows Worker Installer:
          ${{ steps.generate-sas.outputs.windows_worker_url }}
          EOF

      - name: Upload URLs as artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: vhd-sas-urls-${{ github.run_number }}
          path: vhd-urls/
          retention-days: 10

  cleanup-vm:
    needs: generate-sas-urls
    if: always()  # Run even if previous job fails
    runs-on: openlab
    steps:
      - name: Install Azure CLI
        run: |
          if ! command -v az &> /dev/null; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Authenticate to Azure
        env:
          AZURE_CLIENT_ID: ${{ secrets.NDM_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.NDM_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.NDM_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.NDM_AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Delete Dynamic VM
        if: needs.generate-sas-urls.outputs.vm_name != ''
        env:
          VM_NAME: ${{ needs.generate-sas-urls.outputs.vm_name }}
          RESOURCE_GROUP: ${{ needs.generate-sas-urls.outputs.vm_resource_group }}
          NIC_NAME: ${{ needs.generate-sas-urls.outputs.vm_nic_name }}
        run: |
          echo "Deleting VM: $VM_NAME"
          az vm delete \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --yes \
            --output none || echo "VM deletion failed or already deleted"
          
          # Clean up associated NIC
          if [ -n "$NIC_NAME" ]; then
            echo "Deleting NIC: $NIC_NAME"
            az network nic delete \
              --resource-group "$RESOURCE_GROUP" \
              --name "$NIC_NAME" \
              --output none || echo "NIC deletion failed or already deleted"
          fi
          
          echo "VM cleanup completed"
        continue-on-error: false # Don't fail workflow if cleanup fails
