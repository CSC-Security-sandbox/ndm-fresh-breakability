name: Build Worker Binary and Windows Installer

on:
  push:
    branches:
      - ad/windows-worker-action
  release:
    types: [created]

jobs:
  Worker-package:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Replace GitHub Token Placeholder in .npmrc
        run: |
          sed -i 's|${GITOPS_USER_GITHUB_TOKEN}|${{ secrets.GITOPS_USER_GITHUB_TOKEN }}|' .npmrc

      - name: Install dependencies and pkg
        run: npm install && npm install pkg -g
      
      - name: Run Build
        run: npm run build

      - name: Build binary
        run: npm run pkg
    
      - name: Zip pkg folder
        run: zip -r pkg.zip pkg
      
      - name: Set SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-binary-${{ env.SHORT_SHA }}
          path: pkg.zip

  build:
    runs-on: windows-latest
    needs: Worker-package
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}

    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set SHA
          shell: pwsh
          run: |
            $shortSha = $env:GITHUB_SHA.Substring(0, 6)
            echo "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV

        - name: Checkout worker.env.j2 from app-deployment repository
          uses: actions/checkout@v4
          with:
            repository: ${{ github.repository_owner }}/app-deployment
            token: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
            path: app-deployment
            sparse-checkout: |
              ansible/worker/roles/configure-worker/templates/worker.env.j2

        - name: Download Binary Artifact
          uses: actions/download-artifact@v4
          with:
            name: worker-binary-${{ env.SHORT_SHA }}
            path: pkg

        - name: Extract Binary
          shell: pwsh
          run: |
            Expand-Archive -Path "pkg\pkg.zip" -DestinationPath "pkg" -Force

        - name: Prepare Installer Directory
          shell: pwsh
          run: |
            New-Item -ItemType Directory -Force -Path wininstaller
            Move-Item -Path "./pkg/pkg/worker-win-x64.exe" -Destination "wininstaller\worker.exe" -Force

        - name: Copy environment file
          shell: pwsh
          run: |
            Copy-Item -Path "app-deployment/ansible/worker/roles/configure-worker/templates/worker.env.j2" -Destination "wininstaller\worker.env.j2" -Force
  
        - name: Download WinSW and rename
          shell: pwsh
          run: |
            # Download a specific version of WinSW (adjust version if needed)
            Invoke-WebRequest -Uri "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe" -OutFile "wininstaller\winsw.exe"
  
        - name: List files in wininstaller directory
          shell: pwsh
          run: |
            Write-Host "Files in wininstaller directory:"
            Get-ChildItem -Path "wininstaller" | ForEach-Object { Write-Host "  - $($_.Name)" }
  
        - name: Install Inno Setup
          shell: pwsh
          run: choco install innosetup -y
  
        - name: Build Windows Installer with Inno Setup
          shell: cmd
          run: |
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "wininstaller\installer.iss"

        - name: Upload Installer Artifact
          uses: actions/upload-artifact@v4
          with:
            name: windows-installer-${{ env.SHORT_SHA }}
            path: wininstaller\datamigrator-worker-setup.exe

  release:
    runs-on: ubuntu-latest
    needs: [Worker-package, build]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Set SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Download Binary Artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-binary-${{ env.SHORT_SHA }}
          path: artifacts

      - name: Download Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ env.SHORT_SHA }}
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.SHORT_SHA }}
          release_name: Release-${{ env.SHORT_SHA }}
          draft: false
          prerelease: true

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1.0.1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/pkg.zip
          asset_name: ${{ env.SHORT_SHA }}-worker.zip
          asset_content_type: application/zip

      - name: Upload Installer Release Asset
        uses: actions/upload-release-asset@v1.0.1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/datamigrator-worker-setup.exe
          asset_name: ${{ env.SHORT_SHA }}-windows-worker-installer.exe
          asset_content_type: application/octet-stream