name: Release Workflow

on:
  workflow_dispatch:
    
permissions: 
  contents: write
  actions: read
  pull-requests: write
  security-events: write
  id-token: write
  
jobs:
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.extract_build.outputs.build }}
    steps:
      - name: Ensure branch is release/*
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ ! "$BRANCH_NAME" =~ ^release/[^/]+$ ]]; then
            echo "This workflow can only be run on release/* branches."
            exit 1
          fi
          
          VERSION="${BRANCH_NAME#release/}"
          
          VALID_PATTERN="^([0-9]{4}\.[0-9]{2}(\.[0-9]{2})?(-[a-zA-Z0-9_]+)?|[a-zA-Z][a-zA-Z0-9_]*(-[a-zA-Z0-9_]+)?)$"
          
          if [[ ! "$VERSION" =~ $VALID_PATTERN ]]; then
            echo "Error: Invalid release version format: $VERSION"
            echo "Valid formats are:"
            echo "  - YYYY.MM (e.g., 2025.08)"
            echo "  - YYYY.MM-<suffix> (e.g., 2025.08-1, 2025.08-alpha, 2025.08-username)"
            echo "  - YYYY.MM.DD (e.g., 2025.08.03)"
            echo "  - YYYY.MM.DD-<suffix> (e.g., 2025.08.03-testing)"
            echo "  - <name> (e.g., preview, testing)"
            echo "  - <name>-<suffix> (e.g., preview-1, testing-beta)"
            exit 1
          fi
          
          echo "Valid release branch: $BRANCH_NAME (version: $VERSION)"
          
      - name: Extract build from branch name
        id: extract_build
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/release/}"
          echo "build=$BRANCH_NAME" >> $GITHUB_OUTPUT

  build-docker-images:
    needs: check-branch
    uses: ./.github/workflows/build-push-service-images.yaml
    with:
      build: ${{ needs.check-branch.outputs.build }}
    secrets: inherit

  build-worker-binary:
    needs: check-branch
    uses: ./.github/workflows/build-binary-and-installer-for-worker.yaml
    with:
      build: ${{ needs.check-branch.outputs.build }}
    secrets: inherit
  
  build-vm-images:
    needs: [check-branch, build-worker-binary, build-docker-images]
    uses: ./.github/workflows/ndm-vm-image-build.yaml
    with:
      build: ${{ needs.check-branch.outputs.build }}
    secrets: inherit
