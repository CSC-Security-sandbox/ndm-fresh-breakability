name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag to validate (e.g., 2025.9.17, 1.2.3-alpha)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show provided version
        run: |
          echo "Provided version: ${{ github.event.inputs.version }}"

      - name: Create simple Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM alpine:3.18
          LABEL org.opencontainers.image.title="Test Image"
          LABEL org.opencontainers.image.version="${{ github.event.inputs.version }}"
          CMD ["/bin/sh","-c","echo Image version: ${{ github.event.inputs.version }}"]
          EOF

      - name: Build Docker image with provided tag
        run: |
          docker build -t testimage:${{ github.event.inputs.version }} .

      - name: Validate Docker tag by running container
        run: |
          docker run --rm testimage:${{ github.event.inputs.version }}

      - name: Ensure Chart.yaml exists (dummy if absent)
        run: |
          if [ ! -f Chart.yaml ]; then
          cat > Chart.yaml <<'EOF'
          apiVersion: v2
          name: dummy-chart
          description: A dummy Helm chart for CI version validation
          version: 0.0.1
          appVersion: "1.0.0"
          type: application
          EOF
          echo "Resulting Chart.yaml before patch:"
          cat Chart.yaml
          fi

      - name: Install yq and Helm
        run: |
          sudo curl -L "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          curl -L https://get.helm.sh/helm-v3.14.4-linux-amd64.tar.gz | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          helm version
          yq --version

      - name: Patch Chart.yaml with provided version
        run: |
          V='${{ github.event.inputs.version }}'
          yq -i ".version = \"$V\" | .appVersion = \"$V\"" Chart.yaml
          echo "Patched Chart.yaml:" && cat Chart.yaml

      - name: Lint Helm chart
        run: helm lint .

      - name: Package Helm chart with provided version
        run: |
          helm package .
          echo "Packaged charts:" && ls -1 *.tgz

      - name: Summary
        run: |
          echo "## Version Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built: testimage:${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          CHART_FILE=$(ls -1 *.tgz | head -1 || true)
          if [ -n "$CHART_FILE" ]; then
            echo "Helm chart package: $CHART_FILE" >> $GITHUB_STEP_SUMMARY
          fi
