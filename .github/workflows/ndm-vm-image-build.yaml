name: NDM Packer VM Image Build Workflow

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  HELM_VERSION: 3.17.3
  PACKER_VERSION: 1.12.0
  TERRAFORM_VERSION: 1.11.4
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to build (control-plane, worker, or unified-plane)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - control-plane
          - worker
          - unified-plane
      provider:
        description: 'Cloud provider'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - azure
          - vsphere
          - gcp
  schedule:
    - cron: '30 18 * * *'

jobs:
  determine-matrix:
    runs-on: openlab
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Set components based on input
          if [[ "${{ github.event.inputs.component }}" == "all" || "${{ github.event.inputs.component }}" == "" ]]; then
            if [[ "${{ github.event.inputs.provider }}" == "vsphere" ]]; then
              COMPONENTS='["control-plane", "worker", "unified-plane"]'
            else
              COMPONENTS='["control-plane", "worker"]'
            fi
          else
            COMPONENTS='["${{ github.event.inputs.component }}"]'
          fi

          # Set providers based on input
          if [[ "${{ github.event.inputs.provider }}" == "all" || "${{ github.event.inputs.provider }}" == "" ]]; then
            PROVIDERS='["azure", "vsphere", "gcp"]'
          else
            PROVIDERS='["${{ github.event.inputs.provider }}"]'
          fi

          # Create the matrix JSON
          echo "matrix={\"component\":${COMPONENTS},\"provider\":${PROVIDERS}}" >> $GITHUB_OUTPUT

    
  packer:
    needs: determine-matrix
    name: Build ${{ matrix.component }} on ${{ matrix.provider }}
    runs-on: openlab
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    outputs:
      provider: ${{ matrix.provider }}
      component: ${{ matrix.component }}
      image_name: ${{ steps.image-info.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Packer
        uses: hashicorp/setup-packer@1aa358be5cf73883762b302a3a03abd66e75b232
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Determine packer path
        id: packer-path
        run: |
          # Dynamically generate the path for each component-provider combination
          PROVIDER_PATH="${{ matrix.provider }}"

          PACKER_PATH="app-deployment/packer/${PROVIDER_PATH}/${{ matrix.component }}"
          echo "path=$PACKER_PATH" >> $GITHUB_OUTPUT
          echo "Using packer configuration path: $PACKER_PATH"

      - name: Export ACR pull secret
        if: ${{ matrix.component != 'worker' }}
        run: |
          echo "Exporting ACR pull secret..."
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV

      - name: Configure cloud provider credentials
        id: credentials
        run: |
          # Create credentials directory
          mkdir -p $GITHUB_WORKSPACE/credentials

          echo "Setting up credentials for provider: ${{ matrix.provider }}"
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          case "${{ matrix.provider }}" in
            azure)
              echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
              echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
              echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
              ;;
            aws)
              echo "PKR_VAR_aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
              echo "PKR_VAR_aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
              ;;
            vsphere)
              echo "Decoding and exporting vSphere credentials..."
              echo "PKR_VAR_vsphere_endpoint=$(echo "${{ secrets.VSPHERE_SERVER }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_vsphere_username=$(echo "${{ secrets.VSPHERE_USERNAME }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_vsphere_password=$(echo "${{ secrets.VSPHERE_PASSWORD }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_username=$(echo "${{ secrets.VSPHERE_BUILD_USERNAME }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_password=$(echo "${{ secrets.VSPHERE_BUILD_PASSWORD }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_password_encrypted=$(echo "${{ secrets.VSPHERE_BUILD_PASSWORD_ENCRYPTED }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_key=$(echo "${{ secrets.VSPHERE_BUILD_KEY }}" | base64 --decode)" >> $GITHUB_ENV
              ;;
            gcp)
              echo "${{ secrets.PACKER_GCP_CREDENTIALS_JSON }}" | base64 --decode > $GITHUB_WORKSPACE/gcp-key.json
              echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/gcp-key.json" >> $GITHUB_ENV
              ;;
          esac
      
      - name: Fetch and Replace tags
        if: ${{ matrix.component != 'worker' }}
        run: |
          chmod +x ./app-deployment/scripts/get_tags.sh
          ./app-deployment/scripts/get_tags.sh

      - name: Download Worker Binary
        if: ${{ matrix.component == 'worker' }} || ${{ matrix.component == 'unified-plane' }}
        id: worker-binary
        run: |
          REPO="NetApp-Cloud-DataMigrate/worker"
          API_URL="https://api.github.com/repos/$REPO/releases"

          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ env.GITOPS_USER_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API_URL" | jq -r 'sort_by(.published_at) | reverse | .[0].tag_name')

          if [[ "$LATEST_RELEASE" == "null" || -z "$LATEST_RELEASE" ]]; then
            echo "Error: Unable to fetch latest release tag."
            exit 1
          fi

          echo "Latest release tag: $LATEST_RELEASE"
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> $GITHUB_ENV

          # Get release by tag
          WORKER_BINARY_URL="https://api.github.com/repos/NetApp-Cloud-DataMigrate/worker/releases/tags/$LATEST_RELEASE"

          ASSET_URL=$(curl -s -H "Authorization: token ${{ env.GITOPS_USER_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$WORKER_BINARY_URL" | jq -r '.assets[] | select(.name == "'$LATEST_RELEASE'-worker.zip") | .url')

          echo "Asset URL: $ASSET_URL"

          echo "Downloading asset using GitHub API..."
          curl -L -o "worker.zip" \
            -H "Authorization: token ${{ env.GITOPS_USER_GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL"
          
          echo "Worker binary downloaded successfully."
      
          # Create directory in the workspace
          mkdir -p $GITHUB_WORKSPACE/worker_bin
          unzip worker.zip -d $GITHUB_WORKSPACE/worker_bin
      
          if [[ -f "$GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64" ]]; then
            echo "Binary exists at $GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64"
          else
            echo "Binary not found!" && exit 1
          fi
          echo "worker_binary_path=$GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64" >> $GITHUB_OUTPUT

      - name: Packer Init
        run: |
          cd ${{ steps.packer-path.outputs.path }}
          packer init .

      - name: Packer Validate
        id: validate
        run: |
          cd ${{ steps.packer-path.outputs.path }}

          if [ "${{ matrix.component }}" == "worker" ] || [ "${{ matrix.component }}" == "unified-plane" ]; then
            echo "Validating worker configuration with binary path..."
            packer validate \
              -var "worker_binary_path=${{ steps.worker-binary.outputs.worker_binary_path }}" \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl
          else
            echo "Validating control-plane configuration..."
            packer validate \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl
          fi

          if [ $? -ne 0 ]; then
            echo "Packer validation failed"
            exit 1
          fi

          echo "Packer validation completed successfully"

      - name: Packer Build
        id: build
        run: |
          cd ${{ steps.packer-path.outputs.path }}

          # Set build-specific variables
          BUILD_ID=$(date -u +'%Y%m%dT%H%M%SZ')-${{ github.sha }}
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          # Run packer build with appropriate parameters based on component
          if [ "${{ matrix.component }}" == "worker" ] || [ "${{ matrix.component }}" == "unified-plane" ]; then
            echo "Building worker image with binary path..."
            packer build \
              -var "worker_binary_path=${{ steps.worker-binary.outputs.worker_binary_path }}" \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl | tee $GITHUB_WORKSPACE/packer.log
          else
            echo "Building control-plane image..."
            packer build \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl | tee $GITHUB_WORKSPACE/packer.log
          fi

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Packer build failed"
            exit 1
          fi

          echo "Packer build completed successfully"

      - name: Extract Image Info
        id: image-info
        run: |
          # Extract image information based on provider
          case "${{ matrix.provider }}" in
          azure)
            echo "Capturing image details for Azure..."
      
            IMAGE_RESOURCE_GROUP=$(grep 'ManagedImageResourceGroupName' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_NAME=$(grep 'ManagedImageName' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_ID=$(grep 'ManagedImageId' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_LOCATION=$(grep 'ManagedImageLocation' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
      
            echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            echo "resource_group=$IMAGE_RESOURCE_GROUP" >> $GITHUB_OUTPUT
            echo "location=$IMAGE_LOCATION" >> $GITHUB_OUTPUT
      
            # Output summary
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "Image ID: $IMAGE_ID"
            echo "Image Name: $IMAGE_NAME"
            echo "Resource Group: $IMAGE_RESOURCE_GROUP"
            echo "Location: $IMAGE_LOCATION"
            ;;
          aws)
            echo "Capturing image details for AWS..."
      
            # Process the packer log to extract AMI ID using your pattern
            tail -2 $GITHUB_WORKSPACE/packer.log | head -2 | awk 'match($0, /ami-.*/) { print substr($0, RSTART, RLENGTH) }' > $GITHUB_WORKSPACE/ami.txt
            
            # Read the AMI ID from the file
            IMAGE_ID=$(cat $GITHUB_WORKSPACE/ami.txt)
            
            echo "aws_image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
      
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "AMI ID: $IMAGE_ID"
            ;;
          vsphere)
            echo "Capturing image details for vSphere..."
            IMAGE_NAME=$(grep -A 3 'Builds finished' $GITHUB_WORKSPACE/packer.log | grep 'vsphere-iso.linux-ubuntu:' | tail -1 | awk '{print $NF}')
      
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "OVF Template Name: $IMAGE_NAME"
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            ;;
          gcp)
            echo "Capturing image details for GCP..."

            # Extract GCP Image ID from the Packer log
            IMAGE_ID=$(grep 'A disk image was created' $GITHUB_WORKSPACE/packer.log | tail -1 | awk -F': ' '{print $NF}')

            echo "gcp_image_id=$IMAGE_ID" >> $GITHUB_OUTPUT

            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "GCP Image ID: $IMAGE_ID"
            ;;
          esac

  deploy-and-test:
    if: ${{ needs.packer.outputs.provider == 'vsphere' && needs.packer.outputs.component == 'unified-plane' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    needs: [ packer, determine-matrix ]
    
    name: Create VM for ${{ matrix.component }} on ${{ matrix.provider }}
    runs-on: openlab
    outputs:
      vm_ip_address: ${{ steps.deployment-info.outputs.vm_ip_address }}
      deployment_id: ${{ steps.deployment-info.outputs.deployment_id }}
    
    env:
      NDM_VM_PORT: 22
      NDM_APP_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      NDM_APP_PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials
        id: credentials
        run: |
          # Create credentials directory
          mkdir -p $GITHUB_WORKSPACE/credentials

          echo "Setting VM credentials..."
          VM_USERNAME=$(echo "${{ secrets.VSPHERE_BUILD_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.VSPHERE_BUILD_PASSWORD }}" | base64 --decode)

          # Write to GITHUB_ENV
          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV

          echo "Setting up credentials for provider: ${{ matrix.provider }}"
          case "${{ matrix.provider }}" in
            vsphere)
              echo "TF_VAR_vsphere_server=$(echo "${{ secrets.VSPHERE_SERVER }}" | base64 --decode)" >> $GITHUB_ENV
              echo "TF_VAR_vsphere_user=$(echo "${{ secrets.VSPHERE_USERNAME }}" | base64 --decode)" >> $GITHUB_ENV
              echo "TF_VAR_vsphere_password=$(echo "${{ secrets.VSPHERE_PASSWORD }}" | base64 --decode)" >> $GITHUB_ENV
              echo "TF_VAR_ovf_template_name=${{ needs.packer.outputs.image_name }}" >> $GITHUB_ENV
              ;;
          esac

      - name: Generate Deployment ID
        id: deployment-id
        run: |
          DEPLOYMENT_ID="${{ matrix.component }}-${{ matrix.provider }}-$(date -u +'%Y%m%dT%H%M%SZ')"
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          
      - name: Initialize Terraform
        run: |
          cd app-deployment/terraform/${{ matrix.provider }}
          terraform init

      - name: Validate Terraform Configuration
        run: |
          cd app-deployment/terraform/${{ matrix.provider }}
          terraform validate

      - name: Create Terraform Plan
        run: |
          cd app-deployment/terraform/${{ matrix.provider }}
          terraform plan -out=tfplan

      - name: Apply Terraform Plan
        id: terraform-apply
        run: |
          cd app-deployment/terraform/${{ matrix.provider }}
          terraform apply -auto-approve tfplan

      - name: Extract Deployment Information
        id: deployment-info
        run: |
          cd app-deployment/terraform/${{ matrix.provider }}
          
          # Extract VM IP address
          VM_IP=$(terraform output -raw vm_ip_address)
          echo "vm_ip_address=$VM_IP" >> $GITHUB_OUTPUT
          
          # Pass deployment ID from previous step
          echo "deployment_id=${{ steps.deployment-id.outputs.deployment_id }}" >> $GITHUB_OUTPUT
          
          echo "Deployment information extracted:"
          echo "VM IP: $VM_IP"
          echo "Deployment ID: ${{ steps.deployment-id.outputs.deployment_id }}"
      
      - name: Set VM IP Address for API Tests
        run: |
          echo "JOB_SERVICE_URL=https://${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_URL=https://${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "ADMIN_SERVICE_URL=https://${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "KEYCLOAK_IP=${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "NDM_VM_HOST=${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "NDM_WORKERS_HOST=${{ steps.deployment-info.outputs.vm_ip_address }}" >> $GITHUB_ENV
          echo "NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "NDM_WORKERS_PORT=$NDM_VM_PORT" >> $GITHUB_ENV
          echo "NDM_WORKERS_PASSWORD=$NDM_VM_PASSWORD" >> $GITHUB_ENV


      - name: Install sshpass
        run: |
          echo "Installing sshpass..."
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          echo "sshpass installed successfully."

      - name: Wait for Service Boot Setup to Complete
        run: |
          echo "Monitoring service boot setup on ${{ steps.deployment-info.outputs.vm_ip_address }}..."
          
          # Ensure script is executable
          chmod +x ./app-deployment/scripts/service_check.sh
          
          # Run the service_check.sh script to wait for the microk8s-boot service to complete
          ./app-deployment/scripts/service_check.sh \
          "${{ steps.deployment-info.outputs.vm_ip_address }}" \
          "$VM_USERNAME" \
          "$VM_PASSWORD"
          
          if [ $? -ne 0 ]; then
            echo "Service setup failed or timed out"
            exit 1
          fi
          
          echo "Service setup completed successfully"

      # Integrated API Tests Steps
      - name: Set up Go for API Tests
        if: ${{ matrix.provider == 'vsphere' && matrix.component == 'unified-plane' }}
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run API Tests
        if: ${{ matrix.provider == 'vsphere' && matrix.component == 'unified-plane' }}
        run: |
          cd ndm-api-tests
          go mod tidy
          go test -v -count=1 ./...
        continue-on-error: true

      - name: Destroy Terraform Resources
        if: ${{ always() && matrix.provider == 'vsphere' && matrix.component == 'unified-plane' }}
        run: |
          echo "Destroying Terraform resources for ${{ matrix.component }} on ${{ matrix.provider }}..."
          cd app-deployment/terraform/${{ matrix.provider }}
          terraform destroy -auto-approve
          echo "Terraform resources destroyed."
      
      - name: Clean Up Temporary Files
        if: always()
        run: |
          echo "Cleaning up temporary files..."
          rm -rf $GITHUB_WORKSPACE/bin 2>/dev/null || true
          rm -rf $GITHUB_WORKSPACE/credentials 2>/dev/null || true
          rm -f $GITHUB_WORKSPACE/packer.log 2>/dev/null || true
          rm -rf $GITHUB_WORKSPACE/api-tests 2>/dev/null || true
          echo "Temporary files cleaned up."