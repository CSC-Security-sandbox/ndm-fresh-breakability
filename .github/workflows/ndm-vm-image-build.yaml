name: NDM VM Image Build

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  HELM_VERSION: 3.17.3
  PACKER_VERSION: 1.12.0
  TERRAFORM_VERSION: 1.11.4
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to build (control-plane, worker, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - control-plane
          - worker
          - windows-installer
      provider:
        description: 'Cloud provider'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - azure
          - vsphere
          - gcp
      services_config:
        description: 'JSON configuration for service tags and branches'
        required: false
        type: string
        default: |
          {
            "worker": {
              "tag": "latest",
              "branch": "main"
            },
            "admin-service": {
              "tag": "latest",
              "branch": "main"
            },
            "config-service": {
              "tag": "latest",
              "branch": "main"
            },
            "datamigrator-ui": {
              "tag": "latest",
              "branch": "main"
            },
            "db-writer": {
              "tag": "latest",
              "branch": "main"
            },
            "jobs-service": {
              "tag": "latest",
              "branch": "main"
            },
            "keycloak-customizations": {
              "tag": "latest",
              "branch": "main"
            },
            "reports-service": {
              "tag": "latest",
              "branch": "main"
            },
            "db-migrations": {
              "tag": "latest",
              "branch": "main"
            },
            "support-service": {
              "tag": "latest",
              "branch": "main"
            }
          }
  schedule:
    - cron: '30 18 * * *'
  workflow_call:
    inputs:
      build:
        description: 'Build to release'
        required: true
        type: string

permissions: 
  contents: read

jobs:
  package-artifacts:
    runs-on: openlab
    outputs:
      ref_type: ${{ steps.build_version.outputs.ref_type }}
      ref_name: ${{ steps.build_version.outputs.ref_name }}
      build_type: ${{ steps.build_version.outputs.build_type }}
      build_version: ${{ steps.build_version.outputs.build_version }}
      worker_tag: ${{ steps.parse-config.outputs.worker_tag }}
      worker_branch: ${{ steps.parse-config.outputs.worker_branch }}
      admin_service_tag: ${{ steps.parse-config.outputs.admin_service_tag }}
      admin_service_branch: ${{ steps.parse-config.outputs.admin_service_branch }}
      config_service_tag: ${{ steps.parse-config.outputs.config_service_tag }}
      config_service_branch: ${{ steps.parse-config.outputs.config_service_branch }}
      datamigrator_ui_tag: ${{ steps.parse-config.outputs.datamigrator_ui_tag }}
      datamigrator_ui_branch: ${{ steps.parse-config.outputs.datamigrator_ui_branch }}
      db_writer_service_tag: ${{ steps.parse-config.outputs.db_writer_service_tag }}
      db_writer_service_branch: ${{ steps.parse-config.outputs.db_writer_service_branch }}
      jobs_service_tag: ${{ steps.parse-config.outputs.jobs_service_tag }}
      jobs_service_branch: ${{ steps.parse-config.outputs.jobs_service_branch }}
      keycloak_customizations_tag: ${{ steps.parse-config.outputs.keycloak_customizations_tag }}
      keycloak_customizations_branch: ${{ steps.parse-config.outputs.keycloak_customizations_branch }}
      reports_service_tag: ${{ steps.parse-config.outputs.reports_service_tag }}
      reports_service_branch: ${{ steps.parse-config.outputs.reports_service_branch }}
      db_migrations_tag: ${{ steps.parse-config.outputs.db_migrations_tag }}
      db_migrations_branch: ${{ steps.parse-config.outputs.db_migrations_branch }}
      support_service_tag: ${{ steps.parse-config.outputs.support_service_tag }}
      support_service_branch: ${{ steps.parse-config.outputs.support_service_branch }}
      linux_binary_name: ${{ steps.worker-binary.outputs.linux_binary_name }}
      windows_binary_name: ${{ steps.worker-binary.outputs.windows_binary_name }}
      binary_path: ${{ steps.worker-binary.outputs.binary_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Export Azure credentials
        run: |
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Parse and set service configurations
        id: parse-config
        run: |
          # Parse the JSON configuration or use defaults
          SERVICES_CONFIG='${{ github.event.inputs.services_config }}'
          
          if [ -z "$SERVICES_CONFIG" ] || [ "$SERVICES_CONFIG" = "null" ]; then
            echo "No services configuration provided, using defaults"
            SERVICES_CONFIG='{
              "worker": {"tag": "latest", "branch": "main"},
              "admin-service": {"tag": "latest", "branch": "main"},
              "config-service": {"tag": "latest", "branch": "main"},
              "datamigrator-ui": {"tag": "latest", "branch": "main"},
              "db-writer": {"tag": "latest", "branch": "main"},
              "jobs-service": {"tag": "latest", "branch": "main"},
              "keycloak-customizations": {"tag": "latest", "branch": "main"},
              "reports-service": {"tag": "latest", "branch": "main"},
              "db-migrations": {"tag": "latest", "branch": "main"},
              "support-service": {"tag": "latest", "branch": "main"}
            }'
          fi
          
          # Extract individual service tags and set as environment variables
          WORKER_TAG=$(echo "$SERVICES_CONFIG" | jq -r '.worker.tag // "latest"')
          ADMIN_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."admin-service".tag // "latest"')
          CONFIG_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."config-service".tag // "latest"')
          DATAMIGRATOR_UI_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."datamigrator-ui".tag // "latest"')
          DB_WRITER_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."db-writer".tag // "latest"')
          JOBS_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."jobs-service".tag // "latest"')
          KEYCLOAK_CUSTOMIZATIONS_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."keycloak-customizations".tag // "latest"')
          REPORTS_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."reports-service".tag // "latest"')
          DB_MIGRATIONS_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."db-migrations".tag // "latest"')
          SUPPORT_SERVICE_TAG=$(echo "$SERVICES_CONFIG" | jq -r '."support-service".tag // "latest"')

          # Extract branches for each service
          WORKER_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '.worker.branch // "main"' | sed 's#/#-#g')
          ADMIN_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."admin-service".branch // "main"' | sed 's#/#-#g')
          CONFIG_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."config-service".branch // "main"' | sed 's#/#-#g')
          DATAMIGRATOR_UI_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."datamigrator-ui".branch // "main"' | sed 's#/#-#g')
          DB_WRITER_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."db-writer".branch // "main"' | sed 's#/#-#g')
          JOBS_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."jobs-service".branch // "main"' | sed 's#/#-#g')
          KEYCLOAK_CUSTOMIZATIONS_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."keycloak-customizations".branch // "main"' | sed 's#/#-#g')
          REPORTS_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."reports-service".branch // "main"' | sed 's#/#-#g')
          DB_MIGRATIONS_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."db-migrations".branch // "main"' | sed 's#/#-#g')
          SUPPORT_SERVICE_BRANCH=$(echo "$SERVICES_CONFIG" | jq -r '."support-service".branch // "main"' | sed 's#/#-#g')
          

          # Set as step outputs for other jobs
          echo "worker_tag=$WORKER_TAG" >> $GITHUB_OUTPUT
          echo "admin_service_tag=$ADMIN_SERVICE_TAG" >> $GITHUB_OUTPUT
          echo "config_service_tag=$CONFIG_SERVICE_TAG" >> $GITHUB_OUTPUT
          echo "datamigrator_ui_tag=$DATAMIGRATOR_UI_TAG" >> $GITHUB_OUTPUT
          echo "db_writer_service_tag=$DB_WRITER_SERVICE_TAG" >> $GITHUB_OUTPUT
          echo "jobs_service_tag=$JOBS_SERVICE_TAG" >> $GITHUB_OUTPUT
          echo "keycloak_customizations_tag=$KEYCLOAK_CUSTOMIZATIONS_TAG" >> $GITHUB_OUTPUT
          echo "reports_service_tag=$REPORTS_SERVICE_TAG" >> $GITHUB_OUTPUT
          echo "db_migrations_tag=$DB_MIGRATIONS_TAG" >> $GITHUB_OUTPUT
          echo "support_service_tag=$SUPPORT_SERVICE_TAG" >> $GITHUB_OUTPUT

          echo "worker_branch=$WORKER_BRANCH" >> $GITHUB_OUTPUT
          echo "admin_service_branch=$ADMIN_SERVICE_BRANCH" >> $GITHUB_OUTPUT
          echo "config_service_branch=$CONFIG_SERVICE_BRANCH" >> $GITHUB_OUTPUT
          echo "datamigrator_ui_branch=$DATAMIGRATOR_UI_BRANCH" >> $GITHUB_OUTPUT
          echo "db_writer_service_branch=$DB_WRITER_SERVICE_BRANCH" >> $GITHUB_OUTPUT
          echo "jobs_service_branch=$JOBS_SERVICE_BRANCH" >> $GITHUB_OUTPUT
          echo "keycloak_customizations_branch=$KEYCLOAK_CUSTOMIZATIONS_BRANCH" >> $GITHUB_OUTPUT
          echo "reports_service_branch=$REPORTS_SERVICE_BRANCH" >> $GITHUB_OUTPUT
          echo "db_migrations_branch=$DB_MIGRATIONS_BRANCH" >> $GITHUB_OUTPUT
          echo "support_service_branch=$SUPPORT_SERVICE_BRANCH" >> $GITHUB_OUTPUT

      - name: Determine build and ref
        id: build_version
        run: |
          DATE_BASE=$(date +'%Y.%m.')
          TIME_PART=$(date +'%d%H%M%S')
          VERSION_BASE="${DATE_BASE}${TIME_PART}"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            BUILD_VERSION="${VERSION_BASE}-nightly"
          elif [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            BUILD_VERSION="${{ inputs.build }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_VERSION="${VERSION_BASE}-adhoc"
          else
            echo "Error: Unsupported event type or branch format for build versioning."
            exit 1
          fi
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "build_type=${{ github.event_name == 'schedule' && 'nightly' || 'adhoc' }}" >> $GITHUB_OUTPUT

          REF="${GITHUB_REF}"
          if [[ "$REF" == "refs/heads/main" ]]; then
            REF_TYPE="branches"
            REF_NAME="main"
          elif [[ "$REF" == refs/heads/release/* ]]; then
            REF_TYPE="releases"
            REF_NAME="${REF#refs/heads/release/}"
          elif [[ "$REF" == refs/heads/* ]]; then
            REF_TYPE="branches"
            REF_NAME="main"
          fi
          echo "ref_type=$REF_TYPE" >> $GITHUB_OUTPUT
          echo "ref_name=$REF_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Display Service Tags and Branches
        run: |
          echo "========== SERVICE CONFIGURATION SUMMARY =========="
          echo "worker: tag=${{ steps.parse-config.outputs.worker_tag }}, branch=${{ steps.parse-config.outputs.worker_branch }}"
          echo "admin-service: tag=${{ steps.parse-config.outputs.admin_service_tag }}, branch=${{ steps.parse-config.outputs.admin_service_branch }}"
          echo "config-service: tag=${{ steps.parse-config.outputs.config_service_tag }}, branch=${{ steps.parse-config.outputs.config_service_branch }}"
          echo "datamigrator-ui: tag=${{ steps.parse-config.outputs.datamigrator_ui_tag }}, branch=${{ steps.parse-config.outputs.datamigrator_ui_branch }}"
          echo "db-writer: tag=${{ steps.parse-config.outputs.db_writer_service_tag }}, branch=${{ steps.parse-config.outputs.db_writer_service_branch }}"
          echo "jobs-service: tag=${{ steps.parse-config.outputs.jobs_service_tag }}, branch=${{ steps.parse-config.outputs.jobs_service_branch }}"
          echo "keycloak-customizations: tag=${{ steps.parse-config.outputs.keycloak_customizations_tag }}, branch=${{ steps.parse-config.outputs.keycloak_customizations_branch }}"
          echo "reports-service: tag=${{ steps.parse-config.outputs.reports_service_tag }}, branch=${{ steps.parse-config.outputs.reports_service_branch }}"
          echo "db-migrations: tag=${{ steps.parse-config.outputs.db_migrations_tag }}, branch=${{ steps.parse-config.outputs.db_migrations_branch }}"
          echo "support-service: tag=${{ steps.parse-config.outputs.support_service_tag }}, branch=${{ steps.parse-config.outputs.support_service_branch }}"
          echo "build version: ${{ steps.build_version.outputs.build_version }}"
          echo "=================================================="
          
          echo "## NDM VM Image Build - Service Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag | Branch |" >> $GITHUB_STEP_SUMMARY
          echo "| ------- | --- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| worker | \`${{ steps.parse-config.outputs.worker_tag }}\` | \`${{ steps.parse-config.outputs.worker_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| admin-service | \`${{ steps.parse-config.outputs.admin_service_tag }}\` | \`${{ steps.parse-config.outputs.admin_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| config-service | \`${{ steps.parse-config.outputs.config_service_tag }}\` | \`${{ steps.parse-config.outputs.config_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| datamigrator-ui | \`${{ steps.parse-config.outputs.datamigrator_ui_tag }}\` | \`${{ steps.parse-config.outputs.datamigrator_ui_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| db-writer | \`${{ steps.parse-config.outputs.db_writer_service_tag }}\` | \`${{ steps.parse-config.outputs.db_writer_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| jobs-service | \`${{ steps.parse-config.outputs.jobs_service_tag }}\` | \`${{ steps.parse-config.outputs.jobs_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| keycloak-customizations | \`${{ steps.parse-config.outputs.keycloak_customizations_tag }}\` | \`${{ steps.parse-config.outputs.keycloak_customizations_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| reports-service | \`${{ steps.parse-config.outputs.reports_service_tag }}\` | \`${{ steps.parse-config.outputs.reports_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| db-migrations | \`${{ steps.parse-config.outputs.db_migrations_tag }}\` | \`${{ steps.parse-config.outputs.db_migrations_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| support-service | \`${{ steps.parse-config.outputs.support_service_tag }}\` | \`${{ steps.parse-config.outputs.support_service_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**build version**: \`${{ steps.build_version.outputs.build_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fetch and Replace tags and bundle docker images
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        env:
          WORKER_TAG: ${{ steps.parse-config.outputs.worker_tag }}
          ADMIN_SERVICE_TAG: ${{ steps.parse-config.outputs.admin_service_tag }}
          CONFIG_SERVICE_TAG: ${{ steps.parse-config.outputs.config_service_tag }}
          DATAMIGRATOR_UI_TAG: ${{ steps.parse-config.outputs.datamigrator_ui_tag }}
          DB_WRITER_SERVICE_TAG: ${{ steps.parse-config.outputs.db_writer_service_tag }}
          JOBS_SERVICE_TAG: ${{ steps.parse-config.outputs.jobs_service_tag }}
          KEYCLOAK_CUSTOMIZATIONS_TAG: ${{ steps.parse-config.outputs.keycloak_customizations_tag }}
          REPORTS_SERVICE_TAG: ${{ steps.parse-config.outputs.reports_service_tag }}
          DB_MIGRATIONS_TAG: ${{ steps.parse-config.outputs.db_migrations_tag }}
          SUPPORT_SERVICE_TAG: ${{ steps.parse-config.outputs.support_service_tag }}
          WORKER_BRANCH: ${{ steps.parse-config.outputs.worker_branch }}
          ADMIN_SERVICE_BRANCH: ${{ steps.parse-config.outputs.admin_service_branch }}
          CONFIG_SERVICE_BRANCH: ${{ steps.parse-config.outputs.config_service_branch }}
          DATAMIGRATOR_UI_BRANCH: ${{ steps.parse-config.outputs.datamigrator_ui_branch }}
          DB_WRITER_SERVICE_BRANCH: ${{ steps.parse-config.outputs.db_writer_service_branch }}
          JOBS_SERVICE_BRANCH: ${{ steps.parse-config.outputs.jobs_service_branch }}
          KEYCLOAK_CUSTOMIZATIONS_BRANCH: ${{ steps.parse-config.outputs.keycloak_customizations_branch }}
          REPORTS_SERVICE_BRANCH: ${{ steps.parse-config.outputs.reports_service_branch }}
          DB_MIGRATIONS_BRANCH: ${{ steps.parse-config.outputs.db_migrations_branch }}
          SUPPORT_SERVICE_BRANCH: ${{ steps.parse-config.outputs.support_service_branch }}
        run: |
          chmod +x ./app-deployment/scripts/get_tags.sh
          ./app-deployment/scripts/get_tags.sh ${{steps.build_version.outputs.build_version}} "${{ steps.build_version.outputs.ref_type }}" "${{ steps.build_version.outputs.ref_name }}"

      - name: Run helm package ansible playbook
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        run: |
          ansible-playbook ./app-deployment/ansible/control-plane/playbooks/package-helm-chart.yaml -i ./app-deployment/ansible/control-plane/config/local-inventory.yaml --extra-vars "build_version=${{ steps.build_version.outputs.build_version }}" --extra-vars "@./app-deployment/ansible/control-plane/config/group_vars/vars.yaml"

      - name: Upload Docker tar and Helm chart tgz to artifactory
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        run: |
          BUILD_TYPE="${{ steps.build_version.outputs.build_type }}"
          BUILD_VERSION="${{ steps.build_version.outputs.build_version }}"

          # Upload Docker image tar
          if [ -f app-deployment/artifacts/datamigrator-${BUILD_VERSION}.tar ]; then
            if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
              ARTIFACTORY_PATH="releases/${BUILD_VERSION}/docker/datamigrator-${BUILD_VERSION}.tar"
            else
              ARTIFACTORY_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/docker/datamigrator-${BUILD_VERSION}.tar"
            fi
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading Docker tar to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file app-deployment/artifacts/datamigrator-${BUILD_VERSION}.tar \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "Docker tar uploaded successfully to $TARGET_URL."
            done
          else
            echo "Docker tar not found, skipping upload."
          fi

          # Upload Helm chart tgz
          if [ -f app-deployment/artifacts/datamigrator-${BUILD_VERSION}.tgz ]; then
            if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
              ARTIFACTORY_PATH="releases/${BUILD_VERSION}/helm/datamigrator-${BUILD_VERSION}.tgz"
            else
              ARTIFACTORY_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/helm/datamigrator-${BUILD_VERSION}.tgz"
            fi
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading Helm chart to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file app-deployment/artifacts/datamigrator-${BUILD_VERSION}.tgz \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "Helm chart uploaded successfully to $TARGET_URL."
            done
          else
            echo "Helm chart tgz not found, skipping upload."
          fi

      - name: Download Worker Binary from Artifactory
        if: ${{ github.event.inputs.component == 'worker' || github.event.inputs.component == 'windows-installer' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        id: worker-binary
        run: |
          BUILD_VERSION="${{ steps.build_version.outputs.build_version }}"
          BUILD_TYPE="${{ steps.build_version.outputs.build_type }}"
          WORKER_TAG="${{ steps.parse-config.outputs.worker_tag }}"
          WORKER_BRANCH="${{ steps.parse-config.outputs.worker_branch }}"
          
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            REF_TYPE="releases"
            REF_NAME="${BASH_REMATCH[1]}"
            BASE_PATH="releases"
            WORKER_TAG="${{ inputs.build }}"
          else
            REF_TYPE="branches"
            REF_NAME="${WORKER_BRANCH:-main}"
            BASE_PATH="builds/worker"
          fi
          
          echo "Using ref type: $REF_TYPE, ref name: $REF_NAME"
          
          # Determine worker version to use
          if [[ "$WORKER_TAG" == "latest" ]]; then
            echo "Fetching latest worker version from Artifactory..."
            
            LATEST_JSON_PATH="${BASE_PATH}/${REF_TYPE}/${REF_NAME}/latest.json"
            
            # Download latest.json from Artifactory
            curl -o "latest.json" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/${LATEST_JSON_PATH}"
            
            if [ ! -f "latest.json" ] || [ ! -s "latest.json" ]; then
              echo "Error: Failed to download latest.json or file is empty"
              exit 1
            fi
            
            SELECTED_VERSION=$(jq -r '.build_version' latest.json)
            
            if [[ -z "$SELECTED_VERSION" || "$SELECTED_VERSION" == "null" ]]; then
              echo "Error: Couldn't extract build_version from latest.json"
              cat latest.json
              exit 1
            fi
            
            echo "Using latest worker version: $SELECTED_VERSION"
          elif [[ -n "${{ inputs.build }}" && "$WORKER_TAG" == "${{ inputs.build }}" ]]; then
            echo "Using release worker tag: $WORKER_TAG"
            SELECTED_VERSION="${WORKER_TAG}"
          else
            echo "Using specified worker tag: $WORKER_TAG"
            SELECTED_VERSION="${WORKER_TAG::7}"
          fi
          
          echo "SELECTED_VERSION=$SELECTED_VERSION" >> $GITHUB_ENV
          
          # artifact path
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            ARTIFACT_PATH="releases/${REF_NAME}/worker"
          else
            ARTIFACT_PATH="${BASE_PATH}/${REF_TYPE}/${REF_NAME}/${SELECTED_VERSION}"
          fi
          
          echo "binary_path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
          BINARY_PATH="${ARTIFACT_PATH}/datamigrator-worker-${SELECTED_VERSION}.zip"
          
          echo "Downloading worker binary from Artifactory..."
          curl -o "worker.zip" \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/${BINARY_PATH}"
          
          if [ ! -f "worker.zip" ] || [ ! -s "worker.zip" ]; then
            echo "Error: Failed to download worker binary or file is empty"
            exit 1
          fi
          echo "Worker binary downloaded successfully."

          echo "Downloading worker.env from Artifactory..."
          curl -o "worker.env" \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/${ARTIFACT_PATH}/worker-${SELECTED_VERSION}.env"

          if [ ! -f "worker.env" ] || [ ! -s "worker.env" ]; then
            echo "Error: Failed to download worker.env or file is empty"
            exit 1
          fi
          echo "Worker environment file downloaded successfully."
          
          mkdir -p $GITHUB_WORKSPACE/worker_bin
          unzip worker.zip -d $GITHUB_WORKSPACE/worker_bin
          
          if [[ -f "$GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64" ]]; then
            echo "Linux binary exists at $GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64"
            LINUX_BINARY_NAME="datamigrator-worker-${BUILD_VERSION}"
            mv "$GITHUB_WORKSPACE/worker_bin/pkg/worker-linux-x64" "$GITHUB_WORKSPACE/worker_bin/pkg/$LINUX_BINARY_NAME"
            echo "Renamed binary to $LINUX_BINARY_NAME"
          else
            echo "Linux binary not found!"
            ls -la $GITHUB_WORKSPACE/worker_bin/pkg/
            exit 1
          fi

          if [[ -f "$GITHUB_WORKSPACE/worker_bin/pkg/worker-win-x64.exe" ]]; then
            echo "Windows binary exists at $GITHUB_WORKSPACE/worker_bin/pkg/worker-win-x64.exe"
            WINDOWS_BINARY_NAME="datamigrator-worker-${BUILD_VERSION}.exe"
            mv "$GITHUB_WORKSPACE/worker_bin/pkg/worker-win-x64.exe" "$GITHUB_WORKSPACE/worker_bin/pkg/$WINDOWS_BINARY_NAME"
            echo "Renamed binary to $WINDOWS_BINARY_NAME"
          else
            echo "Windows binary not found!"
            ls -la $GITHUB_WORKSPACE/worker_bin/pkg/
            exit 1
          fi

          echo "linux_binary_name=$LINUX_BINARY_NAME" >> $GITHUB_OUTPUT
          echo "windows_binary_name=$WINDOWS_BINARY_NAME" >> $GITHUB_OUTPUT

          # Upload assets to Artifactory
          if [[ ! "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then 
            # Create combined tarball with both Linux and Windows binaries
            BINARIES_TARBALL="datamigrator-worker-${BUILD_VERSION}-binaries.tar.gz"
            tar -czf "$GITHUB_WORKSPACE/worker_bin/pkg/${BINARIES_TARBALL}" -C "$GITHUB_WORKSPACE/worker_bin/pkg" "$LINUX_BINARY_NAME" "$WINDOWS_BINARY_NAME"
            echo "Created binaries tarball ${BINARIES_TARBALL} with both Linux and Windows binaries"

            ARTIFACTORY_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/worker"
            BINARIES_TARBALL_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/worker/${BINARIES_TARBALL}"
            ENV_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/worker/worker-${BUILD_VERSION}.env"
            
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${BINARIES_TARBALL_PATH}"
              echo "Uploading worker binaries tarball to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file "$GITHUB_WORKSPACE/worker_bin/pkg/${BINARIES_TARBALL}" \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "Worker binaries tarball uploaded successfully to $TARGET_URL."

              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ENV_PATH}"
              echo "Uploading worker environment file to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file "worker.env" \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "Worker environment file uploaded successfully to $TARGET_URL."
            done
          fi
      
      - name: Download Docker images tarball
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        run: | 
          cd app-deployment/artifacts
          TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/docker-images/ndm-docker-images.tar"
          curl -o "ndm-docker-images.tar" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
              $TARGET_URL

      - name: Upload Ansible vars.yaml
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ansible-vars
          path: app-deployment/ansible/control-plane/config/group_vars/vars.yaml

      - name: Upload Helm chart artifact
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: helm-chart
          path: app-deployment/artifacts/datamigrator-*.tgz

      - name: Upload Docker image tar artifacts
        if: ${{ github.event.inputs.component == 'control-plane' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: datamigrator-images
          path: app-deployment/artifacts/*.tar

      - name: Upload Worker Binaries as Artifact
        if: ${{ github.event.inputs.component == 'worker' || github.event.inputs.component == 'windows-installer' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: worker-binary
          path: ${{ github.workspace }}/worker_bin/pkg/
          
  determine-matrix:
    runs-on: openlab
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Set components based on input
          if [[ "${{ github.event.inputs.component }}" == "all" || "${{ github.event.inputs.component }}" == "" ]]; then
            COMPONENTS='["control-plane", "worker"]'
          else
            COMPONENTS='["${{ github.event.inputs.component }}"]'
          fi

          # Set providers based on input
          if [[ "${{ github.event.inputs.provider }}" == "all" || "${{ github.event.inputs.provider }}" == "" ]]; then
            PROVIDERS='["azure", "vsphere", "gcp"]'
          else
            PROVIDERS='["${{ github.event.inputs.provider }}"]'
          fi

          # Create the matrix JSON
          echo "matrix={\"component\":${COMPONENTS},\"provider\":${PROVIDERS}}" >> $GITHUB_OUTPUT

  build-windows-installer:
    if: ${{ github.event.inputs.component == 'windows-installer' || github.event.inputs.component == 'all' || github.event.inputs.component == '' }}
    runs-on: windows-latest
    needs: package-artifacts
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
      BUILD_VERSION: ${{ needs.package-artifacts.outputs.build_version }}
    steps:
        - name: Checkout code
          uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

        - name: Download Binary Artifact
          uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
          with:
            name: worker-binary
            path: .

        - name: Prepare Installer Directory
          shell: pwsh
          run: |
            New-Item -ItemType Directory -Force -Path wininstaller
            New-Item -ItemType Directory -Force -Path wininstaller\redist
            New-Item -ItemType Directory -Force -Path wininstaller\fluentd
            Move-Item -Path "${{ needs.package-artifacts.outputs.windows_binary_name }}" -Destination "wininstaller\worker.exe" -Force

        - name: Download Redistributables
          shell: pwsh
          run: |
            # Download VC++ Redistributable
            Write-Host "Downloading VC++ Redistributable..."
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "wininstaller\redist\vc_redist.x64.exe"
            
            # Download fluent-package MSI
            Write-Host "Downloading fluent-package..."
            Invoke-WebRequest -Uri "https://s3.amazonaws.com/packages.treasuredata.com/5/windows/fluent-package-5.2.0-x64.msi" -OutFile "wininstaller\fluentd\fluent-package-5.2.0-x64.msi"

            # Verify downloads
            Write-Host "Verifying downloads..."
            if (Test-Path "wininstaller\redist\vc_redist.x64.exe") {
                $vcSize = (Get-Item "wininstaller\redist\vc_redist.x64.exe").Length
                Write-Host "VC++ Redistributable downloaded: $vcSize bytes"
            } else {
                throw "VC++ Redistributable download failed"
            }

            if (Test-Path "wininstaller\fluentd\fluent-package-5.2.0-x64.msi") {
                $fluentSize = (Get-Item "wininstaller\fluentd\fluent-package-5.2.0-x64.msi").Length
                Write-Host "fluent-package downloaded: $fluentSize bytes"
            } else {
                throw "fluent-package download failed"
            }

        - name: Copy environment file and installer files
          shell: pwsh
          run: |
            Write-Host "Current working directory: $(Get-Location)"
            Copy-Item -Path "app-deployment/ansible/worker/roles/configure-worker/templates/worker.env.j2" -Destination "wininstaller\worker.env.j2" -Force
            Copy-Item -Path "services/worker/wininstaller/installer.iss" -Destination "wininstaller\installer.iss" -Force
            Copy-Item -Path "services/worker/wininstaller/service.xml" -Destination "wininstaller\service.xml" -Force
            Copy-Item -Path "services/worker/wininstaller/fluentd.conf" -Destination "wininstaller\fluentd.conf" -Force

        - name: Update installer version
          shell: pwsh
          run: |
            # Replace the version in installer.iss with the actual app version
            (Get-Content "wininstaller\installer.iss") -replace '#define ApplicationVersion ".*"', '#define ApplicationVersion "${{ env.BUILD_VERSION }}"' | Set-Content "wininstaller\installer.iss"
            Write-Host "Updated installer version to: ${{ env.BUILD_VERSION }}"

        - name: Verify installer version update
          shell: pwsh
          run: |
            Write-Host "Verifying installer.iss content after version update:"
            Write-Host "=============================================="
            Get-Content "wininstaller\installer.iss" | Select-Object -First 10 | ForEach-Object { Write-Host $_ }
            Write-Host "=============================================="
            Write-Host "BUILD_VERSION environment variable: ${{ env.BUILD_VERSION }}"

        - name: Download WinSW and rename
          shell: pwsh
          run: |
            # Download a specific version of WinSW
            Invoke-WebRequest -Uri "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe" -OutFile "wininstaller\winsw.exe"
  
        - name: List files in wininstaller directory
          shell: pwsh
          run: |
            Write-Host "Files in wininstaller directory:"
            Get-ChildItem -Path "wininstaller" | ForEach-Object { Write-Host "  - $($_.Name)" }
  
        - name: Install Inno Setup
          shell: pwsh
          run: choco install innosetup -y
  
        - name: Build Windows Installer with Inno Setup
          shell: cmd
          run: |
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "wininstaller\installer.iss"

        - name: Upload Windows Installer as Artifact
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
          with:
            name: windows-worker-installer
            path: wininstaller/datamigrator-worker-setup.exe

  upload-windows-installer:
    needs: [package-artifacts, build-windows-installer]
    runs-on: openlab
    outputs:
      windows_worker_installer_url: ${{ steps.upload-installer.outputs.windows_worker_installer_url }}
    steps:
      - name: Download Windows Installer Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: windows-worker-installer
          path: ./

      - name: Upload Windows Installer to Artifactory
        id: upload-installer
        run: |
          BUILD_TYPE="${{ needs.package-artifacts.outputs.build_type }}"
          BUILD_VERSION="${{ needs.package-artifacts.outputs.build_version }}"

          if [[ ! "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then 
            ARTIFACTORY_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/windows-installer"
          else
            ARTIFACTORY_PATH="releases/${BUILD_VERSION}/windows-installer"
          fi

          INSTALLER_PATH="${ARTIFACTORY_PATH}/windows-worker-installer-${BUILD_VERSION}.exe"
          INSTALLER_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/${INSTALLER_PATH}"
          echo "windows_worker_installer_url=$INSTALLER_URL" >> $GITHUB_OUTPUT
          
          for REPO_PATH in "cicd/ndm" "team/ndm"; do
            TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${INSTALLER_PATH}"
            echo "Uploading Windows worker installer to $TARGET_URL..."
            curl --silent --show-error --fail --request PUT --upload-file "datamigrator-worker-setup.exe" \
              "$TARGET_URL" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
            echo "Windows worker installer uploaded successfully to $TARGET_URL."
          done

      - name: Generate and upload manifests for windows-installer
        run: |
          set -e
          BUILD_VERSION="${{ needs.package-artifacts.outputs.build_version }}"
          BUILD_TYPE="${{ needs.package-artifacts.outputs.build_type }}"
          WINDOWS_BINARY_NAME="${{ needs.package-artifacts.outputs.windows_binary_name }}"
          BINARY_PATH="${{ needs.package-artifacts.outputs.binary_path }}"
          COMPONENT="windows-installer"
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${GITHUB_SHA}"
          SHORT_COMMIT="${GITHUB_SHA::7}"
          RUN_ID="${GITHUB_RUN_ID}"
          WORKFLOW_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          INSTALLER_FILENAME="windows-worker-installer-${BUILD_VERSION}.exe"

          # Generate metadata.json for windows installer
          cat > metadata.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "component": "$COMPONENT",
            "windows_binary_name": "$WINDOWS_BINARY_NAME",
            "binary_path": "$BINARY_PATH",
            "installer_filename": "$INSTALLER_FILENAME",
            "installer_path": "builds/${BUILD_TYPE}/${BUILD_VERSION}/windows-installer/${INSTALLER_FILENAME}",
            "build_timestamp": "$BUILD_TIMESTAMP",
            "commit": "$COMMIT",
            "short_commit": "$SHORT_COMMIT",
            "workflow_run_id": "$RUN_ID",
            "workflow_run_url": "$WORKFLOW_RUN_URL"
          }
          EOF

          ISO_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            METADATA_PATH="releases/${BUILD_VERSION}/manifests/${COMPONENT}/${COMPONENT}.json"
          else
            METADATA_PATH="builds/$BUILD_TYPE/$BUILD_VERSION/manifests/${COMPONENT}/${COMPONENT}.json"
            LATEST_PATH="builds/$BUILD_TYPE/${COMPONENT}-latest.json"
          fi

          # Generate latest.json for windows installer
          cat > latest.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "component": "$COMPONENT",
            "installer_filename": "$INSTALLER_FILENAME",
            "installer_path": "builds/${BUILD_TYPE}/${BUILD_VERSION}/windows-installer/${INSTALLER_FILENAME}",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${GITHUB_SHA::7}",
            "timestamp": "$ISO_TIME",
            "metadata_path": "$METADATA_PATH",
            "published_by": "${{ github.actor }}"
          }
          EOF

          FILES_TO_UPLOAD="metadata.json"
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            echo "Release branch detected, will only upload metadata.json"
          else
            FILES_TO_UPLOAD="$FILES_TO_UPLOAD latest.json"
            echo "Non-release branch detected, will upload both metadata.json and latest.json"
          fi

          for FILE in $FILES_TO_UPLOAD; do
            if [[ "$FILE" == "metadata.json" ]]; then
              ARTIFACTORY_PATH="$METADATA_PATH"
            else
              ARTIFACTORY_PATH="$LATEST_PATH"
            fi
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading $FILE to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file $FILE \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "$FILE uploaded successfully to $TARGET_URL."
            done
          done

  packer:
    if: ${{ github.event.inputs.component != 'windows-installer' }}
    needs: [package-artifacts, determine-matrix]
    env:
      ref_name: ${{ needs.package-artifacts.outputs.ref_name }}
      ref_type: ${{ needs.package-artifacts.outputs.ref_type }}
      build_type: ${{ needs.package-artifacts.outputs.build_type }}
      build_version: ${{ needs.package-artifacts.outputs.build_version }}
      WORKER_TAG: ${{ needs.package-artifacts.outputs.worker_tag }}
      WORKER_BRANCH: ${{ needs.package-artifacts.outputs.worker_branch }}
      ADMIN_SERVICE_TAG: ${{ needs.package-artifacts.outputs.admin_service_tag }}
      ADMIN_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.admin_service_branch }}
      CONFIG_SERVICE_TAG: ${{ needs.package-artifacts.outputs.config_service_tag }}
      CONFIG_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.config_service_branch }}
      DATAMIGRATOR_UI_TAG: ${{ needs.package-artifacts.outputs.datamigrator_ui_tag }}
      DATAMIGRATOR_UI_BRANCH: ${{ needs.package-artifacts.outputs.datamigrator_ui_branch }}
      DB_WRITER_SERVICE_TAG: ${{ needs.package-artifacts.outputs.db_writer_service_tag }}
      DB_WRITER_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.db_writer_service_branch }}
      JOBS_SERVICE_TAG: ${{ needs.package-artifacts.outputs.jobs_service_tag }}
      JOBS_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.jobs_service_branch }}
      KEYCLOAK_CUSTOMIZATIONS_TAG: ${{ needs.package-artifacts.outputs.keycloak_customizations_tag }}
      KEYCLOAK_CUSTOMIZATIONS_BRANCH: ${{ needs.package-artifacts.outputs.keycloak_customizations_branch }}
      REPORTS_SERVICE_TAG: ${{ needs.package-artifacts.outputs.reports_service_tag }}
      REPORTS_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.reports_service_branch }}
      DB_MIGRATIONS_TAG: ${{ needs.package-artifacts.outputs.db_migrations_tag }}
      DB_MIGRATIONS_BRANCH: ${{ needs.package-artifacts.outputs.db_migrations_branch }}
      SUPPORT_SERVICE_TAG: ${{ needs.package-artifacts.outputs.support_service_tag }}
      SUPPORT_SERVICE_BRANCH: ${{ needs.package-artifacts.outputs.support_service_branch }}
    name: Build ${{ matrix.component }} on ${{ matrix.provider }}
    runs-on: openlab
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    outputs:
      provider: ${{ matrix.provider }}
      component: ${{ matrix.component }}
      image_name: ${{ steps.image-info.outputs.image_name }}
      build_image_version: ${{ steps.image-info.outputs.build_image_version }}
      control_plane_template: ${{ steps.set-template-vsphere.outputs.control_plane_template }}
      worker_template: ${{ steps.set-template-vsphere.outputs.worker_template }}
      control_plane_image_version: ${{ steps.set-template-azure.outputs.control_plane_image_version }}
      worker_image_version: ${{ steps.set-template-azure.outputs.worker_image_version }}
    steps:  
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Packer
        uses: hashicorp/setup-packer@1aa358be5cf73883762b302a3a03abd66e75b232
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Determine packer path
        id: packer-path
        run: |
          # Dynamically generate the path for each component-provider combination
          PROVIDER_PATH="${{ matrix.provider }}"

          PACKER_PATH="app-deployment/packer/${PROVIDER_PATH}/${{ matrix.component }}"
          echo "path=$PACKER_PATH" >> $GITHUB_OUTPUT
          echo "Using packer configuration path: $PACKER_PATH"

      - name: Export ACR pull secret
        if: ${{ matrix.component != 'worker' }}
        run: |
          echo "Exporting ACR pull secret..."
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV

      - name: Configure cloud provider credentials
        id: credentials
        run: |
          # Create credentials directory
          mkdir -p $GITHUB_WORKSPACE/credentials
          echo "PKR_VAR_build_version=${{ env.build_version }}" >> $GITHUB_ENV
          echo "Setting up credentials for provider: ${{ matrix.provider }}"
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          case "${{ matrix.provider }}" in
            azure)
              echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
              echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
              echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
              ;;
            aws)
              echo "PKR_VAR_aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
              echo "PKR_VAR_aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
              ;;
            vsphere)
              echo "Decoding and exporting vSphere credentials..."
              echo "PKR_VAR_vsphere_endpoint=$(echo "${{ secrets.VSPHERE_SERVER }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_vsphere_username=$(echo "${{ secrets.VSPHERE_USERNAME }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_vsphere_password=$(echo "${{ secrets.VSPHERE_PASSWORD }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_username=$(echo "${{ secrets.VSPHERE_BUILD_USERNAME }}" | base64 --decode)" >> $GITHUB_ENV
              echo "PKR_VAR_build_password=$(echo "${{ secrets.VSPHERE_BUILD_PASSWORD }}" | base64 --decode)" >> $GITHUB_ENV
              echo "::add-mask::$PKR_VAR_build_password"
              echo "PKR_VAR_build_password_encrypted=$(echo "${{ secrets.VSPHERE_BUILD_PASSWORD_ENCRYPTED }}" | base64 --decode)" >> $GITHUB_ENV
              echo "::add-mask::$PKR_VAR_build_password_encrypted"
              echo "PKR_VAR_build_key=$(echo "${{ secrets.VSPHERE_BUILD_KEY }}" | base64 --decode)" >> $GITHUB_ENV
              ;;
            gcp)
              echo "${{ secrets.PACKER_GCP_CREDENTIALS_JSON }}" | base64 --decode > $GITHUB_WORKSPACE/gcp-key.json
              echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/gcp-key.json" >> $GITHUB_ENV
              ;;
          esac
          # Determine image suffix based on trigger type
          IMAGE_SUFFIX=""
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            IMAGE_SUFFIX="nightly"
          elif [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            IMAGE_SUFFIX=""
          else
            IMAGE_SUFFIX="adhoc"
          fi

          echo "PKR_VAR_image_suffix=${IMAGE_SUFFIX}" >> $GITHUB_ENV
      
      - name: Download Ansible vars.yaml
        if: ${{ matrix.component == 'control-plane' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ansible-vars
          path: app-deployment/ansible/control-plane/config/group_vars/

      - name: Download Helm chart artifact
        if: ${{ matrix.component == 'control-plane' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: helm-chart
          path: app-deployment/artifacts/

      - name: Download Docker image tar artifact
        if: ${{ matrix.component == 'control-plane' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: datamigrator-images
          path: app-deployment/artifacts/

      - name: Download Worker Binary
        if: ${{ matrix.component == 'worker' }}
        id: worker-binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: worker-binary
          path: ${{ github.workspace }}/worker_bin/pkg/
          
      - name: Set worker binary path output
        if: ${{ matrix.component == 'worker' }}
        id: worker-binary-path
        run: |
          BUILD_VERSION="${{ env.build_version }}"
          echo "worker_binary_path=${{ github.workspace }}/worker_bin/pkg/datamigrator-worker-$BUILD_VERSION" >> $GITHUB_OUTPUT

      - name: Add ovftool to PATH
        run: echo "/home/ubuntu/ovftool" >> $GITHUB_PATH

      - name: Packer Init
        run: |
          cd ${{ steps.packer-path.outputs.path }}
          packer init .

      - name: Packer Validate
        id: validate
        run: |
          cd ${{ steps.packer-path.outputs.path }}

          if [ "${{ matrix.component }}" == "worker" ]; then
            echo "Validating worker configuration with binary path..."
            packer validate \
              -var "worker_binary_path=${{ steps.worker-binary-path.outputs.worker_binary_path }}" \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl
          else
            echo "Validating control-plane configuration..."
            packer validate \
              -var-file="variables.pkrvars.hcl" \
              linux-ubuntu.pkr.hcl
          fi

          if [ $? -ne 0 ]; then
            echo "Packer validation failed"
            exit 1
          fi

          echo "Packer validation completed successfully"

      - name: Packer Build with Retry
        id: build
        continue-on-error: ${{ matrix.provider != 'azure' }} 
        run: |
          cd ${{ steps.packer-path.outputs.path }}

          # Set build-specific variables
          BUILD_ID=$(date -u +'%Y%m%dT%H%M%SZ')-${{ github.sha }}
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          for attempt in {1..3}; do 
            echo "Attempt $attempt: Running Packer build..."

            if [ "${{ matrix.component }}" == "worker" ]; then
              echo "Building worker image with binary path..."
              packer build \
                -var "worker_binary_path=${{ steps.worker-binary-path.outputs.worker_binary_path }}" \
                -var-file="variables.pkrvars.hcl" \
                linux-ubuntu.pkr.hcl | tee $GITHUB_WORKSPACE/packer.log
            else
              echo "Building control-plane image..."
              packer build \
                -var-file="variables.pkrvars.hcl" \
                linux-ubuntu.pkr.hcl | tee $GITHUB_WORKSPACE/packer.log
            fi

            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "Packer build succeeded on attempt $attempt"
              break
            else 
              echo "Packer build failed on attempt $attempt"
              if [ $attempt -eq 3 ]; then
                echo "All retry attempts failed"
                exit 1
              fi
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "Packer build completed successfully"

      - name: Extract Image Info
        id: image-info
        run: |
          # Extract image information based on provider
          case "${{ matrix.provider }}" in
          azure)
            echo "Capturing image details for Azure..."
      
            IMAGE_RESOURCE_GROUP=$(grep 'ManagedImageResourceGroupName' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_NAME=$(grep 'ManagedImageName' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_ID=$(grep 'ManagedImageId' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_LOCATION=$(grep 'ManagedImageLocation' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
            IMAGE_VERSION=$(grep 'SharedImageGalleryImageVersion' $GITHUB_WORKSPACE/packer.log | awk '{print $2}')
      
            echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            echo "build_image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT
            echo "resource_group=$IMAGE_RESOURCE_GROUP" >> $GITHUB_OUTPUT
            echo "location=$IMAGE_LOCATION" >> $GITHUB_OUTPUT
      
            # Output summary
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "Image ID: $IMAGE_ID"
            echo "Image Name: $IMAGE_NAME"
            echo "Image Version: $IMAGE_VERSION"
            echo "Resource Group: $IMAGE_RESOURCE_GROUP"
            echo "Location: $IMAGE_LOCATION"
            ;;
          aws)
            echo "Capturing image details for AWS..."
      
            # Process the packer log to extract AMI ID using your pattern
            tail -2 $GITHUB_WORKSPACE/packer.log | head -2 | awk 'match($0, /ami-.*/) { print substr($0, RSTART, RLENGTH) }' > $GITHUB_WORKSPACE/ami.txt
            
            # Read the AMI ID from the file
            IMAGE_ID=$(cat $GITHUB_WORKSPACE/ami.txt)
            
            echo "aws_image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
      
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "AMI ID: $IMAGE_ID"
            ;;
          vsphere)
            echo "Capturing image details for vSphere..."
            IMAGE_NAME=$(grep -A 3 'Builds finished' $GITHUB_WORKSPACE/packer.log | grep 'vsphere-iso.linux-ubuntu:' | tail -1 | awk '{print $NF}')
      
            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "OVF Template Name: $IMAGE_NAME"
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            ;;
          gcp)
            echo "Capturing image details for GCP..."

            # Extract GCP Image Name from the Packer log
            IMAGE_NAME=$(grep 'A disk image was created' $GITHUB_WORKSPACE/packer.log | tail -1 | awk -F': ' '{print $NF}')

            echo "Captured image info for ${{ matrix.provider }}-${{ matrix.component }}"
            echo "GCP Image Name: $IMAGE_NAME"
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            ;;
          esac

      - name: Save Image Info for Notification
        run: |
          # Save image name to file for notification job
          case "${{ matrix.provider }}" in
            azure)
              echo "${{ steps.image-info.outputs.image_name }}" > ${{ matrix.component }}-${{ matrix.provider }}-image.txt
              echo "${{ steps.image-info.outputs.build_image_version }}" > ${{ matrix.component }}-${{ matrix.provider }}-version.txt
              ;;
            vsphere)
              echo "${{ steps.image-info.outputs.image_name }}" > ${{ matrix.component }}-${{ matrix.provider }}-image.txt
              ;;
            gcp)
              echo "${{ steps.image-info.outputs.image_name }}" > ${{ matrix.component }}-${{ matrix.provider }}-image.txt
              ;;
          esac

      - name: Upload Image Info
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-info-${{ matrix.component }}-${{ matrix.provider }}
          path: ${{ matrix.component }}-${{ matrix.provider }}-image.txt

      - name: Upload Image Version Info (Azure)
        if: ${{ matrix.provider == 'azure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-version-${{ matrix.component }}-${{ matrix.provider }}
          path: ${{ matrix.component }}-${{ matrix.provider }}-version.txt

      - name: Generate and upload images and manifests for control-plane
        if: ${{ matrix.component == 'control-plane' }}
        run: |
          chmod +x ./app-deployment/scripts/services_manifest.sh
          ./app-deployment/scripts/services_manifest.sh services.json "${{ env.ref_type }}" "${{ env.ref_name }}"
          echo "services_json=$(cat services.json)" >> $GITHUB_OUTPUT

          BUILD_TYPE="${{ env.build_type }}"
          BUILD_VERSION="${{ env.build_version }}"

          CHART_JSON="{\"name\":\"datamigrator\",\"version\":\"$BUILD_VERSION\",\"path\":\"$HELM_PATH\"}"
          echo "$CHART_JSON" > chart.json
          echo "chart_json=$CHART_JSON" >> $GITHUB_OUTPUT

          PROVIDER="${{ matrix.provider }}"
          COMPONENT="${{ matrix.component }}"
          IMAGE_NAME="${{ steps.image-info.outputs.image_name }}"
          IMAGE_VERSION="${{ steps.image-info.outputs.build_image_version }}"
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${GITHUB_SHA}"
          SHORT_COMMIT="${GITHUB_SHA::7}"
          RUN_ID="${GITHUB_RUN_ID}"
          WORKFLOW_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          CHART_JSON=$(cat chart.json)
          SERVICES_JSON=$(cat services.json)

          ISO_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            METADATA_PATH="releases/${BUILD_VERSION}/manifests/${PROVIDER}/${COMPONENT}.json"
            DOCKER_PATH="releases/${BUILD_VERSION}/docker/datamigrator-$BUILD_VERSION.tar"
            HELM_PATH="releases/${BUILD_VERSION}/helm/datamigrator-$BUILD_VERSION.tgz"
          else
            METADATA_PATH="builds/$BUILD_TYPE/$BUILD_VERSION/manifests/${PROVIDER}/${COMPONENT}.json"
            LATEST_PATH="builds/$BUILD_TYPE/${PROVIDER}-${COMPONENT}-latest.json"
            DOCKER_PATH="builds/$BUILD_TYPE/$BUILD_VERSION/docker/datamigrator-$BUILD_VERSION.tar"
            HELM_PATH="builds/$BUILD_TYPE/$BUILD_VERSION/helm/datamigrator-$BUILD_VERSION.tgz"
          fi

          if [[ "$PROVIDER" == "azure" ]]; then
            cat > metadata.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "image_name": "$IMAGE_NAME",
            "image_version": "$IMAGE_VERSION",
            "build_timestamp": "$BUILD_TIMESTAMP",
            "commit": "$COMMIT",
            "short_commit": "$SHORT_COMMIT",
            "workflow_run_id": "$RUN_ID",
            "workflow_run_url": "$WORKFLOW_RUN_URL",
            "chart": $CHART_JSON,
            "services": {
              "path": "$DOCKER_PATH",
              "items": $SERVICES_JSON
            }
          }
          EOF
          else
            cat > metadata.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "image_name": "$IMAGE_NAME",
            "build_timestamp": "$BUILD_TIMESTAMP",
            "commit": "$COMMIT",
            "short_commit": "$SHORT_COMMIT",
            "workflow_run_id": "$RUN_ID",
            "workflow_run_url": "$WORKFLOW_RUN_URL",
            "chart": $CHART_JSON,
            "services": {
              "path": "$DOCKER_PATH",
              "items": $SERVICES_JSON
            }
          }
          EOF
          fi

          cat > latest.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${GITHUB_SHA::7}",
            "timestamp": "$ISO_TIME",
            "metadata_path": "$METADATA_PATH",
            "docker_images_path": "$DOCKER_PATH",
            "helm_chart_path": "$HELM_PATH",
            "published_by": "${{ github.actor }}"
          }
          EOF

          FILES_TO_UPLOAD="metadata.json"
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            echo "Release branch detected, will only upload metadata.json"
          else
            FILES_TO_UPLOAD="$FILES_TO_UPLOAD latest.json"
            echo "Non-release branch detected, will upload both metadata.json and latest.json"
          fi

          for FILE in $FILES_TO_UPLOAD; do
            if [[ "$FILE" == "metadata.json" ]]; then
              ARTIFACTORY_PATH="$METADATA_PATH"
            else
              ARTIFACTORY_PATH="$LATEST_PATH"
            fi
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading $FILE to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file $FILE \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "$FILE uploaded successfully to $TARGET_URL."
            done
          done

      - name: Generate and upload manifests for worker
        if: ${{ matrix.component == 'worker' }}
        run: |
          set -e
          BUILD_VERSION="${{ env.build_version }}"
          LINUX_BINARY_NAME="${{ needs.package-artifacts.outputs.linux_binary_name }}"
          BINARY_PATH="${{ needs.package-artifacts.outputs.binary_path }}"
          PROVIDER="${{ matrix.provider }}"
          COMPONENT="${{ matrix.component }}"
          IMAGE_NAME="${{ steps.image-info.outputs.image_name }}"
          IMAGE_VERSION="${{ steps.image-info.outputs.build_image_version }}"
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${GITHUB_SHA}"
          SHORT_COMMIT="${GITHUB_SHA::7}"
          RUN_ID="${GITHUB_RUN_ID}"
          WORKFLOW_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"

          if [[ "$PROVIDER" == "azure" ]]; then
            cat > metadata.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "binary_name": "$LINUX_BINARY_NAME",
            "binary_path": "$BINARY_PATH",
            "image_name": "$IMAGE_NAME",
            "image_version": "$IMAGE_VERSION",
            "build_timestamp": "$BUILD_TIMESTAMP",
            "commit": "$COMMIT",
            "short_commit": "$SHORT_COMMIT",
            "workflow_run_id": "$RUN_ID",
            "workflow_run_url": "$WORKFLOW_RUN_URL"
          }
          EOF
          else
            cat > metadata.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "binary_name": "$LINUX_BINARY_NAME",
            "binary_path": "$BINARY_PATH",
            "image_name": "$IMAGE_NAME",
            "build_timestamp": "$BUILD_TIMESTAMP",
            "commit": "$COMMIT",
            "short_commit": "$SHORT_COMMIT",
            "workflow_run_id": "$RUN_ID",
            "workflow_run_url": "$WORKFLOW_RUN_URL"
          }
          EOF
          fi

          ISO_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_TYPE="${{ env.build_type }}"
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            METADATA_PATH="releases/${BUILD_VERSION}/manifests/${PROVIDER}/${COMPONENT}.json"
          else
            METADATA_PATH="builds/$BUILD_TYPE/$BUILD_VERSION/manifests/${PROVIDER}/${COMPONENT}.json"
            LATEST_PATH="builds/$BUILD_TYPE/${PROVIDER}-${COMPONENT}-latest.json"
          fi

          cat > latest.json <<EOF
          {
            "build_version": "$BUILD_VERSION",
            "provider": "$PROVIDER",
            "component": "$COMPONENT",
            "binary_name": "$LINUX_BINARY_NAME",
            "binary_path": "$BINARY_PATH",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${GITHUB_SHA::7}",
            "timestamp": "$ISO_TIME",
            "metadata_path": "$METADATA_PATH",
            "published_by": "${{ github.actor }}"
          }
          EOF

          FILES_TO_UPLOAD="metadata.json"
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            echo "Release branch detected, will only upload metadata.json"
          else
            FILES_TO_UPLOAD="$FILES_TO_UPLOAD latest.json"
            echo "Non-release branch detected, will upload both metadata.json and latest.json"
          fi

          for FILE in $FILES_TO_UPLOAD; do
            if [[ "$FILE" == "metadata.json" ]]; then
              ARTIFACTORY_PATH="$METADATA_PATH"
            else
              ARTIFACTORY_PATH="$LATEST_PATH"
            fi
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading $FILE to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file $FILE \
                "$TARGET_URL" \
                -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "$FILE uploaded successfully to $TARGET_URL."
            done
          done

      - name: Upload OVA file to Artifactory
        if: ${{ matrix.provider == 'vsphere' }}
        run: |
          echo "Uploading OVA file to Artifactory..."

          OVA_FILE="app-deployment/packer/vsphere/${{ matrix.component }}/artifacts/${{ steps.image-info.outputs.image_name }}/${{ steps.image-info.outputs.image_name }}.ova"
          BUILD_VERSION="${{ env.build_version }}"
          BUILD_TYPE="${{ env.build_type }}"
          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            ARTIFACTORY_PATH="releases/${BUILD_VERSION}/ova/${{ matrix.component }}-${BUILD_VERSION}.ova"
          else
            ARTIFACTORY_PATH="builds/${BUILD_TYPE}/${BUILD_VERSION}/ova/${{ matrix.component }}-${BUILD_VERSION}.ova"
          fi

          if [ -f "$OVA_FILE" ]; then
            echo "Found OVA file: $OVA_FILE"
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              TARGET_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}"
              echo "Uploading OVA file to $TARGET_URL..."
              curl --silent --show-error --fail --request PUT --upload-file \
              "$OVA_FILE" \
              "$TARGET_URL" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}"
              echo "OVA file uploaded successfully to $TARGET_URL."
            done
          else
            echo "Error: OVA file not found at $OVA_FILE"
            exit 1
          fi
      
      - name: Set template output for azure
        id: set-template-azure
        if: ${{ matrix.provider == 'azure' }}
        run: |
          if [ "${{ matrix.component }}" == "control-plane" ]; then
            echo "control_plane_image_version=${{ steps.image-info.outputs.build_image_version }}" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.component }}" == "worker" ]; then
            echo "worker_image_version=${{ steps.image-info.outputs.build_image_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Set template output for vsphere
        id: set-template-vsphere
        if: ${{ matrix.provider == 'vsphere' }}
        run: |
          if [ "${{ matrix.component }}" == "control-plane" ]; then
            echo "control_plane_template=${{ steps.image-info.outputs.image_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.component }}" == "worker" ]; then
            echo "worker_template=${{ steps.image-info.outputs.image_name }}" >> $GITHUB_OUTPUT
          fi

  notify-build-completion:
    if: ${{ github.event_name == 'schedule' }}
    needs: [package-artifacts, packer, upload-windows-installer]
    runs-on: openlab
    steps:
      - name: Download Image Info Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: image-info-*
          merge-multiple: true
          path: ./image-info/

      - name: Download Image Version Artifacts (Azure)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: image-version-*
          merge-multiple: true
          path: ./image-info/

      - name: Send Build Notification
        run: |
          BUILD_VERSION="${{ needs.package-artifacts.outputs.build_version }}"
          BUILD_TYPE="${{ needs.package-artifacts.outputs.build_type }}"
          TRIGGER="${{ github.event_name == 'schedule' && 'Nightly Build' || 'Manual Trigger' }}"
          
          # Build the Adaptive Card body
          CARD_BODY='[
            {
              "type": "TextBlock",
              "text": "Image Details for '"${TRIGGER}"'",
              "size": "Medium",
              "weight": "Bolder"
            },
            {
              "type": "FactSet",
              "facts": [
                {
                  "title": "Build Version:",
                  "value": "'"${BUILD_VERSION}"'"
                },
                {
                  "title": "Build Type:",
                  "value": "'"${BUILD_TYPE}"'"
                }
              ]
            },
            {
              "type": "TextBlock",
              "text": "**Provider Images:**",
              "weight": "Bolder",
              "spacing": "Medium"
            }'

          INSTALLER_URL="https://generic.repo.eng.netapp.com/artifactory/openlab-generic/cicd/ndm/builds/${BUILD_TYPE}/${BUILD_VERSION}/windows-installer/windows-worker-installer-${BUILD_VERSION}.exe"
          
          for provider in "azure" "vsphere" "gcp"; do
            CONTROL_PLANE_FILE="./image-info/control-plane-${provider}-image.txt"
            WORKER_FILE="./image-info/worker-${provider}-image.txt"
            CONTROL_PLANE_VERSION_FILE="./image-info/control-plane-${provider}-version.txt"
            WORKER_VERSION_FILE="./image-info/worker-${provider}-version.txt"
            
            if [[ -f "$CONTROL_PLANE_FILE" || -f "$WORKER_FILE" ]]; then
              case "$provider" in
                "azure")
                  PROVIDER_NAME="Azure"
                  ;;
                "vsphere") 
                  PROVIDER_NAME="vSphere"
                  ;;
                "gcp")
                  PROVIDER_NAME="GCP"
                  ;;
              esac
              
              CARD_BODY+=',
              {
                "type": "TextBlock",
                "text": "**'"${PROVIDER_NAME}"':**",
                "weight": "Bolder",
                "spacing": "Medium"
              },
              {
                "type": "FactSet",
                "facts": ['
              
              FACTS_ADDED=false
              
              if [[ -f "$CONTROL_PLANE_FILE" ]]; then
                CP_NAME=$(cat "$CONTROL_PLANE_FILE")
                CARD_BODY+='
                  {
                    "title": "Control Plane:",
                    "value": "'"${CP_NAME}"'"
                  }'
                FACTS_ADDED=true
                
                if [[ "$provider" == "azure" && -f "$CONTROL_PLANE_VERSION_FILE" ]]; then
                  CP_VERSION=$(cat "$CONTROL_PLANE_VERSION_FILE")
                  CARD_BODY+=',
                  {
                    "title": "Control Plane Image Version:",
                    "value": "'"${CP_VERSION}"'"
                  }'
                fi
              fi
              
              if [[ -f "$WORKER_FILE" ]]; then
                WORKER_NAME=$(cat "$WORKER_FILE")
                if [[ "$FACTS_ADDED" == "true" ]]; then
                  CARD_BODY+=','
                fi
                CARD_BODY+='
                  {
                    "title": "Worker:",
                    "value": "'"${WORKER_NAME}"'"
                  }'
                FACTS_ADDED=true
                
                if [[ "$provider" == "azure" && -f "$WORKER_VERSION_FILE" ]]; then
                  WORKER_VERSION=$(cat "$WORKER_VERSION_FILE")
                  CARD_BODY+=',
                  {
                    "title": "Worker Image Version:",
                    "value": "'"${WORKER_VERSION}"'"
                  }'
                fi
              fi
              
              CARD_BODY+='
                ]
              }'
            fi
          done

          CARD_BODY+=',
          {
            "type": "ActionSet",
            "actions": [
              {
                "type": "Action.OpenUrl",
                "title": "Download Windows Installer",
                "url": "'"${INSTALLER_URL}"'"
              }
            ]
          }'

          CARD_BODY+=']'

          ADAPTIVE_CARD='{
            "type": "AdaptiveCard",
            "version": "1.5",
            "body": '"${CARD_BODY}"'
          }'

          # Send the card
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$ADAPTIVE_CARD" \
            '${{ secrets.POWER_AUTOMATE_URL }}'

          echo "Build notification sent successfully"

  run-azure-ndm-api-tests:
    if: ${{ needs.packer.outputs.control_plane_image_version != '' && needs.packer.outputs.worker_image_version != '' }}
    needs: [package-artifacts, packer, determine-matrix, upload-windows-installer]
    uses: ./.github/workflows/run-api-tests-azure.yaml
    with:
      control_plane_image_version: ${{ needs.packer.outputs.control_plane_image_version }}
      worker_image_version: ${{ needs.packer.outputs.worker_image_version }}
      windows_worker_installer_url: ${{ needs.upload-windows-installer.outputs.windows_worker_installer_url }}
      build_version: ${{ needs.package-artifacts.outputs.build_version }}
      ref_type: ${{ needs.package-artifacts.outputs.ref_type }}
    secrets: inherit

