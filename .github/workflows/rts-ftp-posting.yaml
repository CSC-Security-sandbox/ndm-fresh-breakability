name: RTS FTP Posting (Open-Source Source Code Release)

# Automates the post-RTS FTP posting process described in
# https://netapp.atlassian.net/wiki/spaces/DEVTS/pages/88387662 :
#
#   1. Pulls the <RTS Project Name>_<Version>-FTP-Components.csv report from the
#      RTS tool (rts.rtp.openenglab.netapp.com) for the specified project
#      + version.
#   2. For every component listed in that CSV, downloads the source archive
#      that RTS has pre-staged under /x/eng/3rdparty/data_retention/ so that
#      NetApp has a local copy of the sources it is legally obligated to
#      publish.
#   3. Verifies that every component in the CSV is really a dependency
#      (direct or transitive) of this repo across every language the repo
#      uses (npm, Go, Maven, Docker base images). A component that is NOT
#      referenced anywhere blocks the publish — it should never have been
#      in our BlackDuck scan to begin with.
#   4. Scans every staged file (and the contents of every archive) for any
#      NetApp or NDM intellectual-property marker (copyright strings, the
#      @NetApp-Cloud-DataMigrate npm scope, NDM source-tree paths, ...) and
#      blocks the publish on any hit. This is the final "no NetApp IP gets
#      out of the runner" guardrail.
#   5. Copies the staging tree onto the VED FTP staging filesystem at
#      /x/eng/3rdparty/ftpstaging/<Project>/<Version>/ — this share is
#      mounted on the scs-based runners and is the location COSINE syncs
#      from to the public NetApp open-source FTP site. We deliberately do
#      NOT push to ftp.netapp.com directly: the filesystem path is more
#      reliable, doesn't need credentials, and is the intended drop point
#      per Confluence DEVTS/88387662.
#   6. Prints a ready-to-send e-mail (subject + body) to the workflow summary
#      and log so the operator can paste it into their mail client and send it
#      to enghelp+blackduck@netapp.com — the COSINE team treats that e-mail as
#      a Service-Now ticket request to sync staging -> public FTP.
#
# Runner: scs-v2 (NetApp's scs-based custom runner). The RTS download
# endpoint AND the /x/eng/3rdparty/ftpstaging mount are only reachable
# from inside the NetApp network; the scs-v2 runners already have both,
# and other NDM workflows use the same label.

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Release branch to check out — MUST match release/YYYY.MM[.DD][-suffix] (e.g. release/2026.04, release/2025.08.03, release/2026.04-1). FTP posting is only allowed for dated release branches."
        required: true
        type: string
      rts_project_name:
        description: "RTS Project Name (exactly as it appears in the RTS tool — pre-filled with the canonical NDM name; override only if RTS lists it differently)"
        required: true
        type: string
        default: "Netapp Data Migrator"
      rts_project_version:
        description: "RTS Project Version (exactly as it appears in the RTS tool, e.g. 2026.04)"
        required: true
        type: string
      dry_run:
        description: "Dry run — download the CSV and the sources, but skip the copy to /x/eng/3rdparty/ftpstaging and the COSINE notification"
        required: false
        default: false
        type: boolean
      skip_dependency_check:
        description: "Skip the 'component is a real NDM dependency' check (only use when you have recorded the justification in the run summary)"
        required: false
        default: false
        type: boolean
      allow_ip_hit_sha256s:
        description: "Comma-separated sha256 hashes of files to EXEMPT from the NetApp-IP contamination scan (use only after Legal sign-off)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  post-to-ftp-staging:
    name: Stage sources and publish to /x/eng/3rdparty/ftpstaging
    runs-on: scs-v2
    timeout-minutes: 180

    env:
      RTS_BASE_URL: ${{ vars.RTS_BASE_URL || 'https://rts.rtp.openenglab.netapp.com' }}
      RTS_DATA_RETENTION_ROOT: ${{ vars.RTS_DATA_RETENTION_ROOT || '/x/eng/3rdparty/data_retention' }}
      FTP_STAGING_ROOT: ${{ vars.FTP_STAGING_ROOT || '/x/eng/3rdparty/ftpstaging' }}
      COSINE_NOTIFY_EMAIL: ${{ vars.COSINE_NOTIFY_EMAIL || 'enghelp+blackduck@netapp.com' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Enforce branch_name is a dated release/YYYY.MM branch
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch_name }}
        run: |
          set -euo pipefail
          # FTP posting is only legal for an actual dated release. Refuse
          # to publish from main, develop, feature branches, or named
          # release branches like release/preview — they may contain
          # unreleased / pre-RTS code whose third-party dependencies have
          # not yet been legally cleared. The accepted shape mirrors the
          # dated forms in release-workflow.yaml:
          #
          #   release/YYYY.MM                  e.g. release/2026.04
          #   release/YYYY.MM-<suffix>         e.g. release/2026.04-1
          #                                          release/2026.04-alpha
          #   release/YYYY.MM.DD               e.g. release/2025.08.03
          #   release/YYYY.MM.DD-<suffix>      e.g. release/2025.08.03-testing
          #
          # YYYY is exactly 4 digits, MM is exactly 2 digits, DD (when
          # present) is 1-2 digits, and the suffix (when present) is a
          # non-empty [A-Za-z0-9_] run.
          ALLOWED_RE='^release/[0-9]{4}\.[0-9]{2}(\.[0-9]{1,2})?(-[A-Za-z0-9_]+)?$'
          if [[ ! "${BRANCH_NAME}" =~ ${ALLOWED_RE} ]]; then
            echo "::error::branch_name='${BRANCH_NAME}' is not a dated release branch."
            echo "::error::FTP posting is only allowed from release/YYYY.MM[.DD][-suffix]. Aborting before any source download."
            exit 1
          fi
          echo "branch_name='${BRANCH_NAME}' is a dated release branch — proceeding."

      - name: Checkout specified branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.inputs.branch_name }}

      - name: Install required tools (rsync, curl, python3)
        run: |
          set -euo pipefail
          # rsync is the only non-default we need for the publish step;
          # curl + python3 + ca-certificates are listed for completeness
          # in case the runner image is ever slimmed down.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rsync curl ca-certificates python3

      - name: Validate inputs and compute paths
        id: paths
        env:
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
        run: |
          set -euo pipefail

          if [[ -z "${RTS_PROJECT_NAME// }" ]]; then
            echo "::error::rts_project_name must not be empty"
            exit 1
          fi
          if [[ -z "${RTS_PROJECT_VERSION// }" ]]; then
            echo "::error::rts_project_version must not be empty"
            exit 1
          fi

          # Reject path-traversal attempts in the user-supplied values — these
          # end up in URLs and in filesystem paths below.
          case "${RTS_PROJECT_NAME}${RTS_PROJECT_VERSION}" in
            *..*|*/*) echo "::error::Project name/version must not contain '..' or '/'"; exit 1 ;;
          esac

          STAGE_ROOT="${RUNNER_TEMP:-/tmp}/rts-ftp-posting"
          PROJECT_DIR="${STAGE_ROOT}/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}"
          mkdir -p "${PROJECT_DIR}"
          CSV_NAME="${RTS_PROJECT_NAME} ${RTS_PROJECT_VERSION}-FTP-Components.csv"
          CSV_PATH="${PROJECT_DIR}/${CSV_NAME}"
          MANIFEST_PATH="${STAGE_ROOT}/manifest.json"
          LOG_DIR="${STAGE_ROOT}/logs"
          mkdir -p "${LOG_DIR}"

          {
            echo "stage_root=${STAGE_ROOT}"
            echo "project_dir=${PROJECT_DIR}"
            echo "csv_name=${CSV_NAME}"
            echo "csv_path=${CSV_PATH}"
            echo "manifest_path=${MANIFEST_PATH}"
            echo "log_dir=${LOG_DIR}"
          } >> "$GITHUB_OUTPUT"

          echo "Project:         ${RTS_PROJECT_NAME}"
          echo "Version:         ${RTS_PROJECT_VERSION}"
          echo "Staging dir:     ${PROJECT_DIR}"
          echo "CSV target path: ${CSV_PATH}"

      - name: Download FTP-Components CSV from RTS
        env:
          RTS_USER: ${{ secrets.RTS_USER }}
          RTS_PASSWORD: ${{ secrets.RTS_PASSWORD }}
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
          CSV_PATH: ${{ steps.paths.outputs.csv_path }}
        run: |
          set -euo pipefail

          # Build:
          #   <base>/download?file=/x/eng/3rdparty/data_retention/<Project>/<Version>/<Project> <Version>-FTP-Components.csv
          CSV_FILE_NAME="${RTS_PROJECT_NAME} ${RTS_PROJECT_VERSION}-FTP-Components.csv"
          REMOTE_PATH="${RTS_DATA_RETENTION_ROOT}/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}/${CSV_FILE_NAME}"
          URL="${RTS_BASE_URL}/download?file=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "${REMOTE_PATH}")"

          AUTH_ARGS=()
          if [[ -n "${RTS_USER:-}" && -n "${RTS_PASSWORD:-}" ]]; then
            AUTH_ARGS=(--user "${RTS_USER}:${RTS_PASSWORD}")
          fi

          echo "Downloading CSV from: ${URL}"
          curl --fail --show-error --silent --location "${AUTH_ARGS[@]}" \
            --output "${CSV_PATH}" "${URL}"

          if [[ ! -s "${CSV_PATH}" ]]; then
            echo "::error::CSV download succeeded but file is empty: ${CSV_PATH}"
            exit 1
          fi

          echo "CSV downloaded ($(wc -c <"${CSV_PATH}") bytes)."
          echo "First rows:"
          head -n 5 "${CSV_PATH}" || true

      - name: Verify CSV components are real dependencies of this repo
        env:
          CSV_PATH: ${{ steps.paths.outputs.csv_path }}
          STAGE_ROOT: ${{ steps.paths.outputs.stage_root }}
          SKIP_CHECK: ${{ github.event.inputs.skip_dependency_check }}
        run: |
          set -euo pipefail

          # Runs BEFORE any source archive is downloaded so an unknown
          # component aborts the job cheaply and we don't waste bandwidth
          # fetching things that should never be posted.
          REPORT="${STAGE_ROOT}/dependency-check.json"
          EXTRA_ARG=""
          if [[ "${SKIP_CHECK}" == "true" ]]; then
            echo "::warning::skip_dependency_check=true — running the check in warn-only mode."
            EXTRA_ARG="--warn-only"
          fi

          python3 scripts/rts-ftp-posting/verify-components.py \
            --csv "${CSV_PATH}" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --report "${REPORT}" \
            ${EXTRA_ARG}

      - name: Download all source archives referenced in the CSV
        id: stage
        env:
          RTS_USER: ${{ secrets.RTS_USER }}
          RTS_PASSWORD: ${{ secrets.RTS_PASSWORD }}
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
          CSV_PATH: ${{ steps.paths.outputs.csv_path }}
          PROJECT_DIR: ${{ steps.paths.outputs.project_dir }}
          MANIFEST_PATH: ${{ steps.paths.outputs.manifest_path }}
          LOG_DIR: ${{ steps.paths.outputs.log_dir }}
        run: |
          set -euo pipefail
          python3 scripts/rts-ftp-posting/stage-sources.py \
            --csv "${CSV_PATH}" \
            --project "${RTS_PROJECT_NAME}" \
            --version "${RTS_PROJECT_VERSION}" \
            --rts-base-url "${RTS_BASE_URL}" \
            --data-retention-root "${RTS_DATA_RETENTION_ROOT}" \
            --output-dir "${PROJECT_DIR}" \
            --manifest "${MANIFEST_PATH}" \
            --log-dir "${LOG_DIR}" \
            ${RTS_USER:+--rts-user "${RTS_USER}"} \
            ${RTS_PASSWORD:+--rts-password "${RTS_PASSWORD}"}

      - name: Sanity-check staged content
        env:
          PROJECT_DIR: ${{ steps.paths.outputs.project_dir }}
          MANIFEST_PATH: ${{ steps.paths.outputs.manifest_path }}
        run: |
          set -euo pipefail
          echo "=== Staged tree ==="
          find "${PROJECT_DIR}" -type f -printf '%10s  %p\n' | head -n 200
          echo ""
          echo "=== Manifest summary ==="
          python3 - <<'PY'
          import json, os, sys
          m = json.load(open(os.environ["MANIFEST_PATH"]))
          components = m.get("components", [])
          ok = [c for c in components if c.get("status") == "ok"]
          fail = [c for c in components if c.get("status") != "ok"]
          print(f"Components listed: {len(components)}")
          print(f"Downloaded OK:     {len(ok)}")
          print(f"Failed / skipped:  {len(fail)}")
          if fail:
              print("\nFailed / skipped rows:")
              for c in fail[:25]:
                  print(f"  - {c.get('component')} {c.get('version','')}: {c.get('status')} — {c.get('detail','')}")
              if len(fail) > 25:
                  print(f"  ... and {len(fail)-25} more")
          # Hard fail only if every row failed — a handful of missing archives
          # is common (e.g. Apache/Google-trusted sources manually staged by TGs)
          # and is surfaced to the operator via the workflow artifact.
          if components and not ok:
              print("::error::No source archives could be downloaded.")
              sys.exit(1)
          PY

      - name: Scan staged sources for NetApp / NDM IP contamination
        env:
          PROJECT_DIR: ${{ steps.paths.outputs.project_dir }}
          STAGE_ROOT: ${{ steps.paths.outputs.stage_root }}
          ALLOW_HITS: ${{ github.event.inputs.allow_ip_hit_sha256s }}
        run: |
          set -euo pipefail

          # This is the last line of defence before bytes leave the runner.
          # It hard-fails on ANY hit (copyright marker, NDM source-tree path,
          # @NetApp-Cloud-DataMigrate scope, etc.); the only way past it is
          # to record the sha256 of a reviewed false positive in the
          # allow_ip_hit_sha256s workflow input after Legal sign-off.
          REPORT="${STAGE_ROOT}/ip-scan.json"
          python3 scripts/rts-ftp-posting/scan-for-netapp-ip.py \
            --root "${PROJECT_DIR}" \
            --report "${REPORT}" \
            --allow-hits "${ALLOW_HITS}"

      - name: Publish to /x/eng/3rdparty/ftpstaging (skipped on dry_run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
          PROJECT_DIR: ${{ steps.paths.outputs.project_dir }}
          LOG_DIR: ${{ steps.paths.outputs.log_dir }}
        run: |
          set -euo pipefail

          # The FTP staging share is mounted directly on scs-v2 runners.
          # COSINE syncs from this filesystem path to the public FTP site,
          # so writing here is functionally equivalent to (and more
          # reliable than) pushing to ftp://ftp.netapp.com directly.
          if [[ ! -d "${FTP_STAGING_ROOT}" ]]; then
            echo "::error::FTP staging root not mounted on this runner: ${FTP_STAGING_ROOT}"
            echo "::error::This workflow must run on a runner that has /x/eng/3rdparty/ftpstaging mounted (e.g. scs-v2)."
            exit 1
          fi

          DEST_DIR="${FTP_STAGING_ROOT}/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}"
          LOG_FILE="${LOG_DIR}/publish-rsync.log"

          echo "Publishing ${PROJECT_DIR}/  ->  ${DEST_DIR}/"
          mkdir -p -- "${DEST_DIR}"

          # rsync semantics:
          #   -a            archive (preserve perms/timestamps, recurse)
          #   --no-owner    don't try to chown to the runner user (the
          #                 share is shared; chown would fail or look wrong)
          #   --no-group    same idea for group
          #   --omit-dir-times  avoid touching directory mtimes that other
          #                 projects' files share
          #   -v --stats    log every file + a summary
          #   trailing slash on source means "copy contents of" rather
          #                 than "copy directory itself".
          rsync -av --stats --no-owner --no-group --omit-dir-times \
            "${PROJECT_DIR}/" "${DEST_DIR}/" 2>&1 | tee "${LOG_FILE}"

          echo ""
          echo "Publish complete:"
          echo "  Filesystem path: ${DEST_DIR}"
          echo "  (COSINE will sync this to ftp://ftp.netapp.com/frm-ntap/opensource/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}/ on receipt of the e-mail rendered below.)"

      - name: Summary
        if: ${{ always() }}
        env:
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
          MANIFEST_PATH: ${{ steps.paths.outputs.manifest_path }}
          STAGE_ROOT: ${{ steps.paths.outputs.stage_root }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SKIP_DEP: ${{ github.event.inputs.skip_dependency_check }}
        run: |
          set -euo pipefail
          DEP_REPORT="${STAGE_ROOT}/dependency-check.json"
          IP_REPORT="${STAGE_ROOT}/ip-scan.json"
          {
            echo "## RTS FTP Posting — ${RTS_PROJECT_NAME} ${RTS_PROJECT_VERSION}"
            echo ""
            if [[ -f "${MANIFEST_PATH}" ]]; then
              TOTAL=$(python3 -c 'import json,os; m=json.load(open(os.environ["MANIFEST_PATH"])); print(len(m.get("components",[])))')
              OK=$(python3 -c 'import json,os; m=json.load(open(os.environ["MANIFEST_PATH"])); print(sum(1 for c in m.get("components",[]) if c.get("status")=="ok"))')
              FAIL=$(( TOTAL - OK ))
              echo "- Components in FTP-Components.csv: **${TOTAL}**"
              echo "- Downloaded OK: **${OK}**"
              echo "- Failed / skipped: **${FAIL}**"
            else
              echo "- Manifest not produced (job failed early)."
            fi
            export DEP_REPORT IP_REPORT
            if [[ -f "${DEP_REPORT}" ]]; then
              DEP_OK=$(python3 -c 'import json,os; r=json.load(open(os.environ["DEP_REPORT"])); print(len(r.get("ok",[])))')
              DEP_UNK=$(python3 -c 'import json,os; r=json.load(open(os.environ["DEP_REPORT"])); print(len(r.get("unknown",[])))')
              echo "- Dependency verification: **${DEP_OK} matched / ${DEP_UNK} unknown** $([[ "${SKIP_DEP}" == "true" ]] && echo '(skip_dependency_check=true — warn-only)' || echo '(enforced)')"
            else
              echo "- Dependency verification: **not run** (job failed earlier)"
            fi
            if [[ -f "${IP_REPORT}" ]]; then
              IP_HITS=$(python3 -c 'import json,os; r=json.load(open(os.environ["IP_REPORT"])); print(len(r.get("hits",[])))')
              IP_ARCH=$(python3 -c 'import json,os; r=json.load(open(os.environ["IP_REPORT"])); print(r.get("archives_scanned",0))')
              if [[ "${IP_HITS}" == "0" ]]; then
                echo "- NetApp/NDM IP contamination scan: **clean** (${IP_ARCH} archives scanned)"
              else
                echo "- NetApp/NDM IP contamination scan: **${IP_HITS} HITS** (${IP_ARCH} archives scanned) — see ip-scan.json in the artifact"
              fi
            else
              echo "- NetApp/NDM IP contamination scan: **not run** (job failed earlier)"
            fi
            echo "- Dry run: **${DRY_RUN}**"
            echo "- VED staging path: \`${FTP_STAGING_ROOT}/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}\`"
            echo "- Public FTP target (after COSINE sync): \`ftp://ftp.netapp.com/frm-ntap/opensource/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}/\`"
            echo "- COSINE notification: **render-only — send manually (see section below)**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print COSINE notification e-mail (to send manually)
        if: ${{ always() }}
        env:
          RTS_PROJECT_NAME: ${{ github.event.inputs.rts_project_name }}
          RTS_PROJECT_VERSION: ${{ github.event.inputs.rts_project_version }}
          MANIFEST_PATH: ${{ steps.paths.outputs.manifest_path }}
          LOG_DIR: ${{ steps.paths.outputs.log_dir }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          # We intentionally do NOT send this e-mail from the runner. COSINE
          # treats it as a Service-Now ticket request and wants it to come
          # from a real human's NetApp mailbox. This step just renders the
          # exact subject + body the operator can paste into their mail
          # client and send to ${COSINE_NOTIFY_EMAIL}.

          DEST_DIR="${FTP_STAGING_ROOT}/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}"
          PUBLIC_FTP_PATH="ftp://ftp.netapp.com/frm-ntap/opensource/${RTS_PROJECT_NAME}/${RTS_PROJECT_VERSION}/"
          EMAIL_FILE="${LOG_DIR}/cosine-notification.txt"

          if [[ -f "${MANIFEST_PATH}" ]]; then
            COMPONENT_COUNT=$(python3 -c 'import json,os; m=json.load(open(os.environ["MANIFEST_PATH"])); print(len(m.get("components",[])))')
            OK_COUNT=$(python3 -c 'import json,os; m=json.load(open(os.environ["MANIFEST_PATH"])); print(sum(1 for c in m.get("components",[]) if c.get("status")=="ok"))')
          else
            COMPONENT_COUNT="?"
            OK_COUNT="?"
          fi

          SUBJECT="[RTS FTP Posting] ${RTS_PROJECT_NAME} ${RTS_PROJECT_VERSION} — sources staged at ${DEST_DIR}, please sync to public FTP"

          {
            echo "To:      ${COSINE_NOTIFY_EMAIL}"
            echo "Subject: ${SUBJECT}"
            echo ""
            echo "Hi COSINE team,"
            echo ""
            echo "Open-source source archives for the following RTS release have been"
            echo "copied to the VED FTP staging filesystem and are ready to be synced"
            echo "to the public open-source FTP location. Please open a Service-Now"
            echo "ticket (Protex Service Request) to perform the sync."
            echo ""
            echo "    Project:        ${RTS_PROJECT_NAME}"
            echo "    Version:        ${RTS_PROJECT_VERSION}"
            echo "    Staging path:   ${DEST_DIR}"
            echo "    Public target:  ${PUBLIC_FTP_PATH}"
            echo "    Components:     ${OK_COUNT} published of ${COMPONENT_COUNT} listed in the FTP-Components.csv"
            echo ""
            echo "Verifications run before the publish:"
            echo "  - every component in FTP-Components.csv was matched against this"
            echo "    repo's dependency manifests (npm / Go / Maven / Docker)"
            echo "  - every staged archive was extracted and scanned for NetApp"
            echo "    copyright markers, the @NetApp-Cloud-DataMigrate npm scope,"
            echo "    and NDM source-tree paths — no hits"
            echo ""
            echo "This message was generated by the \"RTS FTP Posting\" GitHub Actions"
            echo "workflow (run id: ${GITHUB_RUN_ID}, repo: ${GITHUB_REPOSITORY})."
            echo ""
            echo "Thanks,"
            echo "NDM Release Automation"
          } > "${EMAIL_FILE}"

          echo ""
          echo "=============================================================="
          echo " COSINE notification e-mail — SEND THIS MANUALLY"
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo " (dry_run=true — send AFTER you've re-run without dry_run)"
          fi
          echo "=============================================================="
          cat "${EMAIL_FILE}"
          echo "=============================================================="
          echo ""
          echo "The same body is also saved in the workflow artifact at"
          echo "  logs/cosine-notification.txt"

          # Also render it into the run summary so it's one copy-paste away
          # from the Actions UI.
          {
            echo ""
            echo "## COSINE notification e-mail (send manually)"
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo ""
              echo "> Dry run — do not send until the real (non-dry-run) upload has completed."
            fi
            echo ""
            echo '```'
            cat "${EMAIL_FILE}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload manifest and logs as workflow artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rts-ftp-posting-${{ github.event.inputs.rts_project_name }}-${{ github.event.inputs.rts_project_version }}
          path: |
            ${{ steps.paths.outputs.stage_root }}/manifest.json
            ${{ steps.paths.outputs.stage_root }}/dependency-check.json
            ${{ steps.paths.outputs.stage_root }}/ip-scan.json
            ${{ steps.paths.outputs.log_dir }}/**
            ${{ steps.paths.outputs.csv_path }}
          if-no-files-found: warn
          retention-days: 30
