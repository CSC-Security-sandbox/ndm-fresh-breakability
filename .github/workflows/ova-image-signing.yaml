              --no-paginate \
              --query "clusters[]" \
              --output json 2>/dev/null || echo "[]")
            
            echo "$CLUSTERS" | jq -r --arg region "$REGION" '.[] | 
              "| \(.) | | \($region) |"' >> cleanup-reports/summary.md
          done
          echo "" >> cleanup-reports/summary.md
          
          # Auto Scaling Groups
          echo "### Tagged Scaling Groups" >> cleanup-reports/summary.md
          echo "| name | owner | region |" >> cleanup-reports/summary.md
          echo "|------|-------|--------|" >> cleanup-reports/summary.md
          
          echo "### Untagged or Incorrectly tagged Scaling Groups" >> cleanup-reports/summary.md
          echo "| name | region |" >> cleanup-reports/summary.md
          echo "|------|--------|" >> cleanup-reports/summary.md
          
          for REGION in ${REGIONS//,/ }; do
