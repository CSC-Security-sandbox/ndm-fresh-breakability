              --query "Reservations[].Instances[].[InstanceId,Tags[?Key=='Owner'].Value|[0],Tags[?Key=='owner'].Value|[0]]" \
              --output json 2>/dev/null || echo "[]")
            
            echo "$INSTANCES" | jq -r --arg region "$REGION" '.[] | 
              if (.[1] != null and .[1] != "") or (.[2] != null and .[2] != "") then
                "| \(.[0]) | \(.[1] // .[2] // "") | \($region) |"
              else
