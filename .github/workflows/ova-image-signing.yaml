name: AWS Orphaned Resources Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (true = report only, false = delete resources)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      resource_age_days:
        description: "Delete resources older than X days (default: 30)"
        required: false
        default: "30"
      aws_region:
        description: "AWS Region (leave empty for all regions)"
        required: false
        default: ""
      cleanup_ebs_volumes:
        description: "Cleanup unattached EBS volumes"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_ebs_snapshots:
        description: "Cleanup orphaned EBS snapshots"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_elastic_ips:
        description: "Cleanup unassociated Elastic IPs"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_amis:
        description: "Cleanup old/unused AMIs"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_load_balancers:
        description: "Cleanup unused Load Balancers"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_security_groups:
        description: "Cleanup unused Security Groups"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_key_pairs:
        description: "Cleanup unused Key Pairs"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_ecr_images:
        description: "Cleanup old ECR images"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_cloudwatch_logs:
        description: "Cleanup empty/old CloudWatch Log Groups"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_s3_incomplete_uploads:
        description: "Cleanup incomplete S3 multipart uploads"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || vars.AWS_DEFAULT_REGION || 'us-east-1' }}
  DRY_RUN: ${{ github.event.inputs.dry_run }}
  RESOURCE_AGE_DAYS: ${{ github.event.inputs.resource_age_days }}

permissions:
  contents: read

jobs:
  aws-cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7ceaf96edc86cc1713cef59eba79feeb23f59da1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq bc
          pip install awscli --upgrade

      - name: Get AWS Regions
        id: get-regions
        run: |
          if [ -n "${{ github.event.inputs.aws_region }}" ]; then
            echo "regions=${{ github.event.inputs.aws_region }}" >> $GITHUB_OUTPUT
          else
            REGIONS=$(aws ec2 describe-regions --query "Regions[].RegionName" --output text | tr '\t' ',')
            echo "regions=$REGIONS" >> $GITHUB_OUTPUT
          fi

      - name: Initialize Cleanup Report
        run: |
          mkdir -p cleanup-reports
          cat > cleanup-reports/summary.md << 'EOF'
          # AWS Orphaned Resources Cleanup Report
          
          **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Mode:** ${{ env.DRY_RUN == 'true' && 'DRY RUN (No resources deleted)' || 'LIVE RUN (Resources will be deleted)' }}
          **Resource Age Threshold:** ${{ env.RESOURCE_AGE_DAYS }} days
          
          ---
          
          EOF

      - name: Cleanup Unattached EBS Volumes
        if: ${{ github.event.inputs.cleanup_ebs_volumes == 'true' }}
        run: |
          echo "## EBS Volumes Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          TOTAL_DELETED=0
          TOTAL_SIZE_GB=0
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking EBS volumes in $REGION..."
            
            # Find unattached volumes (available state) - handle pagination
            VOLUMES=$(aws ec2 describe-volumes \
              --region "$REGION" \
              --filters "Name=status,Values=available" \
              --no-paginate \
              --query "Volumes[?CreateTime<='$CUTOFF_DATE'].[VolumeId,Size,CreateTime,Tags[?Key=='Name'].Value|[0]]" \
              --output json 2>/dev/null || echo "[]")
            
            VOLUME_COUNT=$(echo "$VOLUMES" | jq 'length')
            
            if [ "$VOLUME_COUNT" -gt 0 ]; then
              echo "Found $VOLUME_COUNT unattached volumes in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Volume ID | Size (GB) | Created | Name |" >> cleanup-reports/summary.md
              echo "|-----------|-----------|---------|------|" >> cleanup-reports/summary.md
              
              echo "$VOLUMES" | jq -r '.[] | "| \(.[0]) | \(.[1]) | \(.[2]) | \(.[3] // "N/A") |"' >> cleanup-reports/summary.md
              
              # Calculate total size
              REGION_SIZE=$(echo "$VOLUMES" | jq '[.[] | .[1]] | add // 0')
              TOTAL_SIZE_GB=$((TOTAL_SIZE_GB + REGION_SIZE))
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$VOLUMES" | jq -r '.[] | .[0]' | while read -r VOL_ID; do
                  if [ -n "$VOL_ID" ] && [ "$VOL_ID" != "null" ]; then
                    echo "Deleting volume: $VOL_ID"
                    aws ec2 delete-volume --region "$REGION" --volume-id "$VOL_ID" || echo "Failed to delete $VOL_ID"
                    TOTAL_DELETED=$((TOTAL_DELETED + 1))
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done
          
          echo "**Total unattached EBS storage: ${TOTAL_SIZE_GB} GB**" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Cleanup Orphaned EBS Snapshots
        if: ${{ github.event.inputs.cleanup_ebs_snapshots == 'true' }}
        run: |
          echo "## EBS Snapshots Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TOTAL_SNAPSHOTS=0
          TOTAL_SIZE_GB=0
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking EBS snapshots in $REGION..."
            
            # Get all snapshots owned by this account - handle pagination
            SNAPSHOTS=$(aws ec2 describe-snapshots \
              --region "$REGION" \
              --owner-ids "$ACCOUNT_ID" \
              --no-paginate \
              --query "Snapshots[?StartTime<='$CUTOFF_DATE'].[SnapshotId,VolumeId,StartTime,VolumeSize,Description]" \
              --output json 2>/dev/null || echo "[]")
            
            # Get AMIs to check for orphaned snapshots - handle pagination
            AMIS=$(aws ec2 describe-images \
              --region "$REGION" \
              --owners "$ACCOUNT_ID" \
              --no-paginate \
              --query "Images[].BlockDeviceMappings[].Ebs.SnapshotId" \
              --output text 2>/dev/null || echo "")
            
            # Get all volumes (both attached and unattached) to check if source volumes exist
            ALL_VOLUMES=$(aws ec2 describe-volumes \
              --region "$REGION" \
              --no-paginate \
              --query "Volumes[].VolumeId" \
              --output text 2>/dev/null || echo "")
            
            # Get volumes attached to running instances (these are definitely in use)
            ATTACHED_VOLUMES=$(aws ec2 describe-instances \
              --region "$REGION" \
              --no-paginate \
              --filters "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].BlockDeviceMappings[].Ebs.VolumeId" \
              --output text 2>/dev/null | tr '\t' '\n' | sort -u | tr '\n' ' ' || echo "")
            
            # Find orphaned snapshots:
            # 1. Not associated with any AMI
            # 2. Source volume doesn't exist (deleted) OR source volume exists but is unattached (available state)
            # Create jq filter in a temp file to avoid shell interpretation issues
            printf '%s\n' '. as $snaps |' '($amis | split("\t") | map(select(. != ""))) as $ami_snaps |' '($volumes | split(" ") | map(select(. != ""))) as $vol_ids |' '($attached | split(" ") | map(select(. != ""))) as $attached_vols |' '[.[] | select(' '(.[0] as $sid | ($ami_snaps | index($sid) | not)) and' '(.[1] as $vid |' '  ($vid == null or $vid == "null" or' '   ($vol_ids | index($vid) | not) or' '   (($vol_ids | index($vid)) and ($attached_vols | index($vid) | not))))' ')]' > /tmp/orphan_filter.jq
            ORPHANED_SNAPSHOTS=$(echo "$SNAPSHOTS" | jq -r --arg amis "$AMIS" --arg volumes "$ALL_VOLUMES" --arg attached "$ATTACHED_VOLUMES" -f /tmp/orphan_filter.jq)
            rm -f /tmp/orphan_filter.jq
            
            ORPHAN_COUNT=$(echo "$ORPHANED_SNAPSHOTS" | jq 'length')
            
            if [ "$ORPHAN_COUNT" -gt 0 ]; then
              echo "Found $ORPHAN_COUNT orphaned snapshots in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Snapshot ID | Volume ID | Created | Size (GB) | Description |" >> cleanup-reports/summary.md
              echo "|-------------|-----------|---------|-----------|-------------|" >> cleanup-reports/summary.md
              
              echo "$ORPHANED_SNAPSHOTS" | jq -r '.[] | "| \(.[0]) | \(.[1] // "N/A") | \(.[2]) | \(.[3]) | \(.[4] // "N/A") |"' >> cleanup-reports/summary.md
              
              # Calculate total size
              REGION_SIZE=$(echo "$ORPHANED_SNAPSHOTS" | jq '[.[] | .[3]] | add // 0')
              TOTAL_SIZE_GB=$((TOTAL_SIZE_GB + REGION_SIZE))
              TOTAL_SNAPSHOTS=$((TOTAL_SNAPSHOTS + ORPHAN_COUNT))
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$ORPHANED_SNAPSHOTS" | jq -r '.[] | .[0]' | while read -r SNAP_ID; do
                  if [ -n "$SNAP_ID" ] && [ "$SNAP_ID" != "null" ]; then
                    echo "Deleting snapshot: $SNAP_ID"
                    aws ec2 delete-snapshot --region "$REGION" --snapshot-id "$SNAP_ID" || echo "Failed to delete $SNAP_ID"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done
          
          echo "**Total orphaned snapshots: $TOTAL_SNAPSHOTS**" >> cleanup-reports/summary.md
          echo "**Total snapshot storage: ${TOTAL_SIZE_GB} GB**" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Cleanup Unassociated Elastic IPs
        if: ${{ github.event.inputs.cleanup_elastic_ips == 'true' }}
        run: |
          echo "## Elastic IPs Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          TOTAL_EIPS=0
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking Elastic IPs in $REGION..."
            
            # Find unassociated Elastic IPs - handle pagination
            EIPS=$(aws ec2 describe-addresses \
              --region "$REGION" \
              --no-paginate \
              --query "Addresses[?AssociationId==null].[AllocationId,PublicIp,Tags[?Key=='Name'].Value|[0]]" \
              --output json 2>/dev/null || echo "[]")
            
            EIP_COUNT=$(echo "$EIPS" | jq 'length')
            
            if [ "$EIP_COUNT" -gt 0 ]; then
              echo "Found $EIP_COUNT unassociated Elastic IPs in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Allocation ID | Public IP | Name |" >> cleanup-reports/summary.md
              echo "|---------------|-----------|------|" >> cleanup-reports/summary.md
              
              echo "$EIPS" | jq -r '.[] | "| \(.[0]) | \(.[1]) | \(.[2] // "N/A") |"' >> cleanup-reports/summary.md
              
              TOTAL_EIPS=$((TOTAL_EIPS + EIP_COUNT))
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$EIPS" | jq -r '.[] | .[0]' | while read -r ALLOC_ID; do
                  if [ -n "$ALLOC_ID" ] && [ "$ALLOC_ID" != "null" ]; then
                    echo "Releasing Elastic IP: $ALLOC_ID"
                    aws ec2 release-address --region "$REGION" --allocation-id "$ALLOC_ID" || echo "Failed to release $ALLOC_ID"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done
          
          echo "**Total unassociated Elastic IPs: $TOTAL_EIPS** (Cost: ~\$${TOTAL_EIPS} * 3.60/month)" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Cleanup Unused AMIs
        if: ${{ github.event.inputs.cleanup_amis == 'true' }}
        run: |
          echo "## AMI Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking AMIs in $REGION..."
            
            # Get old AMIs owned by this account - handle pagination
            OLD_AMIS=$(aws ec2 describe-images \
              --region "$REGION" \
              --owners "$ACCOUNT_ID" \
              --no-paginate \
              --query "Images[?CreationDate<='$CUTOFF_DATE'].[ImageId,Name,CreationDate]" \
              --output json 2>/dev/null || echo "[]")
            
            # Get AMIs currently in use by instances - handle pagination
            USED_AMIS=$(aws ec2 describe-instances \
              --region "$REGION" \
              --no-paginate \
              --query "Reservations[].Instances[].ImageId" \
              --output text 2>/dev/null || echo "")
            
            # Get AMIs used in Launch Templates - handle pagination
            LT_AMIS=$(aws ec2 describe-launch-templates \
              --region "$REGION" \
              --no-paginate \
              --query "LaunchTemplates[].LaunchTemplateId" \
              --output text 2>/dev/null | while read -r LT_ID; do
                aws ec2 describe-launch-template-versions \
                  --region "$REGION" \
                  --launch-template-id "$LT_ID" \
                  --no-paginate \
                  --query "LaunchTemplateVersions[].LaunchTemplateData.ImageId" \
                  --output text 2>/dev/null
              done || echo "")
            
            # Get AMIs used in Auto Scaling Groups
            ASG_AMIS=$(aws autoscaling describe-launch-configurations \
              --region "$REGION" \
              --no-paginate \
              --query "LaunchConfigurations[].ImageId" \
              --output text 2>/dev/null || echo "")
            
            ALL_USED_AMIS="$USED_AMIS $LT_AMIS $ASG_AMIS"
            
            # Find unused AMIs
            UNUSED_AMIS=$(echo "$OLD_AMIS" | jq -r --arg used "$ALL_USED_AMIS" '
              . as $amis |
              ($used | split(" ") | map(select(. != ""))) as $used_amis |
              [.[] | select(.[0] as $ami | ($used_amis | index($ami) | not))]
            ')
            
            UNUSED_COUNT=$(echo "$UNUSED_AMIS" | jq 'length')
            
            if [ "$UNUSED_COUNT" -gt 0 ]; then
              echo "Found $UNUSED_COUNT unused AMIs in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| AMI ID | Name | Created |" >> cleanup-reports/summary.md
              echo "|--------|------|---------|" >> cleanup-reports/summary.md
              
              echo "$UNUSED_AMIS" | jq -r '.[] | "| \(.[0]) | \(.[1] // "N/A") | \(.[2]) |"' >> cleanup-reports/summary.md
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$UNUSED_AMIS" | jq -r '.[] | .[0]' | while read -r AMI_ID; do
                  if [ -n "$AMI_ID" ] && [ "$AMI_ID" != "null" ]; then
                    echo "Deregistering AMI: $AMI_ID"
                    aws ec2 deregister-image --region "$REGION" --image-id "$AMI_ID" || echo "Failed to deregister $AMI_ID"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done

      - name: Cleanup Unused Load Balancers
        if: ${{ github.event.inputs.cleanup_load_balancers == 'true' }}
        run: |
          echo "## Load Balancers Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking Load Balancers in $REGION..."
            
            # Check ALB/NLB with no targets - handle pagination
            LBS=$(aws elbv2 describe-load-balancers \
              --region "$REGION" \
              --no-paginate \
              --query "LoadBalancers[?CreatedTime<='$CUTOFF_DATE'].[LoadBalancerArn,LoadBalancerName,Type,CreatedTime]" \
              --output json 2>/dev/null || echo "[]")
            
            UNUSED_LBS="[]"
            
            # Process each load balancer
            LB_COUNT=$(echo "$LBS" | jq 'length')
            if [ "$LB_COUNT" -gt 0 ]; then
              for i in $(seq 0 $((LB_COUNT - 1))); do
                LB_ARN=$(echo "$LBS" | jq -r ".[$i][0]")
                
                if [ -n "$LB_ARN" ] && [ "$LB_ARN" != "null" ]; then
                  # Check if LB has any target groups with healthy targets
                  TARGET_GROUPS=$(aws elbv2 describe-target-groups \
                    --region "$REGION" \
                    --load-balancer-arn "$LB_ARN" \
                    --no-paginate \
                    --query "TargetGroups[].TargetGroupArn" \
                    --output text 2>/dev/null || echo "")
                  
                  HAS_TARGETS=false
                  for TG_ARN in $TARGET_GROUPS; do
                    if [ -n "$TG_ARN" ]; then
                      TARGETS=$(aws elbv2 describe-target-health \
                        --region "$REGION" \
                        --target-group-arn "$TG_ARN" \
                        --query "TargetHealthDescriptions" \
                        --output json 2>/dev/null || echo "[]")
                      
                      if [ "$(echo "$TARGETS" | jq 'length')" -gt 0 ]; then
                        HAS_TARGETS=true
                        break
                      fi
                    fi
                  done
                  
                  if [ "$HAS_TARGETS" == "false" ]; then
                    LB_INFO=$(echo "$LBS" | jq ".[$i]")
                    UNUSED_LBS=$(echo "$UNUSED_LBS" | jq --argjson lb "[$LB_INFO]" '. + $lb')
                  fi
                fi
              done
            fi
            
            UNUSED_COUNT=$(echo "$UNUSED_LBS" | jq 'length')
            
            if [ "$UNUSED_COUNT" -gt 0 ]; then
              echo "Found $UNUSED_COUNT unused Load Balancers in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| LB Name | Type | Created |" >> cleanup-reports/summary.md
              echo "|---------|------|---------|" >> cleanup-reports/summary.md
              
              echo "$UNUSED_LBS" | jq -r '.[] | "| \(.[1]) | \(.[2]) | \(.[3]) |"' >> cleanup-reports/summary.md
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$UNUSED_LBS" | jq -r '.[] | .[0]' | while read -r LB_ARN; do
                  if [ -n "$LB_ARN" ] && [ "$LB_ARN" != "null" ]; then
                    echo "Deleting Load Balancer: $LB_ARN"
                    aws elbv2 delete-load-balancer --region "$REGION" --load-balancer-arn "$LB_ARN" || echo "Failed to delete LB"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done

      - name: Cleanup Unused Security Groups
        if: ${{ github.event.inputs.cleanup_security_groups == 'true' }}
        run: |
          echo "## Security Groups Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking Security Groups in $REGION..."
            
            # Get all security groups except default - handle pagination
            ALL_SGS=$(aws ec2 describe-security-groups \
              --region "$REGION" \
              --no-paginate \
              --query "SecurityGroups[?GroupName!='default'].[GroupId,GroupName,Description]" \
              --output json 2>/dev/null || echo "[]")
            
            # Get security groups in use by network interfaces - handle pagination
            USED_SGS=$(aws ec2 describe-network-interfaces \
              --region "$REGION" \
              --no-paginate \
              --query "NetworkInterfaces[].Groups[].GroupId" \
              --output text 2>/dev/null || echo "")
            
            # Get security groups referenced by other security groups - handle pagination
            REFERENCED_SGS=$(aws ec2 describe-security-groups \
              --region "$REGION" \
              --no-paginate \
              --query "SecurityGroups[].IpPermissions[].UserIdGroupPairs[].GroupId" \
              --output text 2>/dev/null || echo "")
            
            # Get security groups used by RDS instances
            RDS_SGS=$(aws rds describe-db-instances \
              --region "$REGION" \
              --no-paginate \
              --query "DBInstances[].VpcSecurityGroups[].VpcSecurityGroupId" \
              --output text 2>/dev/null || echo "")
            
            # Get security groups used by ELB/ALB
            ELB_SGS=$(aws elb describe-load-balancers \
              --region "$REGION" \
              --no-paginate \
              --query "LoadBalancerDescriptions[].SecurityGroups[]" \
              --output text 2>/dev/null || echo "")
            
            ALL_USED="$USED_SGS $REFERENCED_SGS $RDS_SGS $ELB_SGS"
            
            # Find unused security groups
            UNUSED_SGS=$(echo "$ALL_SGS" | jq -r --arg used "$ALL_USED" '
              . as $sgs |
              ($used | split(" ") | map(select(. != ""))) as $used_sgs |
              [.[] | select(.[0] as $sg | ($used_sgs | index($sg) | not))]
            ')
            
            UNUSED_COUNT=$(echo "$UNUSED_SGS" | jq 'length')
            
            if [ "$UNUSED_COUNT" -gt 0 ]; then
              echo "Found $UNUSED_COUNT unused Security Groups in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Group ID | Name | Description |" >> cleanup-reports/summary.md
              echo "|----------|------|-------------|" >> cleanup-reports/summary.md
              
              echo "$UNUSED_SGS" | jq -r '.[] | "| \(.[0]) | \(.[1]) | \(.[2] // "N/A") |"' >> cleanup-reports/summary.md
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$UNUSED_SGS" | jq -r '.[] | .[0]' | while read -r SG_ID; do
                  if [ -n "$SG_ID" ] && [ "$SG_ID" != "null" ]; then
                    echo "Deleting Security Group: $SG_ID"
                    aws ec2 delete-security-group --region "$REGION" --group-id "$SG_ID" || echo "Failed to delete $SG_ID"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done

      - name: Cleanup Unused Key Pairs
        if: ${{ github.event.inputs.cleanup_key_pairs == 'true' }}
        run: |
          echo "## Key Pairs Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          TOTAL_KEYPAIRS=0
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking Key Pairs in $REGION..."
            
            # Get all key pairs - handle pagination
            ALL_KEYPAIRS=$(aws ec2 describe-key-pairs \
              --region "$REGION" \
              --no-paginate \
              --query "KeyPairs[].[KeyName,KeyPairId,KeyFingerprint]" \
              --output json 2>/dev/null || echo "[]")
            
            # Get key pairs in use by instances - handle pagination
            USED_KEYPAIRS=$(aws ec2 describe-instances \
              --region "$REGION" \
              --no-paginate \
              --query "Reservations[].Instances[].KeyName" \
              --output text 2>/dev/null | tr '\t' '\n' | sort -u | tr '\n' ' ' || echo "")
            
            # Find unused key pairs
            UNUSED_KEYPAIRS=$(echo "$ALL_KEYPAIRS" | jq -r --arg used "$USED_KEYPAIRS" '
              . as $kps |
              ($used | split(" ") | map(select(. != ""))) as $used_kps |
              [.[] | select(.[0] as $kp | ($used_kps | index($kp) | not))]
            ')
            
            UNUSED_COUNT=$(echo "$UNUSED_KEYPAIRS" | jq 'length')
            
            if [ "$UNUSED_COUNT" -gt 0 ]; then
              echo "Found $UNUSED_COUNT unused Key Pairs in $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Key Name | Key Pair ID | Fingerprint |" >> cleanup-reports/summary.md
              echo "|----------|------------|-------------|" >> cleanup-reports/summary.md
              
              echo "$UNUSED_KEYPAIRS" | jq -r '.[] | "| \(.[0]) | \(.[1]) | \(.[2]) |"' >> cleanup-reports/summary.md
              
              TOTAL_KEYPAIRS=$((TOTAL_KEYPAIRS + UNUSED_COUNT))
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$UNUSED_KEYPAIRS" | jq -r '.[] | .[0]' | while read -r KEY_NAME; do
                  if [ -n "$KEY_NAME" ] && [ "$KEY_NAME" != "null" ]; then
                    echo "Deleting Key Pair: $KEY_NAME"
                    aws ec2 delete-key-pair --region "$REGION" --key-name "$KEY_NAME" || echo "Failed to delete $KEY_NAME"
                  fi
                done
              fi
              
              echo "" >> cleanup-reports/summary.md
            fi
          done
          
          echo "**Total unused Key Pairs: $TOTAL_KEYPAIRS**" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Cleanup Old ECR Images
        if: ${{ github.event.inputs.cleanup_ecr_images == 'true' }}
        run: |
          echo "## ECR Images Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          TOTAL_IMAGES=0
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking ECR repositories in $REGION..."
            
            # Get all ECR repositories in this region - handle pagination
            REPOS=$(aws ecr describe-repositories \
              --region "$REGION" \
              --no-paginate \
              --query "repositories[].repositoryName" \
              --output text 2>/dev/null || echo "")
            
            if [ -z "$REPOS" ]; then
              continue
            fi
            
            for REPO in $REPOS; do
              echo "Checking ECR repository: $REPO in $REGION"
              
              # Get untagged images - handle pagination
              UNTAGGED=$(aws ecr describe-images \
                --region "$REGION" \
                --repository-name "$REPO" \
                --filter "tagStatus=UNTAGGED" \
                --no-paginate \
                --query "imageDetails[?imagePushedAt<='$CUTOFF_DATE'].[imageDigest,imagePushedAt]" \
                --output json 2>/dev/null || echo "[]")
              
              UNTAGGED_COUNT=$(echo "$UNTAGGED" | jq 'length')
              
              if [ "$UNTAGGED_COUNT" -gt 0 ]; then
                echo "Found $UNTAGGED_COUNT untagged images in $REPO ($REGION)" >> cleanup-reports/summary.md
                echo "" >> cleanup-reports/summary.md
                echo "| Repository | Region | Image Count |" >> cleanup-reports/summary.md
                echo "|------------|--------|-------------|" >> cleanup-reports/summary.md
                echo "| $REPO | $REGION | $UNTAGGED_COUNT |" >> cleanup-reports/summary.md
                echo "" >> cleanup-reports/summary.md
                
                TOTAL_IMAGES=$((TOTAL_IMAGES + UNTAGGED_COUNT))
                
                if [ "${{ env.DRY_RUN }}" == "false" ]; then
                  # Delete images in batches (ECR has a limit of 100 images per batch)
                  echo "$UNTAGGED" | jq -r '.[] | .[0]' | while read -r DIGEST; do
                    if [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ]; then
                      aws ecr batch-delete-image \
                        --region "$REGION" \
                        --repository-name "$REPO" \
                        --image-ids imageDigest="$DIGEST" || echo "Failed to delete image $DIGEST from $REPO"
                    fi
                  done
                fi
              fi
            done
          done
          
          echo "**Total untagged ECR images: $TOTAL_IMAGES**" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Cleanup Empty CloudWatch Log Groups
        if: ${{ github.event.inputs.cleanup_cloudwatch_logs == 'true' }}
        run: |
          echo "## CloudWatch Log Groups Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          REGIONS="${{ steps.get-regions.outputs.regions }}"
          CUTOFF_TIMESTAMP=$(($(date +%s) - (${{ env.RESOURCE_AGE_DAYS }} * 86400)))
          CUTOFF_MS=$((CUTOFF_TIMESTAMP * 1000))
          
          for REGION in ${REGIONS//,/ }; do
            echo "Checking CloudWatch Log Groups in $REGION..."
            
            # Get all log groups - handle pagination
            LOG_GROUPS=$(aws logs describe-log-groups \
              --region "$REGION" \
              --no-paginate \
              --query "logGroups[].logGroupName" \
              --output text 2>/dev/null || echo "")
            
            if [ -z "$LOG_GROUPS" ]; then
              continue
            fi
            
            EMPTY_GROUPS=()
            OLD_GROUPS=()
            
            for LOG_GROUP in $LOG_GROUPS; do
              # Check if log group is empty or has no recent logs
              STREAMS=$(aws logs describe-log-streams \
                --region "$REGION" \
                --log-group-name "$LOG_GROUP" \
                --order-by LastEventTime \
                --descending \
                --limit 1 \
                --query "logStreams[0].lastEventTimestamp" \
                --output text 2>/dev/null || echo "None")
              
              if [ "$STREAMS" == "None" ] || [ -z "$STREAMS" ]; then
                EMPTY_GROUPS+=("$LOG_GROUP")
              elif [ "$STREAMS" -lt "$CUTOFF_MS" ] 2>/dev/null; then
                OLD_GROUPS+=("$LOG_GROUP")
              fi
            done
            
            if [ ${#EMPTY_GROUPS[@]} -gt 0 ] || [ ${#OLD_GROUPS[@]} -gt 0 ]; then
              echo "### Region: $REGION" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
            fi
            
            if [ ${#EMPTY_GROUPS[@]} -gt 0 ]; then
              echo "#### Empty Log Groups ($REGION)" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              for GROUP in "${EMPTY_GROUPS[@]}"; do
                echo "- $GROUP" >> cleanup-reports/summary.md
                
                if [ "${{ env.DRY_RUN }}" == "false" ]; then
                  aws logs delete-log-group --region "$REGION" --log-group-name "$GROUP" || echo "Failed to delete $GROUP"
                fi
              done
              echo "" >> cleanup-reports/summary.md
            fi
            
            if [ ${#OLD_GROUPS[@]} -gt 0 ]; then
              echo "#### Log Groups with No Recent Activity ($REGION)" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              for GROUP in "${OLD_GROUPS[@]}"; do
                echo "- $GROUP" >> cleanup-reports/summary.md
              done
              echo "" >> cleanup-reports/summary.md
            fi
          done

      - name: Cleanup Incomplete S3 Multipart Uploads
        if: ${{ github.event.inputs.cleanup_s3_incomplete_uploads == 'true' }}
        run: |
          echo "## S3 Incomplete Multipart Uploads Cleanup" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          CUTOFF_DATE=$(date -d "-${{ env.RESOURCE_AGE_DAYS }} days" -u +%Y-%m-%dT%H:%M:%S)
          
          # Get all buckets (S3 is global, but buckets are region-specific)
          BUCKETS=$(aws s3api list-buckets --query "Buckets[].Name" --output text 2>/dev/null || echo "")
          
          TOTAL_UPLOADS=0
          
          for BUCKET in $BUCKETS; do
            echo "Checking incomplete multipart uploads in $BUCKET..."
            
            # List incomplete multipart uploads - handle pagination
            UPLOADS=$(aws s3api list-multipart-uploads \
              --bucket "$BUCKET" \
              --query "Uploads[?Initiated<='$CUTOFF_DATE'].[Key,UploadId,Initiated]" \
              --output json 2>/dev/null || echo "[]")
            
            UPLOAD_COUNT=$(echo "$UPLOADS" | jq 'length')
            
            if [ "$UPLOAD_COUNT" -gt 0 ]; then
              echo "Found $UPLOAD_COUNT incomplete uploads in $BUCKET" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              echo "| Bucket | Key | Upload ID | Initiated |" >> cleanup-reports/summary.md
              echo "|--------|-----|----------|-----------|" >> cleanup-reports/summary.md
              
              echo "$UPLOADS" | jq -r ".[] | \"| $BUCKET | \(.[0]) | \(.[1]) | \(.[2]) |\"" >> cleanup-reports/summary.md
              echo "" >> cleanup-reports/summary.md
              
              TOTAL_UPLOADS=$((TOTAL_UPLOADS + UPLOAD_COUNT))
              
              if [ "${{ env.DRY_RUN }}" == "false" ]; then
                echo "$UPLOADS" | jq -r '.[] | "\(.[0])|\(.[1])"' | while IFS='|' read -r KEY UPLOAD_ID; do
                  if [ -n "$KEY" ] && [ -n "$UPLOAD_ID" ]; then
                    aws s3api abort-multipart-upload \
                      --bucket "$BUCKET" \
                      --key "$KEY" \
                      --upload-id "$UPLOAD_ID" || echo "Failed to abort upload"
                  fi
                done
              fi
            fi
          done
          
          echo "**Total incomplete multipart uploads: $TOTAL_UPLOADS**" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md

      - name: Generate Final Report
        run: |
          echo "---" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          echo "## Summary" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          echo "**Cleanup completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> cleanup-reports/summary.md
          echo "" >> cleanup-reports/summary.md
          
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "⚠️ **This was a DRY RUN. No resources were deleted.**" >> cleanup-reports/summary.md
            echo "" >> cleanup-reports/summary.md
            echo "To delete these resources, run the workflow again with \`dry_run: false\`" >> cleanup-reports/summary.md
          else
            echo "✅ **Resources have been deleted.**" >> cleanup-reports/summary.md
          fi
          
          cat cleanup-reports/summary.md

      - name: Upload Cleanup Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aws-cleanup-report-${{ github.run_id }}
          path: cleanup-reports/
          retention-days: 30

      - name: Post Summary to GitHub
        run: |
          cat cleanup-reports/summary.md >> $GITHUB_STEP_SUMMARY