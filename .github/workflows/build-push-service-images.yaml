name: Build and Push to ACR on PR Merge

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/admin-service/**'
      - 'services/config-service/**'
      - 'services/db-writer/**'
      - 'services/datamigrator-ui/**'
      - 'services/jobs-service/**'
      - 'services/keycloak-customizations/**'
      - 'services/reports-service/**'
      - 'liquibase/**'
  push:
    branches:
      - main
    paths:
      - 'services/admin-service/**'
      - 'services/config-service/**'
      - 'services/db-writer/**'
      - 'services/datamigrator-ui/**'
      - 'services/jobs-service/**'
      - 'services/keycloak-customizations/**'
      - 'services/reports-service/**'
      - 'liquibase/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write
  actions: read

env:
  TRIVY_VERSION: v0.63.0

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set matrix for changed services
        id: set-matrix
        shell: bash
        run: |
          services=( "db-writer" "keycloak-customizations" "reports-service" "admin-service" "config-service" "datamigrator-ui" "jobs-service" )
          targets=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
            for service in "${services[@]}"; do
              if git diff --name-only "$base_sha" "$head_sha" | grep -q "^services/$service/"; then
                targets+=("$service")
              fi
            done
            if git diff --name-only "$base_sha" "$head_sha" | grep -q "^liquibase/"; then
              targets+=("db-migrations")
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            targets=("${services[@]}")
            targets+=("db-migrations")
          elif [ "${{ github.event_name }}" = "push" ]; then
            # services
            for service in "${services[@]}"; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^services/$service/"; then
                targets+=("$service")
              fi
            done
            # liquibase
            if git diff --name-only HEAD~1 HEAD | grep -q "^liquibase/"; then
              targets+=("db-migrations")
            fi
          fi

          # Convert to JSON for the matrix
          service_json=$(printf '%s\n' "${targets[@]}" | jq -R . | jq -s . | tr -d '\n')
          echo "Matrix for changed services: $service_json"
          echo "matrix={\"service\":$service_json}" >> $GITHUB_OUTPUT

  trivy-pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: determine-matrix
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine-matrix.outputs.matrix).service }}
      fail-fast: false
    env:
      IMAGE_NAME: prscan-${{ matrix.service }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca

      - name: Log in to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_SP_USERNAME }}
          password: ${{ secrets.AZURE_SP_PASSWORD }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@9ea583eb67910444b1f64abf338bd2e105a0a93d
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: Set build context
        id: set-context
        run: |
          if [ "${{ matrix.service }}" = "db-migrations" ]; then
            echo "CONTEXT=liquibase" >> $GITHUB_ENV
          else
            echo "CONTEXT=services/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      - name: Build Docker Image for ${{ matrix.service }} (for scan only)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --secret id=git_token,env=GITOPS_USER_GITHUB_TOKEN \
            --cache-from type=gha,scope=${{ matrix.service }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.service }} \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            --load "$CONTEXT"
        env:
          GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          CONTEXT: ${{ env.CONTEXT }}

      - name: Scan image with Trivy (JSON, fail on CRITICAL/HIGH)
        id: trivy-scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        continue-on-error: true
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'json'
          output: 'trivy-results-${{ matrix.service }}.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: false

      - name: Convert Trivy JSON to SARIF and Table format
        run: |
          FILE="trivy-results-${{ matrix.service }}.json"
      
          if [ -f "$FILE" ]; then
            echo "Converting $FILE to SARIF"
            trivy convert --format sarif --output trivy-results-${{ matrix.service }}.sarif "$FILE"
      
            echo "Converting $FILE to table"
            trivy convert --format table --output trivy-table-${{ matrix.service }}.txt "$FILE"
          else
            echo "No Trivy results file found to convert"
          fi

      - name: Brand SARIF with service name
        run: |
          SERVICE="${{ matrix.service }}"
          jq --arg svc "$SERVICE" \
            '.runs[0].results |= map(
                .message.text |= ("[" + $svc + "] " + .)
              )' \
            trivy-results-${SERVICE}.sarif > trivy-results-${SERVICE}-branded.sarif
          mv trivy-results-${SERVICE}-branded.sarif trivy-results-${SERVICE}.sarif

      - name: Output text summary file
        run: |
          cat trivy-table-${{ matrix.service }}.txt

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

      - name: Generate Trivy Vulnerability Summary
        id: summary
        run: |
          echo "### Trivy Scan Summary for \`${{ matrix.service }}\`" > summary.txt
          echo "" >> summary.txt
          echo "" >> summary.txt
          if [ -s trivy-results-${{ matrix.service }}.json ]; then
            HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-${{ matrix.service }}.json)
            CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-${{ matrix.service }}.json)
            echo "| Severity  | Count |" >> summary.txt
            echo "|-----------|-------|" >> summary.txt
            echo "| CRITICAL  | $CRITICAL |" >> summary.txt
            echo "| HIGH      | $HIGH     |" >> summary.txt
            echo "" >> summary.txt
            if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ]; then
              echo "No HIGH or CRITICAL vulnerabilities detected." >> summary.txt
            else
              echo "### List of HIGH and CRITICAL vulnerabilities" >> summary.txt
              echo "" >> summary.txt
              echo "| Severity | Vulnerability ID | Package | Version | Title |" >> summary.txt
              echo "|----------|------------------|---------|---------|-------|" >> summary.txt
              jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | 
                "| \(.Severity) | \(.VulnerabilityID) | \(.PkgName) | \(.InstalledVersion) | \(.Title // "N/A") |"' \
                trivy-results-${{ matrix.service }}.json >> summary.txt
              echo "" >> summary.txt
              echo "Refer to full Trivy JSON report for details." >> summary.txt
            fi
          else
            echo "No Trivy scan results found. Check previous scan step." >> summary.txt
          fi

      - name: Post or Update Trivy summary as PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const fs = require('fs');
            const service = '${{ matrix.service }}';
            const marker = `<!-- trivy-scan-summary:${service} -->`;
            const summary = fs.readFileSync('summary.txt', 'utf8');

            // Get IST time
            const now = new Date();
            const options = { timeZone: 'Asia/Kolkata', hour12: false };
            const istString = now.toLocaleString('en-IN', options);
            const runTime = `${istString} (IST)`;

            // Build the Security tab filtered link for this PR
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const securityLink = `https://github.com/${owner}/${repo}/security/code-scanning?query=is%3Aopen+pr%3A${prNumber}`;

            // Get all comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Find a bot comment with the marker for this service
            const botComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' && comment.body.startsWith(marker)
            );

            const securityLine = `\n\nYou can also view vulnerabilities for this PR in the [GitHub Security tab](${securityLink}).`;

            let newBody;
            if (botComment) {
              // Append new summary to existing comment
              newBody = `${botComment.body}
            ---
            ## :hourglass: Trivy Scan Run at ${runTime}
      
            ${summary}${securityLine}`;
              // Update the existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: newBody,
              });
            } else {
              // Create a new comment for this service
              newBody = `${marker}
            ## :hourglass: Trivy Scan Run at ${runTime}
      
            ${summary}${securityLine}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: newBody,
              });
            }

      - name: Fail job if vulnerabilities were found
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "CRITICAL or HIGH vulnerabilities were found. Failing the job."
          exit 1

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: determine-matrix
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine-matrix.outputs.matrix).service }}
      fail-fast: false
    env:
      IMAGE_NAME: ${{ secrets.ACR_NAME }}.azurecr.io/ndm-${{ matrix.service }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca

      - name: Log in to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set build context
        id: set-context
        run: |
          if [ "${{ matrix.service }}" = "db-migrations" ]; then
            echo "CONTEXT=liquibase" >> $GITHUB_ENV
          else
            echo "CONTEXT=services/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      - name: Authenticate to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_SP_USERNAME }}
          password: ${{ secrets.AZURE_SP_PASSWORD }}

      - name: Create and use multi-arch builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build and Push Docker Image for ${{ matrix.service }} (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --secret id=git_token,env=GITOPS_USER_GITHUB_TOKEN \
            --cache-from type=gha,scope=${{ matrix.service }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.service }} \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:latest" \
            --push "$CONTEXT"
        env:
          GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          CONTEXT: ${{ env.CONTEXT }}