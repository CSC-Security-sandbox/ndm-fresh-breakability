name: Multi-Cloud Deployment

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Cloud provider to deploy to'
        required: true
        type: choice
        options:
          - azure
          - gcp
        default: 'gcp'
      name_prefix:
        description: "Name prefix for instances/VMs"
        required: false
        default: "admin"
      
      worker_count:
        description: "Number of worker nodes"
        required: false
        default: "2"
      
      cp_image:
        description: "Control plane image leave empty for latest"
        required: false
        default: ""
      
      worker_image:
        description: "Worker image leave empty for latest"
        required: false
        default: ""

      # Azure-specific inputs (only used for Azure)
      azure_admin_password:
        description: "Azure Admin Password (minimum 8 characters, must contain uppercase, lowercase, number, and special character)"
        required: true
        type: string
        default: "Welcome@123"
      username:
        description: 'Username for VM naming (required for Azure)'
        required: true
        type: string
        default: "admin"

jobs:
  route-deployment:
    runs-on: ubuntu-latest

    steps:
    - name: Display Selection
      run: |
        echo "🌩️ ===== MULTI-CLOUD DEPLOYMENT ===== 🌩️"
        echo "Selected cloud provider: ${{ github.event.inputs.cloud_provider }}"
        echo "Name prefix: ${{ github.event.inputs.name_prefix }}"
        echo "CP count: ${{ '1' }}"
        echo "Worker count: ${{ github.event.inputs.worker_count }}"
        echo "CP image: ${{ github.event.inputs.cp_image || 'latest' }}"
        echo "Worker image: ${{ github.event.inputs.worker_image || 'latest' }}"
        
        if [ "${{ github.event.inputs.cloud_provider }}" == "gcp" ]; then
          echo "🔵 GCP Configuration: Using default region and machine type"
        else
          echo "🔷 Azure Configuration:"
          echo "  Username: ${{ github.event.inputs.username }}"
          echo "  Admin Password: ******* (hidden)"
        fi
        echo "================================================="

  deploy-to-azure:
    if: ${{ github.event.inputs.cloud_provider == 'azure' }}
    needs: route-deployment
    uses: ./.github/workflows/azure-deploy.yml
    with:
      name_prefix: ${{ github.event.inputs.name_prefix }}
      worker_count: ${{ github.event.inputs.worker_count }}
      cp_image: ${{ github.event.inputs.cp_image }}
      worker_image: ${{ github.event.inputs.worker_image }}
      azure_admin_password: ${{ github.event.inputs.azure_admin_password }}
      username: ${{ github.event.inputs.username }}
    secrets: inherit

  deploy-to-gcp:
    if: ${{ github.event.inputs.cloud_provider == 'gcp' }}
    needs: route-deployment
    uses: ./.github/workflows/gcp-deploy.yml
    with:
      name_prefix: ${{ github.event.inputs.name_prefix }}
      worker_count: ${{ github.event.inputs.worker_count }}
      cp_image: ${{ github.event.inputs.cp_image }}
      worker_image: ${{ github.event.inputs.worker_image }}
    secrets: inherit
    
    

    

  deployment-summary:
    runs-on: ubuntu-latest
    needs: [deploy-to-gcp, deploy-to-azure]
    if: always()
    
    steps:
    - name: Final Summary
      run: |
        echo "🎉 ===== MULTI-CLOUD DEPLOYMENT COMPLETE ===== 🎉"
        echo ""
        echo "Selected Cloud: ${{ github.event.inputs.cloud_provider }}"
        echo "Name Prefix: ${{ github.event.inputs.name_prefix }}"
        echo "CP Count: 1"
        echo "Worker Count: ${{ github.event.inputs.worker_count }}"
        echo ""
        
        if [ "${{ needs.deploy-to-gcp.result }}" == "success" ]; then
          echo "✅ GCP Deployment: SUCCESS"
        elif [ "${{ needs.deploy-to-gcp.result }}" == "failure" ]; then
          echo "❌ GCP Deployment: FAILED"
        elif [ "${{ needs.deploy-to-gcp.result }}" == "skipped" ]; then
          echo "⏭️ GCP Deployment: SKIPPED (Azure was selected)"
        fi
        
        if [ "${{ needs.deploy-to-azure.result }}" == "success" ]; then
          echo "✅ Azure Deployment: SUCCESS"
        elif [ "${{ needs.deploy-to-azure.result }}" == "failure" ]; then
          echo "❌ Azure Deployment: FAILED"
        elif [ "${{ needs.deploy-to-azure.result }}" == "skipped" ]; then
          echo "⏭️ Azure Deployment: SKIPPED (GCP was selected)"
        fi
        
        echo ""
        echo "🚀 Multi-cloud deployment process completed!"