name: Run Performance Automation Tests for NDM on Azure

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  TERRAFORM_VERSION: 1.12.1
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0

on:
  workflow_dispatch:
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        required: true
        type: string
      run_smb_perf:
        description: 'Run SMB perf'
        required: false
        default: true
        type: boolean
      run_nfs_perf:
        description: 'Run NFS perf'
        required: false
        default: true
        type: boolean
      control_plane_vm_size:
        description: 'Control plane VM size (E8s_v5: 8vCPU/64GB, E16s_v5: 16vCPU/128GB, E32s_v5: 32vCPU/256GB, E64s_v5: 64vCPU/512GB)'
        required: false
        default: 'Standard_E8s_v5'
        type: choice
        options:
          - Standard_E8s_v5
          - Standard_E16s_v5
          - Standard_E32s_v5
          - Standard_E64s_v5
      linux_worker_vm_size:
        description: 'Linux worker VM size (E4s_v5: 4vCPU/32GB, E8s_v5: 8vCPU/64GB, E16s_v5: 16vCPU/128GB)'
        required: false
        default: 'Standard_E4s_v5'
        type: choice
        options:
          - Standard_E4s_v5
          - Standard_E8s_v5
          - Standard_E16s_v5
      windows_worker_vm_size:
        description: 'Windows worker VM size (E8s_v5: 8vCPU/64GB, E16s_v5: 16vCPU/128GB, E32s_v5: 32vCPU/256GB, E64s_v5: 64vCPU/512GB)'
        required: false
        default: 'Standard_E8s_v5'
        type: choice
        options:
          - Standard_E8s_v5
          - Standard_E16s_v5
          - Standard_E32s_v5
          - Standard_E64s_v5
      linux_worker_count:
        description: 'Number of Linux workers'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
      windows_worker_count:
        description: 'Number of Windows workers'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
      windows_defender_disable:
        description: 'Disable Windows Defender real-time monitoring'
        required: false
        default: true
        type: boolean
      windows_defender_ndm_exclusion:
        description: 'Add NDM mount path to Windows Defender exclusions'
        required: false
        default: false
        type: boolean
      smb_source_volumes:
        description: 'SMB source volumes (comma-separated)'
        required: false
        type: string
      smb_source_host_ip:
        description: 'SMB source host IP (comma-separated)'
        required: false
        type: string
      smb_destination_volumes:
        description: 'SMB destination volumes (comma-separated)'
        required: false
        type: string
      smb_destination_host_ip:
        description: 'SMB destination host IP (comma-separated)'
        required: false
        type: string
      smb_dataset_size:
        description: 'SMB dataset size (e.g., "28038.02 MiB")'
        required: false
        type: string
      nfs_source_volumes:
        description: 'NFS source volumes (comma-separated)'
        required: false
        type: string
      nfs_source_host_ip:
        description: 'NFS source host IP (comma-separated)'
        required: false
        type: string
      nfs_destination_volumes:
        description: 'NFS destination volumes (comma-separated)'
        required: false
        type: string
      nfs_destination_host_ip:
        description: 'NFS destination host IP (comma-separated)'
        required: false
        type: string
      nfs_dataset_size:
        description: 'NFS dataset size (e.g., "28810.77 MiB")'
        required: false
        type: string

  workflow_call: 
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        type: string
      run_smb_perf:
        description: 'Whether to run SMB perf (true/false)'
        required: false
        default: true
        type: boolean
      run_nfs_perf:
        description: 'Whether to run NFS perf (true/false)'
        required: false
        default: true
        type: boolean
      control_plane_vm_size:
        description: 'Control plane VM size'
        required: false
        default: 'Standard_E8s_v5'
        type: string
      linux_worker_vm_size:
        description: 'Linux worker VM size'
        required: false
        default: 'Standard_E4s_v5'
        type: string
      windows_worker_vm_size:
        description: 'Windows worker VM size'
        required: false
        default: 'Standard_E8s_v5'
        type: string
      linux_worker_count:
        description: 'Number of Linux workers'
        required: false
        default: 1
        type: number
      windows_worker_count:
        description: 'Number of Windows workers'
        required: false
        default: 1
        type: number
      windows_defender_disable:
        description: 'Disable Windows Defender real-time monitoring'
        required: false
        default: true
        type: boolean
      windows_defender_ndm_exclusion:
        description: 'Add NDM mount path to Windows Defender exclusions'
        required: false
        default: false
        type: boolean
      smb_source_volumes:
        description: 'SMB source volumes'
        required: false
        type: string
      smb_source_host_ip:
        description: 'SMB source host IP'
        required: false
        type: string
      smb_destination_volumes:
        description: 'SMB destination volumes'
        required: false
        type: string
      smb_destination_host_ip:
        description: 'SMB destination host IP'
        required: false
        type: string
      smb_dataset_size:
        description: 'SMB dataset size'
        required: false
        type: string
      nfs_source_volumes:
        description: 'NFS source volumes'
        required: false
        type: string
      nfs_source_host_ip:
        description: 'NFS source host IP'
        required: false
        type: string
      nfs_destination_volumes:
        description: 'NFS destination volumes'
        required: false
        type: string
      nfs_destination_host_ip:
        description: 'NFS destination host IP'
        required: false
        type: string
      nfs_dataset_size:
        description: 'NFS dataset size'
        required: false
        type: string

permissions: 
  contents: read

jobs:
  setup-infrastructure:
    name: Setup Infrastructure and Services
    runs-on: openlab
    outputs:
      control_plane_vm_ip_address: ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}
      linux_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.linux_worker_vm_ip_addresses }}
      windows_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}
      control_plane_vm_size: ${{ steps.vm-config.outputs.control_plane_vm_size }}
      linux_worker_vm_size: ${{ steps.vm-config.outputs.linux_worker_vm_size }}
      windows_worker_vm_size: ${{ steps.vm-config.outputs.windows_worker_vm_size }}
      linux_worker_count: ${{ steps.vm-config.outputs.linux_worker_count }}
      windows_worker_count: ${{ steps.vm-config.outputs.windows_worker_count }}
    steps:
      
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials
        id: credentials
        run: |
          mkdir -p $GITHUB_WORKSPACE/credentials

          echo "Setting VM credentials..."
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)

          # Write to GITHUB_ENV
          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          # Azure Provider Credentials
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
        
          CONTROL_PLANE_IMAGE="${{ inputs.control_plane_image_version || github.event.inputs.control_plane_image_version }}"
          WORKER_IMAGE="${{ inputs.worker_image_version || github.event.inputs.worker_image_version }}"

          # Azure Terraform Variables
          echo "TF_VAR_control_plane_image_version=$CONTROL_PLANE_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_worker_image_version=$WORKER_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_vm_owner=${{ github.actor }}" >> $GITHUB_ENV
          echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV
          echo "TF_VAR_dns_servers=${{ vars.AZURE_WIN_DNS_SERVERS }}" >> $GITHUB_ENV
          
          # Network Configuration will be passed via -var flags
          echo "Using VNet: MigrationAsAService-dev-VNET01"
          echo "Using Subnet: MigrationAsAService-dev-Subnet01"

      - name: Initialize Terraform
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform init

      - name: Validate Terraform Configuration
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform validate

      - name: Create Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform plan -out=tfplan \
            -var="linux_worker_count=${{ inputs.linux_worker_count || github.event.inputs.linux_worker_count || 1 }}" \
            -var="windows_worker_count=${{ inputs.windows_worker_count || github.event.inputs.windows_worker_count || 1 }}" \
            -var="worker_vm_size=${{ inputs.linux_worker_vm_size || github.event.inputs.linux_worker_vm_size || 'Standard_E4s_v5' }}" \
            -var="windows_worker_vm_size=${{ inputs.windows_worker_vm_size || github.event.inputs.windows_worker_vm_size || 'Standard_E8s_v5' }}" \
            -var="control_plane_vm_size=${{ inputs.control_plane_vm_size || github.event.inputs.control_plane_vm_size || 'Standard_E8s_v5' }}"

      - name: Apply Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform apply -auto-approve tfplan
      
      - name: Save VM Configuration Info
        id: vm-config
        run: |
          echo "control_plane_vm_size=${{ inputs.control_plane_vm_size || github.event.inputs.control_plane_vm_size || 'Standard_E8s_v5' }}" >> $GITHUB_OUTPUT
          echo "linux_worker_vm_size=${{ inputs.linux_worker_vm_size || github.event.inputs.linux_worker_vm_size || 'Standard_E4s_v5' }}" >> $GITHUB_OUTPUT
          echo "windows_worker_vm_size=${{ inputs.windows_worker_vm_size || github.event.inputs.windows_worker_vm_size || 'Standard_E8s_v5' }}" >> $GITHUB_OUTPUT
          echo "linux_worker_count=${{ inputs.linux_worker_count || github.event.inputs.linux_worker_count || 1 }}" >> $GITHUB_OUTPUT
          echo "windows_worker_count=${{ inputs.windows_worker_count || github.event.inputs.windows_worker_count || 1 }}" >> $GITHUB_OUTPUT

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: terraform-state
          path: |
            app-deployment/terraform/azure/environments/api/terraform.tfstate
            app-deployment/terraform/azure/environments/api/.terraform.lock.hcl
            app-deployment/terraform/azure/environments/api/.terraform

      - name: Extract Deployment Information
        id: deployment-info
        run: |
          cd app-deployment/terraform/azure/environments/api
          CONTROL_PLANE_IP=$(terraform output -raw control_plane_private_ip)
          LINUX_WORKER_IPS=$(terraform output -json linux_worker_private_ips | jq -c .)
          WINDOWS_WORKER_IPS=$(terraform output -json windows_worker_private_ips | jq -c .)
          echo "windows_worker_vm_ip_addresses=$WINDOWS_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "control_plane_vm_ip_address=$CONTROL_PLANE_IP" >> $GITHUB_OUTPUT
          echo "linux_worker_vm_ip_addresses=$LINUX_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "Control Plane IP: $CONTROL_PLANE_IP"
          echo "Linux Worker IPs (NFS): $LINUX_WORKER_IPS"
          echo "Windows Worker IPs (SMB): $WINDOWS_WORKER_IPS"

      - name: Install sshpass
        run: |
          echo "Installing sshpass..."
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          echo "sshpass installed successfully."

      - name: Download Windows installer
        if: ${{ inputs.run_smb_perf == true || github.event.inputs.run_smb_perf == 'true' }}
        run: |
          WINDOWS_INSTALLER_URL="${{ inputs.windows_worker_installer_url || github.event.inputs.windows_worker_installer_url }}"
          if [ -n "$WINDOWS_INSTALLER_URL" ]; then
            echo "Downloading Windows installer from: $WINDOWS_INSTALLER_URL"
            curl -s -o "windows-worker-installer.exe" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
              "$WINDOWS_INSTALLER_URL"
            
            if [ ! -f "windows-worker-installer.exe" ] || [ ! -s "windows-worker-installer.exe" ]; then
              echo "Error: Failed to download Windows installer or file is empty"
              exit 1
            fi
            echo "Windows installer downloaded successfully."
          else
            echo "No Windows installer URL provided, skipping download"
          fi

      - name: Copy Windows installer to Windows VMs
        if: ${{ inputs.run_smb_perf == true || github.event.inputs.run_smb_perf == 'true' }}
        run: |
          WINDOWS_IPS='${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}'
          
          if [ ! -f "windows-worker-installer.exe" ]; then
            echo "Windows installer file not found, skipping copy to Windows VMs"
            exit 0
          fi
          
          WINDOWS_IP_ARRAY=($(echo "$WINDOWS_IPS" | jq -r '.[]'))
          
          if [ ${#WINDOWS_IP_ARRAY[@]} -eq 0 ]; then
            echo "No Windows VM IP addresses found, skipping copy"
            exit 0
          fi
          
          echo "Found ${#WINDOWS_IP_ARRAY[@]} Windows VM(s), copying installer to each..."
          
          for i in "${!WINDOWS_IP_ARRAY[@]}"; do
            WINDOWS_IP="${WINDOWS_IP_ARRAY[$i]}"
            echo "$WINDOWS_IP"
            VM_INDEX=$((i + 1))
            
            echo "Copying Windows installer to Windows VM #$VM_INDEX at $WINDOWS_IP"
            if SSHPASS="$VM_PASSWORD" sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              windows-worker-installer.exe "$VM_USERNAME@$WINDOWS_IP:/C:/Temp/"; then
              echo "Windows installer copied successfully to Windows VM #$VM_INDEX ($WINDOWS_IP)"
            else
              echo "Failed to copy Windows installer to Windows VM #$VM_INDEX ($WINDOWS_IP)"
              # Continue with other VMs instead of failing completely
            fi
          done
          
          echo "Completed copying Windows installer to all available Windows VMs"

      - name: Configure Windows Defender
        if: ${{ inputs.run_smb_perf == true || github.event.inputs.run_smb_perf == 'true' }}
        run: |
          WINDOWS_IPS='${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}'
          DEFENDER_DISABLE="${{ inputs.windows_defender_disable || github.event.inputs.windows_defender_disable || 'true' }}"
          DEFENDER_NDM_EXCLUSION="${{ inputs.windows_defender_ndm_exclusion || github.event.inputs.windows_defender_ndm_exclusion || 'false' }}"
          
          WINDOWS_IP_ARRAY=($(echo "$WINDOWS_IPS" | jq -r '.[]'))
          
          if [ ${#WINDOWS_IP_ARRAY[@]} -eq 0 ]; then
            echo "No Windows VM IP addresses found, skipping Windows Defender configuration"
            exit 0
          fi
          
          echo "Configuring Windows Defender on ${#WINDOWS_IP_ARRAY[@]} Windows VM(s)..."
          echo "  - Disable Real-Time Monitoring: $DEFENDER_DISABLE"
          echo "  - Add NDM Path Exclusion: $DEFENDER_NDM_EXCLUSION"
          
          for i in "${!WINDOWS_IP_ARRAY[@]}"; do
            WINDOWS_IP="${WINDOWS_IP_ARRAY[$i]}"
            VM_INDEX=$((i + 1))
            
            echo "Configuring Windows Defender on Windows VM #$VM_INDEX at $WINDOWS_IP"
            
            # Build PowerShell command
            PS_CMD=""
            
            if [ "$DEFENDER_DISABLE" = "true" ]; then
              # Disable Windows Defender Real-Time Monitoring
              PS_CMD="Set-MpPreference -DisableRealtimeMonitoring \\$true; Write-Host 'Windows Defender Real-Time Monitoring Disabled'"
            else
              # Enable Windows Defender Real-Time Monitoring
              PS_CMD="Set-MpPreference -DisableRealtimeMonitoring \\$false; Write-Host 'Windows Defender Real-Time Monitoring Enabled'"
            fi
            
            if [ "$DEFENDER_NDM_EXCLUSION" = "true" ]; then
              # Add NDM mount path to exclusions
              PS_CMD="$PS_CMD; Add-MpPreference -ExclusionPath 'C:\\datamigrator\\mnt'; Write-Host 'Added NDM path to Defender exclusions'"
            fi
            
            DEFENDER_CMD="powershell.exe -Command \"$PS_CMD\""
            
            if SSHPASS="$VM_PASSWORD" sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "$VM_USERNAME@$WINDOWS_IP" "$DEFENDER_CMD"; then
              echo "Windows Defender configured successfully on Windows VM #$VM_INDEX ($WINDOWS_IP)"
            else
              echo "Warning: Failed to configure Windows Defender on Windows VM #$VM_INDEX ($WINDOWS_IP)"
              # Continue with other VMs instead of failing completely
            fi
          done
          
          echo "Completed Windows Defender configuration on all Windows VMs"

      - name: Wait for Service Boot Setup to Complete
        run: |
          echo "Monitoring service boot setup on ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}..."
          
          # Ensure script is executable
          chmod +x ./app-deployment/scripts/service_check.sh
          
          # Run the service_check.sh script to wait for the microk8s-boot service to complete
          ./app-deployment/scripts/service_check.sh \
          "${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}" \
          "$VM_USERNAME" \
          "$VM_PASSWORD"

          if [ $? -ne 0 ]; then
            echo "Service setup failed or timed out"
            exit 1
          fi
          
          echo "Service setup completed successfully"

  run-smb-perf:
    name: Run SMB Performance Tests
    runs-on: openlab
    needs: setup-infrastructure
    if: ${{ inputs.run_smb_perf == true || github.event.inputs.run_smb_perf == 'true' }}
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}

      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      PERF_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      PERF_SMB_NDM_WORKERS_PORT: ${{ vars.PERF_SMB_NDM_WORKERS_PORT }}
      PERF_SMB_SOURCE_VOLUMES: ${{ inputs.smb_source_volumes || github.event.inputs.smb_source_volumes || vars.PERF_SMB_SOURCE_VOLUMES }}
      PERF_SMB_DESTINATION_VOLUMES: ${{ inputs.smb_destination_volumes || github.event.inputs.smb_destination_volumes || vars.PERF_SMB_DESTINATION_VOLUMES }}
      PERF_SMB_SOURCE_HOST_IP: ${{ inputs.smb_source_host_ip || github.event.inputs.smb_source_host_ip || vars.PERF_SMB_SOURCE_HOST_IP }}
      PERF_SMB_DESTINATION_HOST_IP: ${{ inputs.smb_destination_host_ip || github.event.inputs.smb_destination_host_ip || vars.PERF_SMB_DESTINATION_HOST_IP }}
      PERF_SMB_PROTOCOL_USERNAME: ${{ secrets.PERF_SMB_PROTOCOL_USERNAME }}
      PERF_SMB_PROTOCOL_PASSWORD: ${{ secrets.PERF_SMB_PROTOCOL_PASSWORD }}
      PERF_SMB_EXECUTABLE_FILENAME: ${{ vars.SMB_EXECUTABLE_FILENAME }}
      PERF_SMB_DATASET_SIZE: ${{ inputs.smb_dataset_size || github.event.inputs.smb_dataset_size || '28038.02 MiB' }}
      
      # VM Configuration
      PERF_CONTROL_PLANE_VM_SIZE: ${{ needs.setup-infrastructure.outputs.control_plane_vm_size }}
      PERF_WORKER_VM_SIZE: ${{ needs.setup-infrastructure.outputs.windows_worker_vm_size }}
      PERF_WORKER_COUNT: ${{ needs.setup-infrastructure.outputs.windows_worker_count }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup credentials for SMB tests
        run: |

          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "PERF_SMB_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "PERF_SMB_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV
      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "Ginkgo and Gomega installed successfully."

      - name: Run SMB Performance Test
        run: |
          cd ndm-api-tests
          chmod +x ./run-smb-azure-perf.sh
          ./run-smb-azure-perf.sh
        continue-on-error: true

  run-nfs-perf:
    name: Run NFS Performance Tests
    runs-on: openlab
    needs: setup-infrastructure
    if: ${{ inputs.run_nfs_perf == true || github.event.inputs.run_nfs_perf == 'true' }}
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      PERF_NFS_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.linux_worker_vm_ip_addresses), ',') }}
      PERF_NFS_NDM_WORKERS_PORT: ${{ vars.PERF_NFS_NDM_WORKERS_PORT }}
      PERF_NFS_SOURCE_VOLUMES: ${{ inputs.nfs_source_volumes || github.event.inputs.nfs_source_volumes || vars.PERF_NFS_SOURCE_VOLUMES }}
      PERF_NFS_DESTINATION_VOLUMES: ${{ inputs.nfs_destination_volumes || github.event.inputs.nfs_destination_volumes || vars.PERF_NFS_DESTINATION_VOLUMES }}
      PERF_NFS_SOURCE_HOST_IP: ${{ inputs.nfs_source_host_ip || github.event.inputs.nfs_source_host_ip || vars.PERF_NFS_SOURCE_HOST_IP }}
      PERF_NFS_DESTINATION_HOST_IP: ${{ inputs.nfs_destination_host_ip || github.event.inputs.nfs_destination_host_ip || vars.PERF_NFS_DESTINATION_HOST_IP }}
      PERF_NFS_PROTOCOL_USERNAME: ${{ vars.PERF_NFS_PROTOCOL_USERNAME }}
      PERF_NFS_DATASET_SIZE: ${{ inputs.nfs_dataset_size || github.event.inputs.nfs_dataset_size || '28810.77 MiB' }}
      
      PERF_CONTROL_PLANE_VM_SIZE: ${{ needs.setup-infrastructure.outputs.control_plane_vm_size }}
      PERF_WORKER_VM_SIZE: ${{ needs.setup-infrastructure.outputs.linux_worker_vm_size }}
      PERF_WORKER_COUNT: ${{ needs.setup-infrastructure.outputs.linux_worker_count }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Waiting
        run: |
          sleep 30
          echo "Wait completed"

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup credentials for NFS tests
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "PERF_NFS_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "PERF_NFS_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV

      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "Ginkgo and Gomega installed successfully."

      - name: Run NFS Performance Test
        run: |
          cd ndm-api-tests
          chmod +x ./run-nfs-azure-perf.sh
          ./run-nfs-azure-perf.sh
        continue-on-error: true

  cleanup:
    name: Cleanup Infrastructure
    runs-on: openlab
    needs: [setup-infrastructure, run-nfs-perf, run-smb-perf]
    if: always()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials for Cleanup
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          # Azure Provider Credentials
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
        
          CONTROL_PLANE_IMAGE="${{ inputs.control_plane_image_version || github.event.inputs.control_plane_image_version }}"
          WORKER_IMAGE="${{ inputs.worker_image_version || github.event.inputs.worker_image_version }}"

          # Azure Terraform Variables
          echo "TF_VAR_control_plane_image_version=$CONTROL_PLANE_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_worker_image_version=$WORKER_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_vm_owner=${{ github.actor }}" >> $GITHUB_ENV
          echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV
          echo "TF_VAR_dns_servers=${{ vars.AZURE_WIN_DNS_SERVERS }}" >> $GITHUB_ENV

      - name: Download Terraform State
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: terraform-state
          path: app-deployment/terraform/azure/environments/api

      - name: Initialize Terraform for Cleanup
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform init

      - name: Destroy Terraform Resources
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform destroy -auto-approve \
            -var="linux_worker_count=${{ inputs.linux_worker_count || github.event.inputs.linux_worker_count || 1 }}" \
            -var="windows_worker_count=${{ inputs.windows_worker_count || github.event.inputs.windows_worker_count || 1 }}" \
            -var="worker_vm_size=${{ inputs.linux_worker_vm_size || github.event.inputs.linux_worker_vm_size || 'Standard_E4s_v5' }}" \
            -var="windows_worker_vm_size=${{ inputs.windows_worker_vm_size || github.event.inputs.windows_worker_vm_size || 'Standard_E8s_v5' }}" \
            -var="control_plane_vm_size=${{ inputs.control_plane_vm_size || github.event.inputs.control_plane_vm_size || 'Standard_E8s_v5' }}"

      - name: Clean Up Temporary Files
        run: |
          rm -rf $GITHUB_WORKSPACE/credentials 2>/dev/null || true