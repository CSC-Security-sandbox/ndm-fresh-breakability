name: Build and Push to ACR on PR Merge

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (one of: db-writer, keycloak-customizations, reports-service, worker, admin-service, config-service, datamigrator-ui, jobs-service)'
        required: true
        default: 'db-writer'

permissions: 
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set a variable for the service (from the workflow_dispatch input)
      - name: Set Service Variable
        id: set_service
        run: |
          echo "SERVICE=${{ github.event.inputs.service }}" >> $GITHUB_ENV

      # Authenticate to Azure
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Authenticate to Azure Container Registry
      - name: Authenticate to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_SP_USERNAME }}
          password: ${{ secrets.AZURE_SP_PASSWORD }}

      # Set up QEMU for cross-architecture builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Set up Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build and push multi-platform Docker image based on the service input
      - name: Build and Push Multi-Platform Docker Image
        run: |
          # Set the image name
          IMAGE_NAME="${{ secrets.ACR_NAME }}.azurecr.io/mono-ndm-${{ env.SERVICE }}"
          echo "Building Docker image for service: ${{ env.SERVICE }} with tags"
          echo "Image tags:"
          echo "$IMAGE_NAME:${{ github.sha }}"
          echo "$IMAGE_NAME:latest"

          # Build and push the image using buildx.
          docker buildx build --platform linux/amd64,linux/arm64 --secret id=git_token,env=GITOPS_USER_GITHUB_TOKEN \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            -t "$IMAGE_NAME:latest" \
            --push "services/${{ env.SERVICE }}"
        env:
          GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
