name: Run Upgrade E2E Tests for NDM on Azure

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  TERRAFORM_VERSION: 1.12.1
  NODE_VERSION: 22.15.0
  GO_VERSION: 1.24.2

on:
  workflow_dispatch:
    inputs:
      old_cp_image_version:
        description: 'Previous CP image version to provision (pre-upgrade)'
        required: true
        type: string
      old_worker_image_version:
        description: 'Previous worker image version to provision (pre-upgrade)'
        required: true
        type: string
      old_windows_worker_installer_url:
        description: 'Previous Windows installer Artifactory URL (pre-upgrade, optional)'
        required: false
        type: string
      upgrade_bundle_path:
        description: 'Artifactory path to the upgrade bundle tar.gz (e.g. cicd/ndm/builds/nightly/<ver>/upgrade-<ver>.tar.gz)'
        required: true
        type: string
      build_version:
        description: 'New build version being upgraded to'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      volume_clone_provider:
        description: 'Volume clone backend for the pre/post-upgrade migration tests (anf/ontap)'
        required: false
        default: 'anf'
        type: string

  workflow_call:
    inputs:
      old_cp_image_version:
        description: 'Previous CP image version to provision (pre-upgrade)'
        required: true
        type: string
      old_worker_image_version:
        description: 'Previous worker image version to provision (pre-upgrade)'
        required: true
        type: string
      old_windows_worker_installer_url:
        description: 'Previous Windows installer Artifactory URL (pre-upgrade, optional)'
        required: false
        type: string
      upgrade_bundle_path:
        description: 'Artifactory path to the upgrade bundle tar.gz'
        required: true
        type: string
      build_version:
        description: 'New build version being upgraded to'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      volume_clone_provider:
        description: 'Volume clone backend for the pre/post-upgrade migration tests (anf/ontap)'
        required: false
        default: 'anf'
        type: string

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Provision Azure VMs using the PREVIOUS nightly images
  # ---------------------------------------------------------------------------
  setup-infrastructure:
    name: Provision VMs with Previous-Version Images
    runs-on: openlab
    outputs:
      control_plane_vm_ip_address: ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}
      linux_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.linux_worker_vm_ip_addresses }}
      windows_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)

          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV

          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

          # Provision with the PREVIOUS (pre-upgrade) image versions
          OLD_CP_IMAGE="${{ inputs.old_cp_image_version || github.event.inputs.old_cp_image_version }}"
          OLD_WORKER_IMAGE="${{ inputs.old_worker_image_version || github.event.inputs.old_worker_image_version }}"
          echo "TF_VAR_control_plane_image_version=$OLD_CP_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_worker_image_version=$OLD_WORKER_IMAGE" >> $GITHUB_ENV

          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          echo "TF_VAR_vm_owner=NDM-Upgrade-E2E-$TIMESTAMP" >> $GITHUB_ENV
          echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV
          echo "TF_VAR_dns_servers=${{ vars.AZURE_WIN_DNS_SERVERS }}" >> $GITHUB_ENV

      - name: Initialize Terraform
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform init

      - name: Validate Terraform Configuration
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform validate

      - name: Create Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform plan -out=tfplan

      - name: Apply Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform apply -auto-approve tfplan

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: upgrade-e2e-terraform-state
          path: |
            app-deployment/terraform/azure/environments/api/terraform.tfstate
            app-deployment/terraform/azure/environments/api/.terraform.lock.hcl
            app-deployment/terraform/azure/environments/api/.terraform

      - name: Extract Deployment Information
        id: deployment-info
        run: |
          cd app-deployment/terraform/azure/environments/api
          CONTROL_PLANE_IP=$(terraform output -raw control_plane_private_ip)
          LINUX_WORKER_IPS=$(terraform output -json linux_worker_private_ips | jq -c .)
          WINDOWS_WORKER_IPS=$(terraform output -json windows_worker_private_ips | jq -c .)
          echo "control_plane_vm_ip_address=$CONTROL_PLANE_IP" >> $GITHUB_OUTPUT
          echo "linux_worker_vm_ip_addresses=$LINUX_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "windows_worker_vm_ip_addresses=$WINDOWS_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "Control Plane IP : $CONTROL_PLANE_IP"
          echo "Linux Worker IPs : $LINUX_WORKER_IPS"
          echo "Windows Worker IPs: $WINDOWS_WORKER_IPS"

      - name: Install sshpass
        run: |
          for i in {1..60}; do
            if sudo apt-get update -qq 2>/dev/null; then break; fi
            echo "Waiting for apt locks... ($i/60)"; sleep 5
          done
          sudo apt-get install -y sshpass || {
            sudo pkill -9 unattended-upgrade 2>/dev/null || true
            sleep 5
            sudo apt-get install -y sshpass
          }
          echo "sshpass installed successfully."

      - name: Install previous Windows worker on Windows VMs
        run: |
          OLD_INSTALLER_URL="${{ inputs.old_windows_worker_installer_url || github.event.inputs.old_windows_worker_installer_url }}"
          WINDOWS_IPS='${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}'

          if [ -z "$OLD_INSTALLER_URL" ]; then
            echo "No previous Windows installer URL provided — skipping pre-upgrade Windows worker installation"
            exit 0
          fi

          echo "Downloading previous Windows worker installer from: $OLD_INSTALLER_URL"
          curl -s -o "prev-windows-worker-installer.exe" \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            "$OLD_INSTALLER_URL"

          if [ ! -s "prev-windows-worker-installer.exe" ]; then
            echo "WARNING: Downloaded file is empty or missing, skipping copy"
            exit 0
          fi

          WINDOWS_IP_ARRAY=($(echo "$WINDOWS_IPS" | jq -r '.[]'))
          if [ ${#WINDOWS_IP_ARRAY[@]} -eq 0 ]; then
            echo "No Windows VM IPs found, skipping"
            exit 0
          fi

          for WINDOWS_IP in "${WINDOWS_IP_ARRAY[@]}"; do
            echo "Copying previous installer to Windows VM at $WINDOWS_IP..."
            SSHPASS="$VM_PASSWORD" sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              prev-windows-worker-installer.exe "$VM_USERNAME@$WINDOWS_IP:/C:/Temp/" || \
              echo "WARNING: Failed to copy to $WINDOWS_IP (continuing)"
          done

      - name: Wait for Service Boot Setup to Complete
        run: |
          echo "Waiting for old NDM version to boot on ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}..."
          chmod +x ./app-deployment/scripts/service_check.sh
          ./app-deployment/scripts/service_check.sh \
            "${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}" \
            "$VM_USERNAME" \
            "$VM_PASSWORD"
          if [ $? -ne 0 ]; then
            echo "Service setup failed or timed out"
            exit 1
          fi
          echo "Old NDM version is running — ready for upgrade."

  # ---------------------------------------------------------------------------
  # Job 2: Pre-upgrade migration — attach NFS (Linux) + SMB (Windows) workers on
  # the OLD build and run a single migration (TC-001) per protocol. Workers are
  # intentionally LEFT ATTACHED (SKIP_WORKER_CLEANUP=true) so the in-place worker
  # upgrade has registered workers to act on and can be validated afterwards.
  # ---------------------------------------------------------------------------
  pre-upgrade-e2e:
    name: Pre-Upgrade Migration + Attach Workers (NFS & SMB)
    runs-on: openlab
    needs: setup-infrastructure
    env:
      CLOUD_PROVIDER: azure
      CLOUD_ENVIRONMENT: Azure
      VOLUME_CLONE_PROVIDER: ${{ inputs.volume_clone_provider || github.event.inputs.volume_clone_provider || 'anf' }}
      SKIP_WORKER_CLEANUP: 'true'
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}
      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_SP_USERNAME }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_SP_PASSWORD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # NFS (Linux) worker + ANF volume config
      AZURE_NFS_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.linux_worker_vm_ip_addresses), ',') }}
      AZURE_NFS_NDM_WORKERS_PORT: ${{ vars.AZURE_NFS_NDM_WORKERS_PORT }}
      AZURE_NFS_SOURCE_VOLUMES: ${{ vars.AZURE_NFS_SOURCE_VOLUMES }}
      AZURE_NFS_DEST_VOLUMES: ${{ vars.AZURE_NFS_DEST_VOLUMES }}
      AZURE_NFS_SOURCE_HOST_IP: ${{ vars.AZURE_NFS_SOURCE_HOST_IP }}
      AZURE_NFS_DESTINATION_HOST_IP: ${{ vars.AZURE_NFS_DESTINATION_HOST_IP }}
      AZURE_ANF_NFS_SOURCE_RESOURCE_GROUP: ${{ vars.AZURE_ANF_NFS_SOURCE_RESOURCE_GROUP }}
      AZURE_ANF_NFS_SOURCE_ACCOUNT_NAME: ${{ vars.AZURE_ANF_NFS_SOURCE_ACCOUNT_NAME }}
      AZURE_ANF_NFS_SOURCE_POOL_NAME: ${{ vars.AZURE_ANF_NFS_SOURCE_POOL_NAME }}
      AZURE_ANF_NFS_DEST_RESOURCE_GROUP: ${{ vars.AZURE_ANF_NFS_DEST_RESOURCE_GROUP }}
      AZURE_ANF_NFS_DEST_ACCOUNT_NAME: ${{ vars.AZURE_ANF_NFS_DEST_ACCOUNT_NAME }}
      AZURE_ANF_NFS_DEST_POOL_NAME: ${{ vars.AZURE_ANF_NFS_DEST_POOL_NAME }}
      AZURE_NFS_PROTOCOL_USERNAME: ${{ vars.AZURE_NFS_PROTOCOL_USERNAME }}
      # SMB (Windows) worker + ANF volume config
      AZURE_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      AZURE_SMB_NDM_WORKERS_PORT: ${{ vars.AZURE_SMB_NDM_WORKERS_PORT }}
      AZURE_SMB_SOURCE_VOLUMES: ${{ vars.AZURE_SMB_SOURCE_VOLUMES }}
      AZURE_SMB_DEST_VOLUMES: ${{ vars.AZURE_SMB_DEST_VOLUMES }}
      AZURE_SMB_SOURCE_HOST_IP: ${{ vars.AZURE_SMB_SOURCE_HOST_IP }}
      AZURE_SMB_DESTINATION_HOST_IP: ${{ vars.AZURE_SMB_DESTINATION_HOST_IP }}
      AZURE_SMB_DOMAIN_NAME: ${{ vars.AZURE_SMB_DOMAIN_NAME }}
      AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP }}
      AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME }}
      AZURE_ANF_SMB_SOURCE_POOL_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_POOL_NAME }}
      AZURE_ANF_SMB_DEST_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_DEST_RESOURCE_GROUP }}
      AZURE_ANF_SMB_DEST_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_DEST_ACCOUNT_NAME }}
      AZURE_ANF_SMB_DEST_POOL_NAME: ${{ vars.AZURE_ANF_SMB_DEST_POOL_NAME }}
      AZURE_SMB_PROTOCOL_USERNAME: ${{ secrets.AZURE_SMB_PROTOCOL_USERNAME }}
      AZURE_SMB_PROTOCOL_PASSWORD: ${{ secrets.AZURE_SMB_PROTOCOL_PASSWORD }}
      # Pre-upgrade SMB worker is installed from the OLD installer copied to the VM in setup
      SMB_EXECUTABLE_FILENAME: 'C:\Temp\prev-windows-worker-installer.exe'
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup worker SSH credentials
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV

      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV

      - name: Wait for Windows worker SSH to be ready
        run: |
          WINDOWS_IPS='${{ needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses }}'
          for ip in $(echo "$WINDOWS_IPS" | jq -r '.[]'); do
            echo "Waiting for SSH (22) on Windows VM $ip..."
            for i in $(seq 1 60); do
              if timeout 5 bash -c "</dev/tcp/$ip/22" 2>/dev/null; then
                echo "SSH is up on $ip"; break
              fi
              sleep 10
            done
          done

      - name: Pre-upgrade NFS migration (TC-001) + attach Linux workers
        run: |
          cd ndm-api-tests
          ginkgo run -v --focus="TC-001" --timeout=2h ./tests/e2e -- \
            --protocol_type=NFS --environment=Azure

      - name: Pre-upgrade SMB migration (TC-001) + attach Windows workers
        run: |
          cd ndm-api-tests
          ginkgo run -v --focus="TC-001" --timeout=2h ./tests/e2e -- \
            --protocol_type=SMB --environment=Azure

      - name: Upload pre-upgrade test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pre-upgrade-e2e-logs-${{ github.run_id }}
          path: ndm-api-tests/reports/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Upload upgrade bundle via NDM API and trigger upgrade
  # ---------------------------------------------------------------------------
  run-upgrade:
    name: Upload Bundle and Trigger Upgrade via API
    runs-on: openlab
    needs: [setup-infrastructure, pre-upgrade-e2e]
    env:
      CP_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CHUNK_SIZE: 15728640  # 15 MB — matches server default
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download upgrade bundle from Artifactory
        run: |
          BUILD_VERSION="${{ inputs.build_version || github.event.inputs.build_version }}"
          BUNDLE_PATH="${{ inputs.upgrade_bundle_path || github.event.inputs.upgrade_bundle_path }}"
          BUNDLE_FILENAME="upgrade-${BUILD_VERSION}.tar.gz"

          echo "Downloading upgrade bundle: ${BUNDLE_PATH}"
          curl --silent --show-error --fail \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            -o "${BUNDLE_FILENAME}" \
            "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${BUNDLE_PATH}"

          SIZE=$(stat -c%s "${BUNDLE_FILENAME}")
          echo "Bundle downloaded: ${BUNDLE_FILENAME} ($(numfmt --to=iec ${SIZE}))"
          echo "BUNDLE_FILENAME=${BUNDLE_FILENAME}" >> $GITHUB_ENV
          echo "BUNDLE_SIZE=${SIZE}" >> $GITHUB_ENV

      - name: Authenticate with Keycloak
        run: |
          BASE_URL="https://${CP_IP}"
          NDM_USERNAME="${{ secrets.NDM_APP_USERNAME }}"
          NDM_PASSWORD="${{ secrets.NDM_APP_PASSWORD }}"

          echo "Fetching bearer token from Keycloak at ${BASE_URL}..."
          TOKEN_RESPONSE=$(curl -k --silent --show-error \
            -X POST "${BASE_URL}/keycloak/realms/datamigrator/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=datamigrator-client&grant_type=password&username=${NDM_USERNAME}&password=${NDM_PASSWORD}")

          TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to get token. Response: ${TOKEN_RESPONSE}"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "NDM_TOKEN=${TOKEN}" >> $GITHUB_ENV
          echo "Token obtained successfully."

      - name: Initialize upload session
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"
          BUILD_VERSION="${{ inputs.build_version || github.event.inputs.build_version }}"

          echo "Initializing upload: ${BUNDLE_FILENAME} (${BUNDLE_SIZE} bytes)..."
          INIT_RESPONSE=$(curl -k --silent --show-error \
            -X POST "${BASE_URL}/init" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NDM_TOKEN}" \
            -d "{\"fileName\":\"${BUNDLE_FILENAME}\",\"fileSize\":${BUNDLE_SIZE}}")

          echo "Init response: $(echo ${INIT_RESPONSE} | jq -c .)"

          UPLOAD_ID=$(echo "${INIT_RESPONSE}" | jq -r '.data.items.uploadId // .data.uploadId // .uploadId // empty')
          TOTAL_CHUNKS=$(echo "${INIT_RESPONSE}" | jq -r '.data.items.totalChunks // .data.totalChunks // .totalChunks // empty')
          SERVER_CHUNK_SIZE=$(echo "${INIT_RESPONSE}" | jq -r '.data.items.chunkSize // .data.chunkSize // .chunkSize // empty')

          if [ -z "$UPLOAD_ID" ]; then
            echo "ERROR: Failed to init upload. Response: ${INIT_RESPONSE}"
            exit 1
          fi

          # Use server-provided chunk size if available
          [ -n "$SERVER_CHUNK_SIZE" ] && echo "CHUNK_SIZE=${SERVER_CHUNK_SIZE}" >> $GITHUB_ENV

          echo "UPLOAD_ID=${UPLOAD_ID}" >> $GITHUB_ENV
          echo "TOTAL_CHUNKS=${TOTAL_CHUNKS}" >> $GITHUB_ENV
          echo "Upload session: id=${UPLOAD_ID}, chunks=${TOTAL_CHUNKS}, chunkSize=${SERVER_CHUNK_SIZE:-${CHUNK_SIZE}}"

      - name: Upload bundle chunks
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"
          CHUNK_INDEX=0
          OFFSET=0

          echo "Uploading ${TOTAL_CHUNKS} chunks (${CHUNK_SIZE} bytes each)..."

          while [ "${OFFSET}" -lt "${BUNDLE_SIZE}" ]; do
            REMAINING=$(( BUNDLE_SIZE - OFFSET ))
            THIS_CHUNK_SIZE=${CHUNK_SIZE}
            [ "${REMAINING}" -lt "${THIS_CHUNK_SIZE}" ] && THIS_CHUNK_SIZE=${REMAINING}

            PCT=$(( (CHUNK_INDEX * 100) / TOTAL_CHUNKS ))
            echo "  Chunk $(( CHUNK_INDEX + 1 ))/${TOTAL_CHUNKS} (${PCT}%, offset=${OFFSET}, size=${THIS_CHUNK_SIZE})..."

            HTTP_CODE=$(dd if="${BUNDLE_FILENAME}" bs="${THIS_CHUNK_SIZE}" skip="${OFFSET}" iflag=skip_bytes count=1 2>/dev/null | \
              curl -k --silent --show-error --output /dev/null --write-out "%{http_code}" \
                -X POST "${BASE_URL}/chunk-upload/${UPLOAD_ID}" \
                -H "Content-Type: application/octet-stream" \
                -H "Authorization: Bearer ${NDM_TOKEN}" \
                -H "X-Chunk-Index: ${CHUNK_INDEX}" \
                --data-binary @-)

            if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
              echo "ERROR: Chunk ${CHUNK_INDEX} upload failed with HTTP ${HTTP_CODE}"
              exit 1
            fi

            OFFSET=$(( OFFSET + THIS_CHUNK_SIZE ))
            CHUNK_INDEX=$(( CHUNK_INDEX + 1 ))
          done

          echo "All ${TOTAL_CHUNKS} chunks uploaded successfully."

      - name: Initiate upload processing (async)
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          echo "Initiating processing for upload ${UPLOAD_ID} (assemble, validate checksums, extract)..."

          # The endpoint returns HTTP 202 immediately — processing runs in the background.
          # We poll latest-upload-status in the next step to track completion.
          HTTP_CODE=$(curl -k --silent --show-error --output /dev/null --write-out "%{http_code}" \
            -X POST "${BASE_URL}/process-upload/${UPLOAD_ID}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NDM_TOKEN}")

          if [ "${HTTP_CODE}" -ne 202 ]; then
            echo "ERROR: process-upload returned HTTP ${HTTP_CODE}, expected 202"
            exit 1
          fi

          echo "Processing initiated (HTTP 202). Will poll for completion..."

      - name: Poll processing status and get bundleId
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          # uploadStatus transitions: uploading -> processing -> success / failed
          # Poll every 5 seconds for up to 10 minutes (120 attempts).
          MAX_RETRIES=120
          RETRY=0
          UPLOAD_STATUS=""

          echo "Polling ${BASE_URL}/latest-upload-status every 5 seconds (max ${MAX_RETRIES} attempts)..."

          while [ "${RETRY}" -lt "${MAX_RETRIES}" ]; do
            RETRY=$(( RETRY + 1 ))
            sleep 5

            STATUS_RESPONSE=$(curl -k --silent --show-error \
              "${BASE_URL}/latest-upload-status" \
              -H "Authorization: Bearer ${NDM_TOKEN}")

            UPLOAD_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.uploadStatus // empty')
            echo "  [${RETRY}/${MAX_RETRIES}] uploadStatus=${UPLOAD_STATUS}"

            case "${UPLOAD_STATUS}" in
              success)
                BUNDLE_ID=$(echo "${STATUS_RESPONSE}" | jq -r '.bundleId // empty')
                UPLOAD_VERSION=$(echo "${STATUS_RESPONSE}" | jq -r '.version // empty')
                echo "Processing complete! version=${UPLOAD_VERSION}, bundleId=${BUNDLE_ID}"
                echo "BUNDLE_ID=${BUNDLE_ID}" >> $GITHUB_ENV
                break
                ;;
              failed)
                echo "Processing failed. Response: ${STATUS_RESPONSE}"
                exit 1
                ;;
              processing|uploading)
                # Still in progress — keep polling
                ;;
              *)
                echo "  Unexpected status '${UPLOAD_STATUS}', continuing..."
                ;;
            esac
          done

          if [ "${UPLOAD_STATUS}" != "success" ]; then
            echo "Processing timed out after $(( MAX_RETRIES * 5 / 60 )) minutes. Last status: ${UPLOAD_STATUS}"
            exit 1
          fi

      - name: Trigger upgrade
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          echo "Triggering upgrade for bundleId=${BUNDLE_ID}..."
          TRIGGER_RESPONSE=$(curl -k --silent --show-error \
            -X POST "${BASE_URL}/trigger-upgrade" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NDM_TOKEN}" \
            -d "{\"bundleId\":\"${BUNDLE_ID}\"}")

          echo "Trigger response: $(echo ${TRIGGER_RESPONSE} | jq -c .)"

          # A successful trigger returns the staged upgrade record — any non-null bundleId confirms staging
          STAGED_STATUS=$(echo "${TRIGGER_RESPONSE}" | jq -r '.upgradeStatus // .status // empty')
          if echo "${TRIGGER_RESPONSE}" | jq -e '.message' 2>/dev/null | grep -qi "error\|failed\|invalid"; then
            echo "ERROR: trigger-upgrade returned an error: ${TRIGGER_RESPONSE}"
            exit 1
          fi

          echo "Upgrade triggered successfully. Status: ${STAGED_STATUS}"
          echo "CP pods will now restart — polling for completion..."

      - name: Poll for upgrade completion
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"
          NDM_USERNAME="${{ secrets.NDM_APP_USERNAME }}"
          NDM_PASSWORD="${{ secrets.NDM_APP_PASSWORD }}"
          BUILD_VERSION="${{ inputs.build_version || github.event.inputs.build_version }}"

          # Allow up to 45 minutes (270 × 10s) for the upgrade to complete.
          # The Ansible playbook imports Docker images and waits for pod readiness,
          # which can take 20-30 minutes on a fresh VM.
          MAX_RETRIES=270
          RETRY=0
          UPGRADE_STATUS=""

          echo "Polling ${BASE_URL}/upgrade-status every 10 seconds (max ${MAX_RETRIES} attempts)..."

          while [ "${RETRY}" -lt "${MAX_RETRIES}" ]; do
            RETRY=$(( RETRY + 1 ))
            sleep 10

            # Re-authenticate on every attempt: Keycloak restarts during the upgrade
            # so the original token becomes invalid. Silently skip if Keycloak is still down.
            CURRENT_TOKEN=$(curl -k --silent \
              -X POST "${BASE_URL%/api/v1/upgrade}/keycloak/realms/datamigrator/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "client_id=datamigrator-client&grant_type=password&username=${NDM_USERNAME}&password=${NDM_PASSWORD}" \
              | jq -r '.access_token // empty' 2>/dev/null || true)

            if [ -z "${CURRENT_TOKEN}" ]; then
              echo "  [${RETRY}/${MAX_RETRIES}] Keycloak not yet reachable — pods still restarting..."
              continue
            fi

            STATUS_RESPONSE=$(curl -k --silent \
              "${BASE_URL}/upgrade-status" \
              -H "Authorization: Bearer ${CURRENT_TOKEN}" 2>/dev/null || true)

            UPGRADE_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.status // empty' 2>/dev/null || true)

            case "${UPGRADE_STATUS}" in
              success)
                REPORTED_VERSION=$(echo "${STATUS_RESPONSE}" | jq -r '.version // empty')
                echo "  [${RETRY}/${MAX_RETRIES}] Upgrade succeeded! Version: ${REPORTED_VERSION}"
                break
                ;;
              failed)
                echo "  [${RETRY}/${MAX_RETRIES}] Upgrade FAILED. Response: ${STATUS_RESPONSE}"
                exit 1
                ;;
              rolled_back)
                echo "  [${RETRY}/${MAX_RETRIES}] Upgrade ROLLED BACK. Response: ${STATUS_RESPONSE}"
                exit 1
                ;;
              staged|pending)
                echo "  [${RETRY}/${MAX_RETRIES}] Upgrade in progress (status=${UPGRADE_STATUS})..."
                ;;
              *)
                echo "  [${RETRY}/${MAX_RETRIES}] Waiting... (status=${UPGRADE_STATUS:-unknown})"
                ;;
            esac
          done

          if [ "${UPGRADE_STATUS}" != "success" ]; then
            echo "Upgrade timed out after $(( MAX_RETRIES * 10 / 60 )) minutes. Last status: ${UPGRADE_STATUS}"
            exit 1
          fi

      - name: Verify worker multicast completed
        run: |
          # Multicast was auto-triggered during process-upload (~5 min before CP upgrade started).
          # The CP Ansible upgrade takes 20-30 min, so by the time we reach here multicast
          # should already be done. Just do a single check to confirm before calling /execute.
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          MULTICAST_RESPONSE=$(curl -k --silent --show-error \
            "${BASE_URL}/multicast/${BUNDLE_ID}" \
            -H "Authorization: Bearer ${NDM_TOKEN}")

          MULTICAST_STATUS=$(echo "${MULTICAST_RESPONSE}" | jq -r '.workflowStatus // empty')
          COMPLETED=$(echo "${MULTICAST_RESPONSE}" | jq -r '.summary.completed // 0')
          TOTAL=$(echo "${MULTICAST_RESPONSE}" | jq -r '.summary.total // 0')
          FAILED=$(echo "${MULTICAST_RESPONSE}" | jq -r '.summary.failed // 0')

          echo "Multicast status: ${MULTICAST_STATUS} | workers: ${COMPLETED}/${TOTAL} completed, ${FAILED} failed"

          if [ "${FAILED}" -gt 0 ]; then
            echo "${FAILED} worker(s) failed to receive the upgrade bundle."
            echo "$(echo ${MULTICAST_RESPONSE} | jq .)"
            exit 1
          fi

          if [ "${MULTICAST_STATUS}" != "COMPLETED" ]; then
            echo "Multicast workflow is not COMPLETED (status=${MULTICAST_STATUS}). Workers may not have finished downloading the binary."
            echo "$(echo ${MULTICAST_RESPONSE} | jq .)"
            exit 1
          fi

          echo "All ${COMPLETED}/${TOTAL} workers have staged the upgrade binary."

      - name: Execute worker upgrades
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          echo "Triggering worker upgrade execution for bundleId=${BUNDLE_ID}..."
          EXECUTE_RESPONSE=$(curl -k --silent --show-error \
            -X POST "${BASE_URL}/execute" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NDM_TOKEN}" \
            -d "{\"bundleId\":\"${BUNDLE_ID}\"}")

          echo "Execute response: $(echo ${EXECUTE_RESPONSE} | jq -c .)"

          WORKFLOW_ID=$(echo "${EXECUTE_RESPONSE}" | jq -r '.workflowId // empty')
          if [ -z "${WORKFLOW_ID}" ]; then
            echo "Execute worker upgrade failed — no workflowId returned."
            echo "Full response: ${EXECUTE_RESPONSE}"
            exit 1
          fi

          echo "Worker upgrade execution started. workflowId=${WORKFLOW_ID}"

      - name: Poll worker upgrade execution status
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"
          NDM_USERNAME="${{ secrets.NDM_APP_USERNAME }}"
          NDM_PASSWORD="${{ secrets.NDM_APP_PASSWORD }}"

          # Allow up to 15 minutes (90 * 10s) for workers to stop, swap binary and restart.
          MAX_RETRIES=90
          RETRY=0
          WORKER_UPGRADE_STATUS=""

          echo "Polling ${BASE_URL}/execute/${BUNDLE_ID} every 10 seconds (max ${MAX_RETRIES} attempts)..."

          while [ "${RETRY}" -lt "${MAX_RETRIES}" ]; do
            RETRY=$(( RETRY + 1 ))
            sleep 10

            CURRENT_TOKEN=$(curl -k --silent \
              -X POST "${BASE_URL%/api/v1/upgrade}/keycloak/realms/datamigrator/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "client_id=datamigrator-client&grant_type=password&username=${NDM_USERNAME}&password=${NDM_PASSWORD}" \
              | jq -r '.access_token // empty' 2>/dev/null || true)

            if [ -z "${CURRENT_TOKEN}" ]; then
              echo "  [${RETRY}/${MAX_RETRIES}] Keycloak not yet reachable — retrying..."
              continue
            fi

            EXEC_RESPONSE=$(curl -k --silent \
              "${BASE_URL}/execute/${BUNDLE_ID}" \
              -H "Authorization: Bearer ${CURRENT_TOKEN}" 2>/dev/null || true)

            WORKER_UPGRADE_STATUS=$(echo "${EXEC_RESPONSE}" | jq -r '.upgradeStatus // empty' 2>/dev/null || true)
            UPGRADE_COMPLETED=$(echo "${EXEC_RESPONSE}" | jq -r '.upgradeCompleted // false' 2>/dev/null || echo "false")
            COMPLETED=$(echo "${EXEC_RESPONSE}" | jq -r '.summary.completed // 0' 2>/dev/null || echo "0")
            TOTAL=$(echo "${EXEC_RESPONSE}" | jq -r '.summary.total // 0' 2>/dev/null || echo "0")
            FAILED=$(echo "${EXEC_RESPONSE}" | jq -r '.summary.failed // 0' 2>/dev/null || echo "0")
            IN_PROGRESS=$(echo "${EXEC_RESPONSE}" | jq -r '.summary.inProgress // 0' 2>/dev/null || echo "0")

            echo "  [${RETRY}/${MAX_RETRIES}] Worker execution: status=${WORKER_UPGRADE_STATUS}, total=${TOTAL}, completed=${COMPLETED}, inProgress=${IN_PROGRESS}, failed=${FAILED}"

            case "${WORKER_UPGRADE_STATUS}" in
              success)
                echo "  All ${COMPLETED}/${TOTAL} workers upgraded successfully."
                break
                ;;
              failure)
                echo "  Worker upgrade failed. ${FAILED} worker(s) did not complete."
                echo "  Not completed: $(echo ${EXEC_RESPONSE} | jq -c '.notCompleted')"
                exit 1
                ;;
              in_progress)
                # Keep polling
                ;;
              *)
                echo "  Waiting... (status=${WORKER_UPGRADE_STATUS:-unknown})"
                ;;
            esac
          done

          if [ "${WORKER_UPGRADE_STATUS}" != "success" ]; then
            echo "Worker upgrade execution timed out after $(( MAX_RETRIES * 10 / 60 )) minutes. Last status: ${WORKER_UPGRADE_STATUS}"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Job 4: Verify the new version is running via API (CP + all registered workers)
  # ---------------------------------------------------------------------------
  verify-upgrade:
    name: Verify Upgrade Success
    runs-on: openlab
    needs: [setup-infrastructure, run-upgrade]
    env:
      CP_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Authenticate with Keycloak
        run: |
          BASE_URL="https://${CP_IP}"
          NDM_USERNAME="${{ secrets.NDM_APP_USERNAME }}"
          NDM_PASSWORD="${{ secrets.NDM_APP_PASSWORD }}"

          TOKEN_RESPONSE=$(curl -k --silent --show-error \
            -X POST "${BASE_URL}/keycloak/realms/datamigrator/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=datamigrator-client&grant_type=password&username=${NDM_USERNAME}&password=${NDM_PASSWORD}")

          TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to get token. Response: ${TOKEN_RESPONSE}"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "NDM_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Verify upgrade-status reports success and correct version
        run: |
          BUILD_VERSION="${{ inputs.build_version || github.event.inputs.build_version }}"
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          STATUS_RESPONSE=$(curl -k --silent --show-error \
            "${BASE_URL}/upgrade-status" \
            -H "Authorization: Bearer ${NDM_TOKEN}")

          echo "upgrade-status response: $(echo ${STATUS_RESPONSE} | jq .)"

          STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.status // empty')
          VERSION=$(echo "${STATUS_RESPONSE}" | jq -r '.version // empty')

          if [ "${STATUS}" != "success" ]; then
            echo "upgrade-status is '${STATUS}', expected 'success'"
            exit 1
          fi

          if [ "${VERSION}" != "${BUILD_VERSION}" ]; then
            echo "Version mismatch: expected '${BUILD_VERSION}', got '${VERSION}'"
            exit 1
          fi

          echo "CP upgrade verified: status=success, version=${VERSION}"

      - name: Verify latest-upload-status shows upgradeStatus success
        run: |
          BASE_URL="https://${CP_IP}/api/v1/upgrade"

          STATUS_RESPONSE=$(curl -k --silent --show-error \
            "${BASE_URL}/latest-upload-status" \
            -H "Authorization: Bearer ${NDM_TOKEN}")

          echo "latest-upload-status: $(echo ${STATUS_RESPONSE} | jq -c '{upgradeStatus,workerUpgradeStatus,version}')"

          UPGRADE_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.upgradeStatus // empty')
          if [ "${UPGRADE_STATUS}" != "success" ]; then
            echo "upgradeStatus is '${UPGRADE_STATUS}', expected 'success'"
            exit 1
          fi

          WORKER_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.workerUpgradeStatus // "unknown"')
          echo "upgradeStatus=success | workerUpgradeStatus=${WORKER_STATUS}"

      - name: Verify CP and worker versions via About NDM
        run: |
          BUILD_VERSION="${{ inputs.build_version || github.event.inputs.build_version }}"
          BASE_URL="https://${CP_IP}/api/v1"

          ABOUT=$(curl -k --silent --show-error \
            "${BASE_URL}/about-ndm" \
            -H "Authorization: Bearer ${NDM_TOKEN}")

          echo "about-ndm response: $(echo ${ABOUT} | jq -c '{build}')"

          FAIL=0

          # ── CP version (from Prometheus) ──────────────────────────────────
          NEW_CP_VERSION=$(echo "${ABOUT}" | jq -r '.build.controlPlane_version.version // empty')
          if [ -z "${NEW_CP_VERSION}" ] || [ "${NEW_CP_VERSION}" = "N/A" ]; then
            echo "CP version not yet available in Prometheus (may still be starting)"
          elif [ "${NEW_CP_VERSION}" != "${BUILD_VERSION}" ]; then
            echo "CP version mismatch: about-ndm reports '${NEW_CP_VERSION}', expected '${BUILD_VERSION}'"
            FAIL=1
          else
            echo "CP version confirmed via about-ndm: ${NEW_CP_VERSION}"
          fi

          # ── Worker versions (from DB) ─────────────────────────────────────
          # All registered workers must be on build_version; none should remain on an older version.
          WORKERS_ON_TARGET=$(echo "${ABOUT}" | jq -r \
            --arg v "${BUILD_VERSION}" \
            '(.build.workersByVersion[$v] // []) | length')

          WORKERS_ON_OTHER=$(echo "${ABOUT}" | jq -r \
            --arg v "${BUILD_VERSION}" \
            '[.build.workersByVersion // {} | to_entries[] | select(.key != $v) | .value[]] | length')

          TOTAL_WORKERS=$(echo "${ABOUT}" | jq -r \
            '[.build.workersByVersion // {} | to_entries[] | .value[]] | length')

          echo "Workers on ${BUILD_VERSION} : ${WORKERS_ON_TARGET}"
          echo "Workers on other versions  : ${WORKERS_ON_OTHER}"
          echo "Total registered workers   : ${TOTAL_WORKERS}"

          if [ "${TOTAL_WORKERS}" -eq 0 ]; then
            echo "No workers registered — skipping worker version check"
          else
            if [ "${WORKERS_ON_OTHER}" -gt 0 ]; then
              echo "${WORKERS_ON_OTHER} worker(s) still on an old version:"
              echo "${ABOUT}" | jq -r \
                --arg v "${BUILD_VERSION}" \
                '.build.workersByVersion // {} | to_entries[] | select(.key != $v) | "  [\(.key)] " + (.value | map(.workerName) | join(", "))'
              FAIL=1
            fi
            if [ "${WORKERS_ON_TARGET}" -eq 0 ]; then
              echo "No workers found on target version ${BUILD_VERSION}"
              FAIL=1
            else
              echo "All ${WORKERS_ON_TARGET} worker(s) confirmed on ${BUILD_VERSION}"
            fi
          fi

          [ "${FAIL}" -eq 1 ] && exit 1
          echo "About NDM version checks passed"

  # ---------------------------------------------------------------------------
  # Job 5: Post-upgrade migration — re-run a single migration (TC-001) per
  # protocol against the UPGRADED control plane, reusing the workers that were
  # upgraded in place (REUSE_EXISTING_WORKERS=true), so no reinstall is needed.
  # ---------------------------------------------------------------------------
  post-upgrade-e2e:
    name: Post-Upgrade Migration (NFS & SMB)
    runs-on: openlab
    needs: [setup-infrastructure, run-upgrade, verify-upgrade]
    env:
      CLOUD_PROVIDER: azure
      CLOUD_ENVIRONMENT: Azure
      VOLUME_CLONE_PROVIDER: ${{ inputs.volume_clone_provider || github.event.inputs.volume_clone_provider || 'anf' }}
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}
      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_SP_USERNAME }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_SP_PASSWORD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # NFS (Linux) worker + ANF volume config
      AZURE_NFS_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.linux_worker_vm_ip_addresses), ',') }}
      AZURE_NFS_NDM_WORKERS_PORT: ${{ vars.AZURE_NFS_NDM_WORKERS_PORT }}
      AZURE_NFS_SOURCE_VOLUMES: ${{ vars.AZURE_NFS_SOURCE_VOLUMES }}
      AZURE_NFS_DEST_VOLUMES: ${{ vars.AZURE_NFS_DEST_VOLUMES }}
      AZURE_NFS_SOURCE_HOST_IP: ${{ vars.AZURE_NFS_SOURCE_HOST_IP }}
      AZURE_NFS_DESTINATION_HOST_IP: ${{ vars.AZURE_NFS_DESTINATION_HOST_IP }}
      AZURE_ANF_NFS_SOURCE_RESOURCE_GROUP: ${{ vars.AZURE_ANF_NFS_SOURCE_RESOURCE_GROUP }}
      AZURE_ANF_NFS_SOURCE_ACCOUNT_NAME: ${{ vars.AZURE_ANF_NFS_SOURCE_ACCOUNT_NAME }}
      AZURE_ANF_NFS_SOURCE_POOL_NAME: ${{ vars.AZURE_ANF_NFS_SOURCE_POOL_NAME }}
      AZURE_ANF_NFS_DEST_RESOURCE_GROUP: ${{ vars.AZURE_ANF_NFS_DEST_RESOURCE_GROUP }}
      AZURE_ANF_NFS_DEST_ACCOUNT_NAME: ${{ vars.AZURE_ANF_NFS_DEST_ACCOUNT_NAME }}
      AZURE_ANF_NFS_DEST_POOL_NAME: ${{ vars.AZURE_ANF_NFS_DEST_POOL_NAME }}
      AZURE_NFS_PROTOCOL_USERNAME: ${{ vars.AZURE_NFS_PROTOCOL_USERNAME }}
      # SMB (Windows) worker + ANF volume config
      AZURE_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      AZURE_SMB_NDM_WORKERS_PORT: ${{ vars.AZURE_SMB_NDM_WORKERS_PORT }}
      AZURE_SMB_SOURCE_VOLUMES: ${{ vars.AZURE_SMB_SOURCE_VOLUMES }}
      AZURE_SMB_DEST_VOLUMES: ${{ vars.AZURE_SMB_DEST_VOLUMES }}
      AZURE_SMB_SOURCE_HOST_IP: ${{ vars.AZURE_SMB_SOURCE_HOST_IP }}
      AZURE_SMB_DESTINATION_HOST_IP: ${{ vars.AZURE_SMB_DESTINATION_HOST_IP }}
      AZURE_SMB_DOMAIN_NAME: ${{ vars.AZURE_SMB_DOMAIN_NAME }}
      AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP }}
      AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME }}
      AZURE_ANF_SMB_SOURCE_POOL_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_POOL_NAME }}
      AZURE_ANF_SMB_DEST_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_DEST_RESOURCE_GROUP }}
      AZURE_ANF_SMB_DEST_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_DEST_ACCOUNT_NAME }}
      AZURE_ANF_SMB_DEST_POOL_NAME: ${{ vars.AZURE_ANF_SMB_DEST_POOL_NAME }}
      AZURE_SMB_PROTOCOL_USERNAME: ${{ secrets.AZURE_SMB_PROTOCOL_USERNAME }}
      AZURE_SMB_PROTOCOL_PASSWORD: ${{ secrets.AZURE_SMB_PROTOCOL_PASSWORD }}
      # Reuse the workers upgraded in place instead of re-attaching them.
      REUSE_EXISTING_WORKERS: 'true'
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup worker SSH credentials
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV

      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV

      - name: Wait for Windows worker SSH to be ready
        run: |
          WINDOWS_IPS='${{ needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses }}'
          for ip in $(echo "$WINDOWS_IPS" | jq -r '.[]'); do
            echo "Waiting for SSH (22) on Windows VM $ip..."
            for i in $(seq 1 60); do
              if timeout 5 bash -c "</dev/tcp/$ip/22" 2>/dev/null; then
                echo "SSH is up on $ip"; break
              fi
              sleep 10
            done
          done

      - name: Post-upgrade NFS migration (TC-001)
        run: |
          cd ndm-api-tests
          ginkgo run -v --focus="TC-001" --timeout=2h ./tests/e2e -- \
            --protocol_type=NFS --environment=Azure

      - name: Post-upgrade SMB migration (TC-001)
        run: |
          cd ndm-api-tests
          ginkgo run -v --focus="TC-001" --timeout=2h ./tests/e2e -- \
            --protocol_type=SMB --environment=Azure

      - name: Upload post-upgrade test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: post-upgrade-e2e-logs-${{ github.run_id }}
          path: ndm-api-tests/reports/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: Always destroy provisioned VMs
  # ---------------------------------------------------------------------------
  cleanup:
    name: Cleanup Infrastructure
    runs-on: openlab
    needs: [setup-infrastructure, pre-upgrade-e2e, run-upgrade, verify-upgrade, post-upgrade-e2e]
    if: always()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials for Cleanup
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)

          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

          # Must match the values used during apply for terraform destroy to work correctly
          OLD_CP_IMAGE="${{ inputs.old_cp_image_version || github.event.inputs.old_cp_image_version }}"
          OLD_WORKER_IMAGE="${{ inputs.old_worker_image_version || github.event.inputs.old_worker_image_version }}"
          echo "TF_VAR_control_plane_image_version=$OLD_CP_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_worker_image_version=$OLD_WORKER_IMAGE" >> $GITHUB_ENV

          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          echo "TF_VAR_vm_owner=NDM-Upgrade-E2E-$TIMESTAMP" >> $GITHUB_ENV
          echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV
          echo "TF_VAR_dns_servers=${{ vars.AZURE_WIN_DNS_SERVERS }}" >> $GITHUB_ENV

      - name: Download Terraform State
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: upgrade-e2e-terraform-state
          path: app-deployment/terraform/azure/environments/api

      - name: Initialize Terraform for Cleanup
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform init

      - name: Destroy Terraform Resources
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform destroy -auto-approve

      - name: Clean Up Temporary Files
        run: |
          rm -rf $GITHUB_WORKSPACE/credentials 2>/dev/null || true
