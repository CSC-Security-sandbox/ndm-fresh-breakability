name: Nightly Trivy Scan for NDM Services

on:
  schedule:
    - cron: '30 18 * * *'  
  workflow_dispatch:    # <-- Enables the "Run workflow" button
    inputs:
      branch:
        description: 'Branch to scan'
        required: false
        default: 'main'
        type: string
       
permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

env:
  TRIVY_VERSION: v0.69.2

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set matrix for all services
        id: set-matrix
        run: |
          services=( "db-writer" "keycloak-customizations" "reports-service" "admin-service" "config-service" "datamigrator-ui" "jobs-service" "support-service" )
          targets=("${services[@]}")
          targets+=("db-migrations")
          targets+=("worker")
          service_json=$(printf '%s\n' "${targets[@]}" | jq -R . | jq -s . | tr -d '\n')
          echo "matrix={\"service\":$service_json}" >> $GITHUB_OUTPUT

  trivy-scan:
    if: false # Temporarily disabled
    runs-on: ubuntu-latest
    needs: determine-matrix
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine-matrix.outputs.matrix).service }}
      fail-fast: false
    env:
      IMAGE_NAME: trivy-scan-${{ matrix.service }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up QEMU
        uses: step-security/setup-qemu-action@8c4aef027ab2df56e08f597afe6dd8cd31cb84f5 # v3.7.0

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Log in to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_SP_USERNAME }}
          password: ${{ secrets.AZURE_SP_PASSWORD }}

      - name: Set up Trivy
        uses: step-security/setup-trivy@c90a9e4ee674152fc961ef98d44fc670a5dcceb7 # v0.2.5
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: Set build context
        if: matrix.service != 'worker'
        id: set-context
        run: |
          if [ "${{ matrix.service }}" = "db-migrations" ]; then
            echo "CONTEXT=liquibase" >> $GITHUB_ENV
          else
            echo "CONTEXT=services/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      # DISABLED: aquasecurity/trivy-action temporarily disabled
      # - name: Run Trivy filesystem (fs) scan for worker
      #   if: matrix.service == 'worker'
      #   uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
      #   with:
      #     scan-type: 'fs'
      #     scan-ref: 'services/worker'
      #     format: 'json'
      #     output: 'trivy-results-${{ matrix.service }}.json'
      #     severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
      #     ignore-unfixed: false
      #     exit-code: '0'

      - name: Build Docker Image for ${{ matrix.service }} (for scan only)
        if: matrix.service != 'worker'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --secret id=git_token,env=GITOPS_USER_GITHUB_TOKEN \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            --load "$CONTEXT"
        env:
          GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          CONTEXT: ${{ env.CONTEXT }}

      # DISABLED: aquasecurity/trivy-action temporarily disabled
      # - name: Run Trivy vulnerability scanner for ${{ matrix.service }} (JSON format)
      #   if: matrix.service != 'worker'
      #   uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
      #   with:
      #     image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
      #     format: 'json'
      #     output: 'trivy-results-${{ matrix.service }}.json'
      #     severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
      #     ignore-unfixed: false
      #     exit-code: '0'

      - name: Convert Trivy JSON to SARIF and Table format
        run: |
          FILE="trivy-results-${{ matrix.service }}.json"
      
          if [ -f "$FILE" ]; then
            echo "Converting $FILE to SARIF"
            trivy convert --format sarif --output trivy-results-${{ matrix.service }}.sarif "$FILE"
      
            echo "Converting $FILE to table"
            trivy convert --format table --output trivy-table-${{ matrix.service }}.txt "$FILE"
          else
            echo "No Trivy results file found to convert"
          fi

      - name: Brand SARIF with service name
        run: |
          SERVICE="${{ matrix.service }}"
          jq --arg svc "$SERVICE" \
            '.runs[0].results |= map(
                .message.text |= ("[" + $svc + "] " + .)
              )' \
            trivy-results-${SERVICE}.sarif > trivy-results-${SERVICE}-branded.sarif
          mv trivy-results-${SERVICE}-branded.sarif trivy-results-${SERVICE}.sarif

      - name: Output Trivy scan results in table format
        run: |
          cat trivy-table-${{ matrix.service }}.txt

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'