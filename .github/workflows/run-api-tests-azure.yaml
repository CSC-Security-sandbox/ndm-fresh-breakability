name: Run E2E API Automation Tests for NDM on Azure

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  TERRAFORM_VERSION: 1.12.1
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0

on:
  workflow_dispatch:
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        required: true
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test'
        required: false
        default: 'Both'
        type: choice
        options:
          - 'Both'
          - 'SMB'
          - 'NFS'
      run_smoke_tests:
        description: 'Run smoke tests'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Run end-to-end tests'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Run regression tests'
        required: false
        default: true
        type: boolean
      ontap_username:
        description: 'ONTAP username for volume management'
        required: true
        type: string
      ontap_password:
        description: 'ONTAP password for volume management'
        required: true
        type: string

  workflow_call: 
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test (Both/SMB/NFS)'
        required: false
        default: 'Both'
        type: string
      run_smoke_tests:
        description: 'Whether to run smoke tests (true/false)'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Whether to run end-to-end tests (true/false)'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Whether to run regression tests (true/false)'
        required: false
        default: true
        type: boolean
      ontap_username:
        description: 'ONTAP username for volume management'
        required: true
        type: string
      ontap_password:
        description: 'ONTAP password for volume management'
        required: true
        type: string

permissions: 
  contents: read

jobs:
  setup-infrastructure:
    name: Setup ONTAP Volumes Only
    runs-on: openlab
    outputs:
      ontap_source_volumes: ${{ steps.ontap-volumes.outputs.ontap_source_volumes }}
      ontap_dest_volumes: ${{ steps.ontap-volumes.outputs.ontap_dest_volumes }}
      ontap_source_paths: ${{ steps.ontap-volumes.outputs.ontap_source_paths }}
      ontap_dest_paths: ${{ steps.ontap-volumes.outputs.ontap_dest_paths }}
    steps:
      
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup ONTAP Source and Destination Volumes
        id: ontap-volumes
        run: |
          echo "Setting up ONTAP volumes for migration testing..."
          
          # ONTAP Configuration (hardcoded for now)
          SOURCE_SVM_IP="10.192.7.43"
          DEST_SVM_IP="10.192.7.111"
          GOLDEN_VOLUME="voleda_ws1"
          
          # Generate unique volume names for this test run
          TEST_ID="${{ github.run_id }}"
          ACTOR="${{ github.actor }}"
          SOURCE_VOLUME_1="ndm_src1_${ACTOR}_${TEST_ID}"
          SOURCE_VOLUME_2="ndm_src2_${ACTOR}_${TEST_ID}"
          DEST_VOLUME_1="ndm_dest1_${ACTOR}_${TEST_ID}"
          DEST_VOLUME_2="ndm_dest2_${ACTOR}_${TEST_ID}"
          
          # ONTAP Credentials (from workflow inputs)
          ONTAP_USERNAME="${{ inputs.ontap_username || github.event.inputs.ontap_username }}"
          ONTAP_PASSWORD="${{ inputs.ontap_password || github.event.inputs.ontap_password }}"
          
          # Mask the password in logs for security
          echo "::add-mask::$ONTAP_PASSWORD"
          
          echo "🔍 ONTAP Configuration:"
          echo "Source SVM IP: $SOURCE_SVM_IP"
          echo "Destination SVM IP: $DEST_SVM_IP"
          echo "Golden Volume: $GOLDEN_VOLUME"
          echo "ONTAP Username: $ONTAP_USERNAME"
          echo "Test ID: $TEST_ID"
          echo "Actor: $ACTOR"
          
          echo "Creating source volumes: $SOURCE_VOLUME_1 and $SOURCE_VOLUME_2 from golden master: $GOLDEN_VOLUME"
          
          # Test ONTAP connectivity first
          echo "🔌 Testing ONTAP connectivity to $SOURCE_SVM_IP..."
          
          # First test basic network connectivity
          echo "Testing basic network connectivity..."
          if ping -c 3 -W 5 "$SOURCE_SVM_IP" >/dev/null 2>&1; then
            echo "✅ Network ping to $SOURCE_SVM_IP successful"
          else
            echo "❌ Network ping to $SOURCE_SVM_IP failed"
            echo "Network connectivity issue - cannot reach host"
          fi
          
          # Test HTTPS port connectivity
          echo "Testing HTTPS port 443 connectivity..."
          if timeout 10 bash -c "</dev/tcp/$SOURCE_SVM_IP/443" 2>/dev/null; then
            echo "✅ HTTPS port 443 is reachable on $SOURCE_SVM_IP"
          else
            echo "❌ HTTPS port 443 is not reachable on $SOURCE_SVM_IP"
            echo "ONTAP HTTPS management interface may not be enabled or accessible"
          fi
          
          # Test ONTAP API connectivity with verbose output
          echo "Testing ONTAP API authentication..."
          CONNECTIVITY_TEST=$(curl -v -s -w "\nHTTP_CODE:%{http_code}\nTIME_TOTAL:%{time_total}\n" \
            -X GET "https://${SOURCE_SVM_IP}/api/cluster" \
            -u "${ONTAP_USERNAME}:${ONTAP_PASSWORD}" \
            -k \
            --connect-timeout 10 \
            --max-time 30 2>&1)
          
          echo "Full connectivity test output:"
          echo "$CONNECTIVITY_TEST"
          
          CONNECTIVITY_HTTP_CODE=$(echo "$CONNECTIVITY_TEST" | grep "HTTP_CODE:" | cut -d':' -f2)
          TOTAL_TIME=$(echo "$CONNECTIVITY_TEST" | grep "TIME_TOTAL:" | cut -d':' -f2)
          
          echo "Extracted HTTP code: '$CONNECTIVITY_HTTP_CODE'"
          echo "Total time: '$TOTAL_TIME' seconds"
          
          if [ "$CONNECTIVITY_HTTP_CODE" != "200" ]; then
            echo "❌ Failed to connect to ONTAP cluster at $SOURCE_SVM_IP"
            echo "HTTP Code: $CONNECTIVITY_HTTP_CODE"
            echo ""
            echo "🔍 Troubleshooting steps:"
            echo "1. Verify ONTAP cluster IP address: $SOURCE_SVM_IP"
            echo "2. Check ONTAP username: '$ONTAP_USERNAME'"
            echo "3. Verify ONTAP password is correct"
            echo "4. Ensure ONTAP HTTPS management is enabled"
            echo "5. Check if the ONTAP cluster is accessible from this runner"
            echo "6. Verify firewall rules allow HTTPS (443) traffic"
            echo "7. Check ONTAP cluster health and management LIF status"
            exit 1
          else
            echo "✅ Successfully connected to ONTAP cluster"
            echo "Authentication successful in $TOTAL_TIME seconds"
          fi
          
          # Clone source volume 1 from golden master
          echo "🔄 Creating source volume 1: $SOURCE_VOLUME_1"
          SOURCE1_CLONE_RESPONSE=$(curl -s -w "%{http_code}" \
            -X POST "https://${SOURCE_SVM_IP}/api/storage/volumes" \
            -u "${ONTAP_USERNAME}:${ONTAP_PASSWORD}" \
            -k \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --connect-timeout 30 \
            --max-time 120 \
            -d '{
              "name": "'${SOURCE_VOLUME_1}'",
              "svm": {"name": "phc-1"},
              "clone": {
                "is_flexclone": true,
                "parent_volume": {"name": "'${GOLDEN_VOLUME}'"}
              },
              "guarantee": {"type": "none"}
            }')
          
          SOURCE1_HTTP_CODE="${SOURCE1_CLONE_RESPONSE: -3}"
          SOURCE1_RESPONSE_BODY="${SOURCE1_CLONE_RESPONSE%???}"
          
          echo "Source volume 1 HTTP code: $SOURCE1_HTTP_CODE"
          echo "Source volume 1 response: $SOURCE1_RESPONSE_BODY"
          
          if [ "$SOURCE1_HTTP_CODE" = "202" ] || [ "$SOURCE1_HTTP_CODE" = "201" ]; then
            echo "✅ Source volume 1 $SOURCE_VOLUME_1 created successfully"
          else
            echo "❌ Failed to create source volume 1. HTTP Code: $SOURCE1_HTTP_CODE"
            echo "Response Body: $SOURCE1_RESPONSE_BODY"
            echo "Possible issues:"
            echo "1. Golden volume '$GOLDEN_VOLUME' may not exist"
            echo "2. SVM 'phc-1' may not exist or be accessible"
            echo "3. Insufficient permissions for FlexClone operations"
            echo "4. Volume name '$SOURCE_VOLUME_1' may already exist"
            exit 1
          fi
          
          # Clone source volume 2 from golden master
          SOURCE2_CLONE_RESPONSE=$(curl -s -w "%{http_code}" \
            -X POST "https://${SOURCE_SVM_IP}/api/storage/volumes" \
            -u "${ONTAP_USERNAME}:${ONTAP_PASSWORD}" \
            -k \
            -H "Content-Type: application/json" \
            -d '{
              "name": "'${SOURCE_VOLUME_2}'",
              "svm": {"name": "phc-1"},
              "clone": {
                "is_flexclone": true,
                "parent_volume": {"name": "'${GOLDEN_VOLUME}'"}
              },
              "guarantee": {"type": "none"}
            }')
          
          SOURCE2_HTTP_CODE="${SOURCE2_CLONE_RESPONSE: -3}"
          if [ "$SOURCE2_HTTP_CODE" = "202" ] || [ "$SOURCE2_HTTP_CODE" = "201" ]; then
            echo "✅ Source volume 2 $SOURCE_VOLUME_2 created successfully"
          else
            echo "❌ Failed to create source volume 2. HTTP Code: $SOURCE2_HTTP_CODE"
            echo "Response: ${SOURCE2_CLONE_RESPONSE%???}"
            exit 1
          fi
          
          echo "Creating destination volumes: $DEST_VOLUME_1 and $DEST_VOLUME_2"
          
          # Create empty destination volume 1
          DEST1_RESPONSE=$(curl -s -w "%{http_code}" \
            -X POST "https://${DEST_SVM_IP}/api/storage/volumes" \
            -u "${ONTAP_USERNAME}:${ONTAP_PASSWORD}" \
            -k \
            -H "Content-Type: application/json" \
            -d '{
              "name": "'${DEST_VOLUME_1}'",
              "svm": {"name": "phc-1"},
              "size": 10737418240,
              "guarantee": {"type": "none"},
              "aggregates": [{"name": "phc1_01_data01_mirrored"}]
            }')
          
          DEST1_HTTP_CODE="${DEST1_RESPONSE: -3}"
          if [ "$DEST1_HTTP_CODE" = "202" ] || [ "$DEST1_HTTP_CODE" = "201" ]; then
            echo "✅ Destination volume 1 $DEST_VOLUME_1 created successfully"
          else
            echo "❌ Failed to create destination volume 1. HTTP Code: $DEST1_HTTP_CODE"
            echo "Response: ${DEST1_RESPONSE%???}"
          fi
          
          # Create empty destination volume 2
          DEST2_RESPONSE=$(curl -s -w "%{http_code}" \
            -X POST "https://${DEST_SVM_IP}/api/storage/volumes" \
            -u "${ONTAP_USERNAME}:${ONTAP_PASSWORD}" \
            -k \
            -H "Content-Type: application/json" \
            -d '{
              "name": "'${DEST_VOLUME_2}'",
              "svm": {"name": "phc-1"},
              "size": 10737418240,
              "guarantee": {"type": "none"},
              "aggregates": [{"name": "phc1_01_data01_mirrored"}]
            }')
          
          DEST2_HTTP_CODE="${DEST2_RESPONSE: -3}"
          if [ "$DEST2_HTTP_CODE" = "202" ] || [ "$DEST2_HTTP_CODE" = "201" ]; then
            echo "✅ Destination volume 2 $DEST_VOLUME_2 created successfully"
          else
            echo "❌ Failed to create destination volume 2. HTTP Code: $DEST2_HTTP_CODE"
            echo "Response: ${DEST2_RESPONSE%???}"
          fi
          
          # Export volume information as JSON arrays for use in subsequent jobs
          echo "ontap_source_volumes=[\"$SOURCE_VOLUME_1\",\"$SOURCE_VOLUME_2\"]" >> $GITHUB_OUTPUT
          echo "ontap_dest_volumes=[\"$DEST_VOLUME_1\",\"$DEST_VOLUME_2\"]" >> $GITHUB_OUTPUT
          echo "ontap_source_paths=[\"${SOURCE_SVM_IP}:/vol/${SOURCE_VOLUME_1}\",\"${SOURCE_SVM_IP}:/vol/${SOURCE_VOLUME_2}\"]" >> $GITHUB_OUTPUT
          echo "ontap_dest_paths=[\"${DEST_SVM_IP}:/vol/${DEST_VOLUME_1}\",\"${DEST_SVM_IP}:/vol/${DEST_VOLUME_2}\"]" >> $GITHUB_OUTPUT
          
          echo "📊 ONTAP Volume Setup Summary:"
          echo "Source 1: ${SOURCE_SVM_IP}:/vol/${SOURCE_VOLUME_1} (cloned from ${GOLDEN_VOLUME})"
          echo "Source 2: ${SOURCE_SVM_IP}:/vol/${SOURCE_VOLUME_2} (cloned from ${GOLDEN_VOLUME})"
          echo "Destination 1: ${DEST_SVM_IP}:/vol/${DEST_VOLUME_1} (empty)"
          echo "Destination 2: ${DEST_SVM_IP}:/vol/${DEST_VOLUME_2} (empty)"

