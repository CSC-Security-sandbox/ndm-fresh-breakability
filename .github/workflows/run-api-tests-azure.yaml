name: Run E2E API Automation Tests for NDM on Azure

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  TERRAFORM_VERSION: 1.12.1
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0
  # AD DNS server IP used for Windows worker NIC configuration at boot.
  # aws-fsxn → AWS_WIN_DNS_SERVERS; anf/ontap → AZURE_WIN_DNS_SERVERS.
  # Both vars are stored as JSON lists e.g. [\"172.x.x.x\"] — we pick the
  # right one here and each consumer wraps/unwraps as needed for its type.
  WIN_AD_DNS_SERVERS: ${{ (inputs.volume_clone_provider == 'aws-fsxn' || github.event.inputs.volume_clone_provider == 'aws-fsxn') && vars.AWS_WIN_DNS_SERVERS != '' && vars.AWS_WIN_DNS_SERVERS || vars.AZURE_WIN_DNS_SERVERS }}

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Cloud provider to deploy infrastructure on'
        required: false
        default: 'azure'
        type: choice
        options:
          - 'azure'
          - 'aws'
      control_plane_image_version:
        description: 'Azure: gallery version | AWS: CP AMI ID (ami-xxx)'
        required: true
        type: string
      worker_image_version:
        description: 'Azure: gallery version | AWS: Linux worker AMI ID (ami-xxx)'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        required: true
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test'
        required: false
        default: 'Both'
        type: choice
        options:
          - 'Both'
          - 'SMB'
          - 'NFS'
      volume_clone_provider:
        description: 'Select volume clone backend'
        required: false
        default: 'ontap'
        type: choice
        options:
          - 'anf'
          - 'ontap'
          - 'aws-fsxn'
      run_smoke_tests:
        description: 'Run smoke tests'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Run end-to-end tests'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Run regression tests'
        required: false
        default: true
        type: boolean
      run_ui_tests:
        description: 'Run UI E2E tests (headless Playwright)'
        required: false
        default: false
        type: boolean

  workflow_call: 
    inputs:
      cloud_provider:
        description: 'Cloud provider to deploy infrastructure on (azure/aws)'
        required: false
        default: 'azure'
        type: string
      control_plane_image_version:
        description: 'Azure: gallery version | AWS: CP AMI ID (ami-xxx)'
        required: true
        type: string
      worker_image_version:
        description: 'Azure: gallery version | AWS: Linux worker AMI ID (ami-xxx)'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test (Both/SMB/NFS)'
        required: false
        default: 'Both'
        type: string
      volume_clone_provider:
        description: 'Select volume clone backend (anf/ontap/aws-fsxn)'
        required: false
        default: 'ontap'
        type: string
      trigger_type:
        description: 'Original trigger type (schedule/workflow_dispatch/workflow_call)'
        required: false
        default: ''
        type: string
      run_smoke_tests:
        description: 'Whether to run smoke tests (true/false)'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Whether to run end-to-end tests (true/false)'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Whether to run regression tests (true/false)'
        required: false
        default: true
        type: boolean
      run_ui_tests:
        description: 'Run UI E2E tests (headless Playwright)'
        required: false
        default: false
        type: boolean

permissions: 
  contents: read

jobs:
  setup-infrastructure:
    name: Setup Infrastructure and Services
    runs-on: openlab
    outputs:
      control_plane_vm_ip_address: ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}
      linux_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.linux_worker_vm_ip_addresses }}
      windows_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials
        run: |
          CLOUD="${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'azure' }}"
          mkdir -p $GITHUB_WORKSPACE/credentials

          echo "Setting VM credentials..."
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)

          # Write to GITHUB_ENV
          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV

          TRIGGER_TYPE="${{ inputs.trigger_type || github.event_name }}"
          TIME_SUFFIX=$(date +"%H%M%S")
          if [[ "$TRIGGER_TYPE" == "schedule" ]]; then
            VM_OWNER="ntly${TIME_SUFFIX}"
          else
            VM_OWNER="adhc${TIME_SUFFIX}"
          fi
          echo "TF_VAR_vm_owner=$VM_OWNER" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV

          if [[ "$CLOUD" == "aws" ]]; then
            echo "TF_DIR=app-deployment/terraform/aws/environments/api" >> $GITHUB_ENV
            CONTROL_PLANE_AMI="${{ inputs.control_plane_image_version || github.event.inputs.control_plane_image_version }}"
            LINUX_WORKER_AMI="${{ inputs.worker_image_version || github.event.inputs.worker_image_version }}"
            echo "TF_VAR_aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "TF_VAR_aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "TF_VAR_key_name=${{ secrets.AWS_EC2_KEY_PAIR_NAME }}" >> $GITHUB_ENV
            echo "TF_VAR_control_plane_ami_id=$CONTROL_PLANE_AMI" >> $GITHUB_ENV
            echo "TF_VAR_linux_worker_ami_id=$LINUX_WORKER_AMI" >> $GITHUB_ENV
            echo "TF_VAR_ad_dns_servers=${{ env.WIN_AD_DNS_SERVERS }}" >> $GITHUB_ENV

            echo "${{ secrets.AWS_EC2_PRIVATE_KEY }}" > $GITHUB_WORKSPACE/credentials/ec2-key.pem
            chmod 600 $GITHUB_WORKSPACE/credentials/ec2-key.pem
            echo "EC2_KEY_FILE=$GITHUB_WORKSPACE/credentials/ec2-key.pem" >> $GITHUB_ENV
          elif [[ "$CLOUD" == "azure" ]]; then
            echo "TF_DIR=app-deployment/terraform/azure/environments/api" >> $GITHUB_ENV
            echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
            echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
            echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

            CONTROL_PLANE_IMAGE="${{ inputs.control_plane_image_version || github.event.inputs.control_plane_image_version }}"
            WORKER_IMAGE="${{ inputs.worker_image_version || github.event.inputs.worker_image_version }}"

          # Azure Terraform Variables
            echo "TF_VAR_control_plane_image_version=$CONTROL_PLANE_IMAGE" >> $GITHUB_ENV
            echo "TF_VAR_worker_image_version=$WORKER_IMAGE" >> $GITHUB_ENV
            echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
            echo "TF_VAR_dns_servers=${{ env.WIN_AD_DNS_SERVERS }}" >> $GITHUB_ENV
          else
            echo "ERROR: Unsupported cloud_provider '$CLOUD'. Supported values: aws, azure" >&2
            exit 1
          fi

      - name: Initialize Terraform
        run: |
          cd $TF_DIR
          terraform init

      - name: Validate Terraform Configuration
        run: |
          cd $TF_DIR
          terraform validate

      - name: Create Terraform Plan
        run: |
          cd $TF_DIR
          terraform plan -out=tfplan

      - name: Apply Terraform Plan
        run: |
          cd $TF_DIR
          terraform apply -auto-approve tfplan

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: terraform-state
          path: |
            ${{ env.TF_DIR }}/terraform.tfstate
            ${{ env.TF_DIR }}/.terraform.lock.hcl
            ${{ env.TF_DIR }}/.terraform

      - name: Set Password on Linux/CP VMs (AWS)
        if: ${{ (inputs.cloud_provider || github.event.inputs.cloud_provider) == 'aws' }}
        run: |
          cd $TF_DIR
          CP_IP=$(terraform output -raw control_plane_private_ip)
          ALL_LINUX_IPS=$(terraform output -json linux_worker_private_ips | jq -r '.[]' | tr '\n' ' ')
          ALL_IPS="$CP_IP $ALL_LINUX_IPS"

          echo "Setting password on Linux/CP VMs..."
          for IP in $ALL_IPS; do
            echo "Configuring password auth on $IP..."

            SSH_READY=false
            for attempt in {1..40}; do
              if ssh -i "$EC2_KEY_FILE" \
                -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -o PubkeyAcceptedAlgorithms=+ssh-rsa \
                "ubuntu@$IP" "echo connected" 2>/dev/null; then
                echo "SSH ready on $IP"
                SSH_READY=true
                break
              fi
              echo "Waiting for SSH on $IP... (attempt $attempt/40)"
              sleep 15
            done

            if [ "$SSH_READY" = false ]; then
              echo "ERROR: SSH never became ready on $IP after 10 minutes — failing step to prevent silent misconfiguration"
              exit 1
            fi

            REMOTE_CMD="echo '${VM_USERNAME}:${VM_PASSWORD}' | sudo chpasswd"
            REMOTE_CMD="$REMOTE_CMD && sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config"
            REMOTE_CMD="$REMOTE_CMD && if [ -f /etc/ssh/sshd_config.d/60-cloudimg-settings.conf ]; then sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config.d/60-cloudimg-settings.conf; fi"
            REMOTE_CMD="$REMOTE_CMD && sudo systemctl restart ssh"
            REMOTE_CMD="$REMOTE_CMD && echo 'Password auth configured successfully on $IP'"

            ssh -i "$EC2_KEY_FILE" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              -o PubkeyAcceptedAlgorithms=+ssh-rsa \
              "ubuntu@$IP" "$REMOTE_CMD"
          done
          echo "Password configuration complete on all Linux/CP VMs"

      - name: Extract Deployment Information
        id: deployment-info
        run: |
          cd $TF_DIR
          CP_IP=$(terraform output -raw control_plane_private_ip)
          LINUX_IPS=$(terraform output -json linux_worker_private_ips | jq -c .)
          WINDOWS_IPS=$(terraform output -json windows_worker_private_ips | jq -c .)
          echo "control_plane_vm_ip_address=$CP_IP" >> $GITHUB_OUTPUT
          echo "linux_worker_vm_ip_addresses=$LINUX_IPS" >> $GITHUB_OUTPUT
          echo "windows_worker_vm_ip_addresses=$WINDOWS_IPS" >> $GITHUB_OUTPUT
          echo "Control Plane IP: $CP_IP"
          echo "Linux Worker IPs (NFS): $LINUX_IPS"
          echo "Windows Worker IPs (SMB): $WINDOWS_IPS"

      # ── Shared: install sshpass, download & copy installer, wait for boot ─
      - name: Install sshpass
        run: |
          echo "Installing sshpass..."

          # Kill any background apt processes holding the lock
          sudo pkill -9 -f unattended-upgrade 2>/dev/null || true
          sudo pkill -9 -f apt.systemd.daily 2>/dev/null || true
          sleep 2

          # Remove stale lock files if no apt process is running
          if ! pgrep -f 'apt|dpkg' > /dev/null 2>&1; then
            sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock /var/cache/apt/archives/lock 2>/dev/null || true
            sudo dpkg --configure -a 2>/dev/null || true
          fi

          # Wait for any remaining apt locks (5 minutes max)
          for i in {1..60}; do
            if sudo apt-get update -qq 2>/dev/null; then
              break
            fi
            echo "Waiting for apt locks... (attempt $i/60)"
            sleep 5
          done

          sudo apt-get install -y sshpass
          echo "sshpass installed successfully."

      - name: Download Windows installer
        if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
        run: |
          WINDOWS_INSTALLER_URL="${{ inputs.windows_worker_installer_url || github.event.inputs.windows_worker_installer_url }}"
          if [ -n "$WINDOWS_INSTALLER_URL" ]; then
            echo "Downloading Windows installer from: $WINDOWS_INSTALLER_URL"
            curl -s -o "windows-worker-installer.exe" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
              "$WINDOWS_INSTALLER_URL"

            if [ ! -f "windows-worker-installer.exe" ] || [ ! -s "windows-worker-installer.exe" ]; then
              echo "Error: Failed to download Windows installer or file is empty"
              exit 1
            fi
            echo "Windows installer downloaded successfully."
          else
            echo "No Windows installer URL provided, skipping download"
          fi

      - name: Copy Windows installer to Windows VMs
        if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
        run: |
          WINDOWS_IPS='${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}'

          if [ ! -f "windows-worker-installer.exe" ]; then
            echo "Windows installer file not found, skipping copy to Windows VMs"
            exit 0
          fi

          # Parse JSON array ["ip1","ip2",...] into shell array using jq
          mapfile -t WINDOWS_IP_ARRAY < <(echo "$WINDOWS_IPS" | jq -r '.[]')

          if [ ${#WINDOWS_IP_ARRAY[@]} -eq 0 ]; then
            echo "No Windows VM IP addresses found, skipping copy"
            exit 0
          fi

          echo "Found ${#WINDOWS_IP_ARRAY[@]} Windows VM(s), copying installer to each..."

          for i in "${!WINDOWS_IP_ARRAY[@]}"; do
            WINDOWS_IP="${WINDOWS_IP_ARRAY[$i]}"
            echo "$WINDOWS_IP"
            VM_INDEX=$((i + 1))
            
            echo "Copying Windows installer to Windows VM #$VM_INDEX at $WINDOWS_IP"

            # Wait for Windows SSH to be ready (user_data installs OpenSSH which takes time)
            echo "Waiting for SSH on Windows VM #$VM_INDEX ($WINDOWS_IP)..."
            SSH_READY=false
            for attempt in {1..30}; do
              if SSHPASS="$VM_PASSWORD" sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 "$VM_USERNAME@$WINDOWS_IP" "echo ready" 2>/dev/null; then
                echo "SSH ready on Windows VM #$VM_INDEX"
                SSH_READY=true
                break
              fi
              echo "  attempt $attempt/30 — waiting 20s..."
              sleep 20
            done

            if [ "$SSH_READY" = "false" ]; then
              echo "SSH never became ready on Windows VM #$VM_INDEX ($WINDOWS_IP) after 10 minutes, skipping"
              continue
            fi

            if SSHPASS="$VM_PASSWORD" sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 windows-worker-installer.exe "$VM_USERNAME@$WINDOWS_IP:/C:/Temp/"; then
              echo "Windows installer copied successfully to Windows VM #$VM_INDEX ($WINDOWS_IP)"
            else
              echo "Failed to copy Windows installer to Windows VM #$VM_INDEX ($WINDOWS_IP)"
              # Continue with other VMs instead of failing completely
            fi
          done

          echo "Completed copying Windows installer to all available Windows VMs"

      - name: Wait for Service Boot Setup to Complete
        run: |
          echo "Monitoring service boot setup on ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}..."

          # Ensure script is executable
          chmod +x ./app-deployment/scripts/service_check.sh

          # Run the service_check.sh script to wait for the microk8s-boot service to complete
          ./app-deployment/scripts/service_check.sh \
          "${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}" \
          "$VM_USERNAME" \
          "$VM_PASSWORD"

          if [ $? -ne 0 ]; then
            echo "Service setup failed or timed out"
            exit 1
          fi

          echo "Service setup completed successfully"

  run-observability-tests:
    name: Run Observability Smoke Tests
    runs-on: openlab
    needs: setup-infrastructure
    env:
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Resolve SSH credentials for the control plane
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV

      - name: Run Prometheus observability smoke tests
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          ginkgo --timeout=5m -v ./tests/observability/...

  run-smb-tests:
    name: Run SMB API Tests
    runs-on: openlab
    needs: setup-infrastructure
    if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
    env:
      CLOUD_PROVIDER: ${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'azure' }}
      VOLUME_CLONE_PROVIDER: ${{ inputs.volume_clone_provider || github.event.inputs.volume_clone_provider || 'ontap' }}
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_SP_USERNAME }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_SP_PASSWORD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      NDM_E2E_DEEP_MIGRATION_VALIDATION: ${{ vars.NDM_E2E_DEEP_MIGRATION_VALIDATION || 'true' }}

      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      # Azure SMB worker + volume config
      AZURE_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      AZURE_SMB_NDM_WORKERS_PORT: ${{ vars.AZURE_SMB_NDM_WORKERS_PORT }}
      AZURE_SMB_SOURCE_VOLUMES: ${{ vars.AZURE_SMB_SOURCE_VOLUMES }}
      AZURE_SMB_DEST_VOLUMES: ${{ vars.AZURE_SMB_DEST_VOLUMES }}
      AZURE_SMB_SOURCE_HOST_IP: ${{ vars.AZURE_SMB_SOURCE_HOST_IP }}
      AZURE_SMB_DESTINATION_HOST_IP: ${{ vars.AZURE_SMB_DESTINATION_HOST_IP }}
      AZURE_SMB_DOMAIN_NAME: ${{ vars.AZURE_SMB_DOMAIN_NAME }}
      AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_SOURCE_RESOURCE_GROUP }}
      AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_ACCOUNT_NAME }}
      AZURE_ANF_SMB_SOURCE_POOL_NAME: ${{ vars.AZURE_ANF_SMB_SOURCE_POOL_NAME }}
      AZURE_ANF_SMB_DEST_RESOURCE_GROUP: ${{ vars.AZURE_ANF_SMB_DEST_RESOURCE_GROUP }}
      AZURE_ANF_SMB_DEST_ACCOUNT_NAME: ${{ vars.AZURE_ANF_SMB_DEST_ACCOUNT_NAME }}
      AZURE_ANF_SMB_DEST_POOL_NAME: ${{ vars.AZURE_ANF_SMB_DEST_POOL_NAME }}
      AZURE_SMB_PROTOCOL_USERNAME: ${{ secrets.AZURE_SMB_PROTOCOL_USERNAME }}
      AZURE_SMB_PROTOCOL_PASSWORD: ${{ secrets.AZURE_SMB_PROTOCOL_PASSWORD }}
      AZURE_AD_SMB_SOURCE_VOLUMES: ${{ vars.AZURE_AD_SMB_SOURCE_VOLUMES }}
      AZURE_AD_SMB_SOURCE_HOST_IP: ${{ vars.AZURE_AD_SMB_SOURCE_HOST_IP }}
      AWS_AD_SMB_SOURCE_VOLUMES: ${{ vars.AWS_AD_SMB_SOURCE_VOLUMES }}
      AWS_AD_SMB_SOURCE_HOST_IP: ${{ vars.AWS_AD_SMB_SOURCE_HOST_IP }}

      # ONTAP SMB volume config (used by Azure and vSphere)
      ONTAP_SMB_SOURCE_VOLUMES: ${{ vars.ONTAP_SMB_SOURCE_VOLUMES }}
      ONTAP_SMB_DEST_VOLUMES: ${{ vars.ONTAP_SMB_DEST_VOLUMES }}
      ONTAP_SMB_SRC_HOST_IP: ${{ vars.ONTAP_SMB_SRC_HOST_IP }}
      ONTAP_SMB_DST_HOST_IP: ${{ vars.ONTAP_SMB_DST_HOST_IP }}
      ONTAP_SRC_API_URL: ${{ vars.ONTAP_SRC_API_URL }}
      ONTAP_SYSTEM_MANAGER_SRC_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_SRC_USERNAME }}
      ONTAP_SYSTEM_MANAGER_SRC_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_SRC_PASSWORD }}
      ONTAP_SRC_SVM_NAME: ${{ vars.ONTAP_SRC_SVM_NAME }}
      ONTAP_DST_API_URL: ${{ vars.ONTAP_DST_API_URL }}
      ONTAP_SYSTEM_MANAGER_DST_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_DST_USERNAME }}
      ONTAP_SYSTEM_MANAGER_DST_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_DST_PASSWORD }}
      ONTAP_DST_SVM_NAME: ${{ vars.ONTAP_DST_SVM_NAME }}

      # AWS SMB worker + FSxN volume config (used when volume_clone_provider == aws-fsxn)
      AWS_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      AWS_SMB_NDM_WORKERS_PORT: ${{ vars.AWS_SMB_NDM_WORKERS_PORT }}
      AWS_SMB_PROTOCOL_USERNAME: ${{ secrets.AWS_SMB_PROTOCOL_USERNAME }}
      AWS_SMB_PROTOCOL_PASSWORD: ${{ secrets.AWS_SMB_PROTOCOL_PASSWORD }}
      AWS_SMB_DOMAIN_NAME: ${{ vars.AWS_SMB_DOMAIN_NAME }}
      AWS_FSXN_SRC_API_URL: ${{ vars.AWS_FSXN_SRC_API_URL }}
