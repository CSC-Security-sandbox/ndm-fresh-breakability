        ```
        EOF
          fi
          
          if [ -n "${{ steps.parser.outputs.e2e_nfs_failure }}" ]; then
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        
        ```
        ${{ steps.parser.outputs.e2e_nfs_failure }}
        ```
        EOF
          fi
        fi
        
        # Add the rest of the summary
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
