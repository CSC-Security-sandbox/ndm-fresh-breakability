name: Run E2E API Automation Tests for NDM on Azure

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  TERRAFORM_VERSION: 1.12.1
  GO_VERSION: 1.24.2
  NODE_VERSION: 22.15.0

on:
  workflow_dispatch:
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        required: true
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test'
        required: false
        default: 'Both'
        type: choice
        options:
          - 'Both'
          - 'SMB'
          - 'NFS'
      run_smoke_tests:
        description: 'Run smoke tests'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Run end-to-end tests'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Run regression tests'
        required: false
        default: true
        type: boolean

  workflow_call: 
    inputs:
      control_plane_image_version:
        description: 'Image version for control plane'
        required: true
        type: string
      worker_image_version:
        description: 'Image version for Linux workers'
        required: true
        type: string
      windows_worker_installer_url:
        description: 'Artifactory URL for windows worker installer'
        type: string
      build_version:
        description: 'Build version for support bundle uploads'
        required: true
        type: string
      ref_type:
        description: 'Reference type (releases or branches)'
        required: true
        type: string
      protocol:
        description: 'Select protocol to test (Both/SMB/NFS)'
        required: false
        default: 'Both'
        type: string
      run_smoke_tests:
        description: 'Whether to run smoke tests (true/false)'
        required: false
        default: true
        type: boolean
      run_e2e_tests:
        description: 'Whether to run end-to-end tests (true/false)'
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: 'Whether to run regression tests (true/false)'
        required: false
        default: true
        type: boolean

permissions: 
  contents: read

jobs:
  setup-infrastructure:
    name: Setup Infrastructure and Services
    runs-on: openlab
    outputs:
      control_plane_vm_ip_address: ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}
      linux_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.linux_worker_vm_ip_addresses }}
      windows_worker_vm_ip_addresses: ${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}
    steps:
      
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Provider Credentials
        id: credentials
        run: |
          mkdir -p $GITHUB_WORKSPACE/credentials

          echo "Setting VM credentials..."
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)

          # Write to GITHUB_ENV
          echo "VM_USERNAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          # Azure Provider Credentials
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_USERNAME }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_PASSWORD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
        
          CONTROL_PLANE_IMAGE="${{ inputs.control_plane_image_version || github.event.inputs.control_plane_image_version }}"
          WORKER_IMAGE="${{ inputs.worker_image_version || github.event.inputs.worker_image_version }}"

          # Azure Terraform Variables
          echo "TF_VAR_control_plane_image_version=$CONTROL_PLANE_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_worker_image_version=$WORKER_IMAGE" >> $GITHUB_ENV

          # Determine VM owner based on trigger type
          TRIGGER_TYPE="${{ inputs.trigger_type || github.event_name }}"
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          if [[ "$TRIGGER_TYPE" == "schedule" ]]; then
            VM_OWNER="NDM-Nightly-$TIMESTAMP"
            echo "Nightly build detected (trigger: $TRIGGER_TYPE) - VM owner set to: $VM_OWNER"
          else
            VM_OWNER="${{ github.actor }}-$TIMESTAMP"
            echo "Adhoc/called build detected (trigger: $TRIGGER_TYPE) - VM owner set to: $VM_OWNER"
          fi
          echo "TF_VAR_vm_owner=$VM_OWNER" >> $GITHUB_ENV
          echo "TF_VAR_admin_username=$VM_USERNAME" >> $GITHUB_ENV
          echo "TF_VAR_admin_password=$VM_PASSWORD" >> $GITHUB_ENV
          echo "TF_VAR_dns_servers=${{ vars.AZURE_WIN_DNS_SERVERS }}" >> $GITHUB_ENV 

      - name: Initialize Terraform
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform init

      - name: Validate Terraform Configuration
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform validate

      - name: Create Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform plan -out=tfplan

      - name: Apply Terraform Plan
        run: |
          cd app-deployment/terraform/azure/environments/api
          terraform apply -auto-approve tfplan

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: terraform-state
          path: |
            app-deployment/terraform/azure/environments/api/terraform.tfstate
            app-deployment/terraform/azure/environments/api/.terraform.lock.hcl
            app-deployment/terraform/azure/environments/api/.terraform

      - name: Extract Deployment Information
        id: deployment-info
        run: |
          cd app-deployment/terraform/azure/environments/api
          CONTROL_PLANE_IP=$(terraform output -raw control_plane_private_ip)
          LINUX_WORKER_IPS=$(terraform output -json linux_worker_private_ips | jq -c .)
          WINDOWS_WORKER_IPS=$(terraform output -json windows_worker_private_ips | jq -c .)
          echo "windows_worker_vm_ip_addresses=$WINDOWS_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "control_plane_vm_ip_address=$CONTROL_PLANE_IP" >> $GITHUB_OUTPUT
          echo "linux_worker_vm_ip_addresses=$LINUX_WORKER_IPS" >> $GITHUB_OUTPUT
          echo "Control Plane IP: $CONTROL_PLANE_IP"
          echo "Linux Worker IPs (NFS): $LINUX_WORKER_IPS"
          echo "Windows Worker IPs (SMB): $WINDOWS_WORKER_IPS"

      - name: Install sshpass
        run: |
          echo "Installing sshpass..."
          
          # Wait for apt locks to be released (max 5 minutes)
          for i in {1..60}; do
            if sudo apt-get update -qq 2>/dev/null; then
              break
            fi
            echo "Waiting for apt locks... (attempt $i/60)"
            sleep 5
          done
          
          # Install sshpass with retry
          sudo apt-get install -y sshpass || {
            echo "First attempt failed, retrying after cleanup..."
            sudo pkill -9 unattended-upgrade 2>/dev/null || true
            sleep 5
            sudo apt-get install -y sshpass
          }
          
          echo "sshpass installed successfully."

      - name: Download Windows installer
        if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
        run: |
          WINDOWS_INSTALLER_URL="${{ inputs.windows_worker_installer_url || github.event.inputs.windows_worker_installer_url }}"
          if [ -n "$WINDOWS_INSTALLER_URL" ]; then
            echo "Downloading Windows installer from: $WINDOWS_INSTALLER_URL"
            curl -s -o "windows-worker-installer.exe" \
              -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
              "$WINDOWS_INSTALLER_URL"
            
            if [ ! -f "windows-worker-installer.exe" ] || [ ! -s "windows-worker-installer.exe" ]; then
              echo "Error: Failed to download Windows installer or file is empty"
              exit 1
            fi
            echo "Windows installer downloaded successfully."
          else
            echo "No Windows installer URL provided, skipping download"
          fi

      - name: Copy Windows installer to Windows VMs
        if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
        run: |
          WINDOWS_IPS='${{ steps.deployment-info.outputs.windows_worker_vm_ip_addresses }}'
          
          if [ ! -f "windows-worker-installer.exe" ]; then
            echo "Windows installer file not found, skipping copy to Windows VMs"
            exit 0
          fi
          
          WINDOWS_IP_ARRAY=($(echo "$WINDOWS_IPS" | jq -r '.[]'))
          
          if [ ${#WINDOWS_IP_ARRAY[@]} -eq 0 ]; then
            echo "No Windows VM IP addresses found, skipping copy"
            exit 0
          fi
          
          echo "Found ${#WINDOWS_IP_ARRAY[@]} Windows VM(s), copying installer to each..."
          
          for i in "${!WINDOWS_IP_ARRAY[@]}"; do
            WINDOWS_IP="${WINDOWS_IP_ARRAY[$i]}"
            echo "$WINDOWS_IP"
            VM_INDEX=$((i + 1))
            
            echo "Copying Windows installer to Windows VM #$VM_INDEX at $WINDOWS_IP"
            if SSHPASS="$VM_PASSWORD" sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              windows-worker-installer.exe "$VM_USERNAME@$WINDOWS_IP:/C:/Temp/"; then
              echo "Windows installer copied successfully to Windows VM #$VM_INDEX ($WINDOWS_IP)"
            else
              echo "Failed to copy Windows installer to Windows VM #$VM_INDEX ($WINDOWS_IP)"
              # Continue with other VMs instead of failing completely
            fi
          done
          
          echo "Completed copying Windows installer to all available Windows VMs"

      - name: Wait for Service Boot Setup to Complete
        run: |
          echo "Monitoring service boot setup on ${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}..."
          
          # Ensure script is executable
          chmod +x ./app-deployment/scripts/service_check.sh
          
          # Run the service_check.sh script to wait for the microk8s-boot service to complete
          ./app-deployment/scripts/service_check.sh \
          "${{ steps.deployment-info.outputs.control_plane_vm_ip_address }}" \
          "$VM_USERNAME" \
          "$VM_PASSWORD"

          if [ $? -ne 0 ]; then
            echo "Service setup failed or timed out"
            exit 1
          fi
          
          echo "Service setup completed successfully"

  run-smb-tests:
    name: Run SMB API Tests
    runs-on: openlab
    needs: setup-infrastructure
    if: ${{ (inputs.protocol == 'SMB' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'SMB' || github.event.inputs.protocol == 'Both') }}
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}

      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      AZURE_SMB_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.windows_worker_vm_ip_addresses), ',') }}
      AZURE_SMB_NDM_WORKERS_PORT: ${{ vars.AZURE_SMB_NDM_WORKERS_PORT }}
      ONTAP_SMB_SOURCE_VOLUMES: ${{ vars.ONTAP_SMB_SOURCE_VOLUMES }}
      ONTAP_SMB_DEST_VOLUMES: ${{ vars.ONTAP_SMB_DEST_VOLUMES }}
      ONTAP_SMB_SRC_HOST_IP: ${{ vars.ONTAP_SMB_SRC_HOST_IP }}
      ONTAP_SMB_DST_HOST_IP: ${{ vars.ONTAP_SMB_DST_HOST_IP }}
      ONTAP_SRC_API_URL: ${{ vars.ONTAP_SRC_API_URL }}
      ONTAP_SYSTEM_MANAGER_SRC_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_SRC_USERNAME }}
      ONTAP_SYSTEM_MANAGER_SRC_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_SRC_PASSWORD }}
      ONTAP_SRC_SVM_NAME: ${{ vars.ONTAP_SRC_SVM_NAME }}
      ONTAP_DST_API_URL: ${{ vars.ONTAP_DST_API_URL }}
      ONTAP_SYSTEM_MANAGER_DST_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_DST_USERNAME }}
      ONTAP_SYSTEM_MANAGER_DST_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_DST_PASSWORD }}
      ONTAP_DST_SVM_NAME: ${{ vars.ONTAP_DST_SVM_NAME }}
      AZURE_SMB_PROTOCOL_USERNAME: ${{ secrets.AZURE_SMB_PROTOCOL_USERNAME }}
      AZURE_SMB_PROTOCOL_PASSWORD: ${{ secrets.AZURE_SMB_PROTOCOL_PASSWORD }}
      AD_SMB_SOURCE_VOLUMES: ${{ vars.AD_SMB_SOURCE_VOLUMES }}
      AD_SMB_SOURCE_HOST_IP: ${{ vars.AD_SMB_SOURCE_HOST_IP }}
      SMB_EXECUTABLE_FILENAME: ${{ vars.SMB_EXECUTABLE_FILENAME }}
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
      RATE_LIMIT_MAX_ALLOWED_SUCCESS_REQ: ${{ vars.RATE_LIMIT_MAX_ALLOWED_SUCCESS_REQ }}
      PROTOCOL_TYPE: SMB
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup credentials for SMB tests
        run: |

          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_SMB_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV
      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "Ginkgo and Gomega installed successfully."

      - name: Run SMB API Tests
        run: |
          cd ndm-api-tests
          chmod +x ./run-smb-azure-automation.sh

          SCRIPT_ARGS=""
          RUN_SMOKE="${{ inputs.run_smoke_tests || github.event.inputs.run_smoke_tests || 'true' }}"
          RUN_E2E="${{ inputs.run_e2e_tests || github.event.inputs.run_e2e_tests || 'true' }}"
          RUN_REGRESSION="${{ inputs.run_regression_tests || github.event.inputs.run_regression_tests || 'true' }}"
          
          if [ "$RUN_SMOKE" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --smoke"
          fi
          
          if [ "$RUN_E2E" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --e2e"
          fi
          
          if [ "$RUN_REGRESSION" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --regression"
          fi
          
          echo "Running SMB tests with arguments: $SCRIPT_ARGS"
          ./run-smb-azure-automation.sh $SCRIPT_ARGS
        continue-on-error: true

      - name: Upload SMB Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: smb-test-logs-${{ github.run_id }}
          path: ndm-api-tests/reports/
          retention-days: 30

  run-nfs-tests:
    name: Run NFS API Tests
    runs-on: openlab
    needs: setup-infrastructure
    if: ${{ (inputs.protocol == 'NFS' || inputs.protocol == 'Both' || github.event.inputs.protocol == 'NFS' || github.event.inputs.protocol == 'Both') }}
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      AZURE_NFS_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.linux_worker_vm_ip_addresses), ',') }}
      AZURE_NFS_NDM_WORKERS_PORT: ${{ vars.AZURE_NFS_NDM_WORKERS_PORT }}
      ONTAP_NFS_SOURCE_VOLUMES: ${{ vars.ONTAP_NFS_SOURCE_VOLUMES }}
      ONTAP_NFS_DEST_VOLUMES: ${{ vars.ONTAP_NFS_DEST_VOLUMES }}
      ONTAP_NFS_SRC_HOST_IP: ${{ vars.ONTAP_NFS_SRC_HOST_IP }}
      ONTAP_NFS_DST_HOST_IP: ${{ vars.ONTAP_NFS_DST_HOST_IP }}
      ONTAP_SRC_API_URL: ${{ vars.ONTAP_SRC_API_URL }}
      ONTAP_SYSTEM_MANAGER_SRC_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_SRC_USERNAME }}
      ONTAP_SYSTEM_MANAGER_SRC_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_SRC_PASSWORD }}
      ONTAP_SRC_SVM_NAME: ${{ vars.ONTAP_SRC_SVM_NAME }}
      ONTAP_DST_API_URL: ${{ vars.ONTAP_DST_API_URL }}
      ONTAP_SYSTEM_MANAGER_DST_USERNAME: ${{ vars.ONTAP_SYSTEM_MANAGER_DST_USERNAME }}
      ONTAP_SYSTEM_MANAGER_DST_PASSWORD: ${{ secrets.ONTAP_SYSTEM_MANAGER_DST_PASSWORD }}
      ONTAP_DST_SVM_NAME: ${{ vars.ONTAP_DST_SVM_NAME }}
      AZURE_NFS_PROTOCOL_USERNAME: ${{ vars.AZURE_NFS_PROTOCOL_USERNAME }}
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
      RATE_LIMIT_MAX_ALLOWED_SUCCESS_REQ: ${{ vars.RATE_LIMIT_MAX_ALLOWED_SUCCESS_REQ }}
      PROTOCOL_TYPE: NFS
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Waiting
        run: |
          sleep 30
          echo "Wait completed"

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup credentials for NFS tests
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV

      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "Ginkgo and Gomega installed successfully."

      - name: Run NFS API Tests
        run: |
          cd ndm-api-tests
          chmod +x ./run-nfs-azure-automation.sh
          
          SCRIPT_ARGS=""
          RUN_SMOKE="${{ inputs.run_smoke_tests || github.event.inputs.run_smoke_tests || 'true' }}"
          RUN_E2E="${{ inputs.run_e2e_tests || github.event.inputs.run_e2e_tests || 'true' }}"
          RUN_REGRESSION="${{ inputs.run_regression_tests || github.event.inputs.run_regression_tests || 'true' }}"
          
          if [ "$RUN_SMOKE" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --smoke"
          fi
          
          if [ "$RUN_E2E" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --e2e"
          fi
          
          if [ "$RUN_REGRESSION" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --regression"
          fi
          
          echo "Running NFS tests with arguments: $SCRIPT_ARGS"
          ./run-nfs-azure-automation.sh $SCRIPT_ARGS
        continue-on-error: true

      - name: Upload NFS Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nfs-test-logs-${{ github.run_id }}
          path: ndm-api-tests/reports/
          retention-days: 30

  send-workflow-card:
    name: Parse Test Results & Send Notifications
    runs-on: openlab
    if: ${{ github.event_name == 'schedule' }}
    needs: [setup-infrastructure, run-nfs-tests, run-smb-tests]
    outputs:
      test_status: ${{ steps.workflow_outputs.outputs.test_status }}
      total_tests: ${{ steps.workflow_outputs.outputs.total_tests }}
      total_failed: ${{ steps.workflow_outputs.outputs.total_failed }}
      pipeline_url: ${{ steps.workflow_outputs.outputs.pipeline_url }}
      badge_color: ${{ steps.workflow_outputs.outputs.badge_color }}
      badge_message: ${{ steps.workflow_outputs.outputs.badge_message }}

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Go for Parser
      uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup GitHub Token
      run: |
        echo "GITHUB_TOKEN=${{ secrets.GITOPS_USER_GITHUB_TOKEN }}" >> $GITHUB_ENV

    - name: Run Nightly Parser and Capture Output
      id: parser
      run: |
        cd ndm-api-tests/parser
        echo "Installing Go dependencies..."
        go mod tidy
        echo "Go dependencies installed successfully"
        echo ""
        echo "Running nightly parser..."
        echo "=========================="
        
        # Capture parser output
        OUTPUT=$(go run nightly-parser.go 2>&1)
        echo "$OUTPUT"
        
        # Extract summary between markers
        SUMMARY=$(echo "$OUTPUT" | sed -n '/TEST_SUMMARY_START/,/TEST_SUMMARY_END/p' | sed '1d;$d')
        
        # Extract JSON results between markers
        JSON_RESULTS=$(echo "$OUTPUT" | sed -n '/JSON_RESULTS_START/,/JSON_RESULTS_END/p' | sed '1d;$d')
        
        # Extract individual metrics
        TOTAL_TESTS=$(echo "$OUTPUT" | grep "TOTAL_TESTS=" | cut -d'=' -f2)
        TOTAL_PASSED=$(echo "$OUTPUT" | grep "TOTAL_PASSED=" | cut -d'=' -f2)
        TOTAL_FAILED=$(echo "$OUTPUT" | grep "TOTAL_FAILED=" | cut -d'=' -f2)
        TOTAL_SKIPPED=$(echo "$OUTPUT" | grep "TOTAL_SKIPPED=" | cut -d'=' -f2)
        PIPELINE_URL=$(echo "$OUTPUT" | grep "PIPELINE_URL=" | cut -d'=' -f2-)
        TEST_STATUS=$(echo "$OUTPUT" | grep "TEST_STATUS=" | cut -d'=' -f2)
        
        # Extract individual test result lines
        SMOKE_SMB_LINE=$(echo "$OUTPUT" | grep "SMOKE_SMB_LINE=" | cut -d'=' -f2- || echo "")
        SMOKE_NFS_LINE=$(echo "$OUTPUT" | grep "SMOKE_NFS_LINE=" | cut -d'=' -f2- || echo "")
        E2E_SMB_LINE=$(echo "$OUTPUT" | grep "E2E_SMB_LINE=" | cut -d'=' -f2- || echo "")
        E2E_NFS_LINE=$(echo "$OUTPUT" | grep "E2E_NFS_LINE=" | cut -d'=' -f2- || echo "")
        REGRESSION_SMB_LINE=$(echo "$OUTPUT" | grep "REGRESSION_SMB_LINE=" | cut -d'=' -f2- || echo "")
        REGRESSION_NFS_LINE=$(echo "$OUTPUT" | grep "REGRESSION_NFS_LINE=" | cut -d'=' -f2- || echo "")
        
        # Extract individual failure summaries
        SMOKE_SMB_FAILURE=$(echo "$OUTPUT" | sed -n '/SMOKE_SMB_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        SMOKE_NFS_FAILURE=$(echo "$OUTPUT" | sed -n '/SMOKE_NFS_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        E2E_SMB_FAILURE=$(echo "$OUTPUT" | sed -n '/E2E_SMB_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        E2E_NFS_FAILURE=$(echo "$OUTPUT" | sed -n '/E2E_NFS_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        REGRESSION_SMB_FAILURE=$(echo "$OUTPUT" | sed -n '/REGRESSION_SMB_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        REGRESSION_NFS_FAILURE=$(echo "$OUTPUT" | sed -n '/REGRESSION_NFS_FAILURE<<EOF/,/^EOF$/p' | sed '1d;$d' || echo "")
        
        # Set GitHub Actions outputs
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "json_results<<EOF" >> $GITHUB_OUTPUT
        echo "$JSON_RESULTS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "total_tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
        echo "total_passed=$TOTAL_PASSED" >> $GITHUB_OUTPUT
        echo "total_failed=$TOTAL_FAILED" >> $GITHUB_OUTPUT
        echo "total_skipped=$TOTAL_SKIPPED" >> $GITHUB_OUTPUT
        echo "pipeline_url=$PIPELINE_URL" >> $GITHUB_OUTPUT
        echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT
        
        # Set individual test result lines as outputs
        echo "smoke_smb_line=$SMOKE_SMB_LINE" >> $GITHUB_OUTPUT
        echo "smoke_nfs_line=$SMOKE_NFS_LINE" >> $GITHUB_OUTPUT
        echo "e2e_smb_line=$E2E_SMB_LINE" >> $GITHUB_OUTPUT
        echo "e2e_nfs_line=$E2E_NFS_LINE" >> $GITHUB_OUTPUT
        echo "regression_smb_line=$REGRESSION_SMB_LINE" >> $GITHUB_OUTPUT
        echo "regression_nfs_line=$REGRESSION_NFS_LINE" >> $GITHUB_OUTPUT
        
        # Set individual failure summary outputs
        echo "smoke_smb_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$SMOKE_SMB_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "smoke_nfs_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$SMOKE_NFS_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "e2e_smb_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$E2E_SMB_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "e2e_nfs_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$E2E_NFS_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "regression_smb_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$REGRESSION_SMB_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "regression_nfs_failure<<EOF" >> $GITHUB_OUTPUT
        echo "$REGRESSION_NFS_FAILURE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "=========================="
        echo "Parser execution completed."

    - name: Display Captured Results
      run: |
        echo "=== CAPTURED TEST SUMMARY ==="
        echo "${{ steps.parser.outputs.summary }}"
        echo ""
        echo "=== TEST METRICS ==="
        echo "Total Tests: ${{ steps.parser.outputs.total_tests }}"
        echo "Passed: ${{ steps.parser.outputs.total_passed }}"
        echo "Failed: ${{ steps.parser.outputs.total_failed }}"
        echo "Skipped: ${{ steps.parser.outputs.total_skipped }}"
        echo "Status: ${{ steps.parser.outputs.test_status }}"
        echo "Pipeline: ${{ steps.parser.outputs.pipeline_url }}"
        echo ""
        echo "=== JSON RESULTS ==="
        echo "${{ steps.parser.outputs.json_results }}"

    - name: Send Teams Notification Card
      if: always()
      run: |
        # Determine test status for title and color
        TOTAL_FAILED="${{ steps.parser.outputs.total_failed }}"
        TOTAL_TESTS="${{ steps.parser.outputs.total_tests }}"
        TOTAL_PASSED="${{ steps.parser.outputs.total_passed }}"
        TOTAL_SKIPPED="${{ steps.parser.outputs.total_skipped }}"
