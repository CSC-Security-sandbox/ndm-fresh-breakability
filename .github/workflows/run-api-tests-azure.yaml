  run-nfs-tests:
    name: Run NFS API Tests
    runs-on: openlab
    needs: setup-infrastructure
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}

      NDM_USERNAME: ${{ secrets.NDM_APP_USERNAME }}
      PASSWORD: ${{ secrets.NDM_APP_PASSWORD }}
      
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}

      AZURE_NFS_NDM_WORKERS_HOST: ${{ join(fromJSON(needs.setup-infrastructure.outputs.linux_worker_vm_ip_addresses), ',') }}
      AZURE_NFS_NDM_WORKERS_PORT: ${{ vars.AZURE_NFS_NDM_WORKERS_PORT }}
      AZURE_NFS_SOURCE_VOLUMES: ${{ vars.AZURE_NFS_SOURCE_VOLUMES }}
      AZURE_NFS_DESTINATION_VOLUMES: ${{ vars.AZURE_NFS_DESTINATION_VOLUMES }}
      AZURE_NFS_SOURCE_HOST_IP: ${{ vars.AZURE_NFS_SOURCE_HOST_IP }}
      AZURE_NFS_DESTINATION_HOST_IP: ${{ vars.AZURE_NFS_DESTINATION_HOST_IP }}
      AZURE_NFS_PROTOCOL_USERNAME: ${{ vars.AZURE_NFS_PROTOCOL_USERNAME }}
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
    steps:
      - name: Waiting
        run: |
          sleep 30
          echo "Wait completed"

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup credentials for NFS tests
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$VM_PASSWORD"
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "AZURE_NFS_NDM_WORKERS_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV

      - name: Install Ginkgo
        run: |
          cd ndm-api-tests
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go get github.com/onsi/gomega/...
          go mod tidy
          echo "Ginkgo and Gomega installed successfully."

      - name: Run NFS API Tests
        run: |
          cd ndm-api-tests
          chmod +x ./run-nfs-azure-automation.sh
          ./run-nfs-azure-automation.sh
        continue-on-error: true

      - name: Upload NFS Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nfs-test-logs-${{ github.run_id }}
          path: ndm-api-tests/reports/
          retention-days: 30

  upload-support-bundle:
    name: Upload Support Bundles
    runs-on: openlab
    needs: [setup-infrastructure, run-nfs-tests]
    if: always()
    env:
      JOB_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      CONFIG_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      ADMIN_SERVICE_URL: https://${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      KEYCLOAK_IP: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_HOST: ${{ needs.setup-infrastructure.outputs.control_plane_vm_ip_address }}
      NDM_VM_PORT: ${{ vars.NDM_VM_PORT }}
      BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
      REF_TYPE: ${{ inputs.ref_type || github.event.inputs.ref_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go for API Tests
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup credentials for support bundle
        run: |
          VM_USERNAME=$(echo "${{ secrets.NDM_SSH_USERNAME }}" | base64 --decode)
          VM_PASSWORD=$(echo "${{ secrets.NDM_SSH_PASSWORD }}" | base64 --decode)
          
          echo "NDM_VM_USER_NAME=$VM_USERNAME" >> $GITHUB_ENV
          echo "NDM_VM_PASSWORD=$VM_PASSWORD" >> $GITHUB_ENV
          echo "NDM_NEXUS_USERNAME=${{ secrets.NDM_NEXUS_USERNAME }}" >> $GITHUB_ENV
          echo "NDM_NEXUS_PASSWORD=${{ secrets.NDM_NEXUS_PASSWORD }}" >> $GITHUB_ENV
          echo "NDM_USERNAME=${{ secrets.NDM_APP_USERNAME }}" >> $GITHUB_ENV
          echo "PASSWORD=${{ secrets.NDM_APP_PASSWORD }}" >> $GITHUB_ENV
      - name: Install Go dependencies
        run: |
          cd ndm-api-tests
          go mod tidy
          echo "Go dependencies installed successfully"
          cd support-bundle
          go run support_bundle.go
          echo "Support bundle uploaded successfully"

