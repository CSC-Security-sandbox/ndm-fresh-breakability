  # ---------------------------------------------------------------------------
  # 7. Report failure if any build stage or E2E failed
  # ---------------------------------------------------------------------------
  report-failure:
    name: Report Build / E2E Failure
    needs: [collect-dependabot-prs, create-security-branch, build-service-images, build-worker-binary, trigger-vm-build-and-e2e]
    if: >-
      always()
      && needs.create-security-branch.result == 'success'
      && (needs.build-service-images.result == 'failure'
          || needs.build-worker-binary.result == 'failure'
          || needs.trigger-vm-build-and-e2e.result == 'failure')
    runs-on: openlab
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Post failure summary
        run: |
          SECURITY_BRANCH="${{ needs.collect-dependabot-prs.outputs.security_branch }}"
          MERGED_PRS="${{ needs.create-security-branch.outputs.merged_prs }}"
          SERVICE_BUILD="${{ needs.build-service-images.result }}"
          WORKER_BUILD="${{ needs.build-worker-binary.result }}"
          VM_BUILD="${{ needs.trigger-vm-build-and-e2e.result }}"
          BUILD_RUN_ID="${{ needs.trigger-vm-build-and-e2e.outputs.build_run_id }}"

          echo "========== FAILURE REPORT =========="
          echo "Security branch: $SECURITY_BRANCH"
          echo "Merged PRs:      $MERGED_PRS"
          echo "Service build:   $SERVICE_BUILD"
          echo "Worker build:    $WORKER_BUILD"
          echo "VM build + E2E:  $VM_BUILD"
          echo ""
          echo "The security branch has NOT been merged to main."
          echo "Manual investigation is required."
          echo "===================================="

          echo "## Vulnerability Fix Automation - FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Branch:** \`$SECURITY_BRANCH\` (still exists for inspection)" >> $GITHUB_STEP_SUMMARY
          echo "**Merged PRs:** #${MERGED_PRS//,/, #}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| ----- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Image Build | $SERVICE_BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker Binary Build | $WORKER_BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| VM Build + E2E | $VM_BUILD |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$BUILD_RUN_ID" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**VM Build Run:** [$BUILD_RUN_ID](${{ github.server_url }}/${{ github.repository }}/actions/runs/$BUILD_RUN_ID)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The security branch was **not** merged to main. Please investigate and either:" >> $GITHUB_STEP_SUMMARY
          echo "1. Fix the issues and re-run this workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Merge the security branch manually after resolving failures" >> $GITHUB_STEP_SUMMARY
          echo "3. Delete the security branch and process PRs individually" >> $GITHUB_STEP_SUMMARY
