name: Automate Dependabot Vulnerability Fixes

on:
  workflow_dispatch:
    inputs:
      max_prs:
        description: 'Maximum number of Dependabot PRs to batch (up to 3)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
      dry_run:
        description: 'Dry run - list PRs without merging or triggering builds'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  # schedule:
  #   - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write
  actions: write
  id-token: write

env:
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}

jobs:

  # ---------------------------------------------------------------------------
  # 1. Scan for open Dependabot PRs targeting main
  # ---------------------------------------------------------------------------
  collect-dependabot-prs:
    name: Collect Open Dependabot PRs
    runs-on: openlab
    outputs:
      pr_numbers: ${{ steps.collect.outputs.pr_numbers }}
      pr_branches: ${{ steps.collect.outputs.pr_branches }}
      pr_count: ${{ steps.collect.outputs.pr_count }}
      pr_details: ${{ steps.collect.outputs.pr_details }}
      security_branch: ${{ steps.collect.outputs.security_branch }}
      has_prs: ${{ steps.collect.outputs.has_prs }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Collect open Dependabot PRs
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          MAX_PRS="${{ github.event.inputs.max_prs || '3' }}"
          SECURITY_BRANCH="security/vulnerability-fixes-$(date +'%Y%m%d-%H%M%S')"

          echo "Searching for open Dependabot PRs (max: $MAX_PRS)..."

          PRS=$(gh pr list \
            --author "app/dependabot" \
            --state open \
            --base main \
            --json number,title,headRefName \
            --limit "$MAX_PRS")

          PR_COUNT=$(echo "$PRS" | jq length)
          PR_NUMBERS=$(echo "$PRS" | jq -r '[.[].number] | join(",")')
          PR_BRANCHES=$(echo "$PRS" | jq -r '[.[].headRefName] | join(",")')

          echo "========== DEPENDABOT PR SCAN RESULTS =========="
          echo "Found $PR_COUNT Dependabot PR(s):"
          echo "$PRS" | jq -r '.[] | "  #\(.number): \(.title) [\(.headRefName)]"'
          echo "================================================="

          echo "pr_numbers=$PR_NUMBERS" >> $GITHUB_OUTPUT
          echo "pr_branches=$PR_BRANCHES" >> $GITHUB_OUTPUT
          echo "pr_count=$PR_COUNT" >> $GITHUB_OUTPUT
          echo "pr_details<<EOF" >> $GITHUB_OUTPUT
          echo "$PRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "security_branch=$SECURITY_BRANCH" >> $GITHUB_OUTPUT

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "has_prs=true" >> $GITHUB_OUTPUT
          else
            echo "has_prs=false" >> $GITHUB_OUTPUT
            echo "No open Dependabot PRs found targeting main."
          fi

          echo "## Dependabot PR Scan" >> $GITHUB_STEP_SUMMARY
          echo "| PR | Title | Branch |" >> $GITHUB_STEP_SUMMARY
          echo "| -- | ----- | ------ |" >> $GITHUB_STEP_SUMMARY
          BACKTICK='`'
          echo "$PRS" | jq -r --arg bt "$BACKTICK" '.[] | "| #\(.number) | \(.title) | \($bt)\(.headRefName)\($bt) |"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security branch:** ${BACKTICK}${SECURITY_BRANCH}${BACKTICK}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # 2. Create security branch from main & merge Dependabot PR branches into it
  # ---------------------------------------------------------------------------
  create-security-branch:
    name: Create Security Branch & Merge PRs
    needs: collect-dependabot-prs
    if: needs.collect-dependabot-prs.outputs.has_prs == 'true' && (github.event.inputs.dry_run != 'true')
    runs-on: openlab
    outputs:
      merged_prs: ${{ steps.merge-prs.outputs.merged_prs }}
      failed_prs: ${{ steps.merge-prs.outputs.failed_prs }}
      merged_count: ${{ steps.merge-prs.outputs.merged_count }}
      security_branch_sanitized: ${{ steps.merge-prs.outputs.security_branch_sanitized }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Create security branch and merge Dependabot PRs
        id: merge-prs
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          SECURITY_BRANCH="${{ needs.collect-dependabot-prs.outputs.security_branch }}"
          PR_NUMBERS="${{ needs.collect-dependabot-prs.outputs.pr_numbers }}"

          SECURITY_BRANCH_SANITIZED=$(echo "$SECURITY_BRANCH" | sed 's#/#-#g')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$SECURITY_BRANCH"
          echo "Created branch: $SECURITY_BRANCH from main ($(git rev-parse --short HEAD))"
          echo "Sanitized name: $SECURITY_BRANCH_SANITIZED"

          MERGED_PRS=""
          FAILED_PRS=""
          MERGED_COUNT=0

          IFS=',' read -ra PR_ARRAY <<< "$PR_NUMBERS"
          for PR_NUM in "${PR_ARRAY[@]}"; do
            echo ""
            echo "--- Processing PR #$PR_NUM ---"

            PR_BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
            PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title')
            echo "  Title:  $PR_TITLE"
            echo "  Branch: $PR_BRANCH"

            git fetch origin "$PR_BRANCH"

            if git merge "origin/$PR_BRANCH" --no-ff -m "Merge Dependabot PR #$PR_NUM: $PR_TITLE"; then
              echo "  Merged successfully"
              MERGED_PRS="${MERGED_PRS:+$MERGED_PRS,}$PR_NUM"
              MERGED_COUNT=$((MERGED_COUNT + 1))
            else
              echo "  Merge conflict detected, skipping PR #$PR_NUM"
              git merge --abort
              FAILED_PRS="${FAILED_PRS:+$FAILED_PRS,}$PR_NUM"
            fi
          done

          if [ "$MERGED_COUNT" -eq 0 ]; then
            echo "No PRs were successfully merged. Cannot proceed."
            echo "merged_prs=" >> $GITHUB_OUTPUT
            echo "failed_prs=$FAILED_PRS" >> $GITHUB_OUTPUT
            echo "merged_count=0" >> $GITHUB_OUTPUT
            echo "security_branch_sanitized=$SECURITY_BRANCH_SANITIZED" >> $GITHUB_OUTPUT
            exit 1
          fi

          git push origin "$SECURITY_BRANCH"
          echo ""
          echo "========== MERGE SUMMARY =========="
          echo "Security branch: $SECURITY_BRANCH"
          echo "Sanitized:       $SECURITY_BRANCH_SANITIZED"
          echo "Merged PRs ($MERGED_COUNT):  $MERGED_PRS"
          if [ -n "$FAILED_PRS" ]; then
            echo "Skipped PRs (conflicts): $FAILED_PRS"
          fi
          echo "==================================="

          echo "merged_prs=$MERGED_PRS" >> $GITHUB_OUTPUT
          echo "failed_prs=$FAILED_PRS" >> $GITHUB_OUTPUT
          echo "merged_count=$MERGED_COUNT" >> $GITHUB_OUTPUT
          echo "security_branch_sanitized=$SECURITY_BRANCH_SANITIZED" >> $GITHUB_OUTPUT

          echo "## Security Branch Merge Results" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$SECURITY_BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "**Merged PRs:** $MERGED_PRS" >> $GITHUB_STEP_SUMMARY
          if [ -n "$FAILED_PRS" ]; then
            echo "**Skipped (conflicts):** $FAILED_PRS" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # 3. Build & push all service Docker images from the security branch
  #    Dispatched on the security branch so Dependabot changes are built.
  #    Runs in PARALLEL with build-worker-binary.
  # ---------------------------------------------------------------------------
  build-service-images:
    name: Build & Push Service Images
    needs: [collect-dependabot-prs, create-security-branch]
    if: needs.create-security-branch.outputs.merged_count != '0'
    runs-on: openlab
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Dispatch service image build on security branch
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          SECURITY_BRANCH="${{ needs.collect-dependabot-prs.outputs.security_branch }}"

          echo "Dispatching build-push-service-images.yaml on $SECURITY_BRANCH (all services)..."

          gh workflow run build-push-service-images.yaml \
            --ref "$SECURITY_BRANCH" \
            -f all-services=true

          echo "Waiting for run to register..."
          sleep 30

          RUN_ID=$(gh run list \
            --workflow=build-push-service-images.yaml \
            --branch="$SECURITY_BRANCH" \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Retrying after 15s..."
            sleep 15
            RUN_ID=$(gh run list \
              --workflow=build-push-service-images.yaml \
              --branch="$SECURITY_BRANCH" \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: Could not retrieve service build run ID"
            exit 1
          fi

          echo "Service build run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          echo "## Service Image Build" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [$RUN_ID](${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$SECURITY_BRANCH\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for service image build to complete
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.dispatch.outputs.run_id }}"
          echo "Watching service build run $RUN_ID..."
          echo "View at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
          gh run watch "$RUN_ID" --exit-status

  # ---------------------------------------------------------------------------
  # 4. Build worker binary from the security branch
  #    Dispatched on the security branch so Dependabot changes are built.
  #    Runs in PARALLEL with build-service-images.
  # ---------------------------------------------------------------------------
  build-worker-binary:
    name: Build Worker Binary
    needs: [collect-dependabot-prs, create-security-branch]
    if: needs.create-security-branch.outputs.merged_count != '0'
    runs-on: openlab
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Dispatch worker binary build on security branch
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          SECURITY_BRANCH="${{ needs.collect-dependabot-prs.outputs.security_branch }}"

          echo "Dispatching build-binary-and-installer-for-worker.yaml on $SECURITY_BRANCH..."

          gh workflow run build-binary-and-installer-for-worker.yaml \
            --ref "$SECURITY_BRANCH"

          echo "Waiting for run to register..."
          sleep 30

          RUN_ID=$(gh run list \
            --workflow=build-binary-and-installer-for-worker.yaml \
            --branch="$SECURITY_BRANCH" \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Retrying after 15s..."
            sleep 15
            RUN_ID=$(gh run list \
              --workflow=build-binary-and-installer-for-worker.yaml \
              --branch="$SECURITY_BRANCH" \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: Could not retrieve worker build run ID"
            exit 1
          fi

          echo "Worker build run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          echo "## Worker Binary Build" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [$RUN_ID](${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$SECURITY_BRANCH\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for worker binary build to complete
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.dispatch.outputs.run_id }}"
          echo "Watching worker build run $RUN_ID..."
          echo "View at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
          gh run watch "$RUN_ID" --exit-status

  # ---------------------------------------------------------------------------
  # 5. Trigger NDM VM Image Build (Azure) with services_config pointing to
  #    images/binaries built from the security branch.
  #    Waits for service images + worker binary to complete first.
  # ---------------------------------------------------------------------------
  trigger-vm-build-and-e2e:
    name: Azure VM Image Build & E2E Tests
    needs: [collect-dependabot-prs, create-security-branch, build-service-images, build-worker-binary]
    runs-on: openlab
    outputs:
      build_run_id: ${{ steps.dispatch.outputs.run_id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Dispatch NDM VM Image Build (Azure + E2E)
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          SECURITY_BRANCH="${{ needs.collect-dependabot-prs.outputs.security_branch }}"
          BRANCH_SANITIZED="${{ needs.create-security-branch.outputs.security_branch_sanitized }}"

          SERVICES_CONFIG=$(cat <<EOJSON
          {
            "worker": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "admin-service": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "config-service": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "datamigrator-ui": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "db-writer": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "jobs-service": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "keycloak-customizations": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "reports-service": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "db-migrations": {"tag": "latest", "branch": "$BRANCH_SANITIZED"},
            "support-service": {"tag": "latest", "branch": "$BRANCH_SANITIZED"}
          }
          EOJSON
          )

          echo "Dispatching ndm-vm-image-build.yaml on $SECURITY_BRANCH"
          echo "  Provider:  azure"
          echo "  Component: all"
          echo "  Run E2E:   true"
          echo "  services_config branch: $BRANCH_SANITIZED"

          gh workflow run ndm-vm-image-build.yaml \
            --ref "$SECURITY_BRANCH" \
            -f component=all \
            -f provider=azure \
            -f run_e2e=true \
            -f services_config="$SERVICES_CONFIG"

          echo "Waiting for run to register..."
          sleep 30

          RUN_ID=$(gh run list \
            --workflow=ndm-vm-image-build.yaml \
            --branch="$SECURITY_BRANCH" \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Retrying after 15s..."
            sleep 15
            RUN_ID=$(gh run list \
              --workflow=ndm-vm-image-build.yaml \
              --branch="$SECURITY_BRANCH" \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: Could not retrieve VM build run ID"
            exit 1
          fi

          echo "VM build run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          echo "## Azure VM Build & E2E" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [$RUN_ID](${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$SECURITY_BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "**services_config branch:** \`$BRANCH_SANITIZED\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for VM build and E2E tests to complete
        timeout-minutes: 240
        env:
          GH_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.dispatch.outputs.run_id }}"
          echo "Watching VM build + E2E run $RUN_ID..."
          echo "View at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
          gh run watch "$RUN_ID" --exit-status

