name: Build Worker Binary and Windows Installer

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/**'
  workflow_dispatch:
  workflow_call: 
    inputs:
      build:
        description: 'Build to release'
        required: true
        type: string

permissions: 
  contents: read

jobs:
  worker-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      RELEASE_TAG: ${{ steps.set_release_tag.outputs.RELEASE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            services/worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Replace GitHub Token Placeholder in .npmrc
        run: |
          sed -i 's|${GITOPS_USER_GITHUB_TOKEN}|${{ secrets.GITOPS_USER_GITHUB_TOKEN }}|' .npmrc

      - name: Install dependencies and pkg
        run: npm install && npm install pkg -g
      
      - name: Run Build
        run: npm run build

      - name: Build binary
        run: npm run pkg
    
      - name: Zip pkg folder
        run: zip -r pkg.zip pkg
      
      - name: Set Release Tag
        id: set_release_tag
        run: |
          if [ -n "${{ inputs.build }}" ]; then
            echo "RELEASE_TAG=${{ inputs.build }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-binary-${{ steps.set_release_tag.outputs.RELEASE_TAG }}
          path: services/worker/pkg.zip
          
  build:
    runs-on: windows-latest
    needs: worker-package
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.worker-package.outputs.RELEASE_TAG }}
    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Download Binary Artifact
          uses: actions/download-artifact@v4
          with:
            name: worker-binary-${{ env.RELEASE_TAG }}
            path: .

        - name: Extract Binary
          shell: pwsh
          run: |
            Expand-Archive -Path "pkg.zip" -DestinationPath "pkg" -Force

        - name: Prepare Installer Directory
          shell: pwsh
          run: |
            New-Item -ItemType Directory -Force -Path wininstaller
            New-Item -ItemType Directory -Force -Path wininstaller\redist
            New-Item -ItemType Directory -Force -Path wininstaller\fluentd
            Move-Item -Path "./pkg/pkg/worker-win-x64.exe" -Destination "wininstaller\worker.exe" -Force

        - name: Download Redistributables
          shell: pwsh
          run: |
            # Download VC++ Redistributable
            Write-Host "Downloading VC++ Redistributable..."
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "wininstaller\redist\vc_redist.x64.exe"
            
            # Download fluent-package MSI
            Write-Host "Downloading fluent-package..."
            Invoke-WebRequest -Uri "https://s3.amazonaws.com/packages.treasuredata.com/5/windows/fluent-package-5.2.0-x64.msi" -OutFile "wininstaller\fluentd\fluent-package-5.2.0-x64.msi"

            # Verify downloads
            Write-Host "Verifying downloads..."
            if (Test-Path "wininstaller\redist\vc_redist.x64.exe") {
                $vcSize = (Get-Item "wininstaller\redist\vc_redist.x64.exe").Length
                Write-Host "VC++ Redistributable downloaded: $vcSize bytes"
            } else {
                throw "VC++ Redistributable download failed"
            }

            if (Test-Path "wininstaller\fluentd\fluent-package-5.2.0-x64.msi") {
                $fluentSize = (Get-Item "wininstaller\fluentd\fluent-package-5.2.0-x64.msi").Length
                Write-Host "fluent-package downloaded: $fluentSize bytes"
            } else {
                throw "fluent-package download failed"
            }

        - name: Copy environment file and installer files
          shell: pwsh
          run: |
            Write-Host "Current working directory: $(Get-Location)"
            Copy-Item -Path "app-deployment/ansible/worker/roles/configure-worker/templates/worker.env.j2" -Destination "wininstaller\worker.env.j2" -Force
            Copy-Item -Path "services/worker/wininstaller/installer.iss" -Destination "wininstaller\installer.iss" -Force
            Copy-Item -Path "services/worker/wininstaller/service.xml" -Destination "wininstaller\service.xml" -Force
            Copy-Item -Path "services/worker/wininstaller/fluentd.conf" -Destination "wininstaller\fluentd.conf" -Force
  
        - name: Download WinSW and rename
          shell: pwsh
          run: |
            # Download a specific version of WinSW
            Invoke-WebRequest -Uri "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe" -OutFile "wininstaller\winsw.exe"
  
        - name: List files in wininstaller directory
          shell: pwsh
          run: |
            Write-Host "Files in wininstaller directory:"
            Get-ChildItem -Path "wininstaller" | ForEach-Object { Write-Host "  - $($_.Name)" }
  
        - name: Install Inno Setup
          shell: pwsh
          run: choco install innosetup -y
  
        - name: Build Windows Installer with Inno Setup
          shell: cmd
          run: |
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "wininstaller\installer.iss"

        - name: Upload Installer Artifact
          uses: actions/upload-artifact@v4
          with:
            name: windows-installer-${{ env.RELEASE_TAG }}
            path: wininstaller\datamigrator-worker-setup.exe

  release:
    runs-on: openlab
    needs: [worker-package, build]
    permissions: 
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NDM_NEXUS_USERNAME: ${{ secrets.NDM_NEXUS_USERNAME }}
      NDM_NEXUS_PASSWORD: ${{ secrets.NDM_NEXUS_PASSWORD }}
      RELEASE_TAG: ${{ needs.worker-package.outputs.RELEASE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Binary Artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-binary-${{ env.RELEASE_TAG }}
          path: artifacts

      - name: Download Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ env.RELEASE_TAG }}
          path: artifacts

      - name: Rename Release Assets
        run: |
          cp artifacts/pkg.zip artifacts/worker-${{ env.RELEASE_TAG }}.zip
          cp artifacts/datamigrator-worker-setup.exe artifacts/windows-worker-installer-${{ env.RELEASE_TAG }}.exe

      - name: Create Release
        id: create_release
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" == "refs/heads/main" ]]; then
            REF_TYPE="branches"
            REF_NAME="main"
          elif [[ "$REF" == refs/heads/release/* ]]; then
            REF_TYPE="releases"
            REF_NAME="${REF#refs/heads/release/}"
          elif [[ "$REF" == refs/heads/* ]]; then
            REF_TYPE="branches"
            REF_NAME="$(echo "${REF#refs/heads/}" | sed 's#/#-#g')"
          else
            echo "Unsupported ref: $REF"
            exit 1
          fi

          cp ./app-deployment/ansible/worker/roles/configure-worker/templates/worker.env.j2 artifacts/worker.env

          if [[ "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            ARTIFACTORY_PATH="releases/${REF_NAME}/worker/${{ env.RELEASE_TAG }}"
          else
            ARTIFACTORY_PATH="builds/worker/${REF_TYPE}/${REF_NAME}/${{ env.RELEASE_TAG }}"
          fi

          # Upload worker binary to Artifactory
          for REPO_PATH in "cicd/ndm" "team/ndm"; do
            curl --silent --show-error --fail --request PUT --upload-file artifacts/pkg.zip \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}/datamigrator-worker-${{ env.RELEASE_TAG }}.zip" \
              -u "${{ env.NDM_NEXUS_USERNAME }}":"${{ env.NDM_NEXUS_PASSWORD }}"
              
            # Upload Windows installer
            curl --silent --show-error --fail --request PUT --upload-file artifacts/datamigrator-worker-setup.exe \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}/windows-worker-installer-${{ env.RELEASE_TAG }}.exe" \
              -u "${{ env.NDM_NEXUS_USERNAME }}":"${{ env.NDM_NEXUS_PASSWORD }}"
              
            # Upload worker env
            curl --silent --show-error --fail --request PUT --upload-file artifacts/worker.env \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${ARTIFACTORY_PATH}/worker-${{ env.RELEASE_TAG }}.env" \
              -u "${{ env.NDM_NEXUS_USERNAME }}":"${{ env.NDM_NEXUS_PASSWORD }}"
          done
          
          # Create and upload metadata for latest version
          ISO_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          METADATA_PATH="${ARTIFACTORY_PATH}/metadata.json"
          LATEST_PATH="builds/worker/${REF_TYPE}/${REF_NAME}/latest.json"
          cat > artifacts/latest.json <<EOF
          {
            "build_version": "${{ env.RELEASE_TAG }}",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${GITHUB_SHA::7}",
            "timestamp": "$ISO_TIME",
            "metadata_path": "${METADATA_PATH}",
            "published_by": "${{ github.actor }}"
          }
          EOF
  
          # If not release branch
          if [[ ! "${{ github.ref }}" =~ refs/heads/release/(.+) ]]; then
            for REPO_PATH in "cicd/ndm" "team/ndm"; do
              curl --silent --show-error --fail --request PUT --upload-file artifacts/latest.json \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${LATEST_PATH}" \
              -u "${{ env.NDM_NEXUS_USERNAME }}":"${{ env.NDM_NEXUS_PASSWORD }}"
            done
          fi

          # Create and upload metadata
          cat > artifacts/metadata.json <<EOF
          {
            "build_version": "${{ env.RELEASE_TAG }}",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${GITHUB_SHA::7}",
            "timestamp": "$ISO_TIME",
            "binary_path": "worker/${REF_TYPE}/${REF_NAME}/${{ env.RELEASE_TAG }}/datamigrator-worker-${{ env.RELEASE_TAG }}.zip",
            "windows_installer_path": "worker/${REF_TYPE}/${REF_NAME}/${{ env.RELEASE_TAG }}/windows-worker-installer-${{ env.RELEASE_TAG }}.exe",
            "env_path": "worker/${REF_TYPE}/${REF_NAME}/${{ env.RELEASE_TAG }}/worker-${{ env.RELEASE_TAG }}.env",
            "published_by": "${{ github.actor }}"
          }
          EOF

          # Upload metadata
          for REPO_PATH in "cicd/ndm" "team/ndm"; do
            curl --silent --show-error --fail --request PUT --upload-file artifacts/metadata.json \
              "https://generic.repo.eng.netapp.com/artifactory/openlab-generic/${REPO_PATH}/${METADATA_PATH}" \
              -u "${{ env.NDM_NEXUS_USERNAME }}":"${{ env.NDM_NEXUS_PASSWORD }}"
          done  

  build-details:
    runs-on: openlab
    needs: [worker-package, release]
    env:
      RELEASE_TAG: ${{ needs.worker-package.outputs.RELEASE_TAG }}
    steps:
      - name: Collect and display build details
        run: |
          echo "Build details for worker binary and installer:"
          echo "Release Tag: ${{ env.RELEASE_TAG }}"
          echo "Binary Artifact: worker-${{ env.RELEASE_TAG }}.zip"
          echo "Windows Installer Artifact: windows-worker-installer-${{ env.RELEASE_TAG }}.exe"
          echo "Worker Environment File: worker-${{ env.RELEASE_TAG }}.env"
          
          echo ""
          echo "Worker config for NDM VM image build:"
          echo "{" 
          echo "  \"worker\": {"
          echo "    \"tag\": \"${GITHUB_SHA}\","
          echo "    \"branch\": \"${GITHUB_REF_NAME}\""
          echo "  }"
          echo "}"
          echo ""
          echo "Copy the above JSON and paste it into the 'services_config' input of the NDM VM image build workflow."

          echo "## Worker Binary Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Tag | \`${{ env.RELEASE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Artifact | \`worker-${{ env.RELEASE_TAG }}.zip\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Installer | \`windows-worker-installer-${{ env.RELEASE_TAG }}.exe\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment File | \`worker-${{ env.RELEASE_TAG }}.env\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Worker Configuration for NDM VM Image Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Copy this JSON and paste it into the 'services_config' input of the NDM VM image build workflow:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "{" >> $GITHUB_STEP_SUMMARY
          echo "  \"worker\": {" >> $GITHUB_STEP_SUMMARY
          echo "    \"tag\": \"${GITHUB_SHA}\"," >> $GITHUB_STEP_SUMMARY
          echo "    \"branch\": \"${GITHUB_REF_NAME}\"" >> $GITHUB_STEP_SUMMARY
          echo "  }" >> $GITHUB_STEP_SUMMARY
          echo "}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY



