name: Black Duck SCA Scan

on:
  push:
    branches: [main, sm/bd-action-workflow]
  pull_request:
    branches: [main, sm/bd-action-workflow]
  workflow_dispatch:

env:
  BLACKDUCK_URL: https://blackduck.eng.netapp.com
  SERVICE_NAME: datamigrator-ui
  SERVICE_PATH: services/datamigrator-ui
  PROJECT_NAME: Test_NDM
  VERSION_NAME: test_v
  BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}

jobs:
  black-duck-sca-scan:
    name: Black Duck SCA Scan
    runs-on: openlab
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better analysis

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          # No caching since package-lock.json doesn't exist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate environment
        run: |
          if [ -z "$BLACKDUCK_API_TOKEN" ]; then
            echo "❌ BLACKDUCK_API_TOKEN is not set. Please add it to GitHub Secrets."
            exit 1
          fi

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "❌ Service path '$SERVICE_PATH' does not exist."
            exit 1
          fi

          echo "✅ Environment validation passed"

      - name: Install NPM dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Installing NPM dependencies..."
          cd $SERVICE_PATH

          # Configure npm to use GitHub token for authentication (matching your .npmrc)
          npm config set //npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN
          npm config set @netapp-cloud-datamigrate:registry https://npm.pkg.github.com/

          # Verify npm configuration
          echo "📋 NPM configuration:"
          npm config list | grep -E "(registry|_authToken)" || true

          if [ -f "package.json" ]; then
            # Use npm install since package-lock.json doesn't exist
            npm install --only=production
            echo "✅ NPM dependencies installed successfully"
            
            # List installed packages for verification
            echo "📋 Installed packages:"
            npm list --depth=0 --only=production || true
          else
            echo "⚠️ No package.json found in $SERVICE_PATH"
          fi

      - name: Print scan configuration
        run: |
          echo "🔍 Black Duck Scan Configuration:"
          echo "PROJECT_NAME: $PROJECT_NAME"
          echo "VERSION_NAME: $VERSION_NAME"
          echo "SERVICE_NAME: $SERVICE_NAME"
          echo "SERVICE_PATH: $SERVICE_PATH"
          echo "BLACKDUCK_URL: $BLACKDUCK_URL"
          echo "RUNNER_OS: $RUNNER_OS"
          echo "WORKSPACE: ${{ github.workspace }}"
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_SHA: ${{ github.sha }}"

      - name: Install Black Duck Server Certificate
        run: |
          echo "🔐 Installing Black Duck server certificate..."

          # Extract certificate from your Black Duck server
          echo | openssl s_client -servername blackduck.eng.netapp.com -connect blackduck.eng.netapp.com:443 2>/dev/null | openssl x509 > blackduck.crt

          # Verify certificate was extracted
          if [ -s blackduck.crt ]; then
            echo "✅ Certificate extracted successfully"
            
            # Create a custom truststore instead of modifying system one
            cp $JAVA_HOME/lib/security/cacerts ./custom-truststore.jks
            
            # Add certificate to custom trust store (no sudo needed)
            $JAVA_HOME/bin/keytool -import -trustcacerts -keystore ./custom-truststore.jks -storepass changeit -noprompt -alias blackduck-cert -file blackduck.crt
            
            # Set Java system property to use custom truststore
            echo "JAVA_OPTS=-Djavax.net.ssl.trustStore=$(pwd)/custom-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit" >> $GITHUB_ENV
            
            echo "✅ Certificate installed to custom trust store"
          else
            echo "⚠️ Could not extract certificate, will rely on Java SSL bypass options"
            echo "JAVA_OPTS=-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true" >> $GITHUB_ENV
          fi

      - name: Download Black Duck Detect
        run: |
          echo "📥 Downloading Black Duck Detect..."
          curl -s -L https://detect.blackduck.com/detect10.sh -o detect10.sh
          chmod +x detect10.sh
          echo "✅ Black Duck Detect downloaded successfully"

      - name: Run Black Duck Detect
        shell: bash
        env:
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
          JAVA_OPTS: "-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true -Dcom.blackduck.integration.verify.ssl=false"
        run: |
          echo "🚀 Starting Black Duck scan..."

          # Set unique code location name based on context
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-PR_${{ github.event.number }}"
          else
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-${{ github.run_id }}"
          fi

          echo "Code location: $CODE_LOCATION_NAME"

          # Run the scan with enhanced error handling
          set +e  # Don't exit on error, we want to handle it

          ./detect10.sh \
            --detect.project.name="$PROJECT_NAME" \
            --blackduck.url="$BLACKDUCK_URL" \
            --blackduck.api.token="$BLACKDUCK_API_TOKEN" \
            --detect.project.version.name="$VERSION_NAME" \
            --detect.source.path="$SERVICE_PATH" \
            --detect.blackduck.signature.scanner.paths="$SERVICE_PATH" \
            --detect.code.location.name="$CODE_LOCATION_NAME" \
            --detect.cleanup=false \
            --detect.tools=DETECTOR,SIGNATURE_SCAN \
            --detect.detector.search.depth=50 \
            --detect.detector.search.continue=true \
            --blackduck.trust.cert=true \
            --blackduck.offline.mode=false \
            --detect.output.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --detect.risk.report.pdf=true \
            --detect.notices.report=true \
            --detect.cleanup.bdio.files=false \
            --detect.accuracy.required=NONE \
            --detect.vulnerability.report=true \
            --logging.level.com.synopsys.integration=DEBUG

          SCAN_EXIT_CODE=$?

          # Handle different exit codes
          case $SCAN_EXIT_CODE in
            0)
              echo "✅ SUCCESS: Black Duck scan completed successfully"
              ;;
            11)
              echo "❌ FAILURE: Black Duck feature error (Exit code 11)"
              echo "This typically indicates:"
              echo "1. API token lacks required permissions (Project Creator role needed)"
              echo "2. Black Duck server compatibility issues"
              echo "3. Network connectivity problems"
              echo ""
              echo "💡 Next steps:"
              echo "- Contact your Black Duck administrator"
              echo "- Verify API token has Project Creator permissions"
              echo "- Check if project already exists and try scanning against it"
              exit 1
              ;;
            *)
              echo "⚠️ Scan completed with exit code: $SCAN_EXIT_CODE"
              if [ $SCAN_EXIT_CODE -ne 0 ]; then
                echo "❌ Scan failed, but continuing to upload artifacts for analysis"
              fi
              ;;
          esac

      - name: Upload Black Duck Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blackduck-reports-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/blackduck-output/
            **/blackduck-output/
          retention-days: 30

      - name: Check for policy violations
        if: always()
        run: |
          # Check if there are any policy violation files
          if find . -name "*PolicyViolation*" -type f | grep -q .; then
            echo "⚠️ Policy violations detected. Check the uploaded artifacts for details."
            exit 1
          else
            echo "✅ No policy violations found."
          fi

      - name: Summary
        if: always()
        run: |
          echo "📊 Black Duck Scan Summary:"
          echo "- Project: $PROJECT_NAME"
          echo "- Version: $VERSION_NAME"
          echo "- Service: $SERVICE_NAME ($SERVICE_PATH)"
          echo "- Scan completed at: $(date)"
          echo "- Reports uploaded as artifacts"
          echo ""
          echo "🔗 Useful links:"
          echo "- Black Duck Console: $BLACKDUCK_URL"
          echo "- Documentation: https://documentation.blackduck.com/"
