name: Run BDS for NDM

on:
  pull_request:
    branches:
      - main
      - sm/bd-action-workflow

  workflow_dispatch:

env:
  BLACKDUCK_URL: https://blackduck.eng.netapp.com
  PROJECT_NAME: Test_NDM
  VERSION_NAME: test_v3
  BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  NODE_VERSION: 22.15.0
  JAVA_VERSION: 17.0.11

jobs:
  filter-changed-services:
    name: Filter Changed Services
    runs-on: ubuntu-latest
    outputs:
      app_deployment: ${{ steps.filter.outputs.app_deployment }}
      auth_lib: ${{ steps.filter.outputs.auth_lib }}
      jobs_lib: ${{ steps.filter.outputs.jobs_lib }}
      logger_lib: ${{ steps.filter.outputs.logger_lib }}
      admin_service: ${{ steps.filter.outputs.admin_service }}
      config_service: ${{ steps.filter.outputs.config_service }}
      datamigrator_ui: ${{ steps.filter.outputs.datamigrator_ui }}
      db_writer: ${{ steps.filter.outputs.db_writer }}
      jobs_service: ${{ steps.filter.outputs.jobs_service }}
      keycloak_customizations: ${{ steps.filter.outputs.keycloak_customizations }}
      reports_service: ${{ steps.filter.outputs.reports_service }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app_deployment:
              - 'app-deployment/**'
            auth_lib:
              - 'lib/auth-lib/**'
            jobs_lib:
              - 'lib/jobs-lib/**'
            logger_lib:
              - 'lib/logger-lib/**'
            admin_service:
              - 'services/admin-service/**'
            config_service:
              - 'services/config-service/**'
            datamigrator_ui:
              - 'services/datamigrator-ui/**'
            db_writer:
              - 'services/db-writer/**'
            jobs_service:
              - 'services/jobs-service/**'
            keycloak_customizations:
              - 'services/keycloak-customizations/**'
            reports_service:
              - 'services/reports-service/**'
            worker:
              - 'services/worker/**'

  check-any-changes:
    name: Check If Any Service Changed
    runs-on: ubuntu-latest
    needs: filter-changed-services
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - name: Check for any changed service/lib
        id: check
        run: |
          if [ \
            "${{ needs.filter-changed-services.outputs.app_deployment }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.auth_lib }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.jobs_lib }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.logger_lib }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.admin_service }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.config_service }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.datamigrator_ui }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.db_writer }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.jobs_service }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.keycloak_customizations }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.reports_service }}" = "true" ] || \
            [ "${{ needs.filter-changed-services.outputs.worker }}" = "true" ]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant service/lib changed. Exiting workflow."
            echo "any_changed=false" >> $GITHUB_OUTPUT
          fi

  black-duck-sca-scan:
    name: Black Duck SCA Scan
    runs-on: openlab
    timeout-minutes: 120
    needs: [filter-changed-services, check-any-changes]
    if: needs.check-any-changes.outputs.any_changed == 'true'
    strategy:
      matrix:
        include:
          - name: App Deployment
            path: app-deployment
            filter_output: app_deployment
          - name: Auth Lib
            path: lib/auth-lib
            filter_output: auth_lib
          - name: Jobs Lib
            path: lib/jobs-lib
            filter_output: jobs_lib
          - name: Logger Lib
            path: lib/logger-lib
            filter_output: logger_lib
          - name: Admin Service
            path: services/admin-service
            filter_output: admin_service
          - name: Config Service
            path: services/config-service
            filter_output: config_service
          - name: Datamigrator UI
            path: services/datamigrator-ui
            filter_output: datamigrator_ui
          - name: DB Writer
            path: services/db-writer
            filter_output: db_writer
          - name: Jobs Service
            path: services/jobs-service
            filter_output: jobs_service
          - name: Keycloak Customizations
            path: services/keycloak-customizations
            filter_output: keycloak_customizations
          - name: Reports Service
            path: services/reports-service
            filter_output: reports_service
          - name: Worker
            path: services/worker
            filter_output: worker
    steps:
      - name: Checkout code
        if: ${{ needs.filter-changed-services.outputs[matrix.filter_output] == 'true' }}
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://npm.pkg.github.com"
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ env.JAVA_VERSION }}"
      - name: Replace GitHub Token Placeholder in .npmrc (if exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f .npmrc ]; then
            echo "✅ .npmrc found. Replacing GitHub token..."
            sed -i 's|${GITOPS_USER_GITHUB_TOKEN}|${{ secrets.GITOPS_USER_GITHUB_TOKEN }}|' .npmrc
          else
            echo "⚠️ .npmrc not found. Skipping replacement."
          fi
      - name: Install dependencies and pkg (if package.json exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            echo "📦 Installing dependencies..."
            npm install
            npm install pkg -g
          else
            echo "⚠️ package.json not found. Skipping npm install."
          fi
      - name: Run Build (if package.json exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            echo "🏗️ Running build..."
            npm run build
          else
            echo "⚠️ package.json not found. Skipping build."
          fi
      - name: Download Black Duck Detect
        run: |
          echo "📥 Downloading Black Duck Detect..."
          curl -s -L https://detect.blackduck.com/detect10.sh -o detect10.sh
          CURL_EXIT_CODE=$?
          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Failed to download Black Duck Detect (curl error $CURL_EXIT_CODE)"
            exit 1
          fi
          if ! [ -s detect10.sh ]; then
            echo "❌ Downloaded detect10.sh is empty."
            exit 1
          fi
          chmod +x detect10.sh
          echo "✅ Black Duck Detect downloaded successfully"
      - name: Run Black Duck Detect
        shell: bash
        env:
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
          JAVA_OPTS: "-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true -Dcom.blackduck.integration.verify.ssl=false -Xmx4g"
        run: |
          SERVICE_NAME="${{ matrix.name }}"
          SERVICE_PATH="${{ matrix.path }}"
          echo "🚀🚀🚀🚀 Starting Black Duck scan for $SERVICE_NAME...🚀🚀🚀🚀"

          CODE_LOCATION_NAME="${PROJECT_NAME}___${VERSION_NAME}___${SERVICE_NAME}"
          echo "Code location: $CODE_LOCATION_NAME"
          echo "Version: $VERSION_NAME"

          echo "CODE_LOCATION_NAME=$CODE_LOCATION_NAME" >> $GITHUB_ENV

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "❌ ❌ ❌ ❌ Service path $SERVICE_PATH does not exist ❌ ❌ ❌ ❌ "
            exit 1
          fi

          echo "✅ Service path $SERVICE_PATH exists"
          ls -la "$SERVICE_PATH"

          set +e
          ./detect10.sh \
            --detect.project.name="$PROJECT_NAME" \
            --blackduck.url="$BLACKDUCK_URL" \
            --blackduck.api.token="$BLACKDUCK_API_TOKEN" \
            --detect.project.version.name="$VERSION_NAME" \
            --detect.source.path="$SERVICE_PATH" \
            --detect.blackduck.signature.scanner.paths="$SERVICE_PATH" \
            --detect.code.location.name="$CODE_LOCATION_NAME" \
            --detect.cleanup=false \
            --detect.tools=DETECTOR,SIGNATURE_SCAN \
            --detect.detector.search.depth=25 \
            --detect.detector.search.continue=true \
            --blackduck.trust.cert=true \
            --blackduck.offline.mode=false \
            --detect.output.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --detect.cleanup.bdio.files=false \
            --detect.accuracy.required=NONE \
            --blackduck.timeout=7200 \
            --detect.timeout=14400 \
            --detect.wait.for.results=false \
            --detect.risk.report.pdf=false \
            --detect.notices.report=false \
            --detect.vulnerability.report=false

          SCAN_EXIT_CODE=$?

          echo "SCAN_EXIT_CODE=$SCAN_EXIT_CODE" >> $GITHUB_ENV

          case $SCAN_EXIT_CODE in
            0)
              echo "✅ ✅ ✅ ✅ ✅ SUCCESS: Black Duck scan completed successfully for service $SERVICE_NAME ✅ ✅ ✅ ✅ ✅  "
              ;;
            *)
              echo "⚠️ Scan completed with exit code: $SCAN_EXIT_CODE"
              if [ "$SCAN_EXIT_CODE" -gt 2 ] && [ "$SCAN_EXIT_CODE" -ne 11 ]; then
                exit $SCAN_EXIT_CODE
              fi
              ;;
          esac

  upload-artifacts:
    name: Upload All Black Duck Reports
    runs-on: openlab
    needs: black-duck-sca-scan
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Upload all Black Duck Reports
        uses: actions/upload-artifact@v4
        with:
          name: blackduck-reports-all-${{ github.run_id }}
          path: blackduck-output/
          retention-days: 30
      - name: Final Summary
        if: always()
        run: |
          echo ""
          echo "==================== 📊 Black Duck Scan Final Summary ===================="
          echo ""
          echo "  🏷️  Project : $PROJECT_NAME"
          echo "  🗂️  Version : $VERSION_NAME"
          echo "  📅 Date    : $(date)"
          echo ""
          echo "  📁 Reports Artifact Path:"
          echo "     ${{ github.workspace }}/blackduck-output/"
          echo ""
          echo "  🔗 Black Duck Console:"
          echo "     $BLACKDUCK_URL"
          echo ""
          echo "  📄 All Black Duck reports have been uploaded as GitHub artifacts."
          echo "  📝 Deep analysis data has been uploaded to the Black Duck server."
          echo "  🕒 Full reports will be available in the Black Duck web interface once server processing completes."
          echo ""
          echo "=========================================================================="
