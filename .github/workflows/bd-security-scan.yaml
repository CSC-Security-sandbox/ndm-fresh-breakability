name: Run BDS for NDM

on:
  pull_request:
    branches:
      - main
      - sm/bd-action-workflow
  workflow_dispatch:

env:
  BLACKDUCK_URL: https://blackduck.eng.netapp.com
  PROJECT_NAME: Test_NDM
  VERSION_NAME: test_v3
  BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
  GITOPS_USER_GITHUB_TOKEN: ${{ secrets.GITOPS_USER_GITHUB_TOKEN }}
  NODE_VERSION: 22.15.0
  JAVA_VERSION: 17.0.11

jobs:
  filter-changed-services:
    name: Filter Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set matrix using git diff
        id: set-matrix
        run: |
          echo "🔍 Detecting changed files..."
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "$CHANGED_FILES"

          declare -a matrix_items=()

          add_to_matrix() {
            local name=$1
            local path=$2
            if ! printf '%s\n' "${matrix_items[@]}" | grep -q "\"path\":\"$path\""; then
              matrix_items+=("{\"name\":\"$name\",\"path\":\"$path\"}")
            fi
          }

          echo "$CHANGED_FILES" | grep -q '^app-deployment/' && add_to_matrix "App Deployment" "app-deployment"
          echo "$CHANGED_FILES" | grep -q '^lib/auth-lib/' && add_to_matrix "Auth Lib" "lib/auth-lib"
          echo "$CHANGED_FILES" | grep -q '^lib/jobs-lib/' && add_to_matrix "Jobs Lib" "lib/jobs-lib"
          echo "$CHANGED_FILES" | grep -q '^lib/logger-lib/' && add_to_matrix "Logger Lib" "lib/logger-lib"
          echo "$CHANGED_FILES" | grep -q '^services/admin-service/' && add_to_matrix "Admin Service" "services/admin-service"
          echo "$CHANGED_FILES" | grep -q '^services/config-service/' && add_to_matrix "Config Service" "services/config-service"
          echo "$CHANGED_FILES" | grep -q '^services/datamigrator-ui/' && add_to_matrix "Datamigrator UI" "services/datamigrator-ui"
          echo "$CHANGED_FILES" | grep -q '^services/db-writer/' && add_to_matrix "DB Writer" "services/db-writer"
          echo "$CHANGED_FILES" | grep -q '^services/jobs-service/' && add_to_matrix "Jobs Service" "services/jobs-service"
          echo "$CHANGED_FILES" | grep -q '^services/keycloak-customizations/' && add_to_matrix "Keycloak Customizations" "services/keycloak-customizations"
          echo "$CHANGED_FILES" | grep -q '^services/reports-service/' && add_to_matrix "Reports Service" "services/reports-service"
          echo "$CHANGED_FILES" | grep -q '^services/worker/' && add_to_matrix "Worker" "services/worker"

          matrix_json="{\"include\":[$(printf "%s\n" "${matrix_items[@]}" | paste -sd "," -)]}"
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

          if [ ${#matrix_items[@]} -eq 0 ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

  black-duck-sca-scan:
    name: Black Duck SCA Scan
    runs-on: openlab
    timeout-minutes: 120
    needs: [filter-changed-services]
    if: needs.filter-changed-services.outputs.any_changed == 'true'
    strategy:
      matrix: ${{ fromJSON(needs.filter-changed-services.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://npm.pkg.github.com"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ env.JAVA_VERSION }}"

      - name: Replace GitHub Token Placeholder in .npmrc (if exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f .npmrc ]; then
            echo "✅ .npmrc found. Replacing GitHub token..."
            sed -i 's|${GITOPS_USER_GITHUB_TOKEN}|${{ secrets.GITOPS_USER_GITHUB_TOKEN }}|' .npmrc
          else
            echo "⚠️ .npmrc not found. Skipping replacement."
          fi

      - name: Install dependencies and pkg (if package.json exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            echo "📦 Installing dependencies..."
            npm install
            npm install pkg -g
          else
            echo "⚠️ package.json not found. Skipping npm install."
          fi

      - name: Run Build (if package.json exists)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            echo "🏗️ Running build..."
            npm run build
          else
            echo "⚠️ package.json not found. Skipping build."
          fi

      - name: Download Black Duck Detect
        run: |
          echo "📥 Downloading Black Duck Detect..."
          curl -s -L https://detect.blackduck.com/detect10.sh -o detect10.sh
          CURL_EXIT_CODE=$?
          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Failed to download Black Duck Detect (curl error $CURL_EXIT_CODE)"
            exit 1
          fi
          if ! [ -s detect10.sh ]; then
            echo "❌ Downloaded detect10.sh is empty."
            exit 1
          fi
          chmod +x detect10.sh
          echo "✅ Black Duck Detect downloaded successfully"

      - name: Run Black Duck Detect
        shell: bash
        env:
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
          JAVA_OPTS: "-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true -Dcom.blackduck.integration.verify.ssl=false -Xmx4g"
        run: |
          SERVICE_NAME="${{ matrix.name }}"
          SERVICE_PATH="${{ matrix.path }}"
          echo "🚀 Starting Black Duck scan for $SERVICE_NAME..."

          CODE_LOCATION_NAME="${PROJECT_NAME}___${VERSION_NAME}___${SERVICE_NAME}"
          echo "Code location: $CODE_LOCATION_NAME"
          echo "Version: $VERSION_NAME"

          echo "CODE_LOCATION_NAME=$CODE_LOCATION_NAME" >> $GITHUB_ENV

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "❌ Service path $SERVICE_PATH does not exist"
            exit 1
          fi

          echo "✅ Service path $SERVICE_PATH exists"
          ls -la "$SERVICE_PATH"

          set +e
          ./detect10.sh \
            --detect.project.name="$PROJECT_NAME" \
            --blackduck.url="$BLACKDUCK_URL" \
            --blackduck.api.token="$BLACKDUCK_API_TOKEN" \
            --detect.project.version.name="$VERSION_NAME" \
            --detect.source.path="$SERVICE_PATH" \
            --detect.blackduck.signature.scanner.paths="$SERVICE_PATH" \
            --detect.code.location.name="$CODE_LOCATION_NAME" \
            --detect.cleanup=false \
            --detect.tools=DETECTOR,SIGNATURE_SCAN \
            --detect.detector.search.depth=25 \
            --detect.detector.search.continue=true \
            --blackduck.trust.cert=true \
            --blackduck.offline.mode=false \
            --detect.output.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --detect.cleanup.bdio.files=false \
            --detect.accuracy.required=NONE \
            --blackduck.timeout=7200 \
            --detect.timeout=14400 \
            --detect.wait.for.results=false \
            --detect.risk.report.pdf=false \
            --detect.notices.report=false \
            --detect.vulnerability.report=false

          SCAN_EXIT_CODE=$?

          echo "SCAN_EXIT_CODE=$SCAN_EXIT_CODE" >> $GITHUB_ENV

          case $SCAN_EXIT_CODE in
            0)
              echo "✅ SUCCESS: Black Duck scan completed for $SERVICE_NAME"
              ;;
            *)
              echo "⚠️ Scan completed with exit code: $SCAN_EXIT_CODE"
              if [ "$SCAN_EXIT_CODE" -gt 2 ] && [ "$SCAN_EXIT_CODE" -ne 11 ]; then
                exit $SCAN_EXIT_CODE
              fi
              ;;
          esac

  upload-artifacts:
    name: Upload All Black Duck Reports
    runs-on: openlab
    needs: [black-duck-sca-scan, filter-changed-services]
    if: needs.filter-changed-services.outputs.any_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload all Black Duck Reports
        uses: actions/upload-artifact@v4
        with:
          name: blackduck-reports-all-${{ github.run_id }}
          path: blackduck-output/
          retention-days: 30

      - name: Final Summary
        if: always()
        run: |
          echo ""
          echo "==================== 📊 Black Duck Scan Final Summary ===================="
          echo ""
          echo "  🏷️  Project : $PROJECT_NAME"
          echo "  🗂️  Version : $VERSION_NAME"
          echo "  📅 Date    : $(date)"
          echo ""
          echo "  📁 Reports Artifact Path:"
          echo "     ${{ github.workspace }}/blackduck-output/"
          echo ""
          echo "  🔗 Black Duck Console:"
          echo "     $BLACKDUCK_URL"
          echo ""
          echo "  📄 All Black Duck reports have been uploaded as GitHub artifacts."
          echo "  📝 Deep analysis data has been uploaded to the Black Duck server."
          echo "  🕒 Full reports will be available in the Black Duck web interface once server processing completes."
          echo ""
          echo "=========================================================================="
