name: Black Duck SCA Scan with Vulnerability Count

on:
  push:
    branches: [main, sm/bd-action-workflow]
  pull_request:
    branches: [main, sm/bd-action-workflow]
  workflow_dispatch:

env:
  BLACKDUCK_URL: https://blackduck.eng.netapp.com
  SERVICE_NAME: datamigrator-ui
  SERVICE_PATH: services/datamigrator-ui
  PROJECT_NAME: Test_NDM
  VERSION_NAME: test_v
  BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}

jobs:
  black-duck-sca-scan:
    name: Black Duck SCA Scan
    runs-on: openlab
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate environment
        run: |
          if [ -z "$BLACKDUCK_API_TOKEN" ]; then
            echo "❌ BLACKDUCK_API_TOKEN is not set. Please add it to GitHub Secrets."
            exit 1
          fi

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "❌ Service path '$SERVICE_PATH' does not exist."
            exit 1
          fi

          echo "✅ Environment validation passed"

      - name: Install NPM dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Installing NPM dependencies..."
          cd $SERVICE_PATH
          npm config set //npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN
          npm config set @netapp-cloud-datamigrate:registry https://npm.pkg.github.com/
          echo "📋 NPM configuration:"
          npm config list | grep -E "(registry|_authToken)" || true
          if [ -f "package.json" ]; then
            npm install --only=production
            echo "✅ NPM dependencies installed successfully"
            echo "📋 Installed packages:"
            npm list --depth=0 --only=production || true
          else
            echo "⚠️ No package.json found in $SERVICE_PATH"
          fi

      - name: Install jq for JSON parsing
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Download Black Duck Detect
        run: |
          echo "📥 Downloading Black Duck Detect..."
          curl -s -L https://detect.blackduck.com/detect10.sh -o detect10.sh
          chmod +x detect10.sh
          echo "✅ Black Duck Detect downloaded successfully"

      - name: Run Black Duck Detect
        shell: bash
        env:
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
          JAVA_OPTS: "-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true -Dcom.blackduck.integration.verify.ssl=false -Xmx4g"
        run: |
          echo "🚀 Starting Black Duck scan..."
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-PR_${{ github.event.number }}"
          else
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-${{ github.run_id }}"
          fi
          echo "Code location: $CODE_LOCATION_NAME"

          # Store the code location name for later use
          echo "CODE_LOCATION_NAME=$CODE_LOCATION_NAME" >> $GITHUB_ENV

          set +e
          ./detect10.sh \
            --detect.project.name="$PROJECT_NAME" \
            --blackduck.url="$BLACKDUCK_URL" \
            --blackduck.api.token="$BLACKDUCK_API_TOKEN" \
            --detect.project.version.name="$VERSION_NAME" \
            --detect.source.path="$SERVICE_PATH" \
            --detect.blackduck.signature.scanner.paths="$SERVICE_PATH" \
            --detect.code.location.name="$CODE_LOCATION_NAME" \
            --detect.cleanup=false \
            --detect.tools=DETECTOR,SIGNATURE_SCAN \
            --detect.detector.search.depth=25 \
            --detect.detector.search.continue=true \
            --blackduck.trust.cert=true \
            --blackduck.offline.mode=false \
            --detect.output.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --detect.risk.report.pdf=true \
            --detect.notices.report=true \
            --detect.cleanup.bdio.files=false \
            --detect.accuracy.required=NONE \
            --detect.vulnerability.report=true \
            --detect.risk.report.pdf.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --blackduck.timeout=7200 \
            --detect.timeout=14400 \
            --detect.wait.for.results=true \
            --detect.blackduck.signature.scanner.memory=4096 \
            --logging.level.com.synopsys.integration=INFO
          SCAN_EXIT_CODE=$?

          echo "SCAN_EXIT_CODE=$SCAN_EXIT_CODE" >> $GITHUB_ENV

          case $SCAN_EXIT_CODE in
            0)
              echo "✅ SUCCESS: Black Duck scan completed successfully"
              ;;
            2)
              echo "⚠️ TIMEOUT: Scan timed out but data may have been uploaded"
              ;;
            *)
              echo "⚠️ Scan completed with exit code: $SCAN_EXIT_CODE"
              ;;
          esac

      - name: Wait for scan to complete and get vulnerability count
        if: always()
        run: |
          echo "⏳ Waiting for scan results and fetching vulnerability count..."

          # Wait a bit more for processing if we had a timeout
          if [ "$SCAN_EXIT_CODE" = "2" ]; then
            echo "⏳ Scan timed out, waiting additional 5 minutes for processing..."
            sleep 300
          fi

          # Debug Information
          echo "🔧 Debug Information:"
          echo "PROJECT_NAME: '$PROJECT_NAME'"
          echo "VERSION_NAME: '$VERSION_NAME'"
          echo "BLACKDUCK_URL: '$BLACKDUCK_URL'"

          # Test API connectivity
          echo "🔗 Testing API connectivity..."
          API_TEST=$(curl -s -k -X GET \
            -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
            -H "Accept: application/json" \
            "$BLACKDUCK_URL/api/current-user" 2>/dev/null)

          if echo "$API_TEST" | jq -e . >/dev/null 2>&1; then
            echo "✅ API connection successful"
            echo "User: $(echo "$API_TEST" | jq -r '.userName // "unknown"')"
          else
            echo "❌ API connection failed"
            echo "Response: $API_TEST"
          fi

          # Improved function to get project ID
          get_project_id() {
            echo "🔍 Searching for project: $PROJECT_NAME"
            
            # Method 1: Try exact name search
            PROJECT_RESPONSE=$(curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.project-detail-4+json" \
              "$BLACKDUCK_URL/api/projects?q=name:$PROJECT_NAME")
            
            PROJECT_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.items[0]._meta.href' 2>/dev/null | sed 's/.*projects\///' | cut -d'/' -f1)
            
            if [ "$PROJECT_ID" != "null" ] && [ -n "$PROJECT_ID" ] && [ "$PROJECT_ID" != "" ]; then
              echo "✅ Found project via exact search: $PROJECT_ID"
              echo "$PROJECT_ID"
              return
            fi
            
            # Method 2: Try without query parameter (get all projects and filter)
            echo "🔍 Trying alternative search method..."
            ALL_PROJECTS=$(curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.project-detail-4+json" \
              "$BLACKDUCK_URL/api/projects?limit=1000")
            
            PROJECT_ID=$(echo "$ALL_PROJECTS" | jq -r --arg name "$PROJECT_NAME" '.items[] | select(.name == $name) | ._meta.href' 2>/dev/null | sed 's/.*projects\///' | cut -d'/' -f1 | head -1)
            
            if [ "$PROJECT_ID" != "null" ] && [ -n "$PROJECT_ID" ] && [ "$PROJECT_ID" != "" ]; then
              echo "✅ Found project via full list search: $PROJECT_ID"
              echo "$PROJECT_ID"
              return
            fi
            
            # Method 3: Try case-insensitive search
            echo "🔍 Trying case-insensitive search..."
            PROJECT_ID=$(echo "$ALL_PROJECTS" | jq -r --arg name "${PROJECT_NAME,,}" '.items[] | select(.name | ascii_downcase == $name) | ._meta.href' 2>/dev/null | sed 's/.*projects\///' | cut -d'/' -f1 | head -1)
            
            if [ "$PROJECT_ID" != "null" ] && [ -n "$PROJECT_ID" ] && [ "$PROJECT_ID" != "" ]; then
              echo "✅ Found project via case-insensitive search: $PROJECT_ID"
              echo "$PROJECT_ID"
              return
            fi
            
            # Debug: Show available projects
            echo "❌ Project not found. Available projects:"
            echo "$ALL_PROJECTS" | jq -r '.items[]? | select(.name != null) | .name' 2>/dev/null | head -10 | sed 's/^/  - /'
            
            echo "null"
          }

          # Improved function to get version ID
          get_version_id() {
            local project_id=$1
            echo "🔍 Searching for version: $VERSION_NAME in project: $project_id"
            
            # Method 1: Try with query parameter
            VERSION_RESPONSE=$(curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.project-detail-4+json" \
              "$BLACKDUCK_URL/api/projects/$project_id/versions?q=versionName:$VERSION_NAME")
            
            VERSION_ID=$(echo "$VERSION_RESPONSE" | jq -r '.items[0]._meta.href' 2>/dev/null | sed 's/.*versions\///' | cut -d'/' -f1)
            
            if [ "$VERSION_ID" != "null" ] && [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "" ]; then
              echo "✅ Found version via query search: $VERSION_ID"
              echo "$VERSION_ID"
              return
            fi
            
            # Method 2: Get all versions and filter
            echo "🔍 Trying alternative version search..."
            ALL_VERSIONS=$(curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.project-detail-4+json" \
              "$BLACKDUCK_URL/api/projects/$project_id/versions?limit=1000")
            
            VERSION_ID=$(echo "$ALL_VERSIONS" | jq -r --arg name "$VERSION_NAME" '.items[] | select(.versionName == $name) | ._meta.href' 2>/dev/null | sed 's/.*versions\///' | cut -d'/' -f1 | head -1)
            
            if [ "$VERSION_ID" != "null" ] && [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "" ]; then
              echo "✅ Found version via full list search: $VERSION_ID"
              echo "$VERSION_ID"
              return
            fi
            
            # Debug: Show available versions
            echo "❌ Version not found. Available versions:"
            echo "$ALL_VERSIONS" | jq -r '.items[]? | select(.versionName != null) | .versionName' 2>/dev/null | head -10 | sed 's/^/  - /'
            
            echo "null"
          }

          # Function to get vulnerability count
          get_vulnerability_count() {
            local project_id=$1
            local version_id=$2
            curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.vulnerability-4+json" \
              "$BLACKDUCK_URL/api/projects/$project_id/versions/$version_id/vulnerable-bom-components?limit=1" | \
              jq -r '.totalCount // 0'
          }

          # Function to get detailed vulnerability breakdown
          get_vulnerability_details() {
            local project_id=$1
            local version_id=$2
            curl -s -k -X GET \
              -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
              -H "Accept: application/vnd.blackducksoftware.vulnerability-4+json" \
              "$BLACKDUCK_URL/api/projects/$project_id/versions/$version_id/vulnerable-bom-components?limit=9999" | \
              jq -r '
                .items[]?.vulnerabilityWithRemediation?.vulnerabilityName as $vuln_name |
                .items[]?.vulnerabilityWithRemediation?.severity as $severity |
                select($vuln_name != null and $severity != null) |
                "\($severity): \($vuln_name)"
              ' 2>/dev/null || echo "No detailed vulnerability data available"
          }

          # Try to get project and vulnerability information
          PROJECT_ID=$(get_project_id)

          if [ "$PROJECT_ID" != "null" ] && [ -n "$PROJECT_ID" ]; then
            echo "✅ Found project ID: $PROJECT_ID"
            
            VERSION_ID=$(get_version_id "$PROJECT_ID")
            
            if [ "$VERSION_ID" != "null" ] && [ -n "$VERSION_ID" ]; then
              echo "✅ Found version ID: $VERSION_ID"
              
              # Get vulnerability count
              VULN_COUNT=$(get_vulnerability_count "$PROJECT_ID" "$VERSION_ID")
              echo "🔍 Total Vulnerabilities Found: $VULN_COUNT"
              
              # Get vulnerability breakdown by severity
              echo "📊 Vulnerability Breakdown:"
              curl -s -k -X GET \
                -H "Authorization: Bearer $BLACKDUCK_API_TOKEN" \
                -H "Accept: application/vnd.blackducksoftware.vulnerability-4+json" \
                "$BLACKDUCK_URL/api/projects/$PROJECT_ID/versions/$VERSION_ID/vulnerable-bom-components?limit=9999" | \
                jq -r '
                  [.items[]?.vulnerabilityWithRemediation?.severity] | 
                  group_by(.) | 
                  map({severity: .[0], count: length}) | 
                  .[] | 
                  select(.severity != null) | 
                  "  \(.severity): \(.count)"
                ' 2>/dev/null || echo "  Unable to get severity breakdown"
              
              # Save counts to environment
              echo "VULNERABILITY_COUNT=$VULN_COUNT" >> $GITHUB_ENV
              
              # Create a summary file
              echo "# Black Duck Vulnerability Summary" > vulnerability_summary.md
              echo "" >> vulnerability_summary.md
              echo "**Project:** $PROJECT_NAME" >> vulnerability_summary.md
              echo "**Version:** $VERSION_NAME" >> vulnerability_summary.md
              echo "**Service:** $SERVICE_NAME" >> vulnerability_summary.md
              echo "**Total Vulnerabilities:** $VULN_COUNT" >> vulnerability_summary.md
              echo "" >> vulnerability_summary.md
              echo "**Scan Date:** $(date)" >> vulnerability_summary.md
              echo "**Black Duck Console:** $BLACKDUCK_URL/api/projects/$PROJECT_ID/versions/$VERSION_ID" >> vulnerability_summary.md
              
            else
              echo "❌ Could not find version '$VERSION_NAME' in project"
              echo "VULNERABILITY_COUNT=unknown" >> $GITHUB_ENV
            fi
          else
            echo "❌ Could not find project '$PROJECT_NAME'"
            echo "VULNERABILITY_COUNT=unknown" >> $GITHUB_ENV
          fi

      - name: Parse local vulnerability reports
        if: always()
        run: |
          echo "🔍 Parsing local vulnerability reports..."

          REPORT_DIR="${{ github.workspace }}/blackduck-output/$SERVICE_NAME"

          # Look for vulnerability reports in various formats
          if find "$REPORT_DIR" -name "*vulnerability*" -type f 2>/dev/null | head -1 | grep -q .; then
            echo "📄 Found local vulnerability reports:"
            find "$REPORT_DIR" -name "*vulnerability*" -type f -exec ls -la {} \;
            
            # Try to parse JSON vulnerability reports
            for file in $(find "$REPORT_DIR" -name "*vulnerability*.json" 2>/dev/null); do
              if [ -f "$file" ]; then
                echo "📊 Parsing $file:"
                LOCAL_VULN_COUNT=$(jq -r '.vulnerabilities | length' "$file" 2>/dev/null || echo "0")
                echo "  Local vulnerability count: $LOCAL_VULN_COUNT"
                
                # Get severity breakdown from local file
                echo "  Severity breakdown:"
                jq -r '.vulnerabilities[]?.severity' "$file" 2>/dev/null | sort | uniq -c | sed 's/^/    /' || echo "    Unable to parse severity data"
              fi
            done
          else
            echo "⚠️ No local vulnerability reports found in $REPORT_DIR"
          fi

      - name: Upload Black Duck Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blackduck-reports-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/blackduck-output/
            vulnerability_summary.md
          retention-days: 30

      - name: Comment vulnerability count on PR
        if: github.event_name == 'pull_request' && env.VULNERABILITY_COUNT != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const vulnCount = process.env.VULNERABILITY_COUNT;
            const serviceName = process.env.SERVICE_NAME;
            const projectName = process.env.PROJECT_NAME;

            const comment = `## 🔒 Black Duck Security Scan Results

            **Service:** ${serviceName}
            **Total Vulnerabilities Found:** ${vulnCount}

            ${vulnCount > 0 ? '⚠️ Vulnerabilities detected. Please review the Black Duck console for details.' : '✅ No vulnerabilities found.'}

            **Black Duck Console:** ${process.env.BLACKDUCK_URL}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Final Summary
        if: always()
        run: |
          echo "📊 Black Duck Scan Final Summary:"
          echo "=================================="
          echo "Project: $PROJECT_NAME"
          echo "Version: $VERSION_NAME"
          echo "Service: $SERVICE_NAME ($SERVICE_PATH)"
          echo "Scan Exit Code: $SCAN_EXIT_CODE"
          echo "Vulnerabilities Found: ${VULNERABILITY_COUNT:-unknown}"
          echo "Scan Date: $(date)"
          echo ""
          echo "🔗 Black Duck Console: $BLACKDUCK_URL"
          echo "📄 Reports uploaded as GitHub artifacts"

          # Set job status based on vulnerability count
          if [ "$VULNERABILITY_COUNT" != "unknown" ] && [ "$VULNERABILITY_COUNT" -gt 0 ]; then
            echo "⚠️ Warning: $VULNERABILITY_COUNT vulnerabilities found"
            # Uncomment the next line if you want the job to fail when vulnerabilities are found
            # exit 1
          elif [ "$VULNERABILITY_COUNT" = "0" ]; then
            echo "✅ No vulnerabilities found"
          else
            echo "ℹ️ Vulnerability count could not be determined"
          fi
