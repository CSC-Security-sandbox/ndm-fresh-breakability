name: Black Duck SCA Scan with Vulnerability Count

on:
  push:
    branches: [main, sm/bd-action-workflow]
  pull_request:
    branches: [main, sm/bd-action-workflow]
  workflow_dispatch:

env:
  BLACKDUCK_URL: https://blackduck.eng.netapp.com
  SERVICE_NAME: datamigrator-ui
  SERVICE_PATH: services/datamigrator-ui
  PROJECT_NAME: Test_NDM
  VERSION_NAME: test_v
  BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}

jobs:
  black-duck-sca-scan:
    name: Black Duck SCA Scan
    runs-on: openlab
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate environment
        run: |
          if [ -z "$BLACKDUCK_API_TOKEN" ]; then
            echo "❌ BLACKDUCK_API_TOKEN is not set. Please add it to GitHub Secrets."
            exit 1
          fi

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "❌ Service path '$SERVICE_PATH' does not exist."
            exit 1
          fi

          echo "✅ Environment validation passed"

      - name: Install NPM dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Installing NPM dependencies..."
          cd $SERVICE_PATH
          npm config set //npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN
          npm config set @netapp-cloud-datamigrate:registry https://npm.pkg.github.com/
          echo "📋 NPM configuration:"
          npm config list | grep -E "(registry|_authToken)" || true
          if [ -f "package.json" ]; then
            npm install --only=production
            echo "✅ NPM dependencies installed successfully"
            echo "📋 Installed packages:"
            npm list --depth=0 --only=production || true
          else
            echo "⚠️ No package.json found in $SERVICE_PATH"
          fi

      # - name: Install jq for JSON parsing
      #   run: |
      #     apt-get update
      #     apt-get install -y jq curl

      - name: Download Black Duck Detect
        run: |
          echo "📥 Downloading Black Duck Detect..."
          curl -s -L https://detect.blackduck.com/detect10.sh -o detect10.sh
          chmod +x detect10.sh
          echo "✅ Black Duck Detect downloaded successfully"

      - name: Run Black Duck Detect
        shell: bash
        env:
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
          JAVA_OPTS: "-Dcom.blackduck.integration.trust.cert=true -Dtrust_cert=true -Dcom.blackduck.integration.verify.ssl=false -Xmx4g"
        run: |
          echo "🚀 Starting Black Duck scan..."
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-PR_${{ github.event.number }}"
          else
            CODE_LOCATION_NAME="${PROJECT_NAME}-${SERVICE_NAME}-${{ github.run_id }}"
          fi
          echo "Code location: $CODE_LOCATION_NAME"

          # Store the code location name for later use
          echo "CODE_LOCATION_NAME=$CODE_LOCATION_NAME" >> $GITHUB_ENV

          set +e
          ./detect10.sh \
            --detect.project.name="$PROJECT_NAME" \
            --blackduck.url="$BLACKDUCK_URL" \
            --blackduck.api.token="$BLACKDUCK_API_TOKEN" \
            --detect.project.version.name="$VERSION_NAME" \
            --detect.source.path="$SERVICE_PATH" \
            --detect.blackduck.signature.scanner.paths="$SERVICE_PATH" \
            --detect.code.location.name="$CODE_LOCATION_NAME" \
            --detect.cleanup=false \
            --detect.tools=DETECTOR,SIGNATURE_SCAN \
            --detect.detector.search.depth=25 \
            --detect.detector.search.continue=true \
            --blackduck.trust.cert=true \
            --blackduck.offline.mode=false \
            --detect.output.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --detect.risk.report.pdf=true \
            --detect.notices.report=true \
            --detect.cleanup.bdio.files=false \
            --detect.accuracy.required=NONE \
            --detect.vulnerability.report=true \
            --detect.risk.report.pdf.path="${{ github.workspace }}/blackduck-output/$SERVICE_NAME" \
            --blackduck.timeout=7200 \
            --detect.timeout=14400 \
            --detect.wait.for.results=true \
            --detect.blackduck.signature.scanner.memory=4096 \
            --logging.level.com.synopsys.integration=INFO
          SCAN_EXIT_CODE=$?

          echo "SCAN_EXIT_CODE=$SCAN_EXIT_CODE" >> $GITHUB_ENV

          case $SCAN_EXIT_CODE in
            0)
              echo "✅ SUCCESS: Black Duck scan completed successfully"
              ;;
            2)
              echo "⚠️ TIMEOUT: Scan timed out but data may have been uploaded"
              ;;
            *)
              echo "⚠️ Scan completed with exit code: $SCAN_EXIT_CODE"
              ;;
          esac

      - name: Upload Black Duck Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blackduck-reports-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/blackduck-output/
            vulnerability_summary.md
          retention-days: 30

      - name: Final Summary
        if: always()
        run: |
          echo "📊 Black Duck Scan Final Summary:"
          echo "=================================="
          echo "Project: $PROJECT_NAME"
          echo "Version: $VERSION_NAME"
          echo "Service: $SERVICE_NAME ($SERVICE_PATH)"
          echo "Scan Exit Code: $SCAN_EXIT_CODE"
          echo "Scan Date: $(date)"
          echo ""
          echo "🔗 Black Duck Console: $BLACKDUCK_URL"
          echo "📄 Reports uploaded as GitHub artifacts"

          # Set job status based on vulnerability count
          if [ "$VULNERABILITY_COUNT" != "unknown" ] && [ "$VULNERABILITY_COUNT" -gt 0 ]; then
            echo "⚠️ Warning: $VULNERABILITY_COUNT vulnerabilities found"
            # Uncomment the next line if you want the job to fail when vulnerabilities are found
            # exit 1
          elif [ "$VULNERABILITY_COUNT" = "0" ]; then
            echo "✅ No vulnerabilities found"
          else
            echo "ℹ️ Vulnerability count could not be determined"
          fi
