name: GCP Image Export & SHA256 Generation

on:
  workflow_dispatch:
    inputs:
      worker_image_name:
        description: "GCP Worker Image Name"
        required: true
      controlplane_image_name:
        description: "GCP Control Plane Image Name"
        required: true
      export_prefix:
        description: "Export folder prefix (e.g., preview-dryrun)"
        required: false
        default: "releases"

env:
  GCP_PROJECT_ID: app-microservices-cm
  GCS_BUCKET: ndm-vmdk-files
  VPC_NAME: appmicro-vpc1
  SUBNET_NAME: appmicro-vpc-subnet-02
  ZONE: us-east4-a
  LOCAL_EXPORT_PATH: /home/ubuntu/
  SCRATCH_SPACE: /mnt/scratch_space

jobs:
  gcp-image-export:
    runs-on: openlab
    outputs:
      worker_archive: ${{ steps.set-outputs.outputs.worker_archive }}
      controlplane_archive: ${{ steps.set-outputs.outputs.controlplane_archive }}
      export_prefix: ${{ steps.set-outputs.outputs.export_prefix }}
      timestamp: ${{ steps.set-outputs.outputs.timestamp }}
    
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass

      - name: Execute GCP Operations
        env:
          RUNNER_PASSWORD: ${{ secrets.RUNNER_GITHUB_PASS_66 }}
        run: |
          sshpass -p "$RUNNER_PASSWORD" ssh -o StrictHostKeyChecking=no ubuntu@10.192.7.66 << 'ENDSSH'
          set -e
          
          WORKER_IMAGE="${{ github.event.inputs.worker_image_name }}"
          CP_IMAGE="${{ github.event.inputs.controlplane_image_name }}"
          EXPORT_PREFIX="${{ github.event.inputs.export_prefix }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          WORKER_ARCHIVE="${WORKER_IMAGE}-${TIMESTAMP}.tar.gz"
          CP_ARCHIVE="${CP_IMAGE}-${TIMESTAMP}.tar.gz"
          CHECKSUM_FILE="GCP_SHA256SUMS-${TIMESTAMP}.sha256"
          LOCAL_PATH="${{ env.LOCAL_EXPORT_PATH }}"
          SCRATCH_SPACE="${{ env.SCRATCH_SPACE }}"
          
          echo "Exporting Worker Image: $WORKER_IMAGE"
          WORKER_EXPORT_OUTPUT=$(sudo gcloud compute images export \
            --project=${{ env.GCP_PROJECT_ID }} \
            --image="$WORKER_IMAGE" \
            --destination-uri="gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${WORKER_ARCHIVE}" \
            --network=${{ env.VPC_NAME }} \
            --subnet=${{ env.SUBNET_NAME }} \
            --zone=${{ env.ZONE }} \
            --export-format=vmdk \
            --async \
            --quiet 2>&1)
          
          WORKER_BUILD_ID=$(echo "$WORKER_EXPORT_OUTPUT" | grep -oP 'builds/\K[a-f0-9-]+' | head -1)
          [ -n "$WORKER_BUILD_ID" ] && echo "Worker Build ID: $WORKER_BUILD_ID" || echo "Warning: No Worker Build ID"
          
          echo "Monitoring Worker Export..."
          MAX_WAIT=3600
          ELAPSED=0
          SLEEP_INTERVAL=30
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            WORKER_EXISTS="no"
            timeout 10s sudo gsutil -q stat "gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${WORKER_ARCHIVE}" 2>/dev/null && WORKER_EXISTS="yes"
            
            BUILD_STATUS="UNKNOWN"
            if [ -n "$WORKER_BUILD_ID" ]; then
              BUILD_STATUS=$(timeout 60s sudo gcloud builds describe "$WORKER_BUILD_ID" --region=us-east4 --project=${{ env.GCP_PROJECT_ID }} --format="value(status)" 2>/dev/null || echo "UNKNOWN")
              
              [ "$BUILD_STATUS" == "SUCCESS" ] && WORKER_EXISTS="yes"
              
              # If build failed, show logs and exit
              if [ "$BUILD_STATUS" == "FAILURE" ] || [ "$BUILD_STATUS" == "TIMEOUT" ] || [ "$BUILD_STATUS" == "CANCELLED" ]; then
                echo ""
                echo "=========================================="
                echo "Worker Build Failed: $BUILD_STATUS"
                echo "=========================================="
                echo ""
                echo "Cloud Build Logs:"
                echo "------------------------------------------"
                sudo gcloud builds log "$WORKER_BUILD_ID" --region=us-east4 --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "Could not retrieve logs"
                echo "------------------------------------------"
                echo ""
                echo "View full logs in Cloud Console:"
                echo "https://console.cloud.google.com/cloud-build/builds;region=us-east4/$WORKER_BUILD_ID?project=${{ env.GCP_PROJECT_ID }}"
                echo ""
                exit 1
              fi
            fi
            
            [ "$WORKER_EXISTS" == "yes" ] && echo "Worker export complete (${ELAPSED}s)" && break
            
            echo "Worker status: $BUILD_STATUS | ${ELAPSED}s"
            sleep $SLEEP_INTERVAL
            ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
          done
          
          [ $ELAPSED -ge $MAX_WAIT ] && echo "Worker export timeout" && exit 1
          
          # Display Cloud Build log URL
          if [ -n "$WORKER_BUILD_ID" ]; then
            echo ""
            echo "Worker Cloud Build Logs:"
            echo "https://console.cloud.google.com/cloud-build/builds;region=us-east4/$WORKER_BUILD_ID?project=${{ env.GCP_PROJECT_ID }}"
            echo ""
          fi
          
          echo "Exporting Control Plane Image: $CP_IMAGE"
          CP_EXPORT_OUTPUT=$(sudo gcloud compute images export \
            --project=${{ env.GCP_PROJECT_ID }} \
            --image="$CP_IMAGE" \
            --destination-uri="gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${CP_ARCHIVE}" \
            --network=${{ env.VPC_NAME }} \
            --subnet=${{ env.SUBNET_NAME }} \
            --zone=${{ env.ZONE }} \
            --export-format=vmdk \
            --async \
            --quiet 2>&1)
          
          CP_BUILD_ID=$(echo "$CP_EXPORT_OUTPUT" | grep -oP 'builds/\K[a-f0-9-]+' | head -1)
          [ -n "$CP_BUILD_ID" ] && echo "CP Build ID: $CP_BUILD_ID" || echo "Warning: No CP Build ID"
          
          echo "Monitoring Control Plane Export..."
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CP_EXISTS="no"
            timeout 10s sudo gsutil -q stat "gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${CP_ARCHIVE}" 2>/dev/null && CP_EXISTS="yes"
            
            BUILD_STATUS="UNKNOWN"
            if [ -n "$CP_BUILD_ID" ]; then
              BUILD_STATUS=$(timeout 60s sudo gcloud builds describe "$CP_BUILD_ID" --region=us-east4 --project=${{ env.GCP_PROJECT_ID }} --format="value(status)" 2>/dev/null || echo "UNKNOWN")
              
              [ "$BUILD_STATUS" == "SUCCESS" ] && CP_EXISTS="yes"
              
              # If build failed, show logs and exit
              if [ "$BUILD_STATUS" == "FAILURE" ] || [ "$BUILD_STATUS" == "TIMEOUT" ] || [ "$BUILD_STATUS" == "CANCELLED" ]; then
                echo ""
                echo "=========================================="
                echo "Control Plane Build Failed: $BUILD_STATUS"
                echo "=========================================="
                echo ""
                echo "Cloud Build Logs:"
                echo "------------------------------------------"
                sudo gcloud builds log "$CP_BUILD_ID" --region=us-east4 --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "Could not retrieve logs"
                echo "------------------------------------------"
                echo ""
                echo "View full logs in Cloud Console:"
                echo "https://console.cloud.google.com/cloud-build/builds;region=us-east4/$CP_BUILD_ID?project=${{ env.GCP_PROJECT_ID }}"
                echo ""
                exit 1
              fi
            fi
            
            [ "$CP_EXISTS" == "yes" ] && echo "CP export complete (${ELAPSED}s)" && break
            
            echo "CP status: $BUILD_STATUS | ${ELAPSED}s"
            sleep $SLEEP_INTERVAL
            ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
          done
          
          [ $ELAPSED -ge $MAX_WAIT ] && echo "CP export timeout" && exit 1
          
          # Display Cloud Build log URL
          if [ -n "$CP_BUILD_ID" ]; then
            echo ""
            echo "Control Plane Cloud Build Logs:"
            echo "https://console.cloud.google.com/cloud-build/builds;region=us-east4/$CP_BUILD_ID?project=${{ env.GCP_PROJECT_ID }}"
            echo ""
          fi
          
          echo "Downloading from GCS..."
          mkdir -p "$LOCAL_PATH/$EXPORT_PREFIX/gcp"
          cd "$LOCAL_PATH/$EXPORT_PREFIX/gcp"
          sudo gsutil cp "gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${WORKER_ARCHIVE}" .
          sudo gsutil cp "gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/${CP_ARCHIVE}" .
          
          echo "Generating checksums..."
          sha256sum "${CP_ARCHIVE}" "${WORKER_ARCHIVE}" > "${CHECKSUM_FILE}"
          sudo gsutil cp "${CHECKSUM_FILE}" "gs://${{ env.GCS_BUCKET }}/${EXPORT_PREFIX}/"
          
          echo "Copying to scratch space..."
          sudo mkdir -p "${SCRATCH_SPACE}/${EXPORT_PREFIX}/gcp"
          sudo cp "${WORKER_ARCHIVE}" "${CP_ARCHIVE}" "${CHECKSUM_FILE}" "${SCRATCH_SPACE}/${EXPORT_PREFIX}/gcp/"
          sudo chmod 644 "${SCRATCH_SPACE}/${EXPORT_PREFIX}/gcp"/*
          
          echo "Export complete"
          echo "$TIMESTAMP" > /tmp/gcp_timestamp.txt
          echo "$WORKER_ARCHIVE" > /tmp/gcp_worker.txt
          echo "$CP_ARCHIVE" > /tmp/gcp_cp.txt
          echo "$EXPORT_PREFIX" > /tmp/gcp_prefix.txt
          
          ENDSSH

      - name: Set Outputs
        id: set-outputs
        env:
          RUNNER_PASSWORD: ${{ secrets.RUNNER_GITHUB_PASS_66 }}
        run: |
          # Read outputs from temp files via SSH
          OUTPUT=$(sshpass -p "$RUNNER_PASSWORD" ssh -T -o StrictHostKeyChecking=no -o LogLevel=QUIET ubuntu@10.192.7.66 << 'ENDSSH'
          cat /tmp/gcp_timestamp.txt
          cat /tmp/gcp_worker.txt
          cat /tmp/gcp_cp.txt
          cat /tmp/gcp_prefix.txt
          ENDSSH
          )

          echo "Raw output from remote:"
          echo "$OUTPUT"

          # Get only the last 4 lines (actual data, skip banner)
          CLEAN_OUTPUT=$(echo "$OUTPUT" | tail -4)
          
          # Parse the output
          TIMESTAMP=$(echo "$CLEAN_OUTPUT" | sed -n '1p')
          WORKER_ARCHIVE=$(echo "$CLEAN_OUTPUT" | sed -n '2p')
          CP_ARCHIVE=$(echo "$CLEAN_OUTPUT" | sed -n '3p')
          EXPORT_PREFIX=$(echo "$CLEAN_OUTPUT" | sed -n '4p')

          # Set GitHub outputs
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "worker_archive=$WORKER_ARCHIVE" >> $GITHUB_OUTPUT
          echo "controlplane_archive=$CP_ARCHIVE" >> $GITHUB_OUTPUT
          echo "export_prefix=$EXPORT_PREFIX" >> $GITHUB_OUTPUT
          
          # Display for verification
          echo "Captured outputs:"
          echo "  Timestamp: $TIMESTAMP"
          echo "  Worker: $WORKER_ARCHIVE"
          echo "  CP: $CP_ARCHIVE"
          echo "  Prefix: $EXPORT_PREFIX"

      - name: Display Summary
        run: |
          echo "Timestamp: ${{ steps.set-outputs.outputs.timestamp }}"
          echo "Worker: ${{ steps.set-outputs.outputs.worker_archive }}"
          echo "CP: ${{ steps.set-outputs.outputs.controlplane_archive }}"
          echo "GCS: gs://${{ env.GCS_BUCKET }}/${{ steps.set-outputs.outputs.export_prefix }}/"