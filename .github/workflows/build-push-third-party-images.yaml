name: Build and Push Third-Party Docker Images Tarball

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — pull and save images but skip Artifactory upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-tarball:
    name: Build ndm-docker-images.tar
    runs-on: scs-v2
    timeout-minutes: 60

    env:
      TARBALL_NAME: ndm-docker-images.tar
      ARTIFACTORY_BASE_URL: https://generic.repo.eng.netapp.com/artifactory/openlab-generic
      ARTIFACTORY_PATH: cicd/ndm/docker-images
      CACHE_PATH: cicd/ndm/container-cache
      # Single source of truth for the Keycloak image tag baked into the
      # tarball. Bump here when picking up a new Keycloak release.
      KEYCLOAK_TAG: 26.6.1-debian-12-r0

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Define image list
        id: images
        run: |
          cat > /tmp/images.txt <<IMAGES
          docker.io/bitnami/keycloak:${KEYCLOAK_TAG}
          docker.io/bitnami/postgresql:17.6.0-debian-12-r0
          docker.io/bitnami/os-shell:12-debian-12-r50
          docker.io/bitnami/postgres-exporter:0.17.1-debian-12-r15
          docker.io/bitnami/redis:8.2.1-debian-12-r0
          docker.io/bitnami/redis-exporter:1.75.0-debian-12-r1
          docker.io/bitnami/kubectl:1.33.4-debian-12-r0
          docker.io/bitnami/grafana:12.1.1-debian-12-r1
          docker.io/grafana/loki:3.5.3
          docker.io/grafana/loki-canary:3.5.3
          docker.io/grafana/loki-helm-test:ewelch-distributed-helm-chart-17db5ee
          docker.io/nginxinc/nginx-unprivileged:1.29-alpine
          docker.io/library/memcached:1.6.38-alpine
          docker.io/kiwigrid/k8s-sidecar:1.30.7
          docker.io/temporalio/server:1.28.1
          docker.io/temporalio/ui:2.39.0
          docker.io/temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
          quay.io/openbao/openbao:2.3.2
          docker.io/library/busybox:1.36
          docker.io/hashicorp/vault-k8s:1.4.2
          registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.16.0
          quay.io/prometheus/node-exporter:v1.9.1
          quay.io/prometheus/pushgateway:v1.11.1
          quay.io/prometheus/prometheus:v3.5.0
          quay.io/prometheus/alertmanager:v0.28.1
          quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
          quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
          docker.io/library/alpine:3.22.1
          ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.132.4
          IMAGES

          sed -i 's/^[[:space:]]*//' /tmp/images.txt
          sed -i '/^$/d' /tmp/images.txt

          echo "Image list:"
          cat /tmp/images.txt
          echo ""
          PULLED_COUNT=$(wc -l < /tmp/images.txt | tr -d ' ')

          CUSTOM_IMAGES=("ndm-fluentd-loki:v1.17-1" "ndm-admin-entry:alpine")
          printf '%s\n' "${CUSTOM_IMAGES[@]}" > /tmp/custom_images.txt
          echo "count=$((PULLED_COUNT + ${#CUSTOM_IMAGES[@]}))" >> "$GITHUB_OUTPUT"

      - name: Check available disk space
        run: df -h /

      - name: Pull images (linux/amd64)
        env:
          ART_USER: ${{ secrets.NDM_NEXUS_USERNAME }}
          ART_PASS: ${{ secrets.NDM_NEXUS_PASSWORD }}
        run: |
          CACHE_BASE="${ARTIFACTORY_BASE_URL}/${CACHE_PATH}"

          # ── helpers ────────────────────────────────────────────────

          # Map image ref → Artifactory cache URL.
          # docker.io/bitnami/keycloak:26.6.1-debian-12-r0
          #   → …/container-cache/docker.io/bitnami/keycloak/26.6.1-debian-12-r0.tar.gz
          cache_url() {
            local repo="${1%:*}" tag="${1##*:}"
            echo "${CACHE_BASE}/${repo}/${tag}.tar.gz"
          }

          # Try loading an image from the Artifactory cache.
          cache_load() {
            local ref="$1" url
            url=$(cache_url "$ref")
            local code
            code=$(curl -sf -o /dev/null -w "%{http_code}" --head \
              -u "${ART_USER}:${ART_PASS}" "${url}" 2>/dev/null) || true
            [ "$code" = "200" ] || return 1
            echo "  Downloading from Artifactory cache…"
            if curl -sf -u "${ART_USER}:${ART_PASS}" "${url}" | gunzip | docker load; then
              return 0
            fi
            echo "  Cache download/load failed, falling back to internet"
            return 1
          }

          # Save an image to the Artifactory cache (non-fatal on failure).
          cache_save() {
            local ref="$1" url
            url=$(cache_url "$ref")
            echo "  Caching → ${url##*/container-cache/}"
            if ! docker save "$ref" | gzip -1 | \
                curl -sf -T - -u "${ART_USER}:${ART_PASS}" \
                  --retry 2 --retry-delay 5 "${url}" >/dev/null 2>&1; then
              echo "::warning::Cache upload failed for ${ref} (non-fatal)"
            fi
          }

          # Retry with exponential backoff.  Skips retries on 404 / "not found"
          # so bitnami fallbacks aren't delayed by pointless waits.
          pull_with_retry() {
            local ref="$1" retries=3 delay=30 output rc
            for attempt in $(seq 1 "$retries"); do
              output=$(docker pull --platform linux/amd64 "${ref}" 2>&1)
              rc=$?
              echo "$output"
              [ $rc -eq 0 ] && return 0
              if echo "$output" | grep -qi "not found\|manifest unknown\|does not exist"; then
                return 1
              fi
              if [ "$attempt" -lt "$retries" ]; then
                echo "  attempt ${attempt}/${retries} failed, retrying in ${delay}s…"
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            return 1
          }

          # Pull from the internet with bitnami fallback chain.
          internet_pull() {
            local image="$1"
            if pull_with_retry "${image}"; then
              echo "✓ ${image}"
              return 0
            elif [[ "${image}" == docker.io/bitnami/* ]]; then
              LEGACY_REF="${image/bitnami/bitnamilegacy}"
              echo "::warning::Docker Hub failed, trying bitnamilegacy: ${LEGACY_REF}"
              if pull_with_retry "${LEGACY_REF}"; then
                docker tag "${LEGACY_REF}" "${image}"
                echo "✓ ${image} (via bitnamilegacy)"
                return 0
              fi
              ECR_REF="${image/docker.io/public.ecr.aws}"
              echo "::warning::bitnamilegacy failed, trying ECR Public: ${ECR_REF}"
              if pull_with_retry "${ECR_REF}"; then
                docker tag "${ECR_REF}" "${image}"
                echo "✓ ${image} (via ECR Public)"
                return 0
              fi
            fi
            return 1
          }

          # ── main loop ─────────────────────────────────────────────

          FAILED=()
          CACHE_HITS=0
          CACHE_MISSES=0

          while IFS= read -r image; do
            echo "::group::Pulling ${image}"

            if cache_load "${image}"; then
              echo "✓ ${image} (cached)"
              CACHE_HITS=$((CACHE_HITS + 1))
            elif internet_pull "${image}"; then
              cache_save "${image}"
              CACHE_MISSES=$((CACHE_MISSES + 1))
            else
              echo "::error::Failed to pull ${image}"
              FAILED+=("${image}")
            fi

            echo "::endgroup::"
          done < /tmp/images.txt

          echo ""
          echo "Cache stats: ${CACHE_HITS} hits, ${CACHE_MISSES} misses"
          echo "cache_hits=${CACHE_HITS}" >> "$GITHUB_ENV"
          echo "cache_misses=${CACHE_MISSES}" >> "$GITHUB_ENV"

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "::error::Failed to pull ${#FAILED[@]} image(s):"
            printf '  - %s\n' "${FAILED[@]}"
            exit 1
          fi

      - name: Build custom images
        run: |
          echo "::group::Building ndm-fluentd-loki"
          docker build --platform linux/amd64 \
            -t ndm-fluentd-loki:v1.17-1 \
            app-deployment/docker/fluentd-loki
          echo "✓ ndm-fluentd-loki:v1.17-1"
          echo "::endgroup::"

          echo "::group::Building ndm-admin-entry"
          docker build --platform linux/amd64 \
            -t ndm-admin-entry:alpine \
            app-deployment/docker/admin-entry
          echo "✓ ndm-admin-entry:alpine"
          echo "::endgroup::"

      - name: Save all images to tarball (Docker + OCI dual format)
        run: |
          mapfile -t IMAGES < /tmp/images.txt
          mapfile -t CUSTOM < /tmp/custom_images.txt
          IMAGES+=("${CUSTOM[@]}")

          CTR_NS="ndm-export-${GITHUB_RUN_ID}"
          echo "Saving ${#IMAGES[@]} images to ${TARBALL_NAME}..."
          echo "Using dedicated containerd namespace '${CTR_NS}' for isolation"
          echo "(produces both manifest.json and index.json)"

          # containerd normalises short names: refs without a '/' become
          # docker.io/library/<name>.  Align our export list accordingly.
          ctr_ref() {
            local r="$1"
            [[ "$r" == */* ]] && echo "$r" || echo "docker.io/library/${r}"
          }

          EXPORTED_REFS=()
          for img in "${IMAGES[@]}"; do
            echo "::group::Importing ${img}"
            docker save "${img}" | sudo ctr -n "${CTR_NS}" images import --no-unpack -
            EXPORTED_REFS+=("$(ctr_ref "${img}")")
            echo "::endgroup::"
          done

          echo "Exporting ${#EXPORTED_REFS[@]} images (deterministic, matches declared list):"
          printf '  %s\n' "${EXPORTED_REFS[@]}"

          # Export only the explicit refs we imported — ctr export produces
          # both manifest.json (Docker v2) and index.json (OCI image index)
          # in a single tar, matching the format expected by
          # 'microk8s images import'.
          sudo ctr -n "${CTR_NS}" images export --platform linux/amd64 \
            "${TARBALL_NAME}" "${EXPORTED_REFS[@]}"

          # Clean up the dedicated namespace.  Log failures rather than
          # silently swallowing them so stale images are visible in the run log.
          echo "Cleaning up namespace '${CTR_NS}'…"
          if ! sudo ctr -n "${CTR_NS}" images rm "${EXPORTED_REFS[@]}" 2>&1; then
            echo "::warning::Partial cleanup failure in namespace '${CTR_NS}' (non-fatal)"
          fi

          ls -lh "${TARBALL_NAME}"
          uncompressed_size=$(du -h "${TARBALL_NAME}" | cut -f1)
          echo "uncompressed_size=${uncompressed_size}" >> "$GITHUB_ENV"

      - name: Compress tarball with gzip
        run: |
          echo "Compressing ${TARBALL_NAME} with gzip..."
          gzip -1 "${TARBALL_NAME}"
          ls -lh "${TARBALL_NAME}.gz"
          tarball_size=$(du -h "${TARBALL_NAME}.gz" | cut -f1)
          echo "tarball_size=${tarball_size}" >> "$GITHUB_ENV"
          echo "Compressed ${uncompressed_size} → ${tarball_size}"

      - name: Generate version string
        id: version
        run: |
          TIMESTAMP="$(date -u +'%Y%m%d-%H%M%S')"
          SHORT_SHA="${GITHUB_SHA::7}"

          # Only dispatches from main produce "production" builds that are
          # allowed to move the `latest.json` pointer. Anything else is
          # treated as an ad-hoc developer build: it uploads a versioned
          # tarball + manifest (so it's still usable via explicit version),
          # but does NOT update latest.json.
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            VERSION="${TIMESTAMP}-${SHORT_SHA}"
            IS_PRODUCTION="true"
          else
            # Slugify the branch name so it is safe for URLs/paths:
            # lowercase, non-alphanumerics → '-', collapse repeats, trim,
            # cap length to keep the final version string readable.
            BRANCH_SLUG="$(echo "${GITHUB_REF_NAME}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
              | cut -c1-32)"
            VERSION="${TIMESTAMP}-${SHORT_SHA}-adhoc-${BRANCH_SLUG}"
            IS_PRODUCTION="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_production=${IS_PRODUCTION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"
          echo "Production build: ${IS_PRODUCTION}"

      - name: Generate manifest.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          mapfile -t IMAGE_ARRAY < /tmp/images.txt
          mapfile -t CUSTOM < /tmp/custom_images.txt
          IMAGE_ARRAY+=("${CUSTOM[@]}")
          IMAGES_JSON=$(printf '%s\n' "${IMAGE_ARRAY[@]}" | jq -R . | jq -s .)

          jq -n \
            --arg version "$VERSION" \
            --arg commit "$GITHUB_SHA" \
            --arg build_time "$BUILD_TIME" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg keycloak_tag "$KEYCLOAK_TAG" \
            --argjson images "$IMAGES_JSON" \
            '{
              version: $version,
              commit: $commit,
              build_time: $build_time,
              workflow_run_id: $run_id,
              keycloak_tag: $keycloak_tag,
              images: $images
            }' > manifest.json

          echo "manifest.json:"
          cat manifest.json

      - name: Upload versioned tarball to Artifactory
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSIONED_URL="${ARTIFACTORY_BASE_URL}/${ARTIFACTORY_PATH}/${VERSION}/${TARBALL_NAME}.gz"
          echo "Uploading ${TARBALL_NAME}.gz (${tarball_size}) to ${VERSIONED_URL}..."

          HTTP_CODE=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            -T "${TARBALL_NAME}.gz" \
            "${VERSIONED_URL}")

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            echo "✓ Versioned tarball upload successful (HTTP ${HTTP_CODE})"
          else
            echo "::error::Versioned tarball upload failed with HTTP ${HTTP_CODE}"
            cat /tmp/upload_response.txt
            exit 1
          fi

      - name: Upload manifest.json to Artifactory
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MANIFEST_URL="${ARTIFACTORY_BASE_URL}/${ARTIFACTORY_PATH}/${VERSION}/manifest.json"
          echo "Uploading manifest.json to ${MANIFEST_URL}..."

          HTTP_CODE=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            -T manifest.json \
            "${MANIFEST_URL}")

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            echo "✓ manifest.json upload successful (HTTP ${HTTP_CODE})"
          else
            echo "::error::manifest.json upload failed with HTTP ${HTTP_CODE}"
            cat /tmp/upload_response.txt
            exit 1
          fi

      - name: Upload latest.json to Artifactory
        if: ${{ github.event.inputs.dry_run != 'true' && steps.version.outputs.is_production == 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          jq -n \
            --arg version "$VERSION" \
            --arg tarball_url "${ARTIFACTORY_PATH}/${VERSION}/${TARBALL_NAME}.gz" \
            --arg image_count "${{ steps.images.outputs.count }}" \
            --arg tarball_size "${tarball_size}" \
            --arg commit "$GITHUB_SHA" \
            --arg updated_at "$BUILD_TIME" \
            --arg published_by "${{ github.actor }}" \
            '{
              version: $version,
              tarball_url: $tarball_url,
              image_count: ($image_count | tonumber),
              tarball_size: $tarball_size,
              commit: $commit,
              updated_at: $updated_at,
              published_by: $published_by
            }' > latest.json

          LATEST_URL="${ARTIFACTORY_BASE_URL}/${ARTIFACTORY_PATH}/latest.json"
          echo "Uploading latest.json to ${LATEST_URL}..."
          cat latest.json

          HTTP_CODE=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -u "${{ secrets.NDM_NEXUS_USERNAME }}":"${{ secrets.NDM_NEXUS_PASSWORD }}" \
            -T latest.json \
            "${LATEST_URL}")

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            echo "✓ latest.json upload successful (HTTP ${HTTP_CODE})"
          else
            echo "::error::latest.json upload failed with HTTP ${HTTP_CODE}"
            cat /tmp/upload_response.txt
            exit 1
          fi

      - name: Note ad-hoc build (latest.json intentionally skipped)
        if: ${{ github.event.inputs.dry_run != 'true' && steps.version.outputs.is_production != 'true' }}
        run: |
          echo "::notice::Ad-hoc build from '${GITHUB_REF_NAME}' — versioned tarball uploaded as '${{ steps.version.outputs.version }}' but latest.json was NOT updated. Only runs dispatched from 'main' publish latest.json."

      - name: Print summary
        if: always()
        run: |
          echo "## Third-Party Docker Images Tarball Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version.outputs.is_production }}" = "true" ]; then
            BUILD_TYPE="production (updates latest.json)"
          else
            BUILD_TYPE="ad-hoc (latest.json NOT updated)"
          fi

          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build type | ${BUILD_TYPE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source ref | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image count | ${{ steps.images.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ github.event.inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache hits / misses | ${cache_hits:-0} / ${cache_misses:-0} |" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "${TARBALL_NAME}.gz" ]; then
            SIZE=$(du -h "${TARBALL_NAME}.gz" | cut -f1)
            echo "| Tarball size (gzip) | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Uncompressed size | ${uncompressed_size:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Images included" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/images.txt >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r img; do
            echo "${img} (custom build)" >> "$GITHUB_STEP_SUMMARY"
          done < /tmp/custom_images.txt
          echo '```' >> "$GITHUB_STEP_SUMMARY"
