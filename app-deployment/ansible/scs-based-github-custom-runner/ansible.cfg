# Loaded when ansible-playbook runs with cwd = this directory.
# The deprecations (to_bytes/to_native/exit_json) come from ansible-core and bundled
# module code, not this repo; they are silenced here until you upgrade ansible on the
# control node. Set to true temporarily if you need to see them while debugging.
[defaults]
stdout_callback = default
display_skipped_hosts = false
ansible_python_interpreter = /usr/bin/python3
host_key_checking = false
remote_tmp = /tmp/.ansible-$USER
deprecation_warnings = false

[privilege_escalation]
become_timeout = 60

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
scp_extra_args = "-O"
pipelining = true
