---
- name: Deploy datamigrator helm chart
  become: true
  become_method: ansible.builtin.sudo
  debugger: never
  gather_facts: true
  hosts: default
  vars:
    ansible_python_interpreter: auto
    ansible_python_interpreter_fallback: ['python3.13', 'python3.12', 'python3.11', 'python3.10', 'python3.9', 'python3.8', '/usr/bin/python3', 'python3']
  roles:
    - { role: ../roles/datamigrator/configure-dm, tags: 'configure-dm' }
    - { role: ../roles/datamigrator/helm-chart/install, tags: 'helm-chart-install' }
    - { role: ../roles/datamigrator/configure-postgres-cron, tags: 'configure-postgres-cron' }
