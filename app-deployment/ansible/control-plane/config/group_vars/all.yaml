  - tcp 2379:2381
  - tcp 4318
  - tcp 5432
  - tcp 6379
  - tcp 6443
  - tcp 6781:6784
  - udp 6781:6784
  - tcp 7233
  - tcp 8090:8091
  - udp 8472
  - tcp 9153
  - tcp 10248:10260
  - udp 4789
  - tcp 5473
  - tcp 8443
  - udp 8472
  - tcp 9099
  - tcp 27017:27019
  - tcp 30000:65535
  - tcp 9000:9005
  - tcp 16443
  - tcp 9091

postgres_version: 16.7.26
postgres_data_volume_size: 30Gi

openbao_version: 0.16.3
openbao_data_volume_size: 8Gi

keycloak_version: 25.2.0

redis_version: 22.0.4
redis_data_volume_size: 30Gi

temporal_version: 0.65.0

grafana_version: 12.1.8
grafana_data_volume_size: 10Gi
loki_version: 6.37.0
loki_data_volume_size: 10Gi

prometheus_version: 27.32.0
prometheus_alertmanager_data_volume_size: 10Gi
prometheus_data_volume_size: 10Gi

fluentd_version: 0.5.3
fluentd_data_volume_size: 10Gi

otel_collector_version: 0.131.0