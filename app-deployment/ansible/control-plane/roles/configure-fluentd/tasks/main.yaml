---
# Fluentd writes log files into the /ndm-logs hostPath volume (see
# fluentd-values.yaml.j2 match paths) and support-service reads from the
# same directory (BASE_LOG_PATH=/ndm-logs) to build support bundles.
# The Kubernetes DirectoryOrCreate semantics would otherwise create the
# directory as root:root 0755 on first pod scheduling, which is not
# writable by the fluentd container.  The fluent user's UID varies
# across fluent/fluentd-kubernetes-daemonset base images (was 100 in
# older debian-elasticsearch variants, different in v1.17.1-debian-
# forward-1.2 that ndm-fluentd-loki is built from) so we cannot rely on
# a hardcoded owner UID matching the container.  Pre-create the
# directory with sticky-bit 01777 (same as /tmp) so the fluent
# container can write its per-date / per-project / per-service
# subdirectories regardless of its image UID, while still preventing
# cross-user deletion of subtrees.  vm_username retains the default
# POSIX ACL so operators can still traverse and read the logs.
- name: Ensure /ndm-logs hostPath exists and is writable by Fluentd
  become: yes
  file:
    path: /ndm-logs
    state: directory
    owner: "{{ vm_username }}"
    group: "{{ vm_username }}"
    mode: "01777"

- name: Set default ACL for {{ vm_username }} on /ndm-logs
  become: yes
  ansible.posix.acl:
    path: /ndm-logs
    entity: "{{ vm_username }}"
    etype: user
    permissions: rwx
    default: true
    state: present

# The fluent Helm chart mounts the host's /var/log into the container so
# fluentd can tail /var/log/containers/*.log and stage its buf_file
# buffers (path /var/log/fluentd-buffers/*, see fileConfigs in
# fluentd-values.yaml.j2).  /var/log on the VM is root:root 0755, and
# the fluent user inside the container is not root, so it cannot
# `mkdir /var/log/fluentd-buffers` on its own (observed as
# `Errno::EACCES error="Permission denied @ dir_s_mkdir - /var/log/fluentd-buffers"`
# in run 24611261104).  Pre-create the buffer directory with the same
# sticky-bit 01777 we use for /ndm-logs so the buf_file plugin can
# create its per-output subtrees regardless of the image's UID.
- name: Ensure /var/log/fluentd-buffers exists and is writable by Fluentd
  become: yes
  file:
    path: /var/log/fluentd-buffers
    state: directory
    owner: "{{ vm_username }}"
    group: "{{ vm_username }}"
    mode: "01777"

- name: Set default ACL for {{ vm_username }} on /var/log/fluentd-buffers
  become: yes
  ansible.posix.acl:
    path: /var/log/fluentd-buffers
    entity: "{{ vm_username }}"
    etype: user
    permissions: rwx
    default: true
    state: present

# Deploy a systemd timer + service that deletes rotated containerd log files from
# snap/microk8s. Before deleting, the script verifies that Fluentd has actually
# flushed yesterday's logs to /ndm-logs (checks for the YYYY-MM-DD date directory).
# If the directory is absent the cleanup is skipped to avoid data loss.
# Only rotated files (1.log, 2.log, ...) are deleted; 0.log (active) is never touched.
- name: Deploy ndm-containerd-log-cleanup script
  become: yes
  template:
    src: ndm-containerd-log-cleanup.sh.j2
    dest: /usr/local/bin/ndm-containerd-log-cleanup.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy ndm-containerd-log-cleanup systemd service
  become: yes
  copy:
    dest: /etc/systemd/system/ndm-containerd-log-cleanup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Delete rotated containerd log files from snap/microk8s
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/ndm-containerd-log-cleanup.sh

- name: Deploy ndm-containerd-log-cleanup systemd timer (runs at 00:30 UTC)
  become: yes
  copy:
    dest: /etc/systemd/system/ndm-containerd-log-cleanup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Daily cleanup of rotated containerd log files at 00:30 UTC
      [Timer]
      OnCalendar=*-*-* 00:30:00 UTC
      Persistent=true
      [Install]
      WantedBy=timers.target

- name: Enable and start ndm-containerd-log-cleanup timer
  become: yes
  systemd:
    name: ndm-containerd-log-cleanup.timer
    enabled: yes
    state: started
    daemon_reload: yes

# Hybrid /ndm-logs retention: delete date dirs older than ndm_logs_retention_days
# only when total /ndm-logs size exceeds ndm_logs_size_threshold_gb.
# With compress gzip, /ndm-logs grows at ~20 MB/day, so the threshold is rarely
# crossed in normal operation. On verbose setups, oldest dirs are pruned first
# until size drops below the threshold. Dirs < ndm_logs_retention_days old are
# never deleted regardless of total size.
- name: Deploy ndm-logs-cleanup script
  become: yes
  template:
    src: ./templates/ndm-logs-cleanup.sh.j2
    dest: /usr/local/bin/ndm-logs-cleanup.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy ndm-logs-cleanup systemd service
  become: yes
  copy:
    dest: /etc/systemd/system/ndm-logs-cleanup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Prune /ndm-logs date dirs when total size exceeds threshold
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/ndm-logs-cleanup.sh

- name: Deploy ndm-logs-cleanup systemd timer (runs at 01:00 UTC)
  become: yes
  copy:
    dest: /etc/systemd/system/ndm-logs-cleanup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Daily hybrid size+age cleanup of /ndm-logs
      [Timer]
      OnCalendar=*-*-* 01:00:00 UTC
      Persistent=true
      [Install]
      WantedBy=timers.target

- name: Enable and start ndm-logs-cleanup timer
  become: yes
  systemd:
    name: ndm-logs-cleanup.timer
    enabled: yes
    state: started
    daemon_reload: yes

- name: Create Fluentd directory
  become: yes
  file:
    path: $HOME/fluentd
    state: directory

- name: Create Fluentd namespace
  become: yes
  template:
    src: ./templates/fluentd-namespace.yaml.j2
    dest: $HOME/fluentd/fluentd-namespace.yaml

- name: Create Fluentd values file for Helm
  become: yes
  template:
    src: ./templates/fluentd-values.yaml.j2
    dest: $HOME/fluentd/fluentd-values.yaml

- name: Remove Fluentd installation
  become: yes
  shell: |
    helm uninstall fluentd --namespace fluentd
    kubectl delete -f $HOME/fluentd/fluentd-namespace.yaml
  when: fluentd_uninstall is defined

- name: Apply Fluentd configurations
  become: yes
  shell: |
    kubectl apply -f $HOME/fluentd/fluentd-namespace.yaml
  register: SHELL_STDOUT

- name: Deploy Fluentd using Helm
  become: yes
  shell: |
    helm repo add fluent https://fluent.github.io/helm-charts
    helm repo update
    helm upgrade --install fluentd fluent/fluentd -f $HOME/fluentd/fluentd-values.yaml --namespace fluentd --version {{ fluentd_version }}
  register: SHELL_STDOUT

- name: debug output
  ansible.builtin.debug:
    msg: "Helm Install (fluentd): stderr: {{ SHELL_STDOUT.stderr_lines }} stdout: {{ SHELL_STDOUT.stdout_lines }}"

- name: Wait for Fluentd pods to be ready
  block:
    # Wait for Fluentd DaemonSet pods to reach Ready, but abort early if a
    # pod lands in an unrecoverable waiting state (CrashLoopBackOff,
    # ImagePullBackOff, ErrImagePull, CreateContainerConfigError,
    # InvalidImageName).  Previously this task used a single
    # `kubectl wait --timeout=120s` retried 10 times with a 25s delay,
    # which meant ~26 min of wasted wall-clock time before the rescue
    # diagnostics ran when the pod was already crashing (observed in run
    # 24606547305).  With the fail-fast loop below, a healthy pod still
    # reaches Ready well under a minute, but a broken pod is detected
    # and surfaced to the rescue block within ~30s.
    - name: Wait for Fluentd pods to be ready (fail-fast on CrashLoopBackOff)
      become: yes
      shell: |
        set -o pipefail
        NS=fluentd
        MAX_ATTEMPTS=8
        WAIT_TIMEOUT=30s
        FATAL_REASONS="CrashLoopBackOff ImagePullBackOff ErrImagePull CreateContainerConfigError InvalidImageName RunContainerError"
        for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
          echo "[attempt $attempt/$MAX_ATTEMPTS] kubectl wait --for=condition=Ready --timeout=$WAIT_TIMEOUT"
          if kubectl wait --namespace="$NS" --for=condition=Ready pod --all --timeout="$WAIT_TIMEOUT"; then
            echo "All fluentd pods are Ready"
            exit 0
          fi
          echo "=== pod status snapshot ==="
          kubectl get pods -n "$NS" -o wide 2>&1 || true
          waiting_reasons=$(kubectl get pods -n "$NS" \
            -o jsonpath='{.items[*].status.containerStatuses[*].state.waiting.reason}' \
            2>/dev/null || true)
          echo "waiting reasons: ${waiting_reasons:-<none>}"
          for reason in $FATAL_REASONS; do
            case " $waiting_reasons " in
              *" $reason "*)
                echo "fail-fast: fluentd pod is in unrecoverable state ($reason); aborting retry loop"
                exit 2
                ;;
            esac
          done
        done
        echo "retry window exhausted without fluentd pods becoming Ready"
        exit 1
      args:
        executable: /bin/bash
      register: kubectl_wait_fluentd
      changed_when: false

  rescue:
    - name: Fluentd diagnostics — pods, services, and recent events
      become: yes
      shell: |
        set +e
        echo "=== kubectl get pods,svc -n fluentd -o wide ==="
        kubectl get pods,svc -n fluentd -o wide 2>&1
        echo "=== kubectl get events -n fluentd (last 80) ==="
        kubectl get events -n fluentd --sort-by='.lastTimestamp' 2>&1 | tail -80
      register: fluentd_diag_get
      changed_when: false

    - name: Fluentd diagnostics — describe pods
      become: yes
      shell: kubectl describe pods -n fluentd 2>&1
      register: fluentd_diag_describe
      changed_when: false
      failed_when: false

    - name: Fluentd diagnostics — container logs
      become: yes
      shell: |
        kubectl logs -n fluentd --all-containers=true --tail=400 --prefix=true 2>&1 \
          || kubectl logs -n fluentd -l app.kubernetes.io/instance=fluentd --all-containers=true --tail=400 --prefix=true 2>&1
      register: fluentd_diag_logs
      changed_when: false
      failed_when: false

    - name: Fluentd diagnostics — pods and events (stdout)
      ansible.builtin.debug:
        var: fluentd_diag_get.stdout

    - name: Fluentd diagnostics — describe pods (stdout)
      ansible.builtin.debug:
        var: fluentd_diag_describe.stdout

    - name: Fluentd diagnostics — container logs (stdout)
      ansible.builtin.debug:
        var: fluentd_diag_logs.stdout

    - name: Fail — Fluentd pods did not become Ready
      ansible.builtin.fail:
        msg: >-
          Fluentd pods did not become Ready within the retry window.
          See "Print Fluentd diagnostics" and Helm output above.
          Ensure Grafana/Loki is deployed before this play (loki-gateway.grafana.svc must exist).

# Let the non-root fluent user read the root:root 0640 container logs under /var/log/pods. The UID varies across base images, so read it from the running pod (hence after the readiness block). read_from_head true means logs written before the ACL is set are still picked up, so no logs are lost.
- name: Detect the Fluentd container UID from the running pod
  become: yes
  shell: POD=$(kubectl get pods -n fluentd -l app.kubernetes.io/instance=fluentd --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}'); [ -n "$POD" ] || { echo "No Running Fluentd pod found in namespace fluentd" >&2; exit 1; }; kubectl exec -n fluentd "$POD" -- id -u
  args:
    executable: /bin/bash
  register: fluentd_uid
  changed_when: false

# rX grants read on files and traverse only on directories.
- name: Grant Fluentd read access to existing container logs
  become: yes
  ansible.posix.acl:
    path: /var/log/pods
    entity: "{{ fluentd_uid.stdout | trim }}"
    etype: user
    permissions: rX
    recursive: true
    state: present

# Default ACL so pod log dirs the kubelet creates later inherit the same read access automatically.
- name: Set default ACL so new container logs are readable by Fluentd
  become: yes
  ansible.posix.acl:
    path: /var/log/pods
    entity: "{{ fluentd_uid.stdout | trim }}"
    etype: user
    permissions: rX
    default: true
    state: present

- name: Check Fluentd pod status
  shell: kubectl get pods -n fluentd
  register: pod_status

- debug:
    var: pod_status.stdout

- name: Delete Fluentd directory
  become: yes
  file:
    path: $HOME/fluentd
    state: absent
