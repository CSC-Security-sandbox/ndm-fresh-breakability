---
- name: Get the node name of the Packer VM
  become: yes
  command: hostname
  register: node_name

- name: Remove the Packer node from the MicroK8s cluster
  become: yes
  command: kubectl delete node "{{ node_name.stdout }}"
  register: delete_node_result

- name: Display the result of node deletion
  become: yes
  debug:
    msg: "{{ delete_node_result.stdout }}"

