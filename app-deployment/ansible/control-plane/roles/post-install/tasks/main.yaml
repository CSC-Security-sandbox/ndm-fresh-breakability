- name: Admin entry configmap template
  become: yes
  template: 
    src: ./templates/admin-entry-configmap.j2 
    dest: $HOME/admin-entry-configmap.yaml

- name: Admin entry job template
  become: yes
  template: 
    src: ./templates/admin-entry-job.j2 
    dest: $HOME/admin-entry-job.yaml

- name: Reset job for the users
  become: yes
  shell: |
    kubectl delete -f $HOME/admin-entry-configmap.yaml -n datamigrator
    kubectl delete -f $HOME/admin-entry-job.yaml -n datamigrator
  when: reset_job is defined and local_cluster is defined
  args:
    chdir: $HOME

- name: Run script to add admin
  become: yes
  shell: |
    kubectl apply -f $HOME/admin-entry-configmap.yaml -n datamigrator
    sleep 5
    kubectl apply -f $HOME/admin-entry-job.yaml -n datamigrator
  when: local_cluster is defined

- name: Wait for job to complete successfully
  become: yes
  shell: |
    kubectl wait --for=condition=complete --timeout=600s job/admin-entry-job -n datamigrator
  register: job_wait_result
  retries: 5
  delay: 10
  until: job_wait_result.rc == 0
  when: local_cluster is defined

- name: Get logs from the job pod
  become: yes
  shell: |
    POD_NAME=$(kubectl get pods -n datamigrator -l job-name=admin-entry-job -o jsonpath='{.items[0].metadata.name}')
    kubectl logs $POD_NAME -n datamigrator
  register: job_logs
  when: local_cluster is defined and (job_wait_result is defined and job_wait_result.rc == 0)

- name: Debug job logs
  debug:
    var: job_logs.stdout_lines
  when: local_cluster is defined and (job_wait_result is defined and job_wait_result.rc == 0)

- name: Clean up admin entry configmap and job files
  become: yes
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - $HOME/admin-entry-configmap.yaml
    - $HOME/admin-entry-job.yaml
  when: local_cluster is defined

- name: Wait for admin-service to be ready
  become: yes
  shell: |
    kubectl wait --for=condition=ready pod -l app=admin-service -n datamigrator --timeout=300s
  register: admin_service_ready
  retries: 3
  delay: 10
  until: admin_service_ready.rc == 0
  when: local_cluster is defined and istio_jwt_auth.enabled | default(false)

- name: Restart Keycloak to refresh JWKS
  become: yes
  shell: |
    echo "Restarting Keycloak StatefulSet to ensure fresh JWKS..."
    kubectl rollout restart statefulset keycloak -n keycloak
    kubectl rollout status statefulset keycloak -n keycloak --timeout=300s
  when: local_cluster is defined and istio_jwt_auth.enabled | default(false)
  ignore_errors: yes

- name: Refresh Istio sidecar configuration to reload JWKS
  become: yes
  shell: |
    # Get all deployments with Istio sidecars in datamigrator namespace
    DEPLOYMENTS=$(kubectl get deployments -n datamigrator -o json | jq -r '.items[] | select(.spec.template.metadata.annotations."sidecar.istio.io/inject" == "true" or .spec.template.metadata.labels."sidecar.istio.io/inject" == "true") | .metadata.name')
    
    if [ -z "$DEPLOYMENTS" ]; then
      echo "No deployments with Istio sidecars found, checking for istio-proxy containers..."
      DEPLOYMENTS=$(kubectl get deployments -n datamigrator -o json | jq -r '.items[] | select(.spec.template.spec.containers[].name == "istio-proxy") | .metadata.name')
    fi
    
    # Restart each deployment to refresh Istio configuration and JWKS cache
    for deployment in $DEPLOYMENTS; do
      echo "Restarting deployment: $deployment"
      kubectl rollout restart deployment/$deployment -n datamigrator
    done
    
    # Wait for rollouts to complete
    for deployment in $DEPLOYMENTS; do
      echo "Waiting for rollout of $deployment to complete..."
      kubectl rollout status deployment/$deployment -n datamigrator --timeout=300s
    done
  when: local_cluster is defined and istio_jwt_auth.enabled | default(false)
  ignore_errors: yes
- name: Update Redis EnvoyFilter with redis-validator secret after admin-entry job
  become: yes
  shell: |
    echo "Retrieving redis-validator secret from OpenBao..."
    export REDIS_VALIDATOR_SECRET=$(kubectl exec -ti openbao-0 -n openbao -- bao kv get -format=json /secrets/redis-secrets/redis-validator-creds | jq -r .data.REDIS_VALIDATOR_SECRET 2>/dev/null || echo "")
    
    if [ -z "$REDIS_VALIDATOR_SECRET" ]; then
      echo "WARNING: redis-validator secret not found in OpenBao, EnvoyFilter will use default"
    else
      echo "Found redis-validator secret, restarting Redis to apply updated EnvoyFilter"
      kubectl rollout restart statefulset/redis-master -n redis 2>/dev/null || echo "Redis not deployed yet"
    fi
  args:
    executable: /bin/bash
  when: 
    - local_cluster is defined
    - enable_istio | default(false) | bool
    - job_wait_result is defined
    - job_wait_result.rc == 0
  ignore_errors: yes
