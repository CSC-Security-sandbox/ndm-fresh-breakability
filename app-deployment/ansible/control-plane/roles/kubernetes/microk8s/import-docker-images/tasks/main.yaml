---
# Third-party images: build-push-third-party-images publishes ndm-docker-images.tar.gz only
# (gzip once in CI). Import streams from gzip so we do not write a full uncompressed .tar to disk.
- name: Stat third-party Docker images bundle
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../../artifacts/ndm-docker-images.tar.gz"
  delegate_to: localhost
  register: third_party_tgz
  become: false
  when: local_cluster is not defined

- name: Assert third-party Docker images bundle is present
  ansible.builtin.assert:
    that:
      - third_party_tgz.stat.exists | default(false)
    fail_msg: >-
      No ndm-docker-images.tar.gz under app-deployment/artifacts.
      Run the VM workflow download step or place the bundle from build-push-third-party-images.
  when: local_cluster is not defined

- name: Copy third-party Docker images bundle
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../artifacts/ndm-docker-images.tar.gz"
    dest: "{{ ansible_env.HOME }}/ndm-docker-images.tar.gz"
    mode: "0644"
  when: local_cluster is not defined

- name: Import third-party Docker images into MicroK8s containerd
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    gunzip -c "{{ ansible_env.HOME }}/ndm-docker-images.tar.gz" | microk8s ctr images import -
  args:
    executable: /bin/bash
  when: local_cluster is not defined
