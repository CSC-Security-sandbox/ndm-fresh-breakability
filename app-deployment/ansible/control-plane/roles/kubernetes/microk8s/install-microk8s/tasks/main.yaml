# Ensure snapd is installed (for Ubuntu and Arch)
- name: 4.1. Make sure snapd is installed on Ubuntu
  package:
    name:
      - snapd
    state: latest
  retries: 5
  delay: 60

# Install MicroK8s
# Uses command instead of community.general.snap to avoid the
# "list index out of range" bug when the snap store is transiently unreachable.
- name: 4.2. Check if MicroK8s is already installed
  command: snap list microk8s
  register: microk8s_check
  changed_when: false
  failed_when: false

- name: 4.2. Install MicroK8s
  command: snap install microk8s --classic --channel={{ microk8s_version }}
  register: microk8s_install
  retries: 3
  delay: 30
  when: microk8s_check.rc != 0

- name: debug
  debug:
    var: microk8s_install

# Wait for MicroK8s to be ready
- name: 4.3. Wait for MicroK8s to be ready
  command: "{{ microk8s_bin_path }}microk8s.status --wait-ready"
  changed_when: false
  register: mk8sstatusout
  failed_when:
    - "'This MicroK8s deployment is acting as a node in a cluster.' not in mk8sstatusout.stdout_lines"
    - mk8sstatusout.rc > 0

# Create kubectl alias
- name: 4.4. Create kubectl alias
  command: "snap alias microk8s.kubectl kubectl"
  changed_when: false

# Create helm3 alias if needed
- name: 4.5. Create helm3 alias
  command: "snap alias microk8s.helm3 helm"
  changed_when: false
  when:
    - "'helm3' in microk8s_plugins"
    - microk8s_plugins.helm3

# Disable snap auto-update to prevent disruptions
- name: 4.6. Disable snap auto-update
  blockinfile:
    dest: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED: microk8s Disable snap autoupdate"
    content: |
      127.0.0.1 api.snapcraft.io
  when: microk8s_disable_snap_autoupdate
