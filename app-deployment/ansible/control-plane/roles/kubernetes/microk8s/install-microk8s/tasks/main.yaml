# Ensure snapd is installed (for Ubuntu and Arch)
- name: 4.1. Make sure snapd is installed on Ubuntu
  package:
    name:
      - snapd
    state: latest
  retries: 5
  delay: 60

# Install MicroK8s
- name: 4.2. Install MicroK8s
  community.general.snap:
    name: microk8s
    classic: yes
    channel: "{{ microk8s_version }}"
  register: microk8s_install
  retries: 3
  delay: 10

- name: debug
  debug:
    var: microk8s_install

# Wait for MicroK8s to be ready
- name: 4.3. Wait for MicroK8s to be ready
  command: "{{ microk8s_bin_path }}microk8s.status --wait-ready"
  changed_when: false
  register: mk8sstatusout
  failed_when:
    - "'This MicroK8s deployment is acting as a node in a cluster.' not in mk8sstatusout.stdout_lines"
    - mk8sstatusout.rc > 0

# Create kubectl alias
- name: 4.4. Create kubectl alias
  command: "snap alias microk8s.kubectl kubectl"
  changed_when: false

# Create helm3 alias if needed
- name: 4.5. Create helm3 alias
  command: "snap alias microk8s.helm3 helm"
  changed_when: false
  when:
    - "'helm3' in microk8s_plugins"
    - microk8s_plugins.helm3

# Disable snap auto-update to prevent disruptions
- name: 4.6. Disable snap auto-update
  blockinfile:
    dest: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED: microk8s Disable snap autoupdate"
    content: |
      127.0.0.1 api.snapcraft.io
  when: microk8s_disable_snap_autoupdate

# Cap container log file size so snap/microk8s pod logs don't grow unboundedly.
# Fluentd reads pod logs continuously into its on-disk buffer.
# kubelet requires a microk8s restart to pick up new args (see task 4.8).
- name: 4.7. Set kubelet container log rotation args
  become: yes
  lineinfile:
    path: /var/snap/microk8s/current/args/kubelet
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: yes
  loop:
    - regexp: "^--container-log-max-size="
      line: "--container-log-max-size={{ container_log_max_size }}"
    - regexp: "^--container-log-max-files="
      line: "--container-log-max-files={{ container_log_max_files }}"
  register: kubelet_args_result

# Restart only when the args file actually changed. On fresh installs this
# runs before any application pods are deployed, so it is safe.
# without a kubelet restart and the node will accumulate unbounded log files
# until the next natural reboot otherwise.
- name: 4.8. Restart MicroK8s to apply kubelet log-rotation args
  become: yes
  shell: microk8s stop && microk8s start
  when: kubelet_args_result.changed

