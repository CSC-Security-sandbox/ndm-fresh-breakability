  - name: node-resource-alerts
    rules:
      - alert: NodeHighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ '{{ $labels.instance }}' }} has high CPU usage"
          description: "Node {{ '{{ $labels.instance }}' }} CPU usage is above 80% for more than 5 minutes."

      - alert: NodeHighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ '{{ $labels.instance }}' }} has high memory usage"
          description: "Node {{ '{{ $labels.instance }}' }} memory usage is above 85% for more than 2 minutes."

      - alert: NodeHighDiskUsage
        expr: (node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay"} - node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay"}) / node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ '{{ $labels.instance }}' }} has high disk usage"
          description: "Node {{ '{{ $labels.instance }}' }} disk usage has exceeded 85% for more than 5 minutes."
