customScrapeConfigs: 
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector-opentelemetry-collector.otel.svc.cluster.local:8889']

  - job_name: worker-service
    static_configs:
      - targets:
          - prometheus-prometheus-pushgateway.prometheus.svc.cluster.local:9091

  - job_name: 'redis-metrics'
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        action: keep
        regex: redis
      - source_labels: [__meta_kubernetes_service_port_name]
        action: keep
        regex: http
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service


  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090

  # Envoy sidecar metrics across the mesh
  - job_name: 'envoy-stats'
    metrics_path: /stats/prometheus
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: '.*-envoy-prom'
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:15090
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod_name

  # A scrape configuration for running Prometheus on a Kubernetes cluster.
  # This uses separate scrape configs for cluster components (i.e. API server, node)
  # and services to allow each to use different authentication configs.
  #
  # Kubernetes labels will be added as Prometheus labels on metrics via the
  # `labelmap` relabeling action.

  # Scrape config for API servers.
  #
  # Kubernetes exposes API servers as endpoints to the default/kubernetes
  # service so this uses `endpoints` role and uses relabelling to only keep
  # the endpoints associated with the default/kubernetes service using the
  # default named port `https`. This works for single API server deployments as
  # well as HA API server deployments.
  - job_name: "kubernetes-apiservers"

    kubernetes_sd_configs:
      - role: endpoints

    # Default to scraping over https. If required, just disable this or change to
    # `http`.
    scheme: https

    # This TLS & bearer token file config is used to connect to the actual scrape
    # endpoints for cluster components. This is separate to discovery auth
    # configuration because discovery & scraping are two separate concerns in
    # Prometheus. The discovery auth config is automatic if Prometheus runs inside
    # the cluster. Otherwise, more config options have to be provided within the
    # <kubernetes_sd_config>.
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      # If your node certificates are self-signed or use a different CA to the
      # master CA, then disable certificate verification below. Note that
      # certificate verification is an integral part of a secure infrastructure
      # so this should only be disabled in a controlled environment. You can
      # disable certificate verification by uncommenting the line below.
      #
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

    # Keep only the default/kubernetes service endpoints for the https port. This
    # will add targets for each API server which Kubernetes adds an endpoint to
    # the default/kubernetes service.
    relabel_configs:
      - source_labels:
          [
            __meta_kubernetes_namespace,
            __meta_kubernetes_service_name,
            __meta_kubernetes_endpoint_port_name,
          ]
        action: keep
        regex: default;kubernetes;https

  - job_name: "kubernetes-nodes"

    # Default to scraping over https. If required, just disable this or change to
    # `http`.
    scheme: https

    # This TLS & bearer token file config is used to connect to the actual scrape
    # endpoints for cluster components. This is separate to discovery auth
    # configuration because discovery & scraping are two separate concerns in
    # Prometheus. The discovery auth config is automatic if Prometheus runs inside
    # the cluster. Otherwise, more config options have to be provided within the
    # <kubernetes_sd_config>.
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      # If your node certificates are self-signed or use a different CA to the
      # master CA, then disable certificate verification below. Note that
      # certificate verification is an integral part of a secure infrastructure
      # so this should only be disabled in a controlled environment. You can
      # disable certificate verification by uncommenting the line below.
      #
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

    kubernetes_sd_configs:
      - role: node

    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics

  - job_name: "kubernetes-nodes-cadvisor"

    # Default to scraping over https. If required, just disable this or change to
    # `http`.
    scheme: https

    # This TLS & bearer token file config is used to connect to the actual scrape
    # endpoints for cluster components. This is separate to discovery auth
    # configuration because discovery & scraping are two separate concerns in
    # Prometheus. The discovery auth config is automatic if Prometheus runs inside
    # the cluster. Otherwise, more config options have to be provided within the
    # <kubernetes_sd_config>.
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      # If your node certificates are self-signed or use a different CA to the
      # master CA, then disable certificate verification below. Note that
      # certificate verification is an integral part of a secure infrastructure
      # so this should only be disabled in a controlled environment. You can
      # disable certificate verification by uncommenting the line below.
      #
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

    kubernetes_sd_configs:
      - role: node

    # This configuration will work only on kubelet 1.7.3+
    # As the scrape endpoints for cAdvisor have changed
    # if you are using older version you need to change the replacement to
    # replacement: /api/v1/nodes/$1:4194/proxy/metrics
    # more info here https://github.com/coreos/prometheus-operator/issues/633
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

    # Metric relabel configs to apply to samples before ingestion.
    # [Metric Relabeling](https://prometheus.io/docs/prometheus/latest/configuration/configuration/#metric_relabel_configs)
    # metric_relabel_configs:
    # - action: labeldrop
    #   regex: (kubernetes_io_hostname|failure_domain_beta_kubernetes_io_region|beta_kubernetes_io_os|beta_kubernetes_io_arch|beta_kubernetes_io_instance_type|failure_domain_beta_kubernetes_io_zone)

  # Scrape config for service endpoints.
  #
  # The relabeling allows the actual service scrape endpoint to be configured
  # via the following annotations:
  #
  # * `prometheus.io/scrape`: Only scrape services that have a value of
  # `true`, except if `prometheus.io/scrape-slow` is set to `true` as well.
  # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
  # to set this to `https` & most likely set the `tls_config` of the scrape config.
  # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
  # * `prometheus.io/port`: If the metrics are exposed on a different port to the
  # service then set this appropriately.
  # * `prometheus.io/param_<parameter>`: If the metrics endpoint uses parameters
  # then you can set any parameter
  - job_name: "kubernetes-service-endpoints"
    honor_labels: true

    kubernetes_sd_configs:
      - role: endpoints

    relabel_configs:
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
        action: drop
        regex: true
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_scheme]
        action: replace
        target_label: __scheme__
        regex: (https?)
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+?)(?::\d+)?;(\d+)
        replacement: $1:$2
      - action: labelmap
        regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
        replacement: __param_$1
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: instance
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node

  # Scrape config for slow service endpoints; same as above, but with a larger
  # timeout and a larger interval
  #
  # The relabeling allows the actual service scrape endpoint to be configured
  # via the following annotations:
  #
  # * `prometheus.io/scrape-slow`: Only scrape services that have a value of `true`
  # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
  # to set this to `https` & most likely set the `tls_config` of the scrape config.
  # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
  # * `prometheus.io/port`: If the metrics are exposed on a different port to the
  # service then set this appropriately.
  # * `prometheus.io/param_<parameter>`: If the metrics endpoint uses parameters
  # then you can set any parameter
  - job_name: "kubernetes-service-endpoints-slow"
    honor_labels: true

    scrape_interval: 5m
    scrape_timeout: 30s

    kubernetes_sd_configs:
      - role: endpoints

    relabel_configs:
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
        action: keep
        regex: true
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_scheme]
        action: replace
        target_label: __scheme__
        regex: (https?)
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+?)(?::\d+)?;(\d+)
        replacement: $1:$2
      - action: labelmap
        regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
        replacement: __param_$1
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node

  - job_name: "prometheus-pushgateway"
    honor_labels: true

    kubernetes_sd_configs:
      - role: service

    relabel_configs:
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_probe]
        action: keep
        regex: pushgateway

  # Example scrape config for probing services via the Blackbox Exporter.
  #
  # The relabeling allows the actual service scrape endpoint to be configured
  # via the following annotations:
  #
  # * `prometheus.io/probe`: Only probe services that have a value of `true`
  - job_name: "kubernetes-services"
    honor_labels: true

    metrics_path: /probe
    params:
      module: [http_2xx]

    kubernetes_sd_configs:
      - role: service

    relabel_configs:
      - source_labels:
          [__meta_kubernetes_service_annotation_prometheus_io_probe]
        action: keep
        regex: true
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox
      - source_labels: [__param_target]
        target_label: instance
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service

  # Example scrape config for pods
  #
  # The relabeling allows the actual pod scrape endpoint to be configured via the
  # following annotations:
  #
  # * `prometheus.io/scrape`: Only scrape pods that have a value of `true`,
  # except if `prometheus.io/scrape-slow` is set to `true` as well.
  # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
  # to set this to `https` & most likely set the `tls_config` of the scrape config.
  # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
  # * `prometheus.io/port`: Scrape the pod on the indicated port instead of the default of `9102`.
  - job_name: "kubernetes-pods"
    honor_labels: true

    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels:
          [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
        action: drop
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
        action: replace
        regex: (https?)
        target_label: __scheme__
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [
            __meta_kubernetes_pod_annotation_prometheus_io_port,
            __meta_kubernetes_pod_ip,
          ]
        action: replace
        regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
        replacement: "[$2]:$1"
        target_label: __address__
      - source_labels:
          [
            __meta_kubernetes_pod_annotation_prometheus_io_port,
            __meta_kubernetes_pod_ip,
          ]
        action: replace
        regex: (\d+);((([0-9]+?)(\.|$)){4})
        replacement: $2:$1
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
        replacement: __param_$1
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_phase]
        regex: Pending|Succeeded|Failed|Completed
        action: drop
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node

  # Example Scrape config for pods which should be scraped slower. An useful example
  # would be stackriver-exporter which queries an API on every scrape of the pod
  #
  # The relabeling allows the actual pod scrape endpoint to be configured via the
  # following annotations:
  #
  # * `prometheus.io/scrape-slow`: Only scrape pods that have a value of `true`
  # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
  # to set this to `https` & most likely set the `tls_config` of the scrape config.
  # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
  # * `prometheus.io/port`: Scrape the pod on the indicated port instead of the default of `9102`.
  - job_name: "kubernetes-pods-slow"
    honor_labels: true

    scrape_interval: 5m
    scrape_timeout: 30s

    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels:
          [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
        action: replace
        regex: (https?)
        target_label: __scheme__
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [
            __meta_kubernetes_pod_annotation_prometheus_io_port,
            __meta_kubernetes_pod_ip,
          ]
        action: replace
        regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
        replacement: "[$2]:$1"
        target_label: __address__
      - source_labels:
          [
            __meta_kubernetes_pod_annotation_prometheus_io_port,
            __meta_kubernetes_pod_ip,
          ]
        action: replace
        regex: (\d+);((([0-9]+?)(\.|$)){4})
        replacement: $2:$1
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
        replacement: __param_$1
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_phase]
        regex: Pending|Succeeded|Failed|Completed
        action: drop
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node

customAlertingRules:
  - name: datamigrator-alerts
    rules:
      - alert: DataMigratorPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="datamigrator", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in datamigrator namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'datamigrator' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: DataMigratorPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="datamigrator"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in datamigrator namespace restarting frequently"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'datamigrator' namespace restarted more than 3 times in the past 5 minutes."
      
  - name: keycloak-alerts
    rules:
      - alert: KeycloakPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="keycloak", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in keycloak namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'keycloak' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: KeycloakPodHighCPUUsage
        expr: 100 * (sum(rate(container_cpu_usage_seconds_total{namespace="keycloak", container!="", container!="POD"}[5m])) by (pod)) / (sum(kube_pod_container_resource_limits{namespace="keycloak", resource="cpu", container!="", container!="POD"}) by (pod)) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in keycloak namespace has high CPU usage"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'keycloak' namespace is using more than 80% of its CPU limit."
      - alert: KeycloakPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="keycloak"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in keycloak namespace restarting frequently"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'keycloak' namespace restarted more than 3 times in the past 5 minutes."
      - alert: KeycloakPodHighMemoryUsage
        expr: 100 * (sum(container_memory_usage_bytes{namespace="keycloak", container!="", container!="POD"}) by (pod)) / (sum(kube_pod_container_resource_limits{namespace="keycloak", resource="memory", container!="", container!="POD"}) by (pod)) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in keycloak namespace has high memory usage"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'keycloak' namespace is using more than 80% of its memory limit."

  - name: redis-alerts
    rules:
      - alert: RedisPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="redis", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in redis namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'redis' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: RedisPodHighCPUUsage
        expr: 100 * (sum(rate(container_cpu_usage_seconds_total{namespace="redis", container!="", container!="POD"}[5m])) by (pod)) / (sum(kube_pod_container_resource_limits{namespace="redis", resource="cpu", container!="", container!="POD"}) by (pod)) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in redis namespace has high CPU usage"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'redis' namespace is using more than 80% of its CPU limit."
      - alert: RedisPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="redis"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in redis namespace restarting frequently" 
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'redis' namespace restarted more than 3 times in the past 5 minutes."
      - alert: RedisPodHighMemoryUsage
        expr: 100 * (sum(container_memory_usage_bytes{namespace="redis", container!="", container!="POD"}) by (pod)) / (sum(kube_pod_container_resource_limits{namespace="redis", resource="memory", container!="", container!="POD"}) by (pod)) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in redis namespace has high memory usage"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'redis' namespace is using more than 80% of its memory limit."

  - name: temporal-alerts
    rules:
      - alert: TemporalPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="temporal", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in temporal namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'temporal' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: TemporalPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="temporal"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in temporal namespace restarting frequently"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'temporal' namespace restarted more than 3 times in the past 5 minutes."

  - name: grafana-alerts
    rules:
      - alert: GrafanaPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="grafana", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in grafana namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'grafana' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: GrafanaPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="grafana"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in grafana namespace restarting frequently"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'grafana' namespace restarted more than 3 times in the past 5 minutes."

  - name: prometheus-alerts
    rules:
      - alert: PrometheusPodNotRunning
        expr: sum by (namespace, pod, phase) (kube_pod_status_phase{namespace="prometheus", phase=~"Pending|Failed|Unknown"}) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in prometheus namespace is not running"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'prometheus' namespace has been in {{ '{{ $labels.phase }}' }} state for at least 5 minutes."
      - alert: PrometheusPodRestartingTooOften
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="prometheus"}[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ '{{ $labels.pod }}' }} in prometheus namespace restarting frequently"
          description: "Pod {{ '{{ $labels.pod }}' }} in the 'prometheus' namespace restarted more than 3 times in the past 5 minutes."

