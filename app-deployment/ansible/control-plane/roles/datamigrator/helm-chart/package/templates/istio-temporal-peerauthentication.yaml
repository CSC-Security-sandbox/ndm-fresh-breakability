{{- $global := .Values.global | default dict -}}
{{- $istio := $global.istio | default dict -}}
{{- $temporalMtls := $istio.temporalMtls | default dict -}}
{{- if $temporalMtls.enabled | default false }}
---
# PeerAuthentication for Temporal namespace
# Enforces mTLS for all service-to-service communication within Temporal
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: temporal-mtls-strict
  namespace: temporal
spec:
  mtls:
    mode: {{ $temporalMtls.mode | default "PERMISSIVE" | upper }}
{{- end }}
