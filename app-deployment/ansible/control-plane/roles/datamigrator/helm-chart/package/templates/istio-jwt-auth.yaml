{{- $global := .Values.global | default dict -}}
{{- $istio := $global.istio | default dict -}}
{{- $jwt := $istio.jwt | default dict -}}
{{- if and ($istio.enabled | default false) ($jwt.enabled | default false) }}
---
# AuthorizationPolicy enforces JWT authentication on protected endpoints
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $jwt.authPolicyName | default "require-jwt" }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- if $jwt.selector }}
  selector:
    matchLabels:
      {{- range $key, $value := $jwt.selector }}
      {{ $key }}: {{ $value }}
      {{- end }}
  {{- end }}
  action: {{ $jwt.action | default "ALLOW" }}
  rules:
  {{- if $jwt.protectedPaths }}
  {{- range $idx, $pathConfig := $jwt.protectedPaths }}
  - to:
    - operation:
        {{- if $pathConfig.paths }}
        paths:
        {{- range $pathConfig.paths }}
        - {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- if $pathConfig.methods }}
        methods:
        {{- range $pathConfig.methods }}
        - {{ . | quote }}
        {{- end }}
        {{- end }}
    when:
    - key: request.auth.claims[iss]
      values: [{{ $jwt.issuer | quote }}]
    {{- if $pathConfig.requiredClaims }}
    {{- range $claim := $pathConfig.requiredClaims }}
    - key: request.auth.claims[{{ $claim.name }}]
      {{- if $claim.values }}
      values:
      {{- range $claim.values }}
      - {{ . | quote }}
      {{- end }}
      {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- end }}

---
# AuthorizationPolicy for public endpoints (no JWT required)
{{- if $jwt.publicPaths }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $jwt.publicAuthPolicyName | default "allow-public" }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- if $jwt.selector }}
  selector:
    matchLabels:
      {{- range $key, $value := $jwt.selector }}
      {{ $key }}: {{ $value }}
      {{- end }}
  {{- end }}
  action: ALLOW
  rules:
  - to:
    - operation:
        paths:
        {{- range $jwt.publicPaths }}
        - {{ . | quote }}
        {{- end }}
{{- end }}
{{- end }}
