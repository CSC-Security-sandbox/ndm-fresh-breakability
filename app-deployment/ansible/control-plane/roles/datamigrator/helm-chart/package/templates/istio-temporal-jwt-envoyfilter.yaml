{{- $global := .Values.global | default dict -}}
{{- $istio := $global.istio | default dict -}}
{{- $temporalMtls := $istio.temporalMtls | default dict -}}
{{- $jwt := $istio.jwt | default dict -}}
{{- $temporalJwt := $temporalMtls.jwtAuth | default dict -}}
{{- if and ($istio.enabled) ($temporalMtls.enabled | default false) ($temporalJwt.enabled | default false) }}
---
# RequestAuthentication to validate JWT tokens for Temporal gRPC/HTTP2 traffic
# JWT is extracted from 'authorization' HTTP header (gRPC metadata becomes HTTP headers)
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: temporal-jwt-validation
  namespace: istio-system
  annotations:
    "helm.sh/resource-policy": keep
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  jwtRules:
    - issuer: {{ $jwt.issuer | quote }}
      jwksUri: {{ $jwt.jwksUri | quote }}
      fromHeaders:
        - name: authorization
          prefix: "Bearer "
      forwardOriginalToken: true
---
# AuthorizationPolicy to enforce JWT requirement for Temporal on port 7233
# Uses DENY action to reject unauthenticated requests on port 7233
# This approach doesn't block other ports (443, etc.)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: temporal-require-jwt
  namespace: istio-system
  annotations:
    "helm.sh/resource-policy": keep
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: DENY
  rules:
    # Deny traffic to port 7233 WITHOUT valid JWT
    # If JWT is present and valid, this rule won't match, allowing the request
    - to:
        - operation:
            ports: ["7233"]
      when:
        - key: request.auth.principal
          notValues: ["*"]
{{- end }}
