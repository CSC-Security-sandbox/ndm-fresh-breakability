{{- $global := .Values.global | default dict -}}
{{- $istio := $global.istio | default dict -}}
{{- $temporalMtls := $istio.temporalMtls | default dict -}}
{{- if $temporalMtls.enabled | default false }}
---
# DestinationRule for Temporal Frontend
# Connection pool settings without mTLS (mTLS disabled via PeerAuthentication)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: temporal-frontend
  namespace: {{ .Release.Namespace }}
spec:
  host: temporaltest-frontend.temporal.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100  # Limit concurrent connections
    loadBalancer:
      simple: ROUND_ROBIN
---
# DestinationRule for Temporal History
# Connection pool settings without mTLS (mTLS disabled via PeerAuthentication)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: temporal-history
  namespace: {{ .Release.Namespace }}
spec:
  host: temporaltest-history.temporal.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    loadBalancer:
      simple: ROUND_ROBIN
---
# DestinationRule for Temporal Matching
# Connection pool settings without mTLS (mTLS disabled via PeerAuthentication)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: temporal-matching
  namespace: {{ .Release.Namespace }}
spec:
  host: temporaltest-matching.temporal.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    loadBalancer:
      simple: ROUND_ROBIN
---
# DestinationRule for Temporal Internal Worker
# Connection pool settings without mTLS (mTLS disabled via PeerAuthentication)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: temporal-worker
  namespace: {{ .Release.Namespace }}
spec:
  host: temporaltest-worker.temporal.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    loadBalancer:
      simple: ROUND_ROBIN
{{- end }}
