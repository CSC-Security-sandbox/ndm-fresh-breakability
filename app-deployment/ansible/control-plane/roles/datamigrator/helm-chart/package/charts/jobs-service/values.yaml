appName: "jobs-service"
kubeApiVersion: "apps/v1"
replicaCount: 1
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0

image:
  repository: ndm-jobs-service

annotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/role: "datamigrator-role"
  vault.hashicorp.com/agent-inject-secret-postgres.env: "secrets/postgres-secrets/postgres-creds"
  vault.hashicorp.com/agent-inject-secret-redis.env: "secrets/redis-secrets/redis-creds"
  vault.hashicorp.com/agent-inject-secret-keycloak.env: "secrets/keycloak-secrets/keycloak-creds"
  vault.hashicorp.com/agent-inject-status: "update"
  vault.hashicorp.com/agent-inject-template-postgres.env: |
    {{- with secret "secrets/postgres-secrets/postgres-creds" -}}
    export DB_USER="{{ .Data.POSTGRES_DMADMIN_USER }}"
    export DB_PASSWORD="{{ .Data.POSTGRES_DMADMIN_PASSWORD }}"
    {{- end }}
  vault.hashicorp.com/agent-inject-template-redis.env: |
    {{- with secret "secrets/redis-secrets/redis-creds" -}}
    export REDIS_USERNAME="{{ .Data.REDIS_USERNAME }}"
    export REDIS_PASSWORD="{{ .Data.REDIS_PASSWORD }}"
    {{- end }}
  vault.hashicorp.com/agent-inject-template-keycloak.env: |
    {{- with secret "secrets/keycloak-secrets/keycloak-creds" -}}
    export KEYCLOAK_CLIENT_SECRET="{{ .Data.KEYCLOAK_CLIENT_SECRET }}"
    {{- end }}
  # vault.hashicorp.com/agent-inject-template-redis.env: |
  #   {{- with secret "secrets/redis-secrets/redis-creds" -}}
  #   export REDIS_USERNAME="{{ .Data.REDIS_USERNAME }}"
  #   export REDIS_PASSWORD="{{ .Data.REDIS_PASSWORD }}"
  #   {{- end }}

serviceAccountName: datamigrator-openbao-sa

containerSecurityContext:
  privileged: true

args:
  - "--source-vault"

imagePullSecrets: azure-dev-acr-creds

env:
  - name: MY_HOST_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: APP_PORT
    value: "3000"
  - name: APP_HOST
    value: "$(MY_HOST_IP)"
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "datamigrator"
  - name: DB_HOST
    value: "postgresql.postgres.svc.cluster.local"
  - name: SCHEMA
    value: "datamigrator"
  - name: DB_SCHEMA
    value: "datamigrator"

  # - name: DB_USER # from secret
  #   value: "dmadmin"
  # - name: DB_PASSWORD # from secret
  #   value: "default"

  - name: SERVICE
    value: "/jobs-service"
  - name: MOUNT_BASE_PATH
    value: "/mnt/datamigrator"
  - name: DIR_MOUNT_BASE_PATH
    value: "/mnt"
  - name: UNMOUNT_TIMEOUT_MS
    value: "30000"
  - name: MOUNT_BACKUP_UID
    value: "0"
  - name: MOUNT_IDLE_TIMEOUT_MS
    value: "600000"
  - name: MOUNT_TIMEOUT_MS
    value: "120000"
  - name: NFS_LINUX_MOUNT_PATH_CMD
    value: 'mount -t nfs ${HOST}:${MOUNT_PATH} ${DIR_PATH}'
  - name: SMB_LINUX_MOUNT_PATH_CMD
    value: 'mount -t cifs //${HOST}/${SHARE_PATH} ${DIR_PATH} -o credentials=${CREDENTIALS_FILE},vers=${VERS},backupuid=${BACKUPUID}'
  - name: UNMOUNT_CMD
    value: 'umount ${DIR_PATH}'
  - name: TEMPORAL_ADDRESS
    value: "temporaltest-frontend.temporal.svc.cluster.local:7233"
  - name: REDIS_HOST
    value: "redis-master.redis.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_DIR
    value: "/logs"
  - name: TEMPLATES_PATH
    value: "src/templates"
  - name: START_CONSUMER
    value: "http://db-writer-service:3000"
  - name: KEYCLOAK_BASE_URL
    value: "http://keycloak.keycloak.svc.cluster.local/keycloak"
  - name: KEYCLOAK_REALM
    value: "datamigrator"
  - name: JWT_REFRESH_INTERVAL_MINUTES
    value: "1380"
  - name: SEND_EMAIL
    value: "http://admin-service-service:3000"
  - name: HEALTHCHECK_STATUS_TIMEOUT_SEC
    value: "180"
  - name: PURGE_BATCH_SIZE
    value: "50000"

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# ==============================
# Ingress for User-facing APIs
# ==============================
ingressThrottle:
  prefixPaths:
    - /api/v1/workers
    - /api/v1/jobs
    - /api/v1/job-run
    - /api/v1/tasks
  ingressClassName: public
  userDefinedAnnotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "25" # max 25 req/s per client
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "1" # 1 burst request allowed
  tls:
    enabled: false
  host: ""

# ==============================
# Ingress for CP and worker
# ==============================
ingress:
  prefixPaths:
    - /api/v1/bulk-discovery
    - /api/v1/bulk-migrate
    - /api/v1/bulk-cutover
    - /api/v1/jobs-docs
    - /api/v1/statscheck
  userDefinedAnnotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  ingressClassName: public
  tls:
    enabled: false
  host: ""
