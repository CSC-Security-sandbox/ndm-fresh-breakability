---
- name: Copy Docker image tar file to target
  copy:
    src: "../../../artifacts/datamigrator-{{ build_version }}.tar"
    dest: "{{ ansible_env.HOME }}/datamigrator-images-{{ build_version }}.tar"
    mode: '0644'
  when: local_cluster is not defined

- name: Compress datamigrator Docker image tar to reduce VM image size
  command: "gzip -1 {{ ansible_env.HOME }}/datamigrator-images-{{ build_version }}.tar"
  args:
    removes: "{{ ansible_env.HOME }}/datamigrator-images-{{ build_version }}.tar"
  when: local_cluster is not defined

- name: Copy helm chart tgz file to target
  copy:
    src: "../../../artifacts/datamigrator-{{ build_version }}.tgz"
    dest: "{{ ansible_env.HOME }}/datamigrator-helmchart-{{ build_version }}.tgz"
  when: local_cluster is not defined

- name: Template each subchart's Chart.yaml
  become: no
  local_action:
    module: template
    src: "../roles/datamigrator/helm-chart/chart.service.j2"
    dest: "../roles/datamigrator/helm-chart/package/charts/{{ item }}/Chart.yaml"
  loop: "{{ chart_names }}"
  vars:
    service_name: "{{ item }}"
  when: local_cluster is defined

- name: Template umbrella chart's Chart.yaml
  become: no
  local_action:
    module: template
    src: "../roles/datamigrator/helm-chart/chart.j2"
    dest: "../roles/datamigrator/helm-chart/package/Chart.yaml"
  when: local_cluster is defined

- name: Package each subchart
  become: no
  local_action:
    module: command
    cmd: helm package ../roles/datamigrator/helm-chart/package/charts/{{ item }} --version {{ build_version }} --destination ../roles/datamigrator/helm-chart/package
  loop: "{{ chart_names }}"
  when: local_cluster is defined

- name: Template umbrella chart's values.yaml
  become: no
  local_action:
    module: template
    src: "../roles/datamigrator/helm-chart/values.j2"
    dest: "../roles/datamigrator/helm-chart/package/values.yaml"
  when: local_cluster is defined

- name: Update umbrella chart dependencies
  become: no
  local_action:
    module: command
    cmd: helm dependency update ../roles/datamigrator/helm-chart/package
  when: local_cluster is defined

- name: Show rendered values.yaml
  become: no
  local_action:
    module: shell
    cmd: cat ../roles/datamigrator/helm-chart/package/values.yaml
  register: rendered_values
  when: local_cluster is defined

- name: Debug rendered values.yaml
  debug:
    var: rendered_values.stdout
  when: local_cluster is defined

- name: Package the umbrella chart (with templated values.yaml and Chart.yaml)
  become: no
  local_action:
    module: command
    cmd: helm package ../roles/datamigrator/helm-chart/package --version {{ build_version }} -d ../roles/datamigrator/helm-chart/package
  when: local_cluster is defined

- name: Copy the tarball to the remote host
  become: yes
  copy:
    src: "../roles/datamigrator/helm-chart/package/datamigrator-{{ build_version }}.tgz"
    dest: "{{ ansible_env.HOME }}/helm-chart.tgz"
  when: local_cluster is defined

- name: Clean up rendered subchart Chart.yaml files
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/charts/{{ item }}/Chart.yaml"
    state: absent
  loop: "{{ chart_names }}"
  ignore_errors: yes
  when: local_cluster is defined

- name: Clean up umbrella chart Chart.yaml
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/Chart.yaml"
    state: absent
  ignore_errors: yes
  when: local_cluster is defined

- name: Clean up umbrella chart values.yaml
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/values.yaml"
    state: absent
  ignore_errors: yes
  when: local_cluster is defined

- name: Clean up packaged subcharts
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/{{ item }}-{{ build_version }}.tgz"
    state: absent
  loop: "{{ chart_names }}"
  ignore_errors: yes
  when: local_cluster is defined

- name: Clean up chart.lock file
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/chart.lock"
    state: absent
  ignore_errors: yes
  when: local_cluster is defined

- name: Wait for Istio CRDs when mesh is enabled
  become: yes
  vars:
    istio_crds:
      - gateways.networking.istio.io
      - virtualservices.networking.istio.io
  shell: kubectl get crd {{ item }}
  register: istio_crd_check
  retries: 30
  delay: 10
  until: istio_crd_check.rc == 0
  loop: "{{ istio_crds }}"
  loop_control:
    label: "{{ item }}"
  when:
    - local_cluster is defined
    - enable_istio | default(false) | bool

- block:
    - name: Install Helm chart
      become: yes
      shell: "{{ helm_command }}"
      register: helm_install_output
      environment: "{{ helm_environment }}"
  rescue:
    - name: Detect Helm pending-operation failure
      ansible.builtin.set_fact:
        helm_pending_failure: "{{ 'another operation' in (ansible_failed_result.stderr | default(''))
          or 'another operation' in (ansible_failed_result.msg | default('')) }}"
    - name: Force uninstall stuck Helm release
      become: yes
      shell: helm uninstall datamigrator -n datamigrator --keep-history
      environment: "{{ helm_environment }}"
      register: helm_force_uninstall
      failed_when: false
      changed_when: helm_force_uninstall.rc == 0
      when: helm_pending_failure | bool
    - name: Retry Helm chart install after cleanup
      become: yes
      shell: "{{ helm_command }}"
      register: helm_install_output
      environment: "{{ helm_environment }}"
      when: helm_pending_failure | bool
    - name: Fail Helm install
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg }}"
      when: not helm_pending_failure | bool
  when: local_cluster is defined
  vars:
    helm_command: >-
      helm upgrade --install datamigrator -n datamigrator $HOME/helm-chart.tgz --timeout 15m
    helm_environment:
      PATH: "/snap/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      KUBECONFIG: "/var/snap/microk8s/current/credentials/client.config"

- name: Debug Helm install output
  debug:
    var: helm_install_output.stdout_lines
  when: local_cluster is defined

- name: Wait for pods to come up and handle failure
  block:
    - name: Wait for pods to come up
      become: yes
      shell: kubectl wait --namespace="datamigrator" --for=condition=Ready pod -l app.kubernetes.io/name=datamigrator
      register: kubectl_get_pods
      retries: 10
      delay: 25
      until: kubectl_get_pods.rc == 0
  rescue:
    - name: Fetch and display pod logs
      become: yes
      shell: |
        for pod in $(kubectl get pods -n datamigrator -o jsonpath='{.items[*].metadata.name}'); do
          echo "Logs for pod: $pod"
          kubectl logs -n datamigrator $pod --all-containers=true
          echo "----------------------------------------"
        done
      register: pod_logs
    - name: Display pod logs
      ansible.builtin.debug:
        msg: "{{ pod_logs.stdout }}"
    - name: Fail the play due to pod readiness failure
      fail:
        msg: "Pods did not become ready within the expected time frame."
  when: local_cluster is defined

- name: Patch Istio IngressGateway to expose Redis port 6379
  become: yes
  shell: |
    echo "Checking if port 6379 is exposed on istio-ingressgateway..."
    if ! kubectl get svc -n istio-system istio-ingressgateway -o jsonpath='{.spec.ports[*].port}' | grep -q "6379"; then
      echo "Port 6379 not found, patching service..."
      kubectl patch svc istio-ingressgateway -n istio-system --type=json -p='[
        {
          "op": "add",
          "path": "/spec/ports/-",
          "value": {
            "name": "redis-tls",
            "port": 6379,
            "protocol": "TCP",
            "targetPort": 6379
          }
        }
      ]'
      echo "Port 6379 added to istio-ingressgateway"
    else
      echo "Port 6379 already exposed, skipping"
    fi
  register: gateway_patch
  failed_when: false
  changed_when: "'added' in gateway_patch.stdout"
  environment:
    PATH: "/snap/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
    KUBECONFIG: "/var/snap/microk8s/current/credentials/client.config"
  when: 
    - enable_istio | default(false) | bool
    - redis_jwt_auth.enabled | default(false) | bool

- name: debug output
  ansible.builtin.debug:
    msg: "Get pods (datamigrator): {{ kubectl_get_pods.stdout | split('\n') }}"
  when: local_cluster is defined

- name: Check datamigrator pod status
  shell: kubectl get pods -n datamigrator
  register: pod_status
  when: local_cluster is defined

- name: Delete the tarball from the remote host
  become: yes
  file:
    path: "{{ ansible_env.HOME }}/helm-chart.tgz"
    state: absent
  when: local_cluster is defined

- name: Delete the local tarball
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/datamigrator-0.1.0.tgz"
    state: absent
  when: local_cluster is defined

- name: Delete the local values.yaml in package folder
  become: no
  local_action:
    module: file
    path: "../roles/datamigrator/helm-chart/package/values.yaml"
    state: absent
  when: local_cluster is defined