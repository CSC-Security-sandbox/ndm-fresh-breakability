- name: Cleanup service account
  become: yes
  shell: |
    kubectl delete serviceaccount -n datamigrator datamigrator-openbao-sa
  ignore_errors: yes
  when: dm_uninstall is defined

- name: delete acr pull secert when dm_uninstall is defined
  become: yes
  shell: |
    kubectl delete secret azure-dev-acr-creds --namespace datamigrator
  ignore_errors: yes
  when: dm_uninstall is defined and local_cluster is not defined

- name: Create service account and namespace
  become: yes
  shell: |
    kubectl create namespace datamigrator
    kubectl create serviceaccount -n datamigrator datamigrator-openbao-sa

- name: Create acr pull secert
  become: yes
  shell: |
    kubectl create secret docker-registry azure-dev-acr-creds \
        --namespace datamigrator \
        --docker-server={{ acr_registry }} \
        --docker-username={{ azure_client_id }} \
        --docker-password={{ azure_client_secret }}
  ignore_errors: yes
  when: local_cluster is not defined
