# ClusterRole to allow reading secrets in istio-system namespace
# This is required for config-service to fetch the Gateway TLS certificate
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datamigrator-istio-secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["datamigrator-istio-tls"]
  verbs: ["get"]
  # Restrict to istio-system namespace via ClusterRoleBinding
---
# Bind the role to the config-service service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datamigrator-config-service-istio-secret-reader
subjects:
- kind: ServiceAccount
  name: datamigrator-openbao-sa
  namespace: datamigrator
roleRef:
  kind: ClusterRole
  name: datamigrator-istio-secret-reader
  apiGroup: rbac.authorization.k8s.io
