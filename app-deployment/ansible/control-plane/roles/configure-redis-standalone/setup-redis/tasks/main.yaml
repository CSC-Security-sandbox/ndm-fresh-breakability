---
- name: Creates redis directory
  become: yes
  file:
    path: $HOME/redis
    state: directory

- name: generate random password for redis
  become: yes
  shell: |
    export REDIS_PASSWORD=$(kubectl exec -ti openbao-0 -n openbao -- bao kv get -format=json /secrets/redis-secrets/redis-creds | jq -r .data.REDIS_PASSWORD)
    echo "REDIS_PASSWORD:$REDIS_PASSWORD"
  args:
    executable: /bin/bash
  register: redis_password

- name: Set Base64-encoded password as fact
  set_fact:
    redis_password: "{{ (redis_password.stdout_lines | select('match', 'REDIS_PASSWORD:.*') | map('regex_replace', 'REDIS_PASSWORD:(.*)', '\\1') | list | first) }}"
    redis_password_base64: "{{ (redis_password.stdout_lines | select('match', 'REDIS_PASSWORD:.*') | map('regex_replace', 'REDIS_PASSWORD:(.*)', '\\1') | list | first) | b64encode }}"

- name: Retrieve admin-cli secret from OpenBao for Redis JWT auth
  become: yes
  shell: |
    export KEYCLOAK_CLIENT_SECRET=$(kubectl exec -ti openbao-0 -n openbao -- bao kv get -format=json /secrets/keycloak-secrets/keycloak-creds | jq -r .data.KEYCLOAK_CLIENT_SECRET 2>/dev/null || echo "changeme")
    echo "KEYCLOAK_CLIENT_SECRET:$KEYCLOAK_CLIENT_SECRET"
  args:
    executable: /bin/bash
  register: redis_validator_secret
  when: enable_istio | default(false) | bool

- name: Set redis_jwt_auth.client_secret from OpenBao
  set_fact:
    redis_jwt_auth: "{{ redis_jwt_auth | combine({'client_secret': (redis_validator_secret.stdout_lines | select('match', 'KEYCLOAK_CLIENT_SECRET:.*') | map('regex_replace', 'KEYCLOAK_CLIENT_SECRET:(.*)', '\\1') | list | first)}) }}"
  when: 
    - enable_istio | default(false) | bool
    - redis_validator_secret is defined

- name: redis-namespace template
  become: yes
  template: src=./templates/redis-namespace.j2 dest=$HOME/redis/redis-namespace.yaml

- name: redis configmap template
  become: yes
  template: src=./templates/redis-configmap.j2 dest=$HOME/redis/redis-configmap.yaml

- name: redis-pv template
  become: yes
  template: src=./templates/redis-pv.j2 dest=$HOME/redis/redis-pv.yaml

- name: redis-storageclass template
  become: yes
  template: src=./templates/redis-storageclass.j2 dest=$HOME/redis/redis-storageclass.yaml

- name: redis-secret template
  become: yes
  template: src=./templates/redis-secret.j2 dest=$HOME/redis/redis-secret.yaml

- name: redis-values template
  become: yes
  template: src=./templates/redis-values.j2 dest=$HOME/redis/redis-values.yaml

- name: istio-redis-jwt-envoyfilter template
  become: yes
  template: src=./templates/istio-redis-jwt-envoyfilter.j2 dest=$HOME/redis/istio-redis-jwt-envoyfilter.yaml
  when: enable_istio | default(false) | bool

- name: Copy Wasm binary from controller to VM (local deployment)
  become: yes
  copy:
    src: ../../../datamigrator/helm-chart/package/wasm/redis-jwt-auth.wasm
    dest: $HOME/redis/redis-jwt-auth.wasm
    mode: '0644'
  when: 
    - enable_istio | default(false) | bool
    - local_cluster is defined
  ignore_errors: yes

- name: Copy Helm chart for Wasm extraction (CI/CD deployment)
  become: yes
  copy:
    src: "../../../artifacts/datamigrator-{{ build_version }}.tgz"
    dest: "$HOME/helm-chart.tgz"
    mode: '0644'
  when: 
    - enable_istio | default(false) | bool
    - local_cluster is not defined
  ignore_errors: no

- name: Extract Wasm from Helm chart (CI/CD deployment)
  become: yes
  shell: |
    if [ -f "$HOME/helm-chart.tgz" ]; then
      echo "Found Helm chart: $HOME/helm-chart.tgz"
      echo "Extracting Wasm from Helm chart..."
      tar -tzf "$HOME/helm-chart.tgz" | grep wasm || echo "No wasm in tarball"
      tar -xzf "$HOME/helm-chart.tgz" -C /tmp/ 2>/dev/null || true
      
      # Find the wasm file in extracted content
      find /tmp -name "redis-jwt-auth.wasm" -exec cp {} $HOME/redis/redis-jwt-auth.wasm \;
      
      if [ -f "$HOME/redis/redis-jwt-auth.wasm" ]; then
        echo "Extracted Wasm from Helm chart"
        ls -lh $HOME/redis/redis-jwt-auth.wasm
      else
        echo "Wasm file not found after extraction"
        exit 1
      fi
    else
      echo "Helm chart not found at $HOME/helm-chart.tgz"
      exit 1
    fi
  when: 
    - enable_istio | default(false) | bool
    - local_cluster is not defined
  ignore_errors: no

- name: Cleanup service account
  become: yes
  shell: |
    kubectl delete serviceaccount -n redis redis-sa
  when: redis_uninstall is defined

- name: remove previous redis installation
  become: yes
  shell: |
    helm delete redis --namespace "redis"
    kubectl delete pvc --all --namespace "redis"
    kubectl delete -f $HOME/redis/redis-configmap.yaml
    kubectl delete -f $HOME/redis/redis-pv.yaml
    kubectl delete -f $HOME/redis/redis-storageclass.yaml
    kubectl delete -f $HOME/redis/redis-secret.yaml
    {% if enable_istio | default(false) | bool %}
    kubectl delete configmap redis-jwt-wasm --namespace=redis || true
    {% endif %}
    kubectl delete -f $HOME/redis/redis-namespace.yaml
  when: redis_uninstall is defined
  args:
    chdir: $HOME

- name: setup namespace, persistentvolume for redis
  become: yes
  shell: |
    kubectl apply -f $HOME/redis/redis-namespace.yaml
    kubectl apply -f $HOME/redis/redis-storageclass.yaml
    kubectl apply -f $HOME/redis/redis-pv.yaml
    kubectl apply -f $HOME/redis/redis-configmap.yaml  
    kubectl apply -f $HOME/redis/redis-secret.yaml
  args:
    chdir: $HOME

- name: Create Wasm ConfigMap in redis namespace
  become: yes
  shell: |
    if [ -f "$HOME/redis/redis-jwt-auth.wasm" ]; then
      echo "Creating/updating Wasm ConfigMap..."
      
      # Check if ConfigMap exists
      if kubectl get configmap redis-jwt-wasm --namespace=redis >/dev/null 2>&1; then
        echo "ConfigMap exists, updating..."
        kubectl create configmap redis-jwt-wasm \
          --from-file=redis-jwt-auth.wasm=$HOME/redis/redis-jwt-auth.wasm \
          --namespace=redis \
          --dry-run=client -o yaml | \
          kubectl apply -f -
      else
        echo "ConfigMap does not exist, creating..."
        kubectl create configmap redis-jwt-wasm \
          --from-file=redis-jwt-auth.wasm=$HOME/redis/redis-jwt-auth.wasm \
          --namespace=redis
      fi
      
      echo "Wasm ConfigMap created/updated successfully"
    else
      echo "Wasm binary not found at $HOME/redis/redis-jwt-auth.wasm, skipping ConfigMap creation"
      exit 1
    fi
  when: enable_istio | default(false) | bool

- name: Create service account
  become: yes
  shell: |
    kubectl create serviceaccount -n redis redis-sa

- name: Apply Redis JWT EnvoyFilter before deploying Redis
  become: yes
  shell: |
    kubectl apply -f $HOME/redis/istio-redis-jwt-envoyfilter.yaml
  when: enable_istio | default(false) | bool

- name: Deploy redis helm chart
  become: yes
  shell: |
    helm upgrade --install redis oci://registry-1.docker.io/bitnamicharts/redis -f $HOME/redis/redis-values.yaml --namespace "redis" --version "{{ redis_version }}"
    exit 0
  args:
    executable: /bin/bash
  register: SHELL_STDOUT

- name: debug output
  ansible.builtin.debug:
    msg: "Helm Install (redis): stderr: {{ SHELL_STDOUT.stderr_lines }} stdout: {{ SHELL_STDOUT.stdout_lines }}"

- name: Wait for 20 seconds before waiting for pods to come up
  ansible.builtin.pause:
    seconds: 20

- name: Wait for pods to come up and handle failure
  block:
    - name: Wait for pods to come up
      become: yes
      shell: |
        kubectl wait --namespace="redis" --for=condition=Ready pod --all
      register: kubectl_get_pods
      retries: 5
      delay: 25
      until: kubectl_get_pods.rc == 0

    - name: debug output
      ansible.builtin.debug:
        msg: "Get pods (redis): {{ kubectl_get_pods.stdout | split('\n') }}"

    - name: Check redis pod status
      shell: kubectl get pods -n redis
      register: pod_status

    - debug:
        var: pod_status.stdout
  rescue:
    - name: Fetch and display pod logs
      become: yes
      shell: |
        for pod in $(kubectl get pods -n redis -o jsonpath='{.items[*].metadata.name}'); do
          echo "Logs for pod: $pod"
          kubectl logs -n redis --tail=20 $pod --all-containers=true
          echo "----------------------------------------"
        done
      register: pod_logs
    - name: Display pod logs
      ansible.builtin.debug:
        msg: "{{ pod_logs.stdout }}"
    - name: Fail the play due to pod readiness failure
      fail:
        msg: "Pods did not become ready within the expected time frame."

- name: Delete redis directory
  become: yes
  file:
    state: absent
    path: $HOME/redis
