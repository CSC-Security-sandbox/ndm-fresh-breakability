apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-exporter-queries
  namespace: postgres
data:
  queries.yaml: |
    pg_stat_statements:
      query: "SELECT
                pg_get_userbyid(userid) as user,
                pg_database.datname,
                pg_stat_statements.queryid,
                pg_stat_statements.query,
                pg_stat_statements.calls,  
                pg_stat_statements.rows,
                pg_stat_statements.shared_blks_hit,
                pg_stat_statements.shared_blks_read,
                pg_stat_statements.shared_blks_dirtied,
                pg_stat_statements.shared_blks_written,
                pg_stat_statements.local_blks_hit,
                pg_stat_statements.local_blks_read,
                pg_stat_statements.local_blks_dirtied,
                pg_stat_statements.local_blks_written,
                pg_stat_statements.temp_blks_read,
                pg_stat_statements.temp_blks_written
             FROM pg_stat_statements
             JOIN pg_database
             ON pg_database.oid = pg_stat_statements.dbid"
      metrics:
        - user:
            usage: "LABEL"
            description: "The user who executed the statement"
        - datname:
            usage: "LABEL"
            description: "Database name"
        - queryid:
            usage: "LABEL"
            description: "Internal query hash"
        - query:
            usage: "LABEL"
            description: "SQL text"
        - calls:
            usage: "COUNTER"
            description: "Executions"
        - time_milliseconds:
            usage: "COUNTER"
            description: "Execution time in ms"
        - rows:
            usage: "COUNTER"
            description: "Rows affected"
        - shared_blks_hit:
            usage: "COUNTER"
            description: "Shared hits"
        - shared_blks_read:
            usage: "COUNTER"
            description: "Shared reads"
        - shared_blks_dirtied:
            usage: "COUNTER"
            description: "Shared dirtied"
        - shared_blks_written:
            usage: "COUNTER"
            description: "Shared written"
        - local_blks_hit:
            usage: "COUNTER"
            description: "Local hits"
