---
- name: Creates redis directory
  become: yes
  file:
    path: $HOME/redis
    state: directory

- name: generate random password for redis
  become: yes
  shell: |
    export REDIS_PASSWORD=$(kubectl exec -ti openbao-0 -n openbao -- bao kv get -format=json /secrets/redis-secrets/redis-creds | jq -r .data.REDIS_PASSWORD)
    echo "REDIS_PASSWORD:$REDIS_PASSWORD"
  args:
    executable: /bin/bash
  register: redis_password

- name: Set Base64-encoded password as fact
  set_fact:
    redis_password: "{{ (redis_password.stdout_lines | select('match', 'REDIS_PASSWORD:.*') | map('regex_replace', 'REDIS_PASSWORD:(.*)', '\\1') | list | first) }}"
    redis_password_base64: "{{ (redis_password.stdout_lines | select('match', 'REDIS_PASSWORD:.*') | map('regex_replace', 'REDIS_PASSWORD:(.*)', '\\1') | list | first) | b64encode }}"

- name: redis-namespace template
  become: yes
  template: src=./templates/redis-namespace.j2 dest=$HOME/redis/redis-namespace.yaml

- name: redis configmap template
  become: yes
  template: src=./templates/redis-configmap.j2 dest=$HOME/redis/redis-configmap.yaml

- name: redis-pv template
  become: yes
  template: src=./templates/redis-pv.j2 dest=$HOME/redis/redis-pv.yaml

- name: redis-storageclass template
  become: yes
  template: src=./templates/redis-storageclass.j2 dest=$HOME/redis/redis-storageclass.yaml

- name: redis-secret template
  become: yes
  template: src=./templates/redis-secret.j2 dest=$HOME/redis/redis-secret.yaml

- name: redis-values template
  become: yes
  template: src=./templates/redis-values.j2 dest=$HOME/redis/redis-values.yaml

- name: Cleanup service account
  become: yes
  shell: |
    kubectl delete serviceaccount -n redis redis-sa
  when: redis_uninstall is defined

- name: remove previous redis installation
  become: yes
  shell: |
    helm delete redis-cluster --namespace "redis"
    kubectl delete pvc --all --namespace "redis"
    kubectl delete -f $HOME/redis/redis-configmap.yaml
    kubectl delete -f $HOME/redis/redis-pv.yaml
    kubectl delete -f $HOME/redis/redis-storageclass.yaml
    kubectl delete -f $HOME/redis/redis-secret.yaml
    kubectl delete -f $HOME/redis/redis-namespace.yaml
  when: redis_uninstall is defined
  args:
    chdir: $HOME

- name: setup namespace, persistentvolume for redis
  become: yes
  shell: |
    kubectl apply -f $HOME/redis/redis-namespace.yaml
    kubectl apply -f $HOME/redis/redis-storageclass.yaml
    kubectl apply -f $HOME/redis/redis-pv.yaml
    kubectl apply -f $HOME/redis/redis-configmap.yaml  
    kubectl apply -f $HOME/redis/redis-secret.yaml
  args:
    chdir: $HOME

- name: Create service account
  become: yes
  shell: |
    kubectl create serviceaccount -n redis redis-sa

- name: Deploy redis helm chart
  become: yes
  shell: |
    helm upgrade --install redis-cluster oci://registry-1.docker.io/bitnamicharts/redis-cluster -f $HOME/redis/redis-values.yaml --namespace "redis" --version "{{ redis_version }}"
    exit 0
  args:
    executable: /bin/bash
  register: SHELL_STDOUT

- name: debug output
  ansible.builtin.debug:
    msg: "Helm Install (redis): stderr: {{ SHELL_STDOUT.stderr_lines }} stdout: {{ SHELL_STDOUT.stdout_lines }}"

- name: Wait for 20 seconds before waiting for pods to come up
  ansible.builtin.pause:
    seconds: 20

- name: wait for pods to come up
  become: yes
  shell: kubectl wait --namespace="redis" --for=condition=Ready pod --all
  register: kubectl_get_pods
  retries: 10
  delay: 25
  until: kubectl_get_pods.rc == 0

- name: debug output
  ansible.builtin.debug:
    msg: "Get pods (redis): {{ kubectl_get_pods.stdout | split('\n') }}"

- name: Check redis pod status
  shell: kubectl get pods -n redis
  register: pod_status

- debug:
    var: pod_status.stdout

- name: Delete redis directory
  become: yes
  file:
    state: absent
    path: $HOME/redis
