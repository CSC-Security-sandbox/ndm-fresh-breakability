# ============================================================================
# Temporal mTLS Configuration
# ============================================================================
# IMPORTANT: This must match the control plane configuration in
# app-deployment/ansible/control-plane/config/group_vars/all.yaml
#
# When temporal_mtls.enabled is true:
# - Worker will use TLS + JWT to connect to Temporal via Istio Gateway
# - NODE_TLS_REJECT_UNAUTHORIZED=0 to accept self-signed certificates
#
# When temporal_mtls.enabled is false:
# - Worker connects to Temporal without TLS (legacy mode)
temporal_mtls:
  enabled: true  # Must match control plane setting
  jwt_auth:
    enabled: true  # Must match control plane setting
  # TLS server name must match the CN or SAN in the Istio Gateway certificate
  # For local dev: 'datamigrator.local'
  # For deployed env: set to your gateway's hostname (e.g., 'temporal.company.com')
  tls_server_name: "datamigrator.local"
