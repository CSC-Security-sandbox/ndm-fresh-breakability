---
- name: 2.1. Update apt package index
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: 2.2. Ensure essential packages are installed
  apt:
    name:
      - nfs-common
      - smbclient
      - xmlstarlet
    state: present

# Disable ICMP redirects for security
- name: Disable ICMP redirects
  sysctl:
    name: "{{ item }}"
    value: '0'
    state: present
    reload: yes
    sysctl_set: yes
  loop:
    # Disable sending of ICMP redirects
    - net.ipv4.conf.all.send_redirects
    - net.ipv4.conf.default.send_redirects
    # Disable acceptance of ICMP redirects
    - net.ipv4.conf.all.accept_redirects
    - net.ipv4.conf.default.accept_redirects
    - net.ipv6.conf.all.accept_redirects
    - net.ipv6.conf.default.accept_redirects
    # Disable secure ICMP redirects
    - net.ipv4.conf.all.secure_redirects
    - net.ipv4.conf.default.secure_redirects

- name: 2.3. Copy systemd service file for boot script
  become: yes
  template:
    src: ./templates/start-rpc-statd-service.j2
    dest: /etc/systemd/system/start-rpc-statd.service
    owner: root
    group: root
    mode: "0644"

- name: 2.4. Reload systemd daemon
  become: yes
  command: systemctl daemon-reload

- name: 2.5. Enable the start-rpc-statd service
  become: yes
  systemd:
    name: start-rpc-statd.service
    enabled: yes

- name: 2.6. Start the service
  become: yes
  systemd:
    name: start-rpc-statd.service
    state: started
  when: local_cluster is defined

- name: 2.7. Get MAC address for unique hostname
  shell: |
    # Get MAC address from primary network interface
    DEFAULT_IFACE=$(ip route | grep default | awk '{print $5}' | head -n1 2>/dev/null)
    if [ -n "$DEFAULT_IFACE" ] && [ -f "/sys/class/net/$DEFAULT_IFACE/address" ]; then
      cat /sys/class/net/$DEFAULT_IFACE/address | tr -d ':' | tr '[:upper:]' '[:lower:]'
    else
      # Fallback: get first non-loopback interface
      for iface in /sys/class/net/*; do
        iface_name=$(basename $iface)
        if [ "$iface_name" != "lo" ] && [ -f "$iface/address" ]; then
          cat $iface/address | tr -d ':' | tr '[:upper:]' '[:lower:]'
          break
        fi
      done
    fi
  register: mac_address_result
  changed_when: false

- name: 2.8. Generate unique hostname using MAC address
  set_fact:
    unique_hostname: "datamigrator-worker-{{ mac_address_result.stdout if mac_address_result.stdout else ansible_date_time.epoch }}"

- name: 2.9. Set the unique hostname
  command: hostnamectl set-hostname "{{ unique_hostname }}"
  
- name: 2.10. Update /etc/hostname file
  copy:
    content: "{{ unique_hostname }}"
    dest: /etc/hostname
    owner: root
    group: root
    mode: '0644'

- name: 2.11. Update /etc/hosts for local resolution
  copy:
    content: |
      127.0.0.1 localhost {{ unique_hostname }}
      ::1 localhost {{ unique_hostname }}
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'

- name: Set recommended SSH ciphers
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Ciphers'
    line: 'Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr'
    state: present
  notify: Restart SSH

- name: Set recommended SSH MACs
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MACs'
    line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-512,hmac-sha2-256,umac-128@openssh.com'
    state: present
  notify: Restart SSH
